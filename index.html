mi-annually", "B) Eurobonds are exchange-traded; gilts are OTC", "C) Eurobonds are issued by governments; gilts are issued by corporations", "D) Eurobonds settle T+1; gilts settle T+2"], "ans_letter": "A", "ans_full": "A — Eurobonds pay annual coupons (once per year); UK gilts pay semi-annual coupons. Both are generally paid gross."}, {"id": "1.6.2", "q": "The secondary market for Eurobonds is regulated by:", "opts": ["A) The FCA", "B) The European Central Bank", "C) The International Capital Market Association (ICMA)", "D) Euroclear"], "ans_letter": "C", "ans_full": "C — The secondary OTC market for Eurobonds is regulated by the International Capital Market Association (ICMA), which sets standards and conventions for the market."}, {"id": "1.6.3", "q": "Which of the following are the two International Central Securities Depositories (ICSDs) for Eurobonds?", "opts": ["A) CREST and DTC", "B) Euroclear and Clearstream", "C) Euroclear and SWIFT", "D) Clearstream and CREST"], "ans_letter": "B", "ans_full": "B — Euroclear (Belgium) and Clearstream (Luxembourg) are the two ICSDs used for settling Eurobond transactions."}, {"id": "1.7.1", "q": "How do capital markets enable the separation of beneficial ownership and control?", "opts": ["A) By requiring all shareholders to be involved in management decisions", "B) By making shares tradeable and providing limited liability, so investors can provide capital without managing the business", "C) By requiring directors to own a majority of company shares", "D) By prohibiting directors from owning any shares"], "ans_letter": "B", "ans_full": "B — Tradeable shares and limited liability allow investors to provide capital without being involved in management, creating the separation of ownership and control."}, {"id": "1.7.2", "q": "In the investment chain, a pension fund trustee investing on behalf of a pension scheme member is BEST described as:", "opts": ["A) A principal acting for an agent", "B) An agent acting on behalf of the principal (pension scheme member)", "C) A beneficial owner of the company", "D) A designated market maker"], "ans_letter": "B", "ans_full": "B — The pension fund trustee is an agent acting on behalf of the principal (the pension scheme member/beneficiary). The member is the beneficial owner of the pension assets."}, {"id": "1.7.3", "q": "A CEO approves a large, value-destroying acquisition primarily to increase the size of the empire they manage and enhance their own status. This is an example of:", "opts": ["A) Efficient capital allocation", "B) The agency/principal-agent problem — management pursuing own interests over shareholders'", "C) Transparent corporate governance", "D) A special resolution requirement"], "ans_letter": "B", "ans_full": "B — This is a classic example of the agency problem: the CEO (agent) is acting in their own interest (empire-building) rather than in the interest of shareholders (principals)."}, {"id": "1.7.4", "q": "A company director awards a construction contract to a firm owned by their family, at a price above market rate. This is BEST described as:", "opts": ["A) Perquisites", "B) Self-dealing", "C) Higher cost of capital", "D) Information asymmetry"], "ans_letter": "B", "ans_full": "B — Self-dealing occurs when a director enters into a transaction that personally benefits them (here, benefiting their family) at the company's expense."}, {"id": "1.7.4", "q": "Investors in a company demand a higher expected return because they are concerned about management acting in their own interests. This BEST illustrates which agency cost?", "opts": ["A) Perquisites", "B) Expropriation", "C) Higher cost of capital", "D) Self-dealing"], "ans_letter": "C", "ans_full": "C — A higher cost of capital is an agency cost: when investors know the agency problem exists, they require a higher return (risk premium) to compensate, making capital raising more expensive for the firm."}, {"id": "1.7.5", "q": "Which of the following BEST describes why reducing the principal-agent problem benefits society as a whole?", "opts": ["A) It increases the earnings of investment managers", "B) It enables directors to take on more risk for shareholders", "C) It leads to more efficient capital allocation, lower cost of capital and better returns for savers", "D) It reduces the need for regulation, lowering compliance costs"], "ans_letter": "C", "ans_full": "C — Reducing the agency problem means capital is allocated more efficiently, the cost of capital falls, and savers and investors receive better returns — benefiting the economy and society broadly."}], "2": [{"id": "2.1.1", "q": "Why is ethics PARTICULARLY important in investment management compared to many other industries?", "opts": ["A) Investment managers are subject to less regulation than other professionals", "B) Clients typically cannot evaluate the quality of investment advice due to information asymmetry, creating a fiduciary relationship", "C) Investment returns are guaranteed so ethical behaviour has no financial consequences", "D) The investment industry is too small to have wider social impact"], "ans_letter": "B", "ans_full": "B — The key reason ethics matters so much in investment is information asymmetry: clients lack the knowledge to judge whether advice or actions are in their interests. This makes the fiduciary duty to act ethically essential."}, {"id": "2.1.1", "q": "Which of the following BEST describes what would happen to financial markets if widespread unethical behaviour went unchecked?", "opts": ["A) Market prices would become more accurate", "B) Trading volumes and spreads would remain unchanged", "C) Investors would lose trust in market integrity, reducing participation and raising the cost of capital", "D) Regulation would be eliminated, reducing costs for all participants"], "ans_letter": "C", "ans_full": "C — Unethical behaviour (e.g. insider trading, manipulation) destroys trust in market integrity. Without that trust, investors withdraw, reducing liquidity, increasing spreads and raising the cost of capital."}, {"id": "2.1.2", "q": "A fund manager buys shares for their personal account after receiving a large client buy order, knowing the client's order will push the price up. This is BEST described as:", "opts": ["A) A positive behavioural indicator — acting on good information", "B) Front-running — a negative behavioural indicator that puts personal interests ahead of the client", "C) Diligent research — a positive indicator of investment skill", "D) Fair dealing — allowed as long as it is disclosed"], "ans_letter": "B", "ans_full": "B — Front-running (trading for personal account ahead of known client orders) is a clear negative behavioural indicator and a serious ethical and regulatory breach."}, {"id": "2.1.2", "q": "Which of the following is a POSITIVE behavioural indicator?", "opts": ["A) Recommending high-commission products that are not suitable for the client", "B) Treating different clients differently based on their account size", "C) Disclosing a conflict of interest before providing investment advice", "D) Guaranteeing a minimum return on a volatile equity fund"], "ans_letter": "C", "ans_full": "C — Disclosing conflicts of interest is a key positive behavioural indicator. It allows clients to assess the objectivity of advice and is required under CFA Standard VI(A)."}, {"id": "2.1.3", "q": "An investment professional plans to leave their firm and start independent practice. Under CFA ethics, they should:", "opts": ["A) Immediately start building their new client book using the firm's client list", "B) Continue acting in the employer's best interests until resignation takes effect and obtain prior permission for independent practice", "C) Begin soliciting clients as soon as they hand in their notice", "D) Disclose confidential firm information to prospective clients to win business"], "ans_letter": "B", "ans_full": "B — Standard IV(A) requires loyalty to the employer. An investment professional must continue acting in the employer's best interests until resignation takes effect, and must obtain prior permission before undertaking independent practice."}, {"id": "2.1.3", "q": "A client reveals to their adviser that they are evading tax. The adviser's obligation of confidentiality means they:", "opts": ["A) Must never disclose this information under any circumstances", "B) May be required to disclose this information as it concerns illegal activity", "C) Can disclose only if the client gives written consent", "D) Must report it immediately to the FCA"], "ans_letter": "B", "ans_full": "B — Under Standard III(E), confidentiality may be broken where the information concerns illegal activity (or where disclosure is required by law). Tax evasion is illegal activity."}, {"id": "2.1.4", "q": "An investment adviser engages in widespread churning of client accounts. Which of the following is a likely consequence FOR THE FIRM?", "opts": ["A) Increased client loyalty and retention", "B) Regulatory fines, potential loss of FCA authorisation and civil litigation from harmed clients", "C) Higher revenues with no regulatory risk if clients signed terms and conditions", "D) Reduced compliance costs"], "ans_letter": "B", "ans_full": "B — Churning is a serious regulatory breach. The firm faces FCA enforcement action, potential loss of authorisation, and civil suits from clients who suffered losses from excessive trading costs."}, {"id": "2.1.4", "q": "A scandal where multiple advisers at a major bank provide unsuitable pension advice to thousands of retail clients would MOST likely result in which industry-level consequence?", "opts": ["A) Reduced regulatory oversight of pension advice", "B) Increased consumer trust in financial advisers", "C) Increased regulatory requirements and scrutiny across the entire advice industry", "D) Higher profits for other advisory firms"], "ans_letter": "C", "ans_full": "C — Widespread unethical behaviour typically triggers a regulatory response affecting the whole industry, not just the offending firm."}, {"id": "2.1.5", "q": "An investment firm follows all regulatory rules to the letter but routinely places clients in high-cost products that barely meet suitability requirements. This BEST illustrates:", "opts": ["A) Exemplary ethical behaviour", "B) The risk of a compliance-only culture — technically legal but not acting in the spirit of client protection", "C) Best execution — the firm is following all rules", "D) A breach of criminal law"], "ans_letter": "B", "ans_full": "B — Following the letter but not the spirit of the rules is the hallmark of a compliance-only culture. The firm is technically compliant but not acting in the client's best interest, which falls short of true ethical behaviour."}, {"id": "2.1.5", "q": "Under the CFA Code and Standards, if local law is LESS strict than the Code, members should:", "opts": ["A) Follow local law only, as it takes precedence", "B) Follow the stricter requirement — the CFA Code and Standards", "C) Follow whichever is more convenient", "D) Seek a waiver from the CFA Institute"], "ans_letter": "B", "ans_full": "B — Under Standard I(A), when the law and the CFA Code conflict, members must comply with the more strict requirement. If local law is less strict, the CFA Code applies."}, {"id": "2.2.1", "q": "How many elements does the CFA Code of Ethics contain?", "opts": ["A) 4", "B) 5", "C) 6", "D) 7"], "ans_letter": "C", "ans_full": "C — The CFA Code of Ethics contains six elements."}, {"id": "2.2.1", "q": "Under which Standard of Professional Conduct would the prohibition on acting on material non-public information be found?", "opts": ["A) Standard I — Professionalism", "B) Standard II — Integrity of Capital Markets", "C) Standard III — Duties to Clients", "D) Standard VI — Conflicts of Interest"], "ans_letter": "B", "ans_full": "B — Prohibition on material non-public information is covered under Standard II(A) — Integrity of Capital Markets."}, {"id": "2.2.2", "q": "Which of the following BEST describes the priority order of interests under the CFA Code of Ethics?", "opts": ["A) Personal interests → employer → clients", "B) Employer → personal interests → clients", "C) Clients → employer → personal interests", "D) Clients and personal interests equally, then employer"], "ans_letter": "C", "ans_full": "C — The CFA Code places clients' interests first, employer interests second, and personal interests last. This reflects the fiduciary nature of investment management."}, {"id": "2.2.2", "q": "An analyst receives an expensive watch from a company she covers. The CFA principle of independence and objectivity MOST directly requires her to:", "opts": ["A) Accept the gift but disclose it to the client", "B) Decline the gift, as it could compromise her independence and objectivity", "C) Accept it since it is a token of appreciation with no strings attached", "D) Only refuse if the gift is worth more than £100"], "ans_letter": "B", "ans_full": "B — Standard I(B) requires investment professionals to maintain independence and objectivity. Accepting lavish gifts from companies they cover could compromise their analysis and should be declined."}, {"id": "2.2.3", "q": "A fund manager inadvertently overhears two company directors discussing an unannounced acquisition. Under Standard II(A), the manager should:", "opts": ["A) Trade immediately before the information becomes public to benefit clients", "B) Not trade on or communicate this information; report to compliance and implement information barriers", "C) Trade only for their personal account, not for client accounts", "D) Confirm the information with the company before trading"], "ans_letter": "B", "ans_full": "B — Standard II(A) prohibits acting on material non-public information. The manager must not trade on it or tip others, and should report to compliance. Firewalls exist precisely to handle this."}, {"id": "2.2.3", "q": "A broker uses client dealing commission to subscribe to an investment research service. Under the CFA Standards, this is:", "opts": ["A) Always prohibited under Standard III(A) — dealing commission must be kept by the broker", "B) Acceptable under Standard III(A) provided the research service benefits the clients whose commission was used", "C) Only permitted if the client provides written consent", "D) Prohibited regardless of who benefits from the research"], "ans_letter": "B", "ans_full": "B — Standard III(A) permits 'soft commission' arrangements (using dealing commission to purchase research or services) provided those goods/services benefit the clients whose commission was used."}, {"id": "2.2.3", "q": "An analyst is asked to recommend a company's shares. She personally holds a significant stake in that company. Under Standard VI(A), she should:", "opts": ["A) Refuse to cover the company entirely", "B) Issue the recommendation without mentioning her stake", "C) Disclose her personal holding before issuing any recommendation, allowing clients to assess her objectivity", "D) Transfer her shares to a family member first"], "ans_letter": "C", "ans_full": "C — Standard VI(A) requires full disclosure of conflicts of interest so that clients can evaluate the objectivity of the advice. Disclosure, not necessarily divestment, is required."}], "3": [{"id": "3.1.1", "q": "Which body is responsible for macro-prudential regulation — monitoring risks to the financial system as a whole?", "opts": ["A) The FCA", "B) The PRA", "C) The Financial Policy Committee (FPC)", "D) HM Treasury"], "ans_letter": "C", "ans_full": "C — The FPC (a committee of the Bank of England) is responsible for macro-prudential regulation and monitoring systemic risk across the whole financial system."}, {"id": "3.1.1", "q": "A large UK bank is subject to regulation by both the FCA and PRA. The FCA's role in this context is:", "opts": ["A) Prudential regulation — ensuring the bank holds sufficient capital", "B) Conduct regulation — how the bank treats its customers and operates in markets", "C) Setting monetary policy via interest rates", "D) Approving all bank mergers"], "ans_letter": "B", "ans_full": "B — The FCA handles conduct regulation (how firms treat customers, market integrity). The PRA handles prudential regulation (capital, safety and soundness)."}, {"id": "3.1.2", "q": "A dual-regulated insurance firm is found to have insufficient capital reserves AND to have mis-sold products to retail customers. Which regulator addresses each issue?", "opts": ["A) FCA handles both", "B) PRA handles capital; FCA handles mis-selling", "C) FCA handles capital; PRA handles mis-selling", "D) PRA handles both"], "ans_letter": "B", "ans_full": "B — The PRA addresses prudential issues (insufficient capital). The FCA addresses conduct issues (mis-selling to retail customers)."}, {"id": "3.1.3", "q": "Under FSMA 2000, what happens if a firm carries on regulated investment business without authorisation?", "opts": ["A) It receives a civil fine only", "B) It commits a criminal offence", "C) It must simply apply for retrospective authorisation", "D) Nothing — regulation is voluntary"], "ans_letter": "B", "ans_full": "B — Carrying on a regulated activity without authorisation or exemption is a criminal offence under FSMA 2000."}, {"id": "3.1.4", "q": "Which of the following is NOT a 'specified investment' under the RAO?", "opts": ["A) A corporate bond", "B) A unit in a collective investment scheme", "C) Physical gold bullion", "D) A share option"], "ans_letter": "C", "ans_full": "C — Physical commodities (such as gold bullion) are excluded from specified investments under the RAO. However, a derivative on gold would be included."}, {"id": "3.1.5", "q": "A merger would result in the combined company controlling 30% of the UK market. The CMA:", "opts": ["A) Has no jurisdiction as 30% is below the 50% threshold", "B) May investigate as the 25% share of supply test is met", "C) Can only intervene if both companies have turnover above £350m", "D) Must automatically block the merger"], "ans_letter": "B", "ans_full": "B — The CMA can investigate where the merged company would control greater than 25% of the UK market. Controlling 30% meets this threshold."}, {"id": "3.1.6", "q": "The Takeover Panel is partially funded by:", "opts": ["A) FCA authorisation fees", "B) The PTM levy on equity transactions above £10,000", "C) A government grant from HM Treasury", "D) Fees charged to takeover bidders"], "ans_letter": "B", "ans_full": "B — The Takeover Panel is partially funded by the PTM (Panel on Takeovers and Mergers) levy of £1.50 on purchases and sales of equities exceeding £10,000."}, {"id": "3.1.7", "q": "The City Code on Takeovers and Mergers is best described as:", "opts": ["A) A piece of primary legislation (Act of Parliament)", "B) A non-statutory code enforced by the Takeover Panel with statutory backing from FSMA 2000", "C) An EU directive that has been retained post-Brexit", "D) Voluntary guidance only — firms can opt out"], "ans_letter": "B", "ans_full": "B — The City Code is non-statutory (not legislation itself) but the Takeover Panel has statutory enforcement powers under FSMA 2000, making it legally binding on relevant parties."}, {"id": "3.1.8", "q": "An investor acquires 32% of a listed company's voting rights. Under the City Code, they must:", "opts": ["A) Make a voluntary offer to shareholders at any price they choose", "B) Make a mandatory cash offer to ALL remaining shareholders at the highest price paid in the previous year", "C) Notify the FCA but no offer is required until they reach 50%", "D) Only make an offer if other shareholders demand one"], "ans_letter": "B", "ans_full": "B — Under Rule 9 of the City Code, acquiring 30% or more of voting rights triggers a mandatory cash offer to all remaining shareholders at the highest price paid in the previous 12 months."}, {"id": "3.1.8", "q": "A bidder holds 92% of a target company's shares following an offer. Under the City Code, the bidder:", "opts": ["A) Cannot acquire the remaining 8% without their consent", "B) May compulsorily acquire the remaining minority shares at the offer price", "C) Must make a new offer to the remaining shareholders", "D) Must sell down to 75% within 6 months"], "ans_letter": "B", "ans_full": "B — At 90% or more of voting rights, the bidder can exercise squeeze-out rights and compulsorily acquire the remaining minority shares at the offer price."}, {"id": "3.1.9", "q": "The Pension Protection Fund (PPF) was established under which legislation?", "opts": ["A) Pension Schemes Act 2021", "B) Pensions Act 1995", "C) Pensions Act 2004", "D) FSMA 2000"], "ans_letter": "C", "ans_full": "C — The Pension Protection Fund was established by the Pensions Act 2004, alongside The Pensions Regulator."}, {"id": "3.1.9", "q": "Under the Pensions Act 2004, a DB pension scheme's statement of funding principles must be reviewed at least every:", "opts": ["A) Year", "B) Two years", "C) Three years", "D) Five years"], "ans_letter": "C", "ans_full": "C — The statement of funding principles must be reviewed at least every three years."}, {"id": "3.1.10", "q": "What is the significance of an FCA-recognised industry code for a firm that follows it?", "opts": ["A) The firm is exempt from all FCA supervision", "B) Following it provides evidence of good conduct and may provide protection in FCA enforcement proceedings", "C) The firm no longer needs a Part 4A permission", "D) The code replaces FCA Handbook rules"], "ans_letter": "B", "ans_full": "B — An FCA-recognised industry code supplements FCA rules. Adhering to it provides evidence of proper behaviour that can be considered in regulatory and enforcement proceedings."}, {"id": "3.2.1", "q": "How does an EU Regulation differ from an EU Directive in terms of application?", "opts": ["A) Directives apply immediately; Regulations require national implementation", "B) Regulations apply immediately in all member states; Directives require national implementation", "C) Both require national implementation through primary legislation", "D) Neither has any effect in the UK post-Brexit"], "ans_letter": "B", "ans_full": "B — EU Regulations are directly binding in all EU member states without needing to be implemented by national legislation. EU Directives require member states to enact national legislation to give effect to them."}, {"id": "3.2.2", "q": "What is the primary purpose of the Financial Services and Markets Act 2023?", "opts": ["A) To re-join the EU financial services single market", "B) To give the FCA and PRA greater rule-making powers previously set by EU law, enabling UK-specific reforms", "C) To abolish the FCA and replace it with a new body", "D) To introduce new criminal penalties for market abuse"], "ans_letter": "B", "ans_full": "B — FSMA 2023 enables the UK to diverge from and replace retained EU financial services law with UK-tailored rules, giving the FCA and PRA new rule-making powers."}, {"id": "3.2.3", "q": "Which of the following was a KEY change introduced by MiFID II compared to MiFID I?", "opts": ["A) Introduction of the single passport for EU-wide trading", "B) Introduction of the Organised Trading Facility (OTF) as a new trading venue category", "C) Creation of the FCA as the UK's conduct regulator", "D) Introduction of the UCITS framework"], "ans_letter": "B", "ans_full": "B — MiFID II introduced the Organised Trading Facility (OTF) as a new category of trading venue, alongside existing Regulated Markets (exchanges) and MTFs."}, {"id": "3.2.4", "q": "Following Brexit, UK UCITS funds are treated within the EU as:", "opts": ["A) Fully recognised UCITS with automatic passporting rights", "B) Third-country Alternative Investment Funds (AIFs)", "C) Exempt from EU fund regulation entirely", "D) Equivalent to EEA UCITS under the OFR"], "ans_letter": "B", "ans_full": "B — Post-Brexit, UK UCITS funds lost their EU UCITS passport and are now treated within the EU as third-country AIFs, requiring separate national approvals in each EU member state."}, {"id": "3.2.5", "q": "Under AIFMD UK, an AIF manager using leverage must apply for FCA authorisation when assets under management exceed:", "opts": ["A) €50 million", "B) €100 million", "C) €500 million", "D) €1 billion"], "ans_letter": "B", "ans_full": "B — The authorisation threshold for AIFMs using leverage is €100 million AUM. For unleveraged AIFs with a 5-year lock-up, the threshold is €500 million."}, {"id": "3.2.6", "q": "Under UK EMIR, what must happen to OTC derivatives that are subject to the clearing obligation?", "opts": ["A) They must be reported to HM Treasury within 24 hours", "B) They must be traded on an exchange", "C) They must be cleared through an authorised central counterparty (CCP)", "D) They must be collateralised with UK government bonds"], "ans_letter": "C", "ans_full": "C — UK EMIR requires OTC derivatives subject to the clearing obligation to be cleared through an authorised CCP, reducing bilateral counterparty risk."}, {"id": "3.2.7", "q": "Under the UK Benchmarks Regulation, what must a firm that uses a benchmark have in place in case the benchmark ceases or materially changes?", "opts": ["A) Authorisation from the FCA to use an alternative benchmark", "B) A robust written fallback plan for what to do if the benchmark ceases", "C) A formal agreement with the benchmark administrator", "D) A daily reconciliation of the benchmark against SONIA"], "ans_letter": "B", "ans_full": "B — UK BMR requires firms that use benchmarks to have robust written fallback provisions setting out what they will do if a benchmark ceases to be produced or materially changes."}, {"id": "3.2.8", "q": "Under FATCA, what is the consequence for a foreign financial institution (FFI) that fails to comply with reporting obligations?", "opts": ["A) Criminal prosecution in the UK courts", "B) A 30% withholding tax on US-source income payments", "C) Loss of FCA authorisation", "D) A fine of up to 4% of global turnover"], "ans_letter": "B", "ans_full": "B — Under FATCA, non-compliant FFIs face a 30% withholding tax on US-source payments such as dividends, interest and proceeds from US securities."}, {"id": "3.3.1", "q": "Which of the following is NOT one of the FCA's operational objectives?", "opts": ["A) Securing appropriate consumer protection", "B) Promoting effective competition in consumers' interests", "C) Setting monetary policy to control inflation", "D) Protecting and enhancing the integrity of the UK financial system"], "ans_letter": "C", "ans_full": "C — Setting monetary policy is the remit of the Bank of England (via the Monetary Policy Committee), not the FCA. The FCA's three operational objectives are consumer protection, competition and market integrity."}, {"id": "3.3.2", "q": "Conduct of Business rules (COBS) — which govern how firms deal with clients — are found in which block of the FCA Handbook?", "opts": ["A) Block 1 — High level standards", "B) Block 3 — Business standards", "C) Block 5 — Redress", "D) Block 7 — Listing rules"], "ans_letter": "B", "ans_full": "B — COBS (the Conduct of Business sourcebook) is part of Block 3 — Business standards, which covers how firms must conduct their business with clients."}, {"id": "3.3.3", "q": "The Consumer Duty (Principle 12, from July 2023) requires firms to:", "opts": ["A) Provide free financial advice to all retail customers", "B) Act to deliver good outcomes for retail customers across four key areas", "C) Abolish all charges on retail investment products", "D) Conduct annual suitability reviews for every client"], "ans_letter": "B", "ans_full": "B — Consumer Duty requires firms to act to deliver good outcomes for retail customers across four areas: products and services, price and value, consumer understanding, and consumer support."}, {"id": "3.3.4", "q": "A firm breaches FCA Principle 6 (Customers' Interests). A client wishes to sue the firm for damages in court under this breach. Under FSMA, this is:", "opts": ["A) Automatically actionable — the client can sue for breach of statutory duty", "B) Not actionable in itself — breach of a Principle does not create a private right of action", "C) Only actionable if the FCA first issues a fine", "D) Actionable if the client suffered a financial loss exceeding £85,000"], "ans_letter": "B", "ans_full": "B — Breach of an FCA Principle does not in itself create a private right of action (actionable breach) for a client. However, the FCA can take regulatory action against the firm."}, {"id": "3.3.5", "q": "SYSC rules primarily serve to:", "opts": ["A) Set capital requirements for investment firms", "B) Encourage directors and senior managers to take practical responsibility for firm arrangements and amplify Principle 3", "C) Define the client categorisation rules", "D) Set the maximum commission rates for financial advisers"], "ans_letter": "B", "ans_full": "B — SYSC is designed to encourage senior managers to take responsibility for their firm's systems and controls, amplifying Principle 3 (Management and Control)."}, {"id": "3.3.6", "q": "An investment firm identifies a conflict of interest between two clients. What is the correct order of steps?", "opts": ["A) Disclose → Manage → Identify", "B) Identify → Manage → Disclose (if management insufficient)", "C) Manage → Identify → Disclose", "D) Disclose to the FCA → Manage → Inform clients"], "ans_letter": "B", "ans_full": "B — The correct order is: first identify the conflict, then implement management measures (e.g. information barriers), and only if those are insufficient, disclose the conflict clearly to the affected client."}, {"id": "3.3.7", "q": "A firm applies for FCA authorisation. The FCA assesses whether the firm's directors are honest, competent and financially sound. This relates to which Threshold Condition?", "opts": ["A) Appropriate resources", "B) Legal status", "C) Suitability (fitness and propriety)", "D) Effective supervision"], "ans_letter": "C", "ans_full": "C — The suitability threshold condition requires the FCA to be satisfied that the firm and its management are fit and proper — honest, competent and financially sound."}, {"id": "3.3.8", "q": "Under SM&CR, who is responsible for certifying that individuals in the Certification Regime are fit and proper?", "opts": ["A) The FCA pre-approves all certified persons", "B) The PRA assesses and certifies all individuals annually", "C) The firm itself certifies these individuals as fit and proper at least annually", "D) The individual self-certifies to the FCA"], "ans_letter": "C", "ans_full": "C — Under the Certification Regime, the firm (not the regulator) is responsible for assessing and certifying that covered individuals are fit and proper to perform their functions, at least annually."}, {"id": "3.3.9", "q": "The FCA Individual Conduct Rules apply to:", "opts": ["A) Only the CEO and CFO of regulated firms", "B) All employees of FCA-regulated firms except ancillary staff (e.g. cleaners, caterers)", "C) Only client-facing staff in the Certification Regime", "D) Senior managers only"], "ans_letter": "B", "ans_full": "B — The Individual Conduct Rules apply to virtually all employees of FCA-regulated firms, excluding ancillary staff (cleaners, caterers, etc.)."}, {"id": "3.3.10", "q": "Under the FCA Training and Competence rules, when may an employee conduct regulated activities without supervision?", "opts": ["A) As soon as they are employed, provided they have a university degree", "B) Only after they have been employed for at least two years", "C) Once they have demonstrated the required level of competence for their role", "D) At any time, as supervision is optional"], "ans_letter": "C", "ans_full": "C — TC rules require employees to demonstrate the required level of competence for their role before they can act without supervision. Until then, adequate supervision must be provided."}, {"id": "3.3.11", "q": "Following the Retail Distribution Review, how many hours of CPD per year must retail investment advisers complete?", "opts": ["A) 15 hours", "B) 20 hours", "C) 35 hours", "D) 50 hours"], "ans_letter": "C", "ans_full": "C — Retail investment advisers must carry out at least 35 hours of continuing professional development (CPD) per year."}, {"id": "3.3.11", "q": "What document confirms that a retail investment adviser has met their CPD obligation and subscribed to an ethics code?", "opts": ["A) FCA Approved Person certificate", "B) Statement of Professional Standing (SPS) from an accredited professional body", "C) CFA Institute membership card", "D) The SM&CR certification"], "ans_letter": "B", "ans_full": "B — A Statement of Professional Standing (SPS), issued by an FCA-accredited professional body (e.g. CII or CISI), confirms the adviser has met CPD requirements and subscribed to a code of ethics. It must be renewed annually."}, {"id": "3.4.1", "q": "Which of the following is a primary role of an investment exchange?", "opts": ["A) Setting monetary policy", "B) Providing an organised marketplace for securities trading with rules, surveillance and price transparency", "C) Authorising individual investment advisers", "D) Managing client money on behalf of investors"], "ans_letter": "B", "ans_full": "B — An investment exchange provides an organised trading platform, sets membership rules, conducts market surveillance, and ensures price transparency."}, {"id": "3.4.2", "q": "Which body grants recognition to Recognised Clearing Houses (RCHs) in the UK?", "opts": ["A) The FCA", "B) The Prudential Regulation Authority (PRA)", "C) The Bank of England", "D) HM Treasury"], "ans_letter": "C", "ans_full": "C — Recognised Clearing Houses (RCHs) are recognised by the Bank of England, not the FCA. The FCA recognises Recognised Investment Exchanges (RIEs)."}, {"id": "3.4.3", "q": "Pre-trade transparency rules under MiFID II require trading venue operators to:", "opts": ["A) Publish a summary of trades at the end of each trading day", "B) Make real-time bid/offer prices and order book depth publicly available before trades are executed", "C) Report all transactions to the FCA within 24 hours", "D) Waive all transparency requirements for trades above £1 million"], "ans_letter": "B", "ans_full": "B — Pre-trade transparency means making current bid/offer quotes and order depth publicly available in real time, before trades are executed, so market participants can assess available prices."}, {"id": "3.4.4", "q": "On ICE Futures Europe, a 'local' trader is one who:", "opts": ["A) Acts as a broker for retail clients", "B) Acts on their own or their company's behalf (own account)", "C) Is a member of the public trading from home", "D) Works for the exchange itself"], "ans_letter": "B", "ans_full": "B — On futures exchanges, 'locals' (traders) trade on their own account or their company's account, taking on market risk directly. Brokers, by contrast, execute orders on behalf of clients."}, {"id": "3.4.5", "q": "A futures trader opens a position on ICE Futures Europe. The daily payment (or receipt) reflecting that day's profit or loss on the position is called:", "opts": ["A) Initial margin", "B) Variation margin", "C) Settlement payment", "D) Clearing fee"], "ans_letter": "B", "ans_full": "B — Variation margin is the daily mark-to-market payment: gains are received and losses are demanded each day, preventing the build-up of large unrealised losses."}, {"id": "3.4.6", "q": "Under MiFID II, how quickly must firms report transaction details to the FCA?", "opts": ["A) Within 1 hour of the trade", "B) By the end of the trading day on which the trade occurred", "C) As soon as possible and no later than the close of the following working day", "D) Within 5 business days"], "ans_letter": "C", "ans_full": "C — MiFID II requires transaction reports to be submitted as quickly as possible and no later than the close of the following working day after the transaction."}, {"id": "3.5.1", "q": "Why is client categorisation important in FCA regulation?", "opts": ["A) It determines how much commission a firm can charge", "B) It determines the level of regulatory protection a client receives — more protection for retail, less for professionals", "C) It classifies clients for tax purposes", "D) It determines whether a client must hold an FCA licence"], "ans_letter": "B", "ans_full": "B — Client categorisation determines the level of FCA regulatory protection. Retail clients receive the most protection; eligible counterparties the least."}, {"id": "3.5.2", "q": "A company has a balance sheet of €25 million, turnover of €45 million, and own funds of €1 million. Under MiFID, is it a per se professional client?", "opts": ["A) Yes — it meets 2 out of the 3 criteria (balance sheet and turnover)", "B) No — it must meet all 3 criteria", "C) Yes — it meets all 3 criteria", "D) No — balance sheet must exceed €40 million"], "ans_letter": "A", "ans_full": "A — For MiFID large undertakings, a per se professional client must meet at least 2 out of 3: balance sheet ≥€20m ✓, turnover ≥€40m ✓, own funds ≥€2m ✗. It meets 2, so yes."}, {"id": "3.5.3", "q": "A retail client wishes to be treated as an elective professional client. They have made 12 transactions per quarter for the last 4 quarters and have a portfolio worth €600,000. They have no professional financial experience. Do they qualify?", "opts": ["A) No — they must meet all 3 quantitative criteria", "B) Yes — they meet 2 of the 3 quantitative criteria (transaction frequency and portfolio size)", "C) No — they must have at least 2 years' professional experience", "D) Yes — the qualitative test alone is sufficient"], "ans_letter": "B", "ans_full": "B — The quantitative test requires 2 of 3 criteria. They meet: 10+ transactions/quarter ✓ and portfolio > €500k ✓. Professional experience (criterion 3) is not met, but 2 out of 3 suffices."}, {"id": "3.5.4", "q": "For which of the following services can a firm treat a client as an eligible counterparty?", "opts": ["A) Investment advice on a specific portfolio", "B) Discretionary portfolio management", "C) Execution of orders on behalf of the client", "D) Both investment advice and execution"], "ans_letter": "C", "ans_full": "C — ECP status only applies to execution of orders, dealing on own account, and reception/transmission of orders. Advisory and discretionary management services require at least professional client protections."}, {"id": "3.5.5", "q": "A per se eligible counterparty wishes to receive the full suite of FCA conduct protections for a new type of business it is entering. It should:", "opts": ["A) Apply to the FCA for re-classification", "B) Opt down to retail or professional client status by agreement with the firm", "C) Continue as ECP — it cannot receive higher protection", "D) Request the firm to apply eligible counterparty rules on a selective basis"], "ans_letter": "B", "ans_full": "B — A per se ECP can opt down to professional or retail client status (via client request or written agreement), receiving the higher level of FCA regulatory protection applicable to that category."}, {"id": "3.5.6", "q": "How long must a firm retain client agreement records under COBS rules?", "opts": ["A) 1 year", "B) 3 years", "C) The longer of 5 years or the duration of the relationship (indefinitely for pension transfer/opt-out/FSAVC)", "D) 10 years"], "ans_letter": "C", "ans_full": "C — Client agreement records must be kept for the longer of 5 years or the duration of the relationship. Pension transfer, opt-out and FSAVC records must be kept indefinitely."}, {"id": "3.5.7", "q": "Under FSMA Section 21, an unauthorised company may communicate a financial promotion if:", "opts": ["A) It has been in business for more than 5 years", "B) The content has been approved by an authorised person", "C) The promotion is sent to fewer than 150 people", "D) It is sent by email rather than post"], "ans_letter": "B", "ans_full": "B — An unauthorised company may communicate a financial promotion provided its content has been approved by an FCA-authorised person, who takes responsibility for the promotion's compliance."}, {"id": "3.5.8", "q": "Which fundamental principle applies to all financial promotions under COBS 4.2?", "opts": ["A) They must be approved by the FCA before use", "B) They must be fair, clear and not misleading", "C) They must be written and cannot be verbal", "D) They must include a 10-year performance history"], "ans_letter": "B", "ans_full": "B — The overarching standard for all financial promotions and communications is that they must be fair, clear and not misleading (COBS 4.2)."}, {"id": "3.5.9", "q": "A firm sends a brochure to retail clients highlighting only the potential gains of an investment with no mention of risk. This breaches which rule?", "opts": ["A) COBS 4.5A — retail client communications must not emphasise benefits without fair indication of risks", "B) COBS 9A — suitability obligations", "C) COBS 11.2A — best execution", "D) SYSC — senior management controls"], "ans_letter": "A", "ans_full": "A — COBS 4.5A requires that communications with retail clients do not emphasise benefits without giving a fair indication of the relevant risks."}, {"id": "3.5.10", "q": "A fund marketing document shows 3 years of past performance data without any warning about the reliability of past performance. This breaches COBS because:", "opts": ["A) It should show at least 5 years of data and must include a prominent past performance warning", "B) It should show at least 10 years of data", "C) Past performance data cannot be shown to retail clients", "D) Simulated performance must be shown instead"], "ans_letter": "A", "ans_full": "A — COBS requires at least 5 years of past performance data (or whole life if shorter) and a prominent warning that past performance is not a reliable indicator of future results."}, {"id": "3.5.11", "q": "What additional requirement applies to a direct offer financial promotion likely to be received by retail clients?", "opts": ["A) It must be pre-approved by the FCA", "B) It must contain all required disclosure information plus additional information sufficient for an informed investment decision", "C) It must be sent by recorded post", "D) It can only be sent to clients with portfolios above £50,000"], "ans_letter": "B", "ans_full": "B — Direct offer promotions to retail clients must contain not only the required disclosure information but also any additional information necessary for the client to make an informed investment decision."}, {"id": "3.5.12", "q": "A firm cold-calls a retail client with no prior relationship to sell a complex derivative product. Under COBS, this is:", "opts": ["A) Permitted as long as the call is before 9pm", "B) Prohibited — there is no existing client relationship, and derivatives are not readily realisable securities", "C) Permitted if the call is made by a senior manager", "D) Permitted provided the client does not object within 30 days"], "ans_letter": "B", "ans_full": "B — Cold calls are prohibited unless one of the three conditions is met. Complex derivatives are not readily realisable securities, and there is no existing relationship, so the cold call is not permitted."}, {"id": "3.5.13", "q": "Under FSMA 2023, if a firm approves a financial promotion for an unauthorised company, the firm:", "opts": ["A) Has no regulatory responsibility — the unauthorised company remains liable", "B) Takes on full legal responsibility for ensuring the promotion is fair, clear and not misleading", "C) Must submit the promotion to the FCA for secondary approval", "D) Must charge a fee to the unauthorised company"], "ans_letter": "B", "ans_full": "B — When an authorised firm approves a financial promotion for an unauthorised person under FSMA s21, the approving firm takes on full legal and regulatory responsibility for the promotion's compliance."}, {"id": "3.5.14", "q": "For how long must a firm retain records of financial promotions relating to MiFID business?", "opts": ["A) 1 year", "B) 3 years", "C) 5 years", "D) Indefinitely"], "ans_letter": "C", "ans_full": "C — Financial promotions relating to MiFID business (equities, bonds, derivatives) must be retained for 5 years."}, {"id": "3.5.15", "q": "A consumer buys a pension product over the phone without any face-to-face meeting. How long do they have to cancel under the distance marketing rules?", "opts": ["A) 7 days", "B) 14 days", "C) 30 days", "D) 60 days"], "ans_letter": "C", "ans_full": "C — For life policies and pension products sold by distance marketing, the cancellation period is 30 days. For most other financial services it is 14 days."}, {"id": "3.5.16", "q": "Before entering into a client agreement, a firm must inform retail clients about:", "opts": ["A) The firm's annual profit figures", "B) The availability of the FSCS, including compensation limits and how to claim", "C) The names of all other clients using the same service", "D) The identities of all the firm's directors"], "ans_letter": "B", "ans_full": "B — Firms must inform retail clients about the FSCS, including the compensation limit (£85,000 for investments) and how to claim, so they understand what protection is available if the firm fails."}, {"id": "3.5.17", "q": "Under MiFID II, a firm providing independent financial advice receives commission from a product provider. The firm should:", "opts": ["A) Retain the commission as this is standard practice", "B) Disclose the commission but it may be retained", "C) Not accept or must return this commission — it is a prohibited inducement", "D) Only return it if the client requests"], "ans_letter": "C", "ans_full": "C — Independent advisers (and portfolio managers) are prohibited from accepting or retaining fees or commissions from product providers under MiFID II's inducement rules."}, {"id": "3.5.18", "q": "Following the RDR, a retail investment adviser recommends a pension product. How is the adviser compensated?", "opts": ["A) By commission set by the pension provider, disclosed to the client", "B) By adviser charges agreed with the client in advance — commission from providers is no longer permitted", "C) By a combination of commission and adviser charges at the adviser's discretion", "D) By charges set by the FCA on a standard tariff"], "ans_letter": "B", "ans_full": "B — Post-RDR, retail advisers receive adviser charges agreed with the client in advance. Commission set by product providers is no longer permitted."}, {"id": "3.5.19", "q": "The FCA's anti-greenwashing rule requires that sustainability claims made by authorised firms must be:", "opts": ["A) Approved by the FCA before publication", "B) Consistent with the product's actual sustainability profile and clear, fair and not misleading", "C) Only made if the product has third-party ESG certification", "D) Accompanied by an independent audit report"], "ans_letter": "B", "ans_full": "B — The anti-greenwashing rule requires sustainability claims to be consistent with the product's actual sustainability profile and to meet the overarching 'fair, clear and not misleading' standard."}, {"id": "3.5.20", "q": "A retail client is given advice to transfer out of a defined benefit pension scheme. What document must the adviser provide?", "opts": ["A) A key features document", "B) A suitability report — pension transfers always require one for retail clients", "C) A financial promotion approval", "D) A conflict of interest disclosure form"], "ans_letter": "B", "ans_full": "B — A suitability report must be provided to retail clients for pension transfers. It must be given as soon as possible after the transaction."}, {"id": "3.5.21", "q": "A retail client uses an execution-only online platform to buy a complex structured product. The platform must:", "opts": ["A) Provide full investment advice before executing the order", "B) Assess whether the product is appropriate for the client based on their knowledge and experience, and warn if it may not be", "C) Refuse to execute the order without a suitability report", "D) Automatically approve all client orders without further checks"], "ans_letter": "B", "ans_full": "B — For execution-only services involving complex products, the appropriateness obligation requires the firm to assess the client's knowledge and experience, and issue a warning if the product may not be appropriate."}, {"id": "3.5.22", "q": "A firm assesses that a complex product is not appropriate for a retail client who has requested execution-only service. The firm should:", "opts": ["A) Refuse to execute the transaction", "B) Execute immediately without any further action", "C) Warn the client that the product may not be appropriate, then execute if the client still wishes to proceed", "D) Refer the client to a different firm"], "ans_letter": "C", "ans_full": "C — The firm must warn the client that the product may not be appropriate. However, it may still execute the transaction if the client chooses to proceed after receiving the warning."}, {"id": "3.5.23", "q": "For which of the following products is an appropriateness assessment NOT required on an execution-only basis?", "opts": ["A) A complex derivative product", "B) A structured note with conditional capital protection", "C) A UCITS equity fund (non-complex instrument)", "D) An exchange-traded certificate (ETC)"], "ans_letter": "C", "ans_full": "C — A UCITS equity fund is a non-complex instrument. Appropriateness assessment is not required for execution-only transactions in non-complex instruments."}, {"id": "3.5.24", "q": "A financial adviser is asked for advice on the tax implications of a complex pension transfer. The adviser has no tax qualification. Under FCA rules, the adviser should:", "opts": ["A) Provide the advice anyway as it is related to investment", "B) Refuse to help the client at all", "C) Acknowledge the limit of their expertise and refer the client to an appropriately qualified tax professional", "D) Provide a disclaimer and then give the tax advice"], "ans_letter": "C", "ans_full": "C — FCA rules and professional standards require individuals to recognise the limits of their own expertise. The adviser should refer the client to a qualified tax professional rather than advise outside their competence."}, {"id": "3.5.25", "q": "A firm only recommends products from a panel of 5 providers. It should describe its service as:", "opts": ["A) Independent advice — it considers multiple providers", "B) Restricted advice — it does not cover the whole market and must disclose this", "C) Execution-only — no advice is given", "D) Portfolio management — it selects from a panel"], "ans_letter": "B", "ans_full": "B — Advice from a limited panel is restricted advice. The firm must clearly disclose this restriction to clients. Only advice based on a comprehensive and fair analysis of the whole market qualifies as independent."}, {"id": "3.5.26", "q": "For a retail client order, which factor is generally the primary consideration under best execution rules?", "opts": ["A) Speed of execution", "B) Total consideration — price plus all costs of execution", "C) Likelihood of execution only", "D) Size of the order"], "ans_letter": "B", "ans_full": "B — For retail clients, best execution is primarily assessed by total consideration (price received or paid plus all transaction costs), as this represents the total cost/benefit to the client."}, {"id": "3.5.27", "q": "A firm wishes to aggregate a retail client's buy order with orders from other clients. Under COBS 11.3, this is permitted only if:", "opts": ["A) The order is over £100,000", "B) Aggregation is unlikely to disadvantage clients, this is disclosed to clients, and an allocation policy is in place", "C) The client is classified as a professional client", "D) The order is executed on a regulated market"], "ans_letter": "B", "ans_full": "B — Aggregation is permitted only if it is unlikely to disadvantage any client, the potential disadvantage is disclosed, and the firm has an order allocation policy."}, {"id": "3.5.28", "q": "An employee buys shares in a company for their personal account just before placing a large client buy order in the same shares. This is:", "opts": ["A) Permitted if disclosed to the compliance function within 24 hours", "B) Prohibited — personal account dealing conflicting with client duties (front-running)", "C) Permitted as units in a collective fund are excluded from personal account rules", "D) Permitted if the personal transaction is smaller than the client order"], "ans_letter": "B", "ans_full": "B — Trading personal account ahead of a known client order (front-running) is prohibited under personal account dealing rules as it directly conflicts with the firm's duties to the client."}, {"id": "3.5.29", "q": "To maintain independence of investment research, a firm's analysts' remuneration must NOT be:", "opts": ["A) Linked to the number of research reports produced", "B) Linked to specific investment banking transactions", "C) Based on a fixed salary", "D) Approved by the compliance function"], "ans_letter": "B", "ans_full": "B — Analysts' remuneration must not be directly linked to specific investment banking transactions, as this would create a conflict of interest and compromise the objectivity of the research."}, {"id": "3.5.30", "q": "A broker produces a sales note recommending a share but it is not independent research. Under COBS, the note must:", "opts": ["A) Include a full 5-year performance record of the recommended share", "B) Be clearly identified as a marketing communication with a warning that it is not independent research", "C) Be approved by the FCA before distribution", "D) Only be distributed to professional clients"], "ans_letter": "B", "ans_full": "B — Non-independent research must be clearly labelled as a marketing communication and include a prominent warning that it is not prepared in accordance with requirements for independent investment research."}, {"id": "3.5.31", "q": "Which of the following must be included as a disclosure in investment research published by a firm?", "opts": ["A) The names of all clients who received the research", "B) The firm's annual profit figures", "C) The name and job title of the analyst and the identity of the firm's regulator", "D) The research must be sent to the FCA before publication"], "ans_letter": "C", "ans_full": "C — Research disclosure requirements include: the analyst's name and job title, the firm's name, and the identity of the competent authority (regulator)."}, {"id": "3.5.32", "q": "Under FCA product governance rules (PROD 3), what must a product manufacturer identify for each retail investment product?", "opts": ["A) The maximum charge that can be levied", "B) A target market — the type of end client the product is designed for", "C) The minimum investment amount", "D) The distributing firms authorised to sell the product"], "ans_letter": "B", "ans_full": "B — PROD 3 requires manufacturers to identify a target market for each product, defining the type of end client the product is designed to serve, and to ensure the distribution strategy is compatible with it."}, {"id": "3.5.33", "q": "Which document provides a short, standardised summary of key information for UCITS funds, introduced under UCITS IV?", "opts": ["A) Key Features Document (KFD)", "B) Key Information Document (KID)", "C) Key Investor Information Document (KIID)", "D) Simplified Prospectus"], "ans_letter": "C", "ans_full": "C — UCITS IV introduced the Key Investor Information Document (KIID) as a short, standardised 2-page document summarising essential information about a UCITS fund for retail investors."}, {"id": "3.5.34", "q": "The FCA wishes to immediately protect retail consumers from a harmful product. Under temporary product intervention powers, an initial ban can last for how long without consultation?", "opts": ["A) 3 months", "B) 6 months", "C) 12 months", "D) 24 months"], "ans_letter": "C", "ans_full": "C — The FCA can ban products that pose unacceptable risks for up to 12 months without prior consultation, enabling rapid consumer protection."}, {"id": "3.5.35", "q": "Which of the following is a PRIIP?", "opts": ["A) A direct holding of FTSE 100 shares", "B) A UK government gilt", "C) A structured product providing exposure to an equity index", "D) A non-life motor insurance policy"], "ans_letter": "C", "ans_full": "C — A structured product providing exposure to an equity index is a PRIIP — it packages access to an underlying financial asset. Direct shares, gilts and non-life insurance are excluded."}, {"id": "3.5.36", "q": "Under the FCA's Sustainability Disclosure Requirements (SDR), which of the following is a voluntary product sustainability label?", "opts": ["A) Sustainability Responsible", "B) Sustainability Improvers", "C) Sustainability Compliant", "D) Sustainability Verified"], "ans_letter": "B", "ans_full": "B — The four voluntary SDR sustainability labels are: Sustainability Focus, Sustainability Improvers, Sustainability Impact, and Sustainability Mixed Goals. 'Sustainability Responsible' is not one of them."}, {"id": "3.5.37", "q": "The Key Investor Information Document (KIID) for a UCITS fund must include a synthetic risk indicator on a scale of:", "opts": ["A) 1–5", "B) 1–7", "C) 1–10", "D) A–E"], "ans_letter": "B", "ans_full": "B — The UCITS KIID includes a synthetic risk and reward indicator (SRRI) on a scale of 1–7, where 1 is lowest risk and 7 is highest risk."}, {"id": "3.5.38", "q": "A retail client buys a personal pension scheme. How long does the client have to cancel under COBS 15?", "opts": ["A) 7 days", "B) 14 days", "C) 30 days", "D) 60 days"], "ans_letter": "C", "ans_full": "C — Personal pension schemes have a 30-day cancellation period (double the standard 14 days), reflecting the long-term and illiquid nature of pension products."}, {"id": "3.5.39", "q": "For how long must a firm retain records relating to client orders and transactions under MiFID business rules?", "opts": ["A) 1 year", "B) 3 years", "C) 5 years", "D) Indefinitely"], "ans_letter": "C", "ans_full": "C — MiFID business requires order and transaction records to be kept for at least 5 years."}, {"id": "3.5.40", "q": "A firm executes a trade for a retail client on Monday. By when must the client receive the trade confirmation?", "opts": ["A) Same day (Monday) by close of business", "B) By end of Tuesday (first business day after execution — T+1)", "C) Within 3 business days", "D) By the end of the following week"], "ans_letter": "B", "ans_full": "B — For retail clients, COBS 16A.3 requires trade confirmations to be provided no later than the first business day following execution (T+1)."}, {"id": "3.5.41", "q": "A retail client receives detailed trade confirmations for each transaction in their discretionary managed portfolio. How often must they receive a periodic portfolio statement?", "opts": ["A) Monthly", "B) Quarterly", "C) Every 6 months", "D) Annually — because they receive deal-by-deal confirmations"], "ans_letter": "D", "ans_full": "D — Where a retail client receives deal-by-deal confirmations of each transaction, periodic statements may be sent annually instead of the standard 6-monthly frequency."}, {"id": "3.5.42", "q": "An authorised fund's accounting year ends on 31 December. By when must the annual report be published?", "opts": ["A) 31 January", "B) 28 February", "C) 30 April", "D) 30 June"], "ans_letter": "C", "ans_full": "C — The annual report must be published within 4 months of the accounting year end. For a 31 December year end, this means by 30 April."}, {"id": "3.5.43", "q": "What is the purpose of the FCA's annual assessment of value requirement for authorised funds?", "opts": ["A) To determine whether the fund manager is fit and proper to manage the fund", "B) To assess whether the fund's ongoing charges represent value for money for investors", "C) To calculate the fund's net asset value at year end", "D) To assess whether the fund complied with its investment mandate"], "ans_letter": "B", "ans_full": "B — The annual assessment of value is specifically designed to assess whether ongoing charges represent value for money for investors, considering performance, costs, comparators, and economies of scale."}, {"id": "3.5.44", "q": "A pension fund trustee is a fiduciary. This means they must:", "opts": ["A) Maximise their own return from managing the pension fund", "B) Act in the best interests of the pension scheme beneficiaries, avoiding conflicts of interest", "C) Invest only in government bonds to protect against risk", "D) Report annually to the FCA on investment performance"], "ans_letter": "B", "ans_full": "B — As fiduciaries, pension trustees must act in the best interests of beneficiaries, avoid conflicts of interest, and not profit from their position at the beneficiaries' expense."}, {"id": "3.5.45", "q": "The primary purpose of the FCA's custody rules (CASS 6) is to:", "opts": ["A) Ensure client assets earn the highest possible return", "B) Prevent co-mingling of client assets with firm assets, protecting clients if the firm becomes insolvent", "C) Require firms to hold client assets in UK government bonds", "D) Allow firms to use client assets for their own investments"], "ans_letter": "B", "ans_full": "B — CASS 6 custody rules are primarily designed to prevent co-mingling. Segregating client assets means they are protected if the firm goes insolvent, as they are not available to firm creditors."}, {"id": "3.5.46", "q": "Before delegating safekeeping of client assets to a third-party custodian, a firm must:", "opts": ["A) Obtain FCA approval for each delegation", "B) Conduct due diligence to ensure the custodian is regulated and financially sound", "C) Obtain written consent from every client", "D) Transfer the assets to a central bank account"], "ans_letter": "B", "ans_full": "B — Firms must conduct due diligence before delegating custody to ensure the third-party custodian is appropriately regulated, financially sound and has adequate organisational arrangements."}, {"id": "3.5.47", "q": "A firm deposits client assets with a third-party custodian. If the custodian misappropriates the assets, who is generally liable to the client?", "opts": ["A) The client bears the risk — they consented to third-party custody", "B) The third-party custodian only", "C) The firm retains liability to the client for the custodian's acts and omissions", "D) The FCA compensates clients directly"], "ans_letter": "C", "ans_full": "C — The firm generally retains liability to the client for the acts and omissions of the third-party custodian, unless a specific exemption applies. This incentivises firms to conduct thorough due diligence."}, {"id": "3.5.48", "q": "When may a firm enter into a securities-financing transaction (e.g. stock lending) using a client's assets?", "opts": ["A) At any time provided a record is kept", "B) Only with prior explicit client consent and restricted to the agreed terms", "C) If the transaction benefits the client financially", "D) Only for institutional clients; never for retail clients"], "ans_letter": "B", "ans_full": "B — Stock lending and other securities-financing transactions using client assets require prior explicit client consent, and must be conducted only within the terms the client has agreed to."}, {"id": "3.5.49", "q": "How frequently must a firm reconcile its internal records of client assets with those held by a third-party custodian?", "opts": ["A) Monthly only", "B) Annually at the year end", "C) As often as necessary and as soon as practicable after the reconciliation date", "D) Weekly on the last business day"], "ans_letter": "C", "ans_full": "C — Reconciliation must take place as often as necessary and as soon as reasonably practicable after the reconciliation date. The frequency depends on the volume and complexity of activity."}, {"id": "3.5.50", "q": "Under the FCA's client money rules (CASS 7), where may a firm place client money?", "opts": ["A) In the firm's general business bank account for ease of management", "B) In a client bank account with a central bank, BCD credit institution, authorised bank or qualifying money market fund", "C) In a segregated account with the FCA directly", "D) In a firm-controlled trust account at the firm's discretion"], "ans_letter": "B", "ans_full": "B — Client money must be placed in a specifically identified client bank account with a central bank, BCD credit institution, bank authorised in a third country, or qualifying money market fund."}, {"id": "3.5.51", "q": "Why should a firm consider diversifying client money across several banks rather than concentrating it with one institution?", "opts": ["A) It earns higher interest from multiple banks", "B) Diversification reduces concentration risk — if one bank fails, not all client money is at risk", "C) The FCA requires exactly three banking relationships", "D) It simplifies the client money reconciliation process"], "ans_letter": "B", "ans_full": "B — Diversifying client money across multiple institutions reduces concentration risk. If one bank fails, only a portion of client money is at risk, rather than all of it."}, {"id": "3.5.52", "q": "When depositing client money with a bank, the firm must ensure the bank acknowledges that the money:", "opts": ["A) Belongs to the firm and can be used as collateral", "B) Is client money and cannot be used to offset the firm's debts to the bank", "C) Can be used by the bank for lending at any time", "D) Earns a minimum guaranteed interest rate"], "ans_letter": "B", "ans_full": "B — The bank must acknowledge the client money nature of the account, ensuring it cannot be used to set off the firm's own debts to the bank. This protects client money in the event of the firm's insolvency."}, {"id": "3.5.53", "q": "When must a firm segregate client money into a client bank account?", "opts": ["A) Within 5 business days of receipt", "B) At the end of each month during reconciliation", "C) Promptly — as soon as the client money is received", "D) Only when the amount exceeds £10,000"], "ans_letter": "C", "ans_full": "C — Client money must be promptly segregated into a client bank account as soon as it is received by the firm."}, {"id": "3.5.54", "q": "A firm's reconciliation reveals it holds £5,000 less client money than it should. It must:", "opts": ["A) Notify the FCA and wait for instructions", "B) Make up the shortfall from its own money as soon as possible", "C) Inform all clients of the shortfall", "D) Reduce client entitlements pro-rata"], "ans_letter": "B", "ans_full": "B — If a firm identifies a client money shortfall, it must make up the shortfall from its own funds as soon as possible."}, {"id": "3.5.55", "q": "A firm is given a power of attorney to manage a client's bank account. This arrangement is governed by which CASS rules?", "opts": ["A) CASS 6 — custody rules", "B) CASS 7 — client money rules only", "C) CASS 8 — mandate accounts", "D) CASS 9 — information and reporting"], "ans_letter": "C", "ans_full": "C — Operating a client's bank account under a mandate (such as a power of attorney) falls under CASS 8, which governs mandate accounts."}, {"id": "3.5.56", "q": "After a client enters into a Title Transfer Collateral Arrangement (TTCA), the client's assets used as collateral:", "opts": ["A) Remain client assets protected by CASS rules", "B) Are held in a segregated account on the client's behalf", "C) Become the firm's own assets — the client loses CASS protection and becomes an unsecured creditor", "D) Are transferred to the Bank of England for safekeeping"], "ans_letter": "C", "ans_full": "C — Under a TTCA, legal ownership of the assets transfers to the firm. They are no longer client assets protected by CASS. If the firm is insolvent, the client ranks as an unsecured creditor."}, {"id": "3.6.1", "q": "If a firm wishes to appeal against an FCA enforcement decision, where should the appeal be heard?", "opts": ["A) The Court of Appeal", "B) The High Court", "C) The Tax and Chancery Chamber of the Upper Tribunal", "D) The Financial Ombudsman Service"], "ans_letter": "C", "ans_full": "C — Appeals against FCA enforcement decisions go to the Tax and Chancery Chamber of the Upper Tribunal."}, {"id": "3.6.2", "q": "A client complains to their investment firm. The firm fails to resolve the matter within 8 weeks. What must the firm do?", "opts": ["A) The complaint is automatically escalated to the FCA", "B) Send a written response explaining why the firm cannot yet respond and informing the client of their right to refer to the FOS", "C) Issue a refund to the client automatically", "D) Refer the matter to the PRA for investigation"], "ans_letter": "B", "ans_full": "B — If a firm cannot issue a final response within 8 weeks, it must send a written response to the complainant explaining the delay and informing them of their right to refer the complaint to the Financial Ombudsman Service."}, {"id": "3.6.3", "q": "A client receives a final response from their firm rejecting their complaint. How long do they have to refer the complaint to the FOS?", "opts": ["A) 1 month", "B) 3 months", "C) 6 months", "D) 12 months"], "ans_letter": "C", "ans_full": "C — A complaint must be referred to the Financial Ombudsman Service within 6 months of receiving the firm's final response."}, {"id": "3.6.4", "q": "The FOS awards £50,000 to a complainant in respect of unsuitable advice. The firm does not wish to pay. The complainant can:", "opts": ["A) Only appeal to the FCA to enforce the award", "B) Enforce the FOS award as a court order — it is legally binding on the firm", "C) Refer the matter to the PRA", "D) Only accept a reduced amount"], "ans_letter": "B", "ans_full": "B — Once a complainant accepts a FOS decision, it is binding on the firm and can be enforced as a court order if the firm refuses to comply."}, {"id": "3.6.5", "q": "Which of the following firms is automatically subject to the FOS compulsory jurisdiction?", "opts": ["A) A US bank with no UK FCA authorisation", "B) An FCA-authorised investment manager", "C) A foreign exchange bureau not required to be FCA-authorised", "D) An online marketplace not involved in financial services"], "ans_letter": "B", "ans_full": "B — All FCA-authorised firms are automatically subject to the FOS compulsory jurisdiction. They cannot opt out."}, {"id": "3.6.6", "q": "The FOS has jurisdiction over a complaint if it is referred within how many years of the event giving rise to it?", "opts": ["A) 1 year", "B) 3 years", "C) 6 years", "D) 10 years"], "ans_letter": "C", "ans_full": "C — The FOS generally has jurisdiction if the complaint is referred within 6 years of the event, or within 3 years of when the complainant knew (or should have known) about the matter, whichever is later."}, {"id": "3.6.7", "q": "How often must firms report their complaints data to the FCA?", "opts": ["A) Monthly", "B) Quarterly", "C) Twice a year (bi-annually)", "D) Annually"], "ans_letter": "C", "ans_full": "C — Firms must provide bi-annual (twice yearly) reports to the FCA on complaints received, upheld and time to resolve."}, {"id": "3.6.8", "q": "When does the FSCS pay compensation to an investor?", "opts": ["A) When a firm gives unsuitable investment advice and the client loses money", "B) When a firm has become insolvent and can no longer meet claims", "C) When the FOS upholds a complaint and the firm refuses to pay", "D) When a client is dissatisfied with their investment returns"], "ans_letter": "B", "ans_full": "B — The FSCS pays compensation only when a firm has become insolvent (failed) and can no longer meet eligible claims. It is the fund of last resort."}, {"id": "3.6.9", "q": "A large pension fund makes an investment with an FCA-authorised firm that subsequently fails. Is the pension fund eligible for FSCS compensation?", "opts": ["A) Yes — all investors are eligible for FSCS protection", "B) Unlikely — large institutional investors such as pension funds are generally excluded from FSCS eligibility", "C) Yes — up to the standard limit of £85,000", "D) Only if the investment was in government bonds"], "ans_letter": "B", "ans_full": "B — The FSCS primarily protects private individuals and small businesses. Large institutional investors such as pension funds are generally excluded from eligible claimant status."}, {"id": "3.6.10", "q": "An investor has £200,000 in a now-insolvent investment firm. How much can they recover from the FSCS?", "opts": ["A) £200,000 — FSCS covers the full loss", "B) £100,000", "C) £85,000 — the maximum for investment claims", "D) Nothing — investments are not covered by the FSCS"], "ans_letter": "C", "ans_full": "C — The FSCS maximum for investment claims against a failed investment firm is £85,000 per eligible claimant per firm. The remaining £115,000 is an unsecured creditor claim in the insolvency."}, {"id": "3.7.1", "q": "The primary UK criminal law creating offences of money laundering is:", "opts": ["A) The Financial Services and Markets Act 2000", "B) The Terrorism Act 2000", "C) The Proceeds of Crime Act 2002 (POCA)", "D) The Money Laundering Regulations"], "ans_letter": "C", "ans_full": "C — The Proceeds of Crime Act 2002 (POCA) is the primary UK criminal legislation on money laundering, creating offences of assisting, acquiring, using, possessing or tipping-off."}, {"id": "3.7.2", "q": "A criminal breaks drug sale proceeds into many small cash deposits across different banks to avoid detection. This is an example of which money laundering stage?", "opts": ["A) Layering", "B) Integration", "C) Placement (smurfing)", "D) Dissemination"], "ans_letter": "C", "ans_full": "C — Breaking large amounts of criminal cash into smaller deposits (known as 'smurfing') is a technique used at the placement stage — injecting criminal funds into the financial system."}, {"id": "3.7.2", "q": "A criminal uses laundered funds to purchase a chain of restaurants, which generate legitimate income. This is an example of which money laundering stage?", "opts": ["A) Placement", "B) Layering", "C) Integration", "D) Tipping-off"], "ans_letter": "C", "ans_full": "C — Integration is when laundered funds re-enter the legitimate economy appearing to have a lawful origin (e.g. a legitimate business or property investment)."}, {"id": "3.7.3", "q": "What is the primary role of the Joint Money Laundering Steering Group (JMLSG)?", "opts": ["A) It prosecutes money laundering offences on behalf of the FCA", "B) It provides practical guidance to help financial firms implement AML requirements", "C) It sets legally binding money laundering regulations", "D) It manages the UK financial intelligence unit"], "ans_letter": "B", "ans_full": "B — The JMLSG provides practical, detailed guidance to help financial services firms implement their AML obligations under the Money Laundering Regulations. Its guidance is not legally binding but is widely followed."}, {"id": "3.7.4", "q": "Under JMLSG guidance, how long must customer due diligence and transaction records be retained?", "opts": ["A) 1 year", "B) 3 years", "C) 5 years", "D) Indefinitely"], "ans_letter": "C", "ans_full": "C — AML records (both CDD documentation and transaction records) must be retained for a minimum of 5 years."}, {"id": "3.7.5", "q": "An employee tells a client that their account has been flagged in a suspicious activity report (SAR). This is the offence of:", "opts": ["A) Assisting — 14 years", "B) Failure to report — 5 years", "C) Tipping-off — 2 years", "D) False statement — 2 years"], "ans_letter": "C", "ans_full": "C — Disclosing to a person that they are under suspicion (or that a SAR has been filed) is the offence of tipping-off, which carries up to 2 years' imprisonment."}, {"id": "3.7.5", "q": "What is the maximum prison sentence for the offence of assisting money laundering under POCA 2002?", "opts": ["A) 2 years", "B) 5 years", "C) 10 years", "D) 14 years"], "ans_letter": "D", "ans_full": "D — Assisting money laundering (or arranging, using, possessing or acquiring criminal proceeds) carries a maximum sentence of 14 years' imprisonment and/or an unlimited fine."}, {"id": "3.7.6", "q": "A director knows that their company will announce a profit warning next week. This is inside information because it is:", "opts": ["A) Known only by the director and is about their own company", "B) Price-sensitive, specific, precise and not yet made public", "C) A general estimate of company performance", "D) Already reflected in the share price"], "ans_letter": "B", "ans_full": "B — The information meets all criteria for inside information under the CJA 1993: it would materially affect the share price (price-sensitive), it relates to a specific company/security, it is precise (a definite forthcoming announcement) and it has not been publicly disclosed."}, {"id": "3.7.7", "q": "A fund manager passes inside information about an acquisition to a colleague, who then trades on it. Which of the CJA 1993 offences has the manager committed?", "opts": ["A) Dealing — they personally bought shares", "B) Encouraging — they passed information to someone likely to deal on it", "C) Disclosing — they told someone not in the proper performance of duties", "D) Both disclosing and encouraging"], "ans_letter": "D", "ans_full": "D — The manager has committed both disclosing (sharing inside information outside proper duties) and encouraging (passing information to someone likely to deal on it). Multiple CJA 1993 offences can apply to the same conduct."}, {"id": "3.7.8", "q": "What is the maximum prison sentence for insider dealing tried on indictment in the Crown Court?", "opts": ["A) 2 years", "B) 5 years", "C) 7 years", "D) 10 years"], "ans_letter": "D", "ans_full": "D — Insider dealing tried on indictment in the Crown Court carries a maximum sentence of 10 years' imprisonment and/or an unlimited fine."}, {"id": "3.7.9", "q": "The FCA charges a trader with market abuse under UK MAR. The standard of proof required is:", "opts": ["A) Beyond reasonable doubt — as this is a criminal charge", "B) Balance of probabilities — as market abuse is a civil offence", "C) No proof required — the FCA can fine on suspicion alone", "D) Clear and convincing evidence — a higher civil standard"], "ans_letter": "B", "ans_full": "B — Market abuse under UK MAR is a civil offence. The standard of proof is the civil standard: balance of probabilities (more likely than not), which is lower than the criminal standard of beyond reasonable doubt."}, {"id": "3.7.10", "q": "A trader places large buy orders for a share then cancels them before execution, creating an artificial impression of demand to push the price up (spoofing). This is market abuse under which category?", "opts": ["A) Improper disclosure", "B) Misuse of information", "C) Manipulating transactions or manipulating devices", "D) Dissemination"], "ans_letter": "C", "ans_full": "C — Spoofing (placing orders with intent to cancel, creating false signals of demand) falls under manipulating transactions or manipulating devices under UK MAR."}, {"id": "3.7.11", "q": "Which of the following is an enforcement power the FCA can use against a firm found guilty of market abuse?", "opts": ["A) Refer the firm for criminal prosecution only", "B) Impose an unlimited civil financial penalty and public censure", "C) Only issue a private warning for a first offence", "D) Reduce the firm's capital requirements as a penalty"], "ans_letter": "B", "ans_full": "B — The FCA can impose unlimited civil financial penalties and publish a public censure naming the offending firm for market abuse under UK MAR."}, {"id": "3.7.12", "q": "A company can avoid liability for an employee bribing a foreign official under the Bribery Act 2010 if it can show:", "opts": ["A) It had no knowledge of the bribery", "B) It had adequate procedures in place to prevent bribery", "C) The bribe was small and
