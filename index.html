 did not affect the outcome", "D) The bribery took place in a country where it is common practice"], "ans_letter": "B", "ans_full": "B — The 'adequate procedures' defence under the Bribery Act 2010 allows a company to avoid liability for failure to prevent bribery if it can demonstrate it had adequate anti-bribery procedures in place."}, {"id": "3.7.12", "q": "Under GDPR, a personal data breach must be notified to the Information Commissioner's Office (ICO) within:", "opts": ["A) 24 hours", "B) 48 hours", "C) 72 hours", "D) 7 days"], "ans_letter": "C", "ans_full": "C — GDPR requires data controllers to notify the ICO of a personal data breach within 72 hours of becoming aware of it."}], "4": [{"id": "4.1.1", "q": "Which body must a Lasting Power of Attorney be registered with before it becomes effective?", "opts": ["A) The Financial Conduct Authority", "B) The Office of the Public Guardian", "C) HM Revenue & Customs", "D) The Probate Registry"], "ans_letter": "B", "ans_full": "B — An LPA must be registered with the Office of the Public Guardian to have legal effect."}, {"id": "4.1.1", "q": "A personal welfare Lasting Power of Attorney gives the donee the power to make decisions about which of the following?", "opts": ["A) The donor's financial investments", "B) The donor's property transactions", "C) The donor's personal healthcare and welfare", "D) The donor's tax affairs"], "ans_letter": "C", "ans_full": "C — The personal welfare LPA covers healthcare and welfare decisions. A property and affairs LPA covers financial matters."}, {"id": "4.1.1", "q": "The Lasting Power of Attorney replaced which earlier document in 2007?", "opts": ["A) Ordinary Power of Attorney", "B) General Power of Attorney", "C) Enduring Power of Attorney", "D) Delegated Power of Attorney"], "ans_letter": "C", "ans_full": "C — The LPA replaced the Enduring Power of Attorney (EPA) from 2007."}, {"id": "4.1.1", "q": "Which of the following does NOT have separate legal personality under English law?", "opts": ["A) A public limited company", "B) A limited liability partnership", "C) An ordinary partnership", "D) A company incorporated under the Companies Act"], "ans_letter": "C", "ans_full": "C — An ordinary partnership does not have separate legal personality in English law; partners remain personally liable. LLPs do have separate legal personality."}, {"id": "4.1.2", "q": "Which of the following is NOT one of the essential elements of a legally binding contract?", "opts": ["A) Offer and acceptance", "B) Consideration", "C) Registration with a court", "D) Intention to create legal relations"], "ans_letter": "C", "ans_full": "C — Registration with a court is not required. The four elements are: offer and acceptance, consideration, intention, and clear terms and conditions."}, {"id": "4.1.2", "q": "A contract is discharged by frustration. What does this mean?", "opts": ["A) One party refuses to pay damages", "B) Both parties agree to end the contract early", "C) Completion of the contract has become impossible", "D) One party has breached the terms"], "ans_letter": "C", "ans_full": "C — Frustration occurs when completion of the contract becomes impossible through no fault of either party."}, {"id": "4.1.2", "q": "In an agency relationship, which party's acts are binding on third parties within the scope of authority given?", "opts": ["A) The agent's acts bind the agent personally", "B) The agent's acts bind the principal", "C) The third party's acts bind the agent", "D) Neither party is bound until written confirmation"], "ans_letter": "B", "ans_full": "B — In an agency relationship, the agent acts on behalf of the principal, and the principal is bound by the agent's acts within the scope of the agent's authority."}, {"id": "4.1.2", "q": "A client verbally agrees to buy shares for a fixed price. The broker confirms but later refuses to proceed. The client can most likely claim which remedy?", "opts": ["A) Nothing — oral contracts are never enforceable", "B) Damages for breach of contract", "C) A new written contract must be formed first", "D) The broker can withdraw at any time before settlement"], "ans_letter": "B", "ans_full": "B — Oral contracts can be legally binding. The client can claim damages for breach of contract if the broker fails to fulfil the agreed terms."}, {"id": "4.1.3", "q": "Two people own a property as joint tenants. One owner dies. What happens to their interest in the property?", "opts": ["A) It passes under the deceased's will", "B) It is split equally between the deceased's children", "C) It passes automatically to the surviving owner", "D) It passes to the state (bona vacantia)"], "ans_letter": "C", "ans_full": "C — Joint tenancy carries the right of survivorship: the deceased's interest passes automatically to the surviving co-owner, regardless of what the will says."}, {"id": "4.1.3", "q": "Two investors own shares as tenants in common. What best describes this arrangement?", "opts": ["A) Each owns an identical undivided interest with right of survivorship", "B) Each owns a separate identified share that can be passed under their will", "C) Neither can sell their share without the other's consent", "D) On death, the shares automatically vest in the surviving owner"], "ans_letter": "B", "ans_full": "B — Tenants in common each hold a separate identified share which passes under their will or intestacy rules on death — there is no right of survivorship."}, {"id": "4.1.3", "q": "Which type of ownership describes the right to use a property and receive its financial benefits, even if not named on the title deed?", "opts": ["A) Legal ownership", "B) Beneficial ownership", "C) Registered ownership", "D) Nominal ownership"], "ans_letter": "B", "ans_full": "B — Beneficial (equitable) ownership gives the right to use, income, and financial benefits from an asset, even where legal title is held by another (e.g. a trustee)."}, {"id": "4.1.4", "q": "A company is unable to pay its debts. What is the correct legal process for dealing with this?", "opts": ["A) The company is declared bankrupt", "B) The company is placed into administration", "C) The directors are made personally bankrupt", "D) The Official Receiver takes over the company"], "ans_letter": "B", "ans_full": "B — Bankruptcy is a legal process that applies only to individuals. Companies that cannot pay their debts are placed into administration."}, {"id": "4.1.4", "q": "What is the minimum debt level at which a creditor can petition a court for a bankruptcy order against an individual?", "opts": ["A) £1,000", "B) £2,500", "C) £5,000", "D) £10,000"], "ans_letter": "C", "ans_full": "C — A creditor can petition for a bankruptcy order for debts exceeding £5,000."}, {"id": "4.1.4", "q": "Which of the following BEST describes the difference between insolvency and bankruptcy?", "opts": ["A) They are the same thing and the terms can be used interchangeably", "B) Insolvency is a financial state; bankruptcy is the legal status that follows for individuals", "C) Bankruptcy applies to companies; insolvency applies to individuals", "D) Insolvency is a criminal offence; bankruptcy is a civil matter"], "ans_letter": "B", "ans_full": "B — Insolvency describes the state of being unable to pay debts. Bankruptcy is the formal legal process that applies to individuals (not companies) who are insolvent."}, {"id": "4.1.4", "q": "After a bankruptcy order is made, who is responsible for administering the bankrupt individual's financial affairs?", "opts": ["A) The creditors collectively", "B) The debtor's solicitor", "C) The Official Receiver", "D) The Insolvency Practitioner appointed by the debtor"], "ans_letter": "C", "ans_full": "C — The Official Receiver, an officer of the court, administers the bankrupt person's financial affairs following a bankruptcy order."}, {"id": "4.1.5", "q": "A person dies without leaving a valid will. How is their estate distributed?", "opts": ["A) The estate passes entirely to the Crown", "B) The estate is divided equally among all blood relatives", "C) The estate is distributed according to the rules of intestacy", "D) The estate is distributed according to the deceased's verbal wishes"], "ans_letter": "C", "ans_full": "C — Dying without a valid will means dying intestate. The estate is distributed according to the statutory rules of intestacy, which may not reflect the deceased's wishes."}, {"id": "4.1.5", "q": "Which of the following is a requirement for a will to be valid?", "opts": ["A) It must be typed, not handwritten", "B) It must be registered with the Probate Registry before death", "C) The testator must be over 18 and have mental capacity", "D) It must be witnessed by a beneficiary named in the will"], "ans_letter": "C", "ans_full": "C — A valid will requires the testator to be over 18, have mental capacity, not be under duress, and the will must be in writing and properly signed and witnessed. A beneficiary witnessing the will could invalidate their gift."}, {"id": "4.1.5", "q": "What is the purpose of probate?", "opts": ["A) To register a will with the courts before death", "B) To establish ownership of the deceased's estate before assets are distributed", "C) To appoint a trustee to manage the deceased's assets indefinitely", "D) To calculate the inheritance tax liability of the estate"], "ans_letter": "B", "ans_full": "B — Probate establishes the legal ownership of a deceased person's estate and authorises the executor to distribute the assets."}, {"id": "4.1.6", "q": "In a discretionary trust, which of the following is correct?", "opts": ["A) Each beneficiary has a fixed right to a share of the income", "B) The settlor retains the right to direct distributions", "C) Trustees decide the amount of trust income and capital each beneficiary receives", "D) Income must be paid out annually and cannot be accumulated"], "ans_letter": "C", "ans_full": "C — In a discretionary trust, no beneficiary has a right to income. The trustees have full discretion to accumulate and/or distribute as they see fit."}, {"id": "4.1.6", "q": "A grandmother sets up a trust so that her granddaughter receives income from the trust assets during her lifetime, with the capital passing to the granddaughter's children on her death. What type of trust is this?", "opts": ["A) Bare trust", "B) Discretionary trust", "C) Interest in possession trust", "D) Charitable trust"], "ans_letter": "C", "ans_full": "C — This is an interest in possession trust. The granddaughter has a life interest (income/use) and the children are the remaindermen who receive the capital."}, {"id": "4.1.6", "q": "In a bare trust, what interest does the beneficiary hold?", "opts": ["A) A discretionary interest", "B) A life interest only", "C) An absolute interest", "D) A reversionary interest"], "ans_letter": "C", "ans_full": "C — In a bare trust, the beneficiary has an absolute interest in the assets. The trustee simply holds the assets on their behalf."}, {"id": "4.1.6", "q": "A trust is established to promote the relief of poverty in a local community. What type of trust is this?", "opts": ["A) Discretionary trust", "B) Bare trust", "C) Interest in possession trust", "D) Charitable trust"], "ans_letter": "D", "ans_full": "D — A trust promoting the relief of poverty is a charitable trust. It must be of a charitable nature and for the public benefit."}, {"id": "4.1.7", "q": "Under the Trustee Act 2000, what are the two standard investment criteria that trustees must have regard to?", "opts": ["A) Liquidity and yield", "B) Suitability and need to diversify", "C) Capital growth and income", "D) Risk and return"], "ans_letter": "B", "ans_full": "B — The Trustee Act 2000 requires trustees to consider the suitability of investments and the need to diversify the trust portfolio."}, {"id": "4.1.7", "q": "The Trustee Act 2000 does NOT apply to which of the following?", "opts": ["A) A family discretionary trust", "B) A bare trust for a minor", "C) An occupational pension scheme", "D) An interest in possession trust"], "ans_letter": "C", "ans_full": "C — The Trustee Act 2000 does not apply to occupational pension schemes, authorised unit trusts, or certain schemes under the Charities Act."}, {"id": "4.1.7", "q": "Under the Trustee Act 2000, what must trustees do before making investment decisions?", "opts": ["A) Obtain court approval for each investment", "B) Consult all beneficiaries individually", "C) Obtain and consider proper advice unless it is unnecessary or inappropriate", "D) Obtain written consent from the settlor"], "ans_letter": "C", "ans_full": "C — Trustees must obtain and consider proper advice from someone with relevant knowledge, unless it is unnecessary or inappropriate in the circumstances."}, {"id": "4.1.7", "q": "What document establishes a trust and sets out the rules, including investment powers and any restrictions?", "opts": ["A) A letter of wishes", "B) A deed of variation", "C) The trust deed", "D) A grant of probate"], "ans_letter": "C", "ans_full": "C — The trust deed is the legal document that establishes the trust, names the trustees and beneficiaries, and governs how the trust operates."}, {"id": "4.1.8", "q": "What is the primary purpose of a Statement of Investment Principles?", "opts": ["A) To set out the pay and conditions of the pension scheme's investment managers", "B) To document the investment policy and principles adopted by pension scheme trustees", "C) To provide members with a guaranteed investment return", "D) To satisfy HMRC requirements for pension tax relief"], "ans_letter": "B", "ans_full": "B — A SIP sets out how the trustees invest the scheme's assets, demonstrating fulfilment of their fiduciary duty and providing transparency to members."}, {"id": "4.1.8", "q": "Under which legislation are occupational pension scheme trustees required to produce a Statement of Investment Principles?", "opts": ["A) Trustee Act 2000", "B) Companies Act 2006", "C) Pensions Act 1995", "D) Financial Services and Markets Act 2000"], "ans_letter": "C", "ans_full": "C — The requirement to produce a SIP for occupational pension schemes is set out in the Pensions Act 1995."}, {"id": "4.1.8", "q": "Which of the following would you expect to find in a Statement of Investment Principles?", "opts": ["A) The names and salaries of the pension fund managers", "B) The scheme's policy on ESG and socially responsible investment", "C) A list of all individual securities held by the fund", "D) The fund's audited accounts for the prior year"], "ans_letter": "B", "ans_full": "B — A SIP typically includes the trustees' policy on ESG/SRI, alongside investment objectives, asset allocation strategy, risk management approach and the use of managers."}, {"id": "4.1.8", "q": "How must occupational pension scheme trustees treat the SIP once it has been produced?", "opts": ["A) It is a confidential document and must not be shared with members", "B) It must be filed with the FCA each year", "C) It must be reviewed regularly and made available to members on request", "D) It must be approved by HMRC before implementation"], "ans_letter": "C", "ans_full": "C — The SIP must be reviewed regularly and updated when investment policy changes. Members are entitled to request a copy."}], "5": [{"id": "5.1.1", "q": "What is the FCA's definition of a high net worth individual?", "opts": ["A) Annual income of £50,000 or more", "B) Annual income of £100,000 or more OR investable assets of £250,000 or more", "C) Investable assets of £500,000 or more", "D) Annual income of £250,000 or more AND investable assets of £1,000,000"], "ans_letter": "B", "ans_full": "B — The FCA defines a high net worth individual as someone with annual income of £100,000+ or investable assets of £250,000+."}, {"id": "5.1.1", "q": "Which of the following is an example of an institutional investor?", "opts": ["A) A retired teacher investing their personal savings", "B) A high net worth individual with assets of £300,000", "C) A sovereign wealth fund investing a country's oil revenues", "D) A certified sophisticated investor trading derivatives"], "ans_letter": "C", "ans_full": "C — Sovereign wealth funds are institutional investors. The other options describe individual investors."}, {"id": "5.1.1", "q": "A certified sophisticated investor is best described as:", "opts": ["A) Anyone with investable assets over £250,000", "B) An investor assessed by a firm as sufficiently knowledgeable to understand the risks of a particular investment", "C) An institutional investor with over £1 million under management", "D) A professional investor regulated by the FCA"], "ans_letter": "B", "ans_full": "B — A certified sophisticated investor is assessed by a firm as being sufficiently knowledgeable to understand the risks of a specific investment product."}, {"id": "5.1.2", "q": "Which FCA Principle requires firms to 'act to deliver good outcomes for retail customers'?", "opts": ["A) Principle 6", "B) Principle 7", "C) Principle 9", "D) Principle 12"], "ans_letter": "D", "ans_full": "D — Principle 12 (the Consumer Duty, introduced July 2023) requires firms to act to deliver good outcomes for retail customers."}, {"id": "5.1.2", "q": "Under the FCA's Treating Customers Fairly (TCF) rules, which of the following is one of the six consumer outcomes?", "opts": ["A) Customers must receive a minimum guaranteed return on investments", "B) Consumers do not face unreasonable post-sale barriers", "C) Firms must offer the lowest possible charges", "D) All client communications must be in writing"], "ans_letter": "B", "ans_full": "B — One of the six TCF consumer outcomes is that consumers do not face unreasonable post-sale barriers (e.g. difficulty switching or making a complaint)."}, {"id": "5.1.2", "q": "Principle 7 of the FCA Principles for Businesses requires a firm to:", "opts": ["A) Maintain adequate financial resources at all times", "B) Communicate information to clients in a way that is clear, fair and not misleading", "C) Obtain best execution on all client orders", "D) Segregate client money from firm money"], "ans_letter": "B", "ans_full": "B — Principle 7 requires firms to pay due regard to the information needs of clients and communicate with them in a way that is clear, fair and not misleading."}, {"id": "5.2.1", "q": "A client has a 25-year investment horizon before retirement. Compared to a client with a 5-year horizon, they can generally:", "opts": ["A) Take less risk and require higher liquidity", "B) Take more risk and require less immediate liquidity", "C) Require a higher return to achieve the same outcome", "D) Only invest in cash and fixed interest"], "ans_letter": "B", "ans_full": "B — A longer time horizon allows more risk to be taken (short-term volatility can be ridden out) and reduces the need for immediate liquidity."}, {"id": "5.2.1", "q": "Which of the following is an 'other specific investor need' that a financial adviser should consider beyond the three main factors?", "opts": ["A) The adviser's own investment preferences", "B) The client's religious or ethical beliefs", "C) The performance of the client's employer's share price", "D) The adviser's firm's preferred product range"], "ans_letter": "B", "ans_full": "B — Religious or ethical beliefs (e.g. Sharia-compliant investing, ESG screening) are a specific investor need that advisers should consider."}, {"id": "5.2.2", "q": "A client says 'I want to save more for the future'. Why is this objective insufficient for financial planning purposes?", "opts": ["A) The client has not specified their employer details", "B) It does not state how much is needed or when, so it cannot be acted on or measured", "C) The client should have said 'invest' rather than 'save'", "D) It is insufficiently ambitious"], "ans_letter": "B", "ans_full": "B — An objective must specify how much is needed and when. A vague aspiration cannot be used to calculate a required return, determine risk levels, or monitor progress."}, {"id": "5.2.2", "q": "A well-quantified investment objective should ideally state which two things?", "opts": ["A) The client's attitude to risk and their employer", "B) The amount needed and the time horizon", "C) The preferred asset class and fund manager", "D) The tax rate and expected inflation"], "ans_letter": "B", "ans_full": "B — A properly quantified objective states how much is needed and when — allowing the adviser to determine required returns, risk, and suitable investments."}, {"id": "5.2.3", "q": "A client earns £4,000 per month and has total monthly expenditure of £3,200. How much is available for investment?", "opts": ["A) £7,200", "B) £3,200", "C) £800", "D) £4,000"], "ans_letter": "C", "ans_full": "C — Investable funds = Income − Expenditure = £4,000 − £3,200 = £800 per month."}, {"id": "5.2.3", "q": "When a client has multiple financial objectives but limited investable funds, what should a financial adviser do?", "opts": ["A) Recommend the highest-return investments to close the gap quickly", "B) Prioritise the objectives and plan within the client's affordability", "C) Advise the client to increase their income before proceeding", "D) Limit advice to a single objective at a time regardless of the client's needs"], "ans_letter": "B", "ans_full": "B — When budgetary constraints exist, financial planning should prioritise the client's objectives and work within what is affordable."}, {"id": "5.3.1", "q": "Which of the following is a 'soft fact' gathered during the fact-find process?", "opts": ["A) The client's date of birth", "B) The client's current mortgage balance", "C) The client's attitude to investment risk", "D) The client's annual salary"], "ans_letter": "C", "ans_full": "C — Soft facts are subjective information about attitudes, feelings and priorities (e.g. attitude to risk). Hard facts are objective, verifiable data like salary and mortgage balance."}, {"id": "5.3.1", "q": "What is the purpose of a letter of authority in the fact-find process?", "opts": ["A) To authorise the adviser to make investments on the client's behalf", "B) To allow relevant third parties to release information about the client to the adviser", "C) To confirm the client's identity for anti-money-laundering purposes", "D) To record the client's agreement to the adviser's charges"], "ans_letter": "B", "ans_full": "B — A letter of authority authorises third parties (e.g. pension providers, lenders) to share information about the client with the adviser, enabling a complete financial picture."}, {"id": "5.3.1", "q": "An adviser asks a client: 'How do you feel about your current spread of investments?' This is an example of gathering which type of fact-find information?", "opts": ["A) Hard fact", "B) Financial data", "C) Soft fact", "D) Regulatory data"], "ans_letter": "C", "ans_full": "C — Open questions about feelings and attitudes are soft facts. They provide subjective insight that hard financial data alone cannot capture."}, {"id": "5.3.2", "q": "Why is a client's residency and domicile status relevant in the fact-find?", "opts": ["A) It determines the client's attitude to risk", "B) It affects the tax treatment of income, gains and inheritance", "C) It indicates the client's investment experience", "D) It establishes the client's credit rating"], "ans_letter": "B", "ans_full": "B — Residency and domicile affect how income, capital gains and inheritance are taxed, so they are essential components of the financial fact-find."}, {"id": "5.3.2", "q": "A client is 58, recently widowed, has two grown children and is considering early retirement. Which factors are MOST relevant to their financial circumstances?", "opts": ["A) Their employer's share price and favourite asset class", "B) Life stage, health, existing pension and retirement time horizon", "C) Their children's investment preferences", "D) The performance of the FTSE 100 over the past 5 years"], "ans_letter": "B", "ans_full": "B — Life stage (near retirement), health (affects life expectancy and long-term care needs), existing pension value, and time horizon are all directly relevant to planning for this client."}, {"id": "5.4.1", "q": "A client holds all their savings in a cash deposit account. Which risk are they most exposed to?", "opts": ["A) Capital risk", "B) Credit risk", "C) Inflation risk", "D) Market risk"], "ans_letter": "C", "ans_full": "C — Cash avoids capital risk but is highly exposed to inflation risk: the real value of the savings is eroded if the interest rate is below inflation."}, {"id": "5.4.1", "q": "Which of the following BEST describes shortfall risk?", "opts": ["A) The risk that the investment provider becomes insolvent", "B) The risk that investment returns fall short of the amount needed to achieve the investor's objectives", "C) The risk that the portfolio is insufficiently diversified", "D) The risk of loss due to fluctuations in exchange rates"], "ans_letter": "B", "ans_full": "B — Shortfall risk is specifically the risk that returns are insufficient to achieve the investor's financial goals, regardless of whether capital is lost."}, {"id": "5.4.1", "q": "An investor holds a portfolio of corporate bonds. Which risk is MOST specific to this investment compared to holding government gilts?", "opts": ["A) Interest rate risk", "B) Inflation risk", "C) Credit risk", "D) Shortfall risk"], "ans_letter": "C", "ans_full": "C — Credit risk is the risk of loss due to an issuer defaulting. Corporate bonds carry more credit risk than government gilts because companies are more likely to default than the UK government."}, {"id": "5.4.1", "q": "Market risk is best described as:", "opts": ["A) The risk that a specific company will fail", "B) Loss of value due to fluctuations in market prices, interest rates or exchange rates", "C) The risk that the client's objectives change over time", "D) Risk arising from poor systems and processes within a firm"], "ans_letter": "B", "ans_full": "B — Market risk (systematic risk) is the risk of loss due to broad market movements — changes in prices, interest rates or exchange rates that affect all investments."}, {"id": "5.4.2", "q": "Diversification is primarily effective at reducing which type of risk?", "opts": ["A) Systematic (market) risk", "B) Inflation risk", "C) Unsystematic (specific) risk", "D) Interest rate risk"], "ans_letter": "C", "ans_full": "C — Diversification reduces unsystematic (specific) risk — risks unique to individual companies or sectors. It cannot eliminate systematic risk, which affects the whole market."}, {"id": "5.4.2", "q": "Why does diversification reduce portfolio risk?", "opts": ["A) Because all assets tend to perform identically in all market conditions", "B) Because losses in one investment can be offset by gains in another due to imperfect correlation", "C) Because it guarantees a minimum return on the portfolio", "D) Because it eliminates exposure to inflation"], "ans_letter": "B", "ans_full": "B — Diversification works because different assets are not perfectly correlated. When one falls, another may rise, reducing the overall volatility of the portfolio."}, {"id": "5.4.3", "q": "Which component of a client's risk profile reflects their emotional comfort with investment volatility?", "opts": ["A) Risk required", "B) Risk capacity", "C) Risk tolerance", "D) Risk exposure"], "ans_letter": "C", "ans_full": "C — Risk tolerance is the subjective, emotional dimension: how comfortable the client is with volatility and the possibility of loss."}, {"id": "5.4.3", "q": "A client has enough wealth that losing a significant portion would not affect their lifestyle. This relates to which aspect of their risk profile?", "opts": ["A) Risk tolerance", "B) Risk required", "C) Risk capacity", "D) Investment experience"], "ans_letter": "C", "ans_full": "C — Risk capacity is the level of risk a client can financially afford to take without threatening their standard of living. Having excess wealth indicates high risk capacity."}, {"id": "5.4.3", "q": "Risk capacity and risk tolerance act as what in relation to a client's investment plan?", "opts": ["A) Targets to be maximised", "B) Constraints on the level of risk required to meet objectives", "C) Guarantees of investment performance", "D) Benchmarks for measuring fund manager performance"], "ans_letter": "B", "ans_full": "B — Risk capacity and risk tolerance are constraints. Even if a higher return (and risk) is mathematically needed to meet a goal, the client may not be able to afford the risk or be comfortable with it."}, {"id": "5.4.4", "q": "The FCA requires advisers to take which factor into account when assessing the risk a client is able to take?", "opts": ["A) The performance of the client's existing portfolio", "B) The client's capacity for loss", "C) The adviser's preferred risk model", "D) The client's stated preferred return"], "ans_letter": "B", "ans_full": "B — The FCA requires advisers to assess the client's capacity for loss — their ability to financially absorb the level of risk identified — when assessing the appropriate risk level."}, {"id": "5.4.4", "q": "A client's risk profile questionnaire suggests they have a high risk tolerance, but their financial circumstances show they cannot afford significant losses. What should the adviser recommend?", "opts": ["A) The highest-risk portfolio because the client expressed high tolerance", "B) The lowest-risk portfolio regardless of their tolerance", "C) A risk level consistent with their capacity for loss, which is the binding constraint", "D) No investment, as the conflicting results make advice impossible"], "ans_letter": "C", "ans_full": "C — Capacity for loss is the binding constraint. Even if psychological tolerance is high, the adviser cannot recommend more risk than the client can financially absorb."}, {"id": "5.5.1", "q": "Why must asset allocation be agreed before specific investment recommendations are made?", "opts": ["A) Because regulators require asset allocation to be documented first", "B) Because the appropriate mix of asset classes is driven by the client's risk profile and objectives, and individual product choices are only meaningful within that context", "C) Because fund managers require a mandate before accepting client money", "D) Because asset allocation determines the adviser's fee"], "ans_letter": "B", "ans_full": "B — Asset allocation is derived from the client's risk profile, objectives and time horizon. Specific products can only be selected appropriately once the overall asset mix has been determined."}, {"id": "5.5.1", "q": "Which of the following is NOT one of the main asset classes in portfolio construction?", "opts": ["A) Equities", "B) Fixed interest", "C) Property", "D) Insurance premiums"], "ans_letter": "D", "ans_full": "D — The main asset classes are cash, fixed interest, equities and property. Insurance premiums are not an asset class."}, {"id": "5.5.2", "q": "When selecting funds for a client, which of the following is NOT a key criterion?", "opts": ["A) The fund's past performance", "B) Ongoing charges", "C) The fund manager's personal investment style", "D) The financial stability of the provider"], "ans_letter": "C", "ans_full": "C — The IMC syllabus identifies past performance, charges, financial stability of the provider, and the standing of trustees/custodians/auditors as key criteria. The fund manager's personal style is not listed."}, {"id": "5.5.2", "q": "Why are charges an important consideration in the fund selection process?", "opts": ["A) Higher charges indicate better quality fund management", "B) Charges are fixed by regulation and cannot vary between funds", "C) Charges directly reduce investment returns and compound over time", "D) Charges are only relevant for retail clients, not institutional investors"], "ans_letter": "C", "ans_full": "C — Both one-off and ongoing charges reduce the net return to the investor. Over long periods, even small differences in charges can have a significant compounding effect on outcomes."}, {"id": "5.5.3", "q": "What is the most important characteristic of a benchmark used to assess portfolio performance?", "opts": ["A) It should always outperform the portfolio", "B) It should be neutral, unbiased and comprise similar investment types to the portfolio", "C) It should be set by the fund manager", "D) It should be based solely on past performance"], "ans_letter": "B", "ans_full": "B — A good benchmark should be neutral and unbiased, and should comprise similar investment types to those in the portfolio, enabling meaningful comparison."}, {"id": "5.5.3", "q": "A pension fund wants to measure whether its investments are meeting its long-term obligations. Which type of benchmark is most appropriate?", "opts": ["A) FTSE 100 total return", "B) A peer group (IA sector) average", "C) A liability-based benchmark", "D) The risk-free rate"], "ans_letter": "C", "ans_full": "C — Pension funds have specific future liabilities (pension payments). A liability-based benchmark measures whether investment returns are sufficient to meet those obligations."}, {"id": "5.5.4", "q": "A client's equity allocation has grown from 60% to 75% due to strong stock market performance. What action should the review prompt?", "opts": ["A) Increase the equity target to match the new allocation", "B) Rebalance the portfolio to restore the original 60% equity allocation", "C) Switch entirely to cash to lock in gains", "D) No action is needed if the client is happy with the performance"], "ans_letter": "B", "ans_full": "B — Portfolio drift means the asset allocation has moved away from the agreed risk profile. Rebalancing restores the intended allocation and risk level."}, {"id": "5.5.4", "q": "Which of the following is NOT a primary purpose of a client portfolio review?", "opts": ["A) Checking for changes in the client's circumstances", "B) Monitoring investment performance against a benchmark", "C) Rebalancing the portfolio", "D) Replacing all holdings with higher-charging funds"], "ans_letter": "D", "ans_full": "D — Reviews are about checking circumstances, monitoring performance and rebalancing. Replacing holdings with higher-charging funds is not a purpose of a review."}, {"id": "5.6.1", "q": "An adviser is explaining a complex structured product to a client with limited investment experience. What is the MOST appropriate approach?", "opts": ["A) Use full technical terminology so the client takes the recommendation seriously", "B) Avoid explaining the risks to prevent the client becoming worried", "C) Use plain language, avoid jargon and confirm the client's understanding", "D) Ask the client to read the product brochure independently"], "ans_letter": "C", "ans_full": "C — Advisers must adapt their communication to the client's level of knowledge, using plain language and confirming understanding — particularly for complex products."}, {"id": "5.6.1", "q": "Which FCA rule requires client communications to be fair, clear and not misleading?", "opts": ["A) COBS 9A", "B) COBS 4.2", "C) COBS 11.2A", "D) SYSC 10"], "ans_letter": "B", "ans_full": "B — COBS 4.2 sets the requirement that all communications with clients must be fair, clear and not misleading."}, {"id": "5.6.2", "q": "A 30-year-old client with stable employment, no dependants and a 35-year investment horizon asks for investment advice. Which approach is MOST appropriate?", "opts": ["A) Entirely cash-based savings account for capital preservation", "B) An equity-heavy ISA with regular pension contributions, taking advantage of the long time horizon", "C) An annuity to guarantee income from age 30", "D) A portfolio weighted towards short-dated government bonds"], "ans_letter": "B", "ans_full": "B — A young client with a long time horizon and stable income can afford to take more risk. Equities within an ISA and pension contributions are well-suited to the accumulation phase."}, {"id": "5.6.2", "q": "A retired client needs regular income, wants to preserve capital for their estate, and has a low risk tolerance. Which combination BEST suits their needs?", "opts": ["A) A 100% global equity fund for maximum growth", "B) Income-producing assets with capital preservation focus and estate/IHT planning", "C) Structured products with capital-at-risk", "D) A high-yield corporate bond fund only"], "ans_letter": "B", "ans_full": "B — A retired client needs income and capital preservation. Income-producing lower-risk assets combined with IHT/trust planning aligns with their objectives and low risk tolerance."}, {"id": "5.7.1", "q": "In a defined contribution pension scheme, who bears the investment risk?", "opts": ["A) The employer (scheme sponsor)", "B) The pension fund trustees", "C) The scheme member", "D) The Pension Protection Fund"], "ans_letter": "C", "ans_full": "C — In a DC scheme, the member bears the investment risk. The final pension depends on contributions made and the investment returns achieved."}, {"id": "5.7.1", "q": "Why do general insurance companies hold a higher proportion of short-term, liquid assets compared to life assurance companies?", "opts": ["A) Because regulation requires it", "B) Because general insurance claims can arise immediately, requiring ready access to cash", "C) Because short-term assets provide higher returns", "D) Because their premium income is lower than life assurance companies"], "ans_letter": "B", "ans_full": "B — General insurers face immediate and unpredictable claims (e.g. car accidents, property damage), so they must hold highly liquid assets to meet these at short notice."}, {"id": "5.7.2", "q": "Under automatic enrolment rules, which workers must be enrolled into a workplace pension?", "opts": ["A) All employees regardless of age or earnings", "B) Workers aged 22 to state pension age who earn above the lower earnings limit and are not already in a qualifying scheme", "C) Only workers who have been employed for more than 2 years", "D) Workers aged 18 and over who earn at least £10,000 per year"], "ans_letter": "B", "ans_full": "B — Eligible workers for automatic enrolment are those aged 22 to state pension age, earning above the lower earnings limit, and not already in a qualifying workplace scheme."}, {"id": "5.7.2", "q": "Under pension freedom rules, how much of a DC pension fund can be taken as a tax-free lump sum?", "opts": ["A) 10%", "B) 20%", "C) 25%", "D) 100%"], "ans_letter": "C", "ans_full": "C — Up to 25% of the accumulated DC pension fund can be taken as a tax-free lump sum. The remainder is taxed as income when withdrawn."}, {"id": "5.7.3", "q": "In a defined benefit pension scheme, who bears the risk if investment returns are insufficient to pay the promised benefits?", "opts": ["A) The scheme members", "B) The scheme trustees", "C) The employer (scheme sponsor)", "D) The Pension Protection Fund automatically"], "ans_letter": "C", "ans_full": "C — In a DB scheme, the employer (sponsor) must make up any shortfall if investments underperform. The member's benefit is guaranteed regardless of investment returns."}, {"id": "5.7.3", "q": "Which of the following risks is a member of a DC pension scheme exposed to that a DB member is NOT?", "opts": ["A) The risk that the employer becomes insolvent", "B) The risk that investment returns are insufficient to fund a comfortable retirement", "C) The risk of the pension being reduced by the Pension Protection Fund", "D) The risk of the scheme being wound up"], "ans_letter": "B", "ans_full": "B — DC members bear the investment risk. Their final pension depends entirely on contributions paid and investment returns achieved. DB members receive a guaranteed benefit regardless."}, {"id": "5.7.4", "q": "Why does a general insurance company hold a higher proportion of liquid, short-term assets compared to a DB pension fund?", "opts": ["A) Regulation forbids general insurers from holding equities", "B) General insurance claims can arise immediately and unpredictably", "C) Short-term assets provide better returns for insurers", "D) DB funds have shorter time horizons than general insurers"], "ans_letter": "B", "ans_full": "B — General insurance claims (e.g. car accidents) can arise at any time, requiring liquid assets to pay claims promptly. DB pension funds have predictable long-term liabilities."}, {"id": "5.7.4", "q": "In a DC pension scheme, how does the typical asset allocation change as a member approaches retirement?", "opts": ["A) The allocation shifts from bonds to equities to maximise final returns", "B) The allocation remains constant throughout the member's working life", "C) The allocation gradually shifts from equities to lower-risk assets (bonds/cash)", "D) The member is automatically moved into cash 10 years before retirement"], "ans_letter": "C", "ans_full": "C — Lifestyle and target-date DC funds gradually de-risk as the member approaches retirement, shifting from equities to lower-risk bonds and cash to protect the accumulated fund."}, {"id": "5.7.5", "q": "What is the PRIMARY return objective of a defined benefit pension fund?", "opts": ["A) To outperform the FTSE 100 index", "B) To match or exceed the growth of its pension liabilities", "C) To maximise equity returns for the benefit of members", "D) To achieve a return of RPI + 5% in all market conditions"], "ans_letter": "B", "ans_full": "B — A DB fund's primary objective is to generate returns sufficient to fund its liabilities (the promised pension benefits). If returns fall short, the employer must make up the deficit."}, {"id": "5.7.5", "q": "A general insurance company's investment return objective is BEST described as:", "opts": ["A) Maximising long-term equity growth", "B) Capital preservation and liquidity, with investment returns supplemental to underwriting profit", "C) Matching long-term inflation over a 30-year horizon", "D) Achieving the highest risk-adjusted return in its peer group"], "ans_letter": "B", "ans_full": "B — General insurers prioritise capital preservation and liquidity to meet unpredictable claims. Investment returns are secondary to underwriting profit."}, {"id": "5.7.6", "q": "A mature defined benefit pension fund that is making regular pension payments to retired members would BEST be classified as:", "opts": ["A) A capital growth fund", "B) An income fund", "C) A speculative fund", "D) A balanced growth fund"], "ans_letter": "B", "ans_full": "B — A mature DB fund paying pensions needs regular income to fund ongoing payments. It is primarily income-focused."}, {"id": "5.7.6", "q": "Which asset classes are MOST suitable for a fund with primary income requirements?", "opts": ["A) High-growth technology equities and venture capital", "B) Dividend-paying equities, corporate bonds and property", "C) Commodities and infrastructure only", "D) Cash and money market funds only"], "ans_letter": "B", "ans_full": "B — Income-focused funds favour assets that generate regular income: dividend-paying equities, corporate bonds (coupon payments) and property (rental income)."}, {"id": "5.7.7", "q": "A pension fund is described as 'immature'. What does this mean for its asset allocation and liquidity needs?", "opts": ["A) It requires high liquidity and mostly short-term bonds", "B) It can hold more equities and has low liquidity needs, as contributions exceed outflows", "C) It must hold only index-linked gilts", "D) It requires immediate conversion of assets to cash"], "ans_letter": "B", "ans_full": "B — An immature pension fund has mostly working members and deferred liabilities. Contributions exceed outflows, so liquidity needs are low and it can hold more growth assets like equities."}, {"id": "5.7.7", "q": "As a defined benefit pension fund matures, what typically happens to its asset allocation?", "opts": ["A) It shifts from bonds to equities to generate more growth", "B) It moves from equities to bonds to better match increasing immediate liabilities", "C) It switches entirely to cash to preserve capital", "D) Asset allocation remains unchanged throughout the fund's life"], "ans_letter": "B", "ans_full": "B — As a DB fund matures and more members retire, immediate liabilities grow. The fund shifts towards bonds (liability-matching) to reduce mismatch risk and increase liquidity."}, {"id": "5.7.8", "q": "Which of the following BEST describes the taxation of income and capital gains within a UK pension fund?", "opts": ["A) Taxed at the basic rate of income tax", "B) Taxed at the higher rate for gains above the annual exempt amount", "C) Not taxed — income and gains within the fund are exempt", "D) Subject to corporation tax at 25%"], "ans_letter": "C", "ans_full": "C — Income and capital gains within a UK pension fund are not subject to tax. This makes the pension fund a highly efficient tax-free investment wrapper."}, {"id": "5.7.8", "q": "How does the tax-exempt status of a pension fund affect its stock selection compared to a taxable investor?", "opts": ["A) Pension funds must avoid equities due to dividend taxation", "B) Pension funds have no tax incentive to prefer capital gains over income, so both can be considered equally", "C) Pension funds are required by law to hold only government bonds", "D) Tax-exempt status means pension funds must hold only UK assets"], "ans_letter": "B", "ans_full": "B — Because income and gains are both tax-free within a pension fund, there is no tax-driven preference for capital growth over income (unlike taxable investors who may prefer gains taxed at lower CGT rates)."}, {"id": "5.7.9", "q": "Which body provides compensation to eligible customers if an FCA-authorised investment firm becomes insolvent?", "opts": ["A) The Financial Ombudsman Service (FOS)", "B) The Pensions Regulator", "C) The Financial Services Compensation Scheme (FSCS)", "D) The Pension Protection Fund (PPF)"], "ans_letter": "C", "ans_full": "C — The FSCS protects eligible customers (up to £85,000 per firm for investments) if an authorised firm fails. The FOS resolves disputes; the PPF protects DB pension members."}, {"id": "5.7.9", "q": "Which legislation established both the Pensions Regulator and the Pension Protection Fund?", "opts": ["A) Pensions Act 1995", "B) Pensions Act 2004", "C) Pensions Act 2008", "D) Trustee Act 2000"], "ans_letter": "B", "ans_full": "B — The Pensions Act 2004 established both the Pensions Regulator (TPR) and the Pension Protection Fund (PPF)."}, {"id": "5.7.10", "q": "Which of the following is a constraint that limits a defined benefit pension fund from maximising investment returns?", "opts": ["A) The fund is prohibited from investing in equities by law", "B) The fund must match the duration of its assets to the duration of its liabilities", "C) The fund must distribute all income annually to members", "D) Pension funds are required to hold 50% in government gilts"], "ans_letter": "B", "ans_full": "B — DB pension funds must manage asset-liability mismatch. Matching the duration of assets to liabilities (liability-driven investment) constrains the ability to hold purely high-growth assets."}, {"id": "5.7.10", "q": "A pension fund trustee wishes to invest heavily in illiquid private equity to improve returns. Which factor would MOST constrain this decision?", "opts": ["A) The fund's tax-exempt status prevents holding private equity", "B) Liquidity requirements: the fund must be able to meet pension payments as they fall due", "C) Private equity is prohibited for pension funds under the Trustee Act 2000", "D) The Pensions Regulator sets maximum equity allocations"], "ans_letter": "B", "ans_full": "B — Pension funds must maintain sufficient liquidity to pay pensions when due. Heavy allocation to illiquid private equity could create cash flow problems when pension payments need to be made."}], "6": [{"id": "6.1.1", "q": "In what order is income taxed for UK income tax purposes?", "opts": ["A) Dividends, then savings income, then non-savings income", "B) Non-savings income first, then savings income, then dividend income", "C) All income is taxed together at a single blended rate", "D) Savings income first, then non-savings, then dividends"], "ans_letter": "B", "ans_full": "B — Income is taxed in a specific order: non-savings income first, then savings income, then dividend income. This affects which rate bands each type falls into."}, {"id": "6.1.1", "q": "A higher rate taxpayer receives dividend income. At what rate is it taxed?", "opts": ["A) 20%", "B) 33.75%", "C) 39.35%", "D) 40%"], "ans_letter": "B", "ans_full": "B — Higher rate taxpayers pay 33.75% on dividend income. The standard higher rate of 40% applies to non-savings and savings income, not dividends."}, {"id": "6.1.1", "q": "The UK tax year runs from:", "opts": ["A) 1 January to 31 December", "B) 1 April to 31 March", "C) 6 April to 5 April the following year", "D) 1 March to 28 February"], "ans_letter": "C", "ans_full": "C — The UK tax year (fiscal year) runs from 6 April to 5 April the following year."}, {"id": "6.1.2", "q": "An additional rate taxpayer receives £3,000 of savings interest. How much Personal Savings Allowance can they use?", "opts": ["A) £1,000", "B) £500", "C) £250", "D) £0"], "ans_letter": "D", "ans_full": "D — Additional rate taxpayers receive no Personal Savings Allowance. All their savings income is taxable."}, {"id": "6.1.2", "q": "At what level of income does a UK taxpayer lose their personal allowance entirely?", "opts": ["A) £100,000", "B) £112,570", "C) £125,140", "D) £150,000"], "ans_letter": "C", "ans_full": "C — The personal allowance is tapered at £1 for every £2 over £100,000 and is completely withdrawn when income reaches £125,140."}, {"id": "6.1.2", "q": "What is the annual dividend allowance available to a higher rate taxpayer?", "opts": ["A) £2,000", "B) £1,000", "C) £500", "D) £0"], "ans_letter": "C", "ans_full": "C — The dividend allowance is £500 for ALL taxpayers regardless of their tax band."}, {"id": "6.1.2", "q": "An investor earning £290,000 contributes to a pension. What is the maximum annual allowance available to them?", "opts": ["A) £60,000", "B) £45,000", "C) £10,000", "D) £3,600"], "ans_letter": "B", "ans_full": "B — The pension annual allowance is tapered by £1 for every £2 of income over £260,000. Income is £290,000 — excess of £30,000 → allowance reduced by £15,000 → £60,000 − £15,000 = £45,000."}, {"id": "6.1.3", "q": "In a discretionary trust, at what rate is non-dividend income taxed on the trustees?", "opts": ["A) 20%", "B) 40%", "C) 45%", "D) 39.35%"], "ans_letter": "C", "ans_full": "C — Non-dividend income in a discretionary trust is taxed on the trustees at the trust rate of 45%. Dividend income is taxed at 39.35%."}, {"id": "6.1.3", "q": "A bare trust holds shares on behalf of a beneficiary. Who is liable for income tax on the dividends?", "opts": ["A) The trustee at the trust rate of 39.35%", "B) The beneficiary at their own marginal tax rate", "C) The settlor at their marginal rate", "D) No tax is due — bare trusts are exempt"], "ans_letter": "B", "ans_full": "B — In a bare trust, the beneficiary is treated as the direct owner for tax purposes and is taxed on income at their own marginal rate."}, {"id": "6.1.4", "q": "Which class of NIC is paid by an employer on certain employee benefits in kind?", "opts": ["A) Class 1", "B) Class 1A", "C) Class 2", "D) Class 4"], "ans_letter": "B", "ans_full": "B — Class 1A NICs are paid by employers on certain employee benefits in kind (e.g. company cars)."}, {"id": "6.1.4", "q": "A self-employed individual wants to fill a gap in their National Insurance record to qualify for a full state pension. Which class of NIC should they pay?", "opts": ["A) Class 1", "B) Class 1B", "C) Class 3", "D) Class 4"], "ans_letter": "C", "ans_full": "C — Class 3 NICs are voluntary contributions made to fill gaps in an individual's NIC record."}, {"id": "6.1.4", "q": "Which class of NIC did the government effectively abolish from 6 April 2024?", "opts": ["A) Class 1", "B) Class 2", "C) Class 3", "D) Class 4"], "ans_letter": "B", "ans_full": "B — Class 2 NICs (paid by the self-employed on a flat-rate basis) were effectively abolished from 6 April 2024."}, {"id": "6.1.5", "q": "A higher rate taxpayer sells shares at a gain. At what rate will they pay CGT?", "opts": ["A) 10%", "B) 18%", "C) 24%", "D) 28%"], "ans_letter": "C", "ans_full": "C — Higher and additional rate taxpayers pay CGT at 24% on most chargeable assets including shares."}, {"id": "6.1.5", "q": "Which of the following assets is EXEMPT from capital gains tax?", "opts": ["A) Buy-to-let investment property", "B) Shares held outside an ISA", "C) UK government gilts", "D) A holiday home"], "ans_letter": "C", "ans_full": "C — UK government gilts (and most corporate debt) are exempt from CGT. Investment property and shares outside ISAs are chargeable assets."}, {"id": "6.1.5", "q": "What is the CGT annual exempt amount for an individual?", "opts": ["A) £6,000", "B) £3,000", "C) £12,300", "D) £10,000"], "ans_letter": "B", "ans_full": "B — The CGT annual exempt amount is £3,000."}, {"id": "6.1.5", "q": "An investor sells shares realising a gain of £20,000. They have capital losses of £5,000 from the same year and £8,000 brought forward. What is the net chargeable gain before the annual exemption?", "opts": ["A) £20,000", "B) £15,000", "C) £7,000", "D) £4,000"], "ans_letter": "B", "ans_full": "B — Current year losses (£5,000) must be offset first: £20,000 − £5,000 = £15,000. Brought-forward losses are only used to the extent needed after the annual exemption is applied."}, {"id": "6.1.6", "q": "What is the inheritance tax nil rate band?", "opts": ["A) £250,000", "B) £325,000", "C) £500,000", "D) £1,000,000"], "ans_letter": "B", "ans_full": "B — The IHT nil rate band is £325,000. Estates above this level are taxed at 40% (or 36% if 10%+ left to charity)."}, {"id": "6.1.6", "q": "A person makes a gift to their adult child and dies 4 years later. How is this gift treated for IHT?", "opts": ["A) Fully exempt as it was a gift to an individual", "B) Taxed at 40% as the donor did not survive 7 years", "C) It is a PET that failed — taxable but taper relief may apply as the donor survived 3–7 years", "D) Charged at 20% as a chargeable lifetime transfer"], "ans_letter": "C", "ans_full": "C — A gift to an individual is a PET. If the donor dies within 7 years, it becomes chargeable. Taper relief reduces the IHT charge if death occurs between 3 and 7 years after the gift."}, {"id": "6.1.6", "q": "What IHT rate applies to chargeable lifetime transfers (CLTs) in excess of the nil rate band?", "opts": ["A) 40%", "B) 36%", "C) 20%", "D) 10%"], "ans_letter": "C", "ans_full": "C — The IHT rate on CLTs (e.g. gifts into discretionary trusts) that exceed the nil rate band is 20% during lifetime. The full 40% rate applies on death."}, {"id": "6.1.7", "q": "A person makes a cash gift to their sibling and dies 5 years later. What taper relief applies to the IHT charge?", "opts": ["A) No relief — donor did not survive 7 years so full 40% applies", "B) 40% reduction in the IHT charge (i.e. 60% of the full charge is payable)", "C) The gift is fully exempt as it was made more than 3 years before death", "D) 20% reduction (80% of the full charge is payable)"], "ans_letter": "B", "ans_full": "B — For a PET where the donor survives 5–6 years, taper relief gives a 40% reduction in the IHT charge, so 60% of the standard charge is payable."}, {"id": "6.1.7", "q": "Which of the following would NOT be an effective IHT mitigation strategy?", "opts": ["A) Making a gift to a child and surviving 7 years", "B) Transferring assets to a spouse", "C) Making a gift but continuing to live in the gifted property rent-free", "D) Leaving more than 10% of the estate to charity"], "ans_letter": "C", "ans_full": "C — Continuing to live in a gifted property rent-free is a 'gift with reservation'. The asset remains in the estate for IHT purposes as the donor has not truly given it away."}, {"id": "6.1.8", "q": "A UK-domiciled individual is also UK resident. On what basis are they taxed for income tax and CGT?", "opts": ["A) Only on UK-source income and gains", "B) Only on income and gains remitted to the UK", "C) On their worldwide income and gains", "D) They are exempt from UK tax on overseas income"], "ans_letter": "C", "ans_full": "C — A UK resident and UK-domiciled individual is taxed on their worldwide income and capital gains."}, {"id": "6.1.8", "q": "Under the Statutory Residence Test, an individual is automatically non-resident if they spend fewer than how many days in the UK in a tax year (with no other conditions)?", "opts": ["A) 46 days", "B) 91 days", "C) 16 days", "D) 183 days"], "ans_letter": "C", "ans_full": "C — An individual who spends fewer than 16 days in the UK in a tax year is automatically non-resident, regardless of other factors."}, {"id": "6.1.8", "q": "For IHT purposes, a non-UK domiciled individual's estate is charged on:", "opts": ["A) Their worldwide assets", "B) Their UK assets only", "C) No assets — non-domiciled individuals are exempt from UK IHT", "D) Assets brought into the UK only"], "ans_letter": "B", "ans_full": "B — A non-UK domiciled individual is only subject to UK IHT on their UK-sited assets. Worldwide assets are only brought within UK IHT for those domiciled in the UK."}, {"id": "6.1.9", "q": "By what date must an online self-assessment tax return be submitted?", "opts": ["A) 31 October following the end of the tax year", "B) 5 April following the end of the tax year", "C) 31 January following the end of the tax year", "D) 31 March following the end of the tax year"], "ans_letter": "C", "ans_full": "C — Electronic/online self-assessment returns must be submitted by 31 January following the end of the tax year. Paper returns must be submitted by 31 October."}, {"id": "6.1.9", "q": "Which of the following BEST distinguishes tax evasion from tax avoidance?", "opts": ["A) Tax evasion uses ISAs and pensions; tax avoidance uses offshore accounts", "B) Tax evasion is illegal (criminal); tax avoidance is legal but may be challenged by HMRC", "C) Both are illegal but tax avoidance carries lower penalties", "D) Tax avoidance is only available to companies; tax evasion is only for individuals"], "ans_letter": "B", "ans_full": "B — Tax evasion is a criminal offence (deliberate concealment of income/assets). Tax avoidance is legally reducing your tax liability but aggressive schemes may be challenged under GAAR."}, {"id": "6.1.10", "q": "How is SDLT calculated on a residential property purchase?", "opts": ["A) A flat rate applied to the full purchase price", "B) A progressive slice system — each band rate applies only to the portion of the price within that band", "C) Based on the market rental value of the property", "D) Only charged on properties above £1 million"], "ans_letter": "B", "ans_full": "B — SDLT uses a slice/progressive system where each rate applies only to the portion of the purchase price falling within each band, similar to income tax."}, {"id": "6.1.10", "q": "A company purchases a residential property valued at £600,000. Which anti-avoidance SDLT rate applies?", "opts": ["A) 5%", "B) 10%", "C) 12%", "D) 17%"], "ans_letter": "D", "ans_full": "D — An anti-avoidance SDLT rate of 17% applies to collective investment schemes and companies buying residential properties valued above £500,000."}, {"id": "6.1.11", "q": "At what rate is Stamp Duty Reserve Tax (SDRT) charged on a paperless purchase of UK listed shares?", "opts": ["A) 0.25%", "B) 0.5%", "C) 1.0%", "D) 1.5%"], "ans_letter": "B", "ans_full": "B — SDRT is charged at 0.5% of the purchase consideration on electronic transactions in UK listed shares."}, {"id": "6.1.11", "q": "Which of the following transactions is EXEMPT from SDRT?", "opts": ["A) Buying shares in a FTSE 100 company electronically", "B) Exercising options to buy shares", "C) Buying units in a unit trust", "D) Taking up a rights issue"], "ans_letter": "C", "ans_full": "C — Unit trusts, OEICs and ETFs are exempt from SDRT. AIM and AQSE Growth Market shares are also exempt."}, {"id": "6.1.11", "q": "Who pays Stamp Duty Reserve Tax?", "opts": ["A) The seller of the shares", "B) The purchaser of the shares", "C) The broker executing the trade", "D) Both buyer and seller equally"], "ans_letter": "B", "ans_full": "B — SDRT is paid by the purchaser on the purchase consideration."}, {"id": "6.1.12", "q": "A company has profits of £300,000 in the financial year. At what rate will corporation tax be charged?", "opts": ["A) 19%", "B) 20%", "C) 25%", "D) 26.5%"], "ans_letter": "C", "ans_full": "C — The main rate of corporation tax (25%) applies to profits of £250,000 or more."}, {"id": "6.1.12", "q": "When must a company with profits of £800,000 pay its corporation tax?", "opts": ["A) On 31 January following the end of the financial year", "B) Quarterly by instalment during the year", "C) Nine months and one day after the accounting year end", "D) On the last day of the financial year"], "ans_letter": "B", "ans_full": "B — Large companies with profits exceeding £1.5 million pay quarterly by instalment. However, a company with profits of £800,000 is not 'large' — they would pay nine months and one day after year end. (Note: the question tests the £1.5m threshold — £800,000 < £1.5m so this company pays 9 months + 1 day.)"}, {"id": "6.1.12", "q": "A company makes a trading loss. How can this loss be used?", "opts": ["A) It can only be carried forward against future profits", "B) It can be offset against profits of the previous year or future years", "C) It is forfeited after one year if not used", "D) It can only be offset against capital gains, not trading profits"], "ans_letter": "B", "ans_full": "B — Corporation tax trading losses can be offset against profits and gains of the previous year (carry back) or future years (carry forward indefinitely)."}, {"id": "6.1.13", "q": "A financial adviser charges a client for advice on purchasing a retail investment. What is the VAT treatment?", "opts": ["A) Standard rate (20%)", "B) Reduced rate (5%)", "C) Zero rate (0%)", "D) Exempt from VAT"], "ans_letter": "D", "ans_full": "D — Advice on the sale of retail investments is exempt from VAT. General advice and recommendations are standard-rated at 20%."}, {"id": "6.1.13", "q": "At what rate is domestic gas and electricity charged for VAT purposes?", "opts": ["A) 0%", "B) 5%", "C) 10%", "D) 20%"], "ans_letter": "B", "ans_full": "B — Domestic electricity and gas are charged at the reduced VAT rate of 5%."}, {"id": "6.1.13", "q": "What is the key difference between a zero-rated supply and an exempt supply for VAT purposes?", "opts": ["A) Zero-rated supplies are only available to individuals, not businesses", "B) Businesses making zero-rated supplies can reclaim input VAT; businesses making exempt supplies cannot", "C) Exempt supplies are charged at 5%; zero-rated at 0%", "D) There is no practical difference — both result in no VAT charged to the customer"], "ans_letter": "B", "ans_full": "B — Zero-rated businesses can reclaim the VAT they paid on their inputs (costs). Exempt businesses cannot reclaim input VAT, which increases their costs."}, {"id": "6.1.14", "q": "A higher rate taxpayer sells UK government gilts at a profit. What is the CGT position?", "opts": ["A) CGT at 24% applies on the full gain", "B) CGT at 18% applies on the full gain", "C) The gain is exempt from CGT", "D) The gain is taxed as income at 40%"], "ans_letter": "C", "ans_full": "C — Capital gains on UK government gilts (and most corporate debt) are exempt from CGT, regardless of the taxpayer's rate."}, {"id": "6.1.14", "q": "A basic rate taxpayer receives £3,000 in dividends from their share portfolio. How much of this is taxable?", "opts": ["A) The full £3,000 is taxed at 8.75%", "B) £2,500 is taxable after the £500 dividend allowance", "C) Nothing — dividends are tax-free for basic rate taxpayers", "D) £2,000 is taxable after the £1,000 PSA"], "ans_letter": "B", "ans_full": "B — The dividend allowance is £500 for all taxpayers. The remaining £2,500 is taxed at 8.75% (basic rate)."}, {"id": "6.1.15", "q": "An investor has a life assurance bond with an original premium of £100,000. How much can they withdraw each year without an immediate income tax liability?", "opts": ["A) £1,000", "B) £5,000", "C) £10,000", "D) £20,000"], "ans_letter": "B", "ans_full": "B — Investors can withdraw 5% of the original premium per year without an immediate income tax liability, cumulating up to 100% over 20 years. 5% × £100,000 = £5,000 per year."}, {"id": "6.1.15", "q": "What is the income tax relief available on a qualifying investment in a Venture Capital Trust (VCT)?", "opts": ["A) 20% on up to £100,000", "B) 30% on up to £200,000", "C) 30% on up to £1,000,000", "D) 50% on up to £100,000"], "ans_letter": "B", "ans_full": "B — VCT investments attract 30% income tax relief on a maximum of £200,000 per year, provided the shares are held for at least 5 years."}, {"id": "6.1.15", "q": "Which of the following is correct regarding EIS investments?", "opts": ["A) 50% income tax relief; shares must be held for 5 years", "B) 30% income tax relief; shares must be held for 3 years; no CGT on disposal", "C) 30% income tax relief; shares must be held for 5 years; dividends tax-free", "D) 20% income tax relief on investments up to £2 million"], "ans_letter": "B", "ans_full": "B — EIS gives 30% income tax relief on up to £1m per year (£2m for knowledge-intensive). Shares must be held for at least 3 years to keep the relief. No CGT arises on disposal."}, {"id": "6.2.1", "q": "A client is a higher rate taxpayer with significant savings income. What is the MOST tax-efficient immediate action?", "opts": ["A) Switch savings into a higher-interest account", "B) Transfer savings into an ISA to shelter future interest from income tax", "C) Move savings offshore to avoid UK tax", "D) Withdraw the savings and reinvest in equities"], "ans_letter": "B", "ans_full": "B — Moving savings into an ISA shelters all interest from income tax. For a higher rate taxpayer with limited PSA (£500), this is the most tax-efficient use of their £20,000 annual ISA allowance."}, {"id": "6.2.1", "q": "A higher rate taxpayer has an unused CGT annual exemption at the end of March. What should they consider?", "opts": ["A) Nothing — unused exemptions can be carried forward to the next year", "B) Realising gains up to the £3,000 annual exemption before the tax year ends to avoid wasting it", "C) Converting gains into income to make use of unused personal allowance", "D) Deferring all disposals to avoid triggering CGT"], "ans_letter": "B", "ans_full": "B — The CGT annual exemption (£3,000) cannot be carried forward. Realising gains up to this amount before the year-end avoids wasting the exemption."}, {"id": "6.2.2", "q": "A client earns £110,000. Why is a pension contribution particularly beneficial for them?", "opts": ["A) It entitles them to a 60% tax credit", "B) It reduces their income below £100,000, restoring their personal allowance and avoiding the effective 60% marginal rate", "C) Pension contributions are always tax-free for everyone", "D) It converts income into capital gains which are tax-free"], "ans_letter": "B", "ans_full": "B — Between £100,000 and £125,140, each £2 of income costs £1 of personal allowance, creating an effective 60% marginal rate. Pension contributions reduce adjusted income, potentially restoring the personal allowance."}, {"id": "6.2.2", "q": "A couple has one high-income spouse and one with little income and unused allowances. Which income tax planning strategy is most appropriate?", "opts": ["A) Both spouses should maximise pension contributions at the higher rate", "B) Transfer income-producing assets to the lower-earning spouse to use their unused allowances and lower rate bands", "C) Place all assets in an offshore account to defer UK tax", "D) Invest only in growth assets to avoid income tax entirely"], "ans_letter": "B", "ans_full": "B — Income-splitting by transferring income-producing assets to the lower-earning spouse utilises their personal allowance and basic rate band, reducing the family's overall tax bill."}, {"id": "6.2.3", "q": "An investor wants to crystallise a capital loss to offset against gains, and then repurchase the same shares. What rule must they observe?", "opts": ["A) They must wait 6 months before rebuying", "B) They must wait 30 days before rebuying the same shares", "C) They can rebuy immediately as the loss is still allowable", "D) They cannot repurchase the same shares within the same tax year"], "ans_letter": "B", "ans_full": "B — The 30-day matching rule (bed and breakfast rule) means that if shares are sold and the same shares are repurchased within 30 days, the sale and repurchase are matched, and the capital loss is not recognised. The investor must wait 30+ days, or use a spouse/ISA to buy the shares immediately."}, {"id": "6.2.3", "q": "A couple both pay CGT on gains of £25,000. They transfer 50% of an asset to the other spouse before sale. What is the CGT advantage?", "opts": ["A) The gain is halved and each can use their £3,000 annual exemption", "B) No advantage — the same total CGT is always due", "C) The transfer triggers an immediate CGT charge", "D) Only the higher-rate taxpayer pays CGT"], "ans_letter": "A", "ans_full": "A — Transferring 50% to a spouse splits the gain. Each spouse can then use their own £3,000 annual exemption, saving tax on up to £6,000 of combined gains."}, {"id": "6.2.4", "q": "A higher rate taxpayer makes capital gains of £30,000 and capital losses of £4,000 in the same year. What is the CGT payable (annual exemption £3,000)?", "opts": ["A) £30,000 × 24% = £7,200", "B) £23,000 × 24% = £5,520", "C) £26,000 × 24% = £6,240", "D) £27,000 × 24% = £6,480"], "ans_letter": "B", "ans_full": "B — Gains (£30,000) − current losses (£4,000) = £26,000 − annual exemption (£3,000) = £23,000 chargeable gain. CGT = £23,000 × 24% = £5,520."}, {"id": "6.2.4", "q": "An estate is worth £500,000. The deceased was single with no transferable NRB. IHT is charged at 40%. What is the IHT due?", "opts": ["A) £200,000", "B) £70,000", "C) £130,000", "D) £175,000"], "ans_letter": "B", "ans_full": "B — Chargeable estate = £500,000 − £325,000 (NRB) = £175,000. IHT = £175,000 × 40% = £70,000."}, {"id": "6.2.5", "q": "In what order should a financial adviser typically recommend tax-efficient investment wrappers?", "opts": ["A) Offshore bond → ISA → pension", "B) Pension → offshore bond → ISA", "C) ISA → pension → offshore bond (or VCT/EIS if appropriate)", "D) VCT → EIS → ISA → pension"], "ans_letter": "C", "ans_full": "C — The typical order is ISA first (most flexible, fully tax-free), then pension (relief at marginal rate, long-term lock-in), then other wrappers like offshore bonds or VCT/EIS for appropriate clients."}, {"id": "6.2.5", "q": "A higher rate taxpayer with an income of £110,000 and significant investment income asks for tax planning advice. What is the MOST impactful single recommendation?", "opts": ["A) Invest in a VCT for 30% income tax relief", "B) Maximise pension contributions to reduce income below £100,000 and restore the personal allowance", "C) Transfer all assets into their spouse's name", "D) Invest the maximum in Premium Bonds"], "ans_letter": "B", "ans_full": "B — Maximising pension contributions to bring income below £100,000 restores the £12,570 personal allowance, avoiding the effective 60% marginal rate trap between £100,000 and £125,140. This is typically the highest-impact recommendation."}]};

// Mock exam allocation (85 total): Ch1=15 Ch2=8 Ch3=20 Ch4=10 Ch5=20 Ch6=12
const MOCK_ALLOC = {1:15, 2:8, 3:20, 4:10, 5:20, 6:12};

let activeCh = 1;
let testImgs = [], testIdx = 0, uploadCh = null;

// ── Storage helpers ────────────────────────────────────────────────────────
function lsk(t, id){ return 'imc_' + t + '_' + id; }
function getDone(id){ return JSON.parse(localStorage.getItem(lsk('done',id))||'[]'); }
function saveDone(id,v){ localStorage.setItem(lsk('done',id), JSON.stringify(v)); }
function getImgs(id){ return JSON.parse(localStorage.getItem(lsk('imgs',id))||'[]'); }
function saveImgs(id,v){ localStorage.setItem(lsk('imgs',id), JSON.stringify(v)); }
function totalPts(id){ return CHAPTERS.find(function(c){return c.id===id;}).sections.reduce(function(a,s){return a+s.points.length;},0); }
function saveQResult(chId, qIdx, result){ localStorage.setItem('imc_qr_'+chId+'_'+qIdx, result); }
function getQResult(chId, qIdx){ return localStorage.getItem('imc_qr_'+chId+'_'+qIdx); }

// ── Tab rendering ──────────────────────────────────────────────────────────
function renderTabs() {
  var wrong = qzCountWrong([1,2,3,4,5,6]);
  var html = CHAPTERS.map(function(ch) {
    var filled = ch.sections.reduce(function(a,s){return a+s.points.filter(function(p){return p.explanation;}).length;},0);
    return '<button class="tab-btn ' + (ch.id===activeCh?'active':'') + '" style="--ch-color:'+ch.color+'" data-tab="'+ch.id+'" onclick="switchTab('+ch.id+')">' +
      '<span class="tab-pip ' + (filled>0?'lit':'') + '"></span>' +
      ch.shortTitle +
      '<span style="font-size:.62rem;opacity:.5">' + ch.questions + 'Q</span>' +
    '</button>';
  }).join('');
  html += '<button class="tab-btn ' + (activeCh==='quiz'?'active':'') + '" style="--ch-color:#6366f1" data-tab="quiz" onclick="switchTab(\'quiz\')">' +
    '🎯 Quiz' + (wrong>0?'<span class="tab-wrong-pill">'+wrong+'</span>':'') +
  '</button>';
  document.getElementById('tabs').innerHTML = html;
}

function renderPanels() {
  document.getElementById('panels').innerHTML =
    CHAPTERS.map(renderChapter).join('') +
    '<div class="ch-panel ' + (activeCh==='quiz'?'active':'') + '" id="pnl-quiz" style="--ch-color:#6366f1">' +
      '<div id="qz-setup"></div>' +
      '<div id="qz-session" style="display:none"></div>' +
      '<div id="qz-results" style="display:none"></div>' +
    '</div>';
}

function renderChapter(ch) {
  var done = getDone(ch.id), tot = totalPts(ch.id);
  var pct = tot ? Math.round(done.length/tot*100) : 0;
  var filled = ch.sections.reduce(function(a,s){return a+s.points.filter(function(p){return p.explanation;}).length;},0);
  var imgs = getImgs(ch.id);
  var qcount = (QUIZ_DATA[ch.id]&&QUIZ_DATA[ch.id].length) ? QUIZ_DATA[ch.id].length : 0;

  return '<div class="ch-panel ' + (ch.id===activeCh?'active':'') + '" id="pnl-'+ch.id+'" style="--ch-color:'+ch.color+'">' +
    '<div class="ch-hdr">' +
      '<h2>' + ch.title + '</h2>' +
      '<div class="ch-meta">' +
        '<span class="badge">📊 ' + ch.questions + ' exam Qs</span>' +
        '<span class="badge">' + tot + ' syllabus points</span>' +
        '<span class="badge ' + (filled===tot?'green':'') + '">' +
          (filled===0?'⬜ Not yet populated':filled===tot?'✅ Fully populated':'📝 '+filled+'/'+tot+' filled') +
        '</span>' +
        (qcount?'<button onclick="openQuizForChapter('+ch.id+')" class="quiz-open-btn">🎯 Practice MCQs ('+qcount+')</button>':'') +
      '</div>' +
      '<div class="ch-prog">' +
        '<div class="prog-track" style="background:#e2e8f0">' +
          '<div class="prog-fill" id="pf-'+ch.id+'" style="width:'+pct+'%;background:'+ch.color+'"></div>' +
        '</div>' +
        '<span class="ch-prog-pct" id="pp-'+ch.id+'">'+pct+'%</span>' +
        '<span class="ch-prog-count" id="pc-'+ch.id+'">'+done.length+'/'+tot+' revised</span>' +
      '</div>' +
    '</div>' +
    '<div class="srch"><input type="text" placeholder="🔍 Search this chapter…" oninput="search(this.value,'+ch.id+')"></div>' +
    ch.sections.map(function(s) {
      return '<div class="sec-label">'+s.id+' — '+s.title+'</div>' +
        s.points.map(function(p){return renderPoint(p,ch,done);}).join('');
    }).join('') +
    '<div class="pq-box">' +
      '<h3>📷 Practice Questions <span style="font-size:.72rem;color:var(--muted);font-weight:400">— upload images to test yourself</span></h3>' +
      '<div class="pq-btns">' +
        '<button class="pq-btn solid" onclick="addImgs('+ch.id+')">⬆ Upload Images</button>' +
        '<button class="pq-btn outline" onclick="openTest('+ch.id+')">🧪 Test Me</button>' +
      '</div>' +
      '<div class="img-grid" id="ig-'+ch.id+'">'+renderImgs(imgs,ch.id)+'</div>' +
      (imgs.length===0?'<div class="no-files">No images yet — upload photos of practice questions</div>':'') +
    '</div>' +
  '</div>';
}

function renderPoint(p, ch, done) {
  var isDone = done.indexOf(p.id) > -1;
  var hasExp = !!p.explanation;
  var expBody = hasExp
    ? '<div style="line-height:1.7">' + p.explanation + '</div>'
    : '<div class="empty-note">📝 Upload your slides or workbook pages and I\'ll fill this in.</div>';
  var kpBody = (p.keypoints&&p.keypoints.length)
    ? '<ul class="kpl">' + p.keypoints.map(function(k){return '<li>'+k+'</li>';}).join('') + '</ul>'
    : '<div class="empty-note">📝 Key points will appear once content is uploaded.</div>';
  var qBody = (p.questions&&p.questions.length)
    ? p.questions.map(function(q,i){
        return '<div class="qi">' +
          '<div class="qi-q">' + q.q + '</div>' +
          (q.opts?'<div class="qi-opts">' + q.opts + '</div>':'') +
          '<button class="reveal" onclick="reveal(this,\'ans-'+p.id+'-'+i+'\')">Show Answer</button>' +
          '<div class="qi-ans" id="ans-'+p.id+'-'+i+'">✅ ' + q.ans + '</div>' +
        '</div>';
      }).join('')
    : '<div class="empty-note">📝 Practice questions will appear once content is uploaded.</div>';

  return '<div class="pc ' + (isDone?'done':'') + '" id="c-'+p.id+'" data-s="'+p.text.toLowerCase()+'">' +
    '<div class="pc-head" onclick="toggleBody(\''+p.id+'\')">' +
      '<span class="pc-num">'+p.id+(hasExp?' ✓':'')+'</span>' +
      '<span class="pc-text">'+p.text+'</span>' +
      '<input type="checkbox" class="pc-check" '+(isDone?'checked':'')+
        ' onclick="event.stopPropagation();tick(\''+p.id+'\','+ch.id+',this)">' +
    '</div>' +
    '<div class="pc-body" id="b-'+p.id+'">' +
      '<div class="acc"><div class="acc-h" onclick="acc(this)">📖 Explanation <span class="ch">▼</span></div>' +
        '<div class="acc-b">'+expBody+'</div></div>' +
      '<div class="acc"><div class="acc-h" onclick="acc(this)">🎯 Key Revision Points <span class="ch">▼</span></div>' +
        '<div class="acc-b">'+kpBody+'</div></div>' +
      '<div class="acc"><div class="acc-h" onclick="acc(this)">❓ Practice Questions <span class="ch">▼</span></div>' +
        '<div class="acc-b">'+qBody+'</div></div>' +
    '</div>' +
  '</div>';
}

function renderImgs(imgs, chId) {
  return imgs.map(function(src,i){
    return '<div class="img-wrap">' +
      '<img src="'+src+'" onclick="openLb(\''+src+'\')">'+
      '<button class="img-del" onclick="delImg('+chId+','+i+')">✕</button>' +
    '</div>';
  }).join('');
}

// ── Tab switching ──────────────────────────────────────────────────────────
function switchTab(id) {
  activeCh = id;
  document.querySelectorAll('.tab-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.tab == id);
  });
  document.querySelectorAll('.ch-panel').forEach(function(p) {
    p.classList.toggle('active', p.id === 'pnl-' + id);
  });
  if (id === 'quiz') {
    qzRenderSetup();
  }
  window.scrollTo(0, 0);
}

// ── Interactions ───────────────────────────────────────────────────────────
function toggleBody(id){ document.getElementById('b-'+id).classList.toggle('open'); }
function acc(h){ h.classList.toggle('open'); h.nextElementSibling.classList.toggle('open'); }
function reveal(btn,id){ document.getElementById(id).style.display='block'; btn.style.display='none'; }
function search(q,id){
  q = q.toLowerCase().trim();
  document.getElementById('pnl-'+id).querySelectorAll('.pc').forEach(function(c){
    c.style.display = (!q||c.dataset.s.includes(q)) ? '' : 'none';
  });
}

// ── Progress ───────────────────────────────────────────────────────────────
