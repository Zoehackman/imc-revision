estigated and resolved promptly", "Unexplained shortfall: firm must make up the shortfall from its own assets"], "questions": [{"q": "How frequently must a firm reconcile its internal records of client assets with those held by a third-party custodian?", "opts": "A) Monthly only\nB) Annually at the year end\nC) As often as necessary and as soon as practicable after the reconciliation date\nD) Weekly on the last business day", "ans": "C — Reconciliation must take place as often as necessary and as soon as reasonably practicable after the reconciliation date. The frequency depends on the volume and complexity of activity."}]}, {"id": "3.5.50", "text": "Explain the application and purpose of the rules relating to the treatment of client money (CASS 7.11)", "explanation": "<p>The <strong>client money rules</strong> (CASS 7) require firms to keep clients' money <strong>separate</strong> from the firm's own money.</p>\n<p>Purpose: protect client money from being used by the firm for its own purposes, and ensure money is returned to clients if the firm becomes insolvent.</p>\n<p>Client money must be placed in a <strong>client bank account</strong> held with:</p>\n<ul>\n  <li>A <strong>central bank</strong>; OR</li>\n  <li>A <strong>BCD credit institution</strong> (bank authorised under the EU Banking Directive / CRR); OR</li>\n  <li>A <strong>bank authorised in a third country</strong>; OR</li>\n  <li>A <strong>qualifying money market fund</strong>.</li>\n</ul>", "keypoints": ["CASS 7 client money rules: keep client money separate from firm's own money", "Purpose: protect clients if firm becomes insolvent — client money not available to firm creditors", "Client money held in a client bank account with: central bank, BCD credit institution, third-country bank, or qualifying MMF"], "questions": [{"q": "Under the FCA's client money rules (CASS 7), where may a firm place client money?", "opts": "A) In the firm's general business bank account for ease of management\nB) In a client bank account with a central bank, BCD credit institution, authorised bank or qualifying money market fund\nC) In a segregated account with the FCA directly\nD) In a firm-controlled trust account at the firm's discretion", "ans": "B — Client money must be placed in a specifically identified client bank account with a central bank, BCD credit institution, bank authorised in a third country, or qualifying money market fund."}]}, {"id": "3.5.51", "text": "Explain the rules relating to the protection of client money and having adequate organisational arrangements (CASS 7.12)", "explanation": "<p>Rules on adequate organisational arrangements for <strong>client money protection</strong> (CASS 7):</p>\n<ul>\n  <li>Firms must have <strong>adequate organisational arrangements</strong> to protect client money, including: written procedures; regular reconciliation; clear segregation of roles; and internal controls.</li>\n  <li>Firms must conduct <strong>due diligence</strong> on banks and money market funds with which client money is deposited, including their creditworthiness.</li>\n  <li>Where possible, a firm should <strong>diversify</strong> client money across multiple institutions to reduce concentration risk.</li>\n  <li>Firms must have a <strong>resolution pack</strong> (information that would help an insolvency practitioner return client money quickly if the firm fails).</li>\n</ul>", "keypoints": ["Adequate arrangements for client money: written procedures, reconciliation, clear roles, internal controls", "Due diligence on banks/MMFs holding client money — including creditworthiness assessment", "Diversify client money where possible to reduce concentration risk", "Resolution pack: documentation enabling rapid return of client money in insolvency"], "questions": [{"q": "Why should a firm consider diversifying client money across several banks rather than concentrating it with one institution?", "opts": "A) It earns higher interest from multiple banks\nB) Diversification reduces concentration risk — if one bank fails, not all client money is at risk\nC) The FCA requires exactly three banking relationships\nD) It simplifies the client money reconciliation process", "ans": "B — Diversifying client money across multiple institutions reduces concentration risk. If one bank fails, only a portion of client money is at risk, rather than all of it."}]}, {"id": "3.5.52", "text": "Explain the rules relating to the depositing of money with third parties (CASS 7.14)", "explanation": "<p>Rules on <strong>depositing client money with third parties</strong> (CASS 7.14):</p>\n<ul>\n  <li>A firm may deposit client money with a third-party (e.g. a bank) only if it exercises <strong>due skill, care and diligence</strong> in the selection and appointment of the third party.</li>\n  <li>The firm must <strong>assess the creditworthiness</strong> of the third party and review this periodically.</li>\n  <li>Firms must ensure the third party acknowledges that the money held in the account is <strong>client money</strong> and cannot be used by the bank for its own purposes or to set off the firm's own debts.</li>\n  <li>The firm retains <strong>responsibility</strong> for ensuring client money is properly protected even when deposited with a third party.</li>\n</ul>", "keypoints": ["CASS 7.14: depositing client money with third parties requires due skill, care and diligence", "Assess creditworthiness of the third party bank; review periodically", "Third party must acknowledge account holds client money — cannot be used to set off firm's own debts", "Firm retains ongoing responsibility for client money protection"], "questions": [{"q": "When depositing client money with a bank, the firm must ensure the bank acknowledges that the money:", "opts": "A) Belongs to the firm and can be used as collateral\nB) Is client money and cannot be used to offset the firm's debts to the bank\nC) Can be used by the bank for lending at any time\nD) Earns a minimum guaranteed interest rate", "ans": "B — The bank must acknowledge the client money nature of the account, ensuring it cannot be used to set off the firm's own debts to the bank. This protects client money in the event of the firm's insolvency."}]}, {"id": "3.5.53", "text": "Explain the rules relating to the segregation of client money (CASS 7.13)", "explanation": "<p>Rules on <strong>segregation of client money</strong> (CASS 7.13):</p>\n<ul>\n  <li>Firms must <strong>promptly segregate</strong> client money from their own money as soon as it is received.</li>\n  <li>Client money must be placed in a <strong>separately identified client bank account</strong>.</li>\n  <li>The account must be <strong>labelled</strong> to identify it as a client money account.</li>\n  <li>A firm must not <strong>place its own money</strong> in a client bank account except: a small amount may be placed to maintain the account (avoid it being closed for inactivity); or to cover an administration shortfall temporarily.</li>\n</ul>", "keypoints": ["Client money must be promptly segregated into a separately identified client bank account", "Account must be clearly labelled as a client money account", "Firm's own money must not be placed in client accounts (except a small amount to maintain the account)", "Segregation protects clients — their money is clearly identified and separate from firm assets"], "questions": [{"q": "When must a firm segregate client money into a client bank account?", "opts": "A) Within 5 business days of receipt\nB) At the end of each month during reconciliation\nC) Promptly — as soon as the client money is received\nD) Only when the amount exceeds £10,000", "ans": "C — Client money must be promptly segregated into a client bank account as soon as it is received by the firm."}]}, {"id": "3.5.54", "text": "Explain the rules relating to records, accounts and reconciliations of clients' money (CASS 7.15)", "explanation": "<p>Rules on <strong>records, accounts and reconciliation of client money</strong> (CASS 7.15):</p>\n<ul>\n  <li>Firms must maintain records and accounts that enable them to <strong>identify at any time</strong> the total amount of client money held for each client.</li>\n  <li><strong>Reconciliation</strong> of client money must be carried out:\n    <ul>\n      <li>As often as is <strong>necessary</strong>; AND</li>\n      <li>As soon as reasonably practicable after the <strong>reconciliation date</strong>.</li>\n    </ul>\n  </li>\n  <li>In the event of a <strong>shortfall</strong> (the firm holds less client money than it should), the firm must make up the shortfall from its own money as soon as possible.</li>\n</ul>", "keypoints": ["Client money records: must identify each client's money at any time", "Reconciliation: as often as necessary AND as soon as practicable after reconciliation date", "Shortfall: firm must make up from own money as soon as possible"], "questions": [{"q": "A firm's reconciliation reveals it holds £5,000 less client money than it should. It must:", "opts": "A) Notify the FCA and wait for instructions\nB) Make up the shortfall from its own money as soon as possible\nC) Inform all clients of the shortfall\nD) Reduce client entitlements pro-rata", "ans": "B — If a firm identifies a client money shortfall, it must make up the shortfall from its own funds as soon as possible."}]}, {"id": "3.5.55", "text": "Explain the rules relating to mandate accounts (CASS 8)", "explanation": "<p><strong>Mandate accounts</strong> (CASS 8) cover situations where a firm operates a bank account in its own name on behalf of a client, or operates an account in the client's name with the client's authority.</p>\n<ul>\n  <li>Used where a firm has authority to operate a client's bank account (e.g. a firm with a power of attorney, or managing cash for a client).</li>\n  <li>Client money in mandate accounts must be subject to <strong>appropriate safeguards</strong>.</li>\n  <li>Firms operating mandate accounts must have adequate organisational arrangements and conduct regular reconciliation.</li>\n  <li>The firm's mandate must be evidenced in writing and the scope of authority must be clear.</li>\n</ul>", "keypoints": ["Mandate accounts (CASS 8): firm operates a bank account on behalf of a client (e.g. power of attorney)", "Client money in mandate accounts subject to appropriate safeguards", "Adequate organisational arrangements and regular reconciliation required", "Mandate must be evidenced in writing with clear scope of authority"], "questions": [{"q": "A firm is given a power of attorney to manage a client's bank account. This arrangement is governed by which CASS rules?", "opts": "A) CASS 6 — custody rules\nB) CASS 7 — client money rules only\nC) CASS 8 — mandate accounts\nD) CASS 9 — information and reporting", "ans": "C — Operating a client's bank account under a mandate (such as a power of attorney) falls under CASS 8, which governs mandate accounts."}]}, {"id": "3.5.56", "text": "Explain the rules relating to title transfer collateral arrangements", "explanation": "<p><strong>Title Transfer Collateral Arrangements (TTCAs)</strong> allow a firm to take legal ownership of client assets as collateral for an obligation:</p>\n<ul>\n  <li>Under a TTCA, the client <strong>transfers legal title</strong> (ownership) of assets to the firm to secure an obligation (e.g. margin on a leveraged position).</li>\n  <li>The assets are <strong>no longer client assets</strong> from the moment of transfer — they become the firm's own assets, and the client loses the protections of the CASS rules.</li>\n  <li>The firm is simply a <strong>creditor</strong> of the client for the return of equivalent assets — meaning that if the firm becomes insolvent, the client ranks as an unsecured creditor.</li>\n  <li>TTCAs are regulated: firms must clearly explain the consequences of a TTCA to clients, particularly the loss of CASS protections.</li>\n</ul>", "keypoints": ["TTCA: client transfers legal title of assets to firm as collateral — assets are no longer protected by CASS", "Once transferred: assets become firm's own; client is only an unsecured creditor if firm is insolvent", "CASS protections are lost from the moment of title transfer", "Firms must clearly explain TTCA consequences to clients before use"], "questions": [{"q": "After a client enters into a Title Transfer Collateral Arrangement (TTCA), the client's assets used as collateral:", "opts": "A) Remain client assets protected by CASS rules\nB) Are held in a segregated account on the client's behalf\nC) Become the firm's own assets — the client loses CASS protection and becomes an unsecured creditor\nD) Are transferred to the Bank of England for safekeeping", "ans": "C — Under a TTCA, legal ownership of the assets transfers to the firm. They are no longer client assets protected by CASS. If the firm is insolvent, the client ranks as an unsecured creditor."}]}]}, {"id": "3.6", "title": "FCA Supervision and Redress", "points": [{"id": "3.6.1", "text": "Explain the FCA's approach to supervision and the enforcement and disciplinary powers of the FCA", "explanation": "<p>The FCA has broad <strong>enforcement and disciplinary powers</strong> under FSMA:</p>\n<ul>\n  <li>Demand the <strong>production of information</strong> and conduct investigations.</li>\n  <li>Issue <strong>private warnings</strong>, <strong>public statements</strong> (naming firms), <strong>financial penalties</strong> (unlimited).</li>\n  <li><strong>Vary or cancel</strong> a firm's Part 4A permission (including banning individuals from performing regulated activities).</li>\n  <li><strong>Appeals</strong>: go to the Tax and Chancery Chamber of the Upper Tribunal.</li>\n</ul>\n<p><strong>Criminal prosecutions</strong> (FCA powers):</p>\n<ul>\n  <li>Carrying on unauthorised investment business</li>\n  <li>Issuing an unapproved financial promotion</li>\n  <li>Failing to co-operate with / misleading the FCA</li>\n  <li>Insider dealing</li>\n  <li>Breaches of money laundering regulations</li>\n</ul>\n<p>Under the Financial Services Act 2012: banning misleading financial promotions; banning products posing unacceptable risk.</p>", "keypoints": ["FCA powers: demand information; private warnings; public statements; unlimited financial penalties", "FCA can vary or cancel a firm's Part 4A permission; ban individuals", "Appeals go to the Tax and Chancery Chamber of the Upper Tribunal", "FCA can prosecute: unauthorised business, unapproved promotions, misleading FCA, insider dealing, money laundering"], "questions": [{"q": "If a firm wishes to appeal against an FCA enforcement decision, where should the appeal be heard?", "opts": "A) The Court of Appeal\nB) The High Court\nC) The Tax and Chancery Chamber of the Upper Tribunal\nD) The Financial Ombudsman Service", "ans": "C — Appeals against FCA enforcement decisions go to the Tax and Chancery Chamber of the Upper Tribunal."}]}, {"id": "3.6.2", "text": "Explain the FCA rules relating to handling of complaints (DISP 1.3)", "explanation": "<p>FCA rules on <strong>complaints handling</strong> (DISP 1.3) require firms to:</p>\n<ul>\n  <li>Have <strong>written complaints handling procedures</strong> that are accessible to clients.</li>\n  <li>Handle complaints <strong>promptly and fairly</strong>.</li>\n  <li>Within <strong>8 weeks</strong> of receiving a complaint, send either:\n    <ul>\n      <li>A <strong>final response</strong> (accepting or rejecting the complaint, with reasons); OR</li>\n      <li>A written response explaining why the firm cannot yet issue a final response and informing the complainant of their right to refer to the <strong>Financial Ombudsman Service (FOS)</strong>.</li>\n    </ul>\n  </li>\n  <li>Maintain records of complaints and investigate root causes to prevent recurrence.</li>\n</ul>", "keypoints": ["Firms must have written complaints handling procedures", "Within 8 weeks: must send either a final response OR explain delay and refer to FOS right", "Final response: accepts or rejects with clear reasons", "Must keep records of complaints and investigate root causes"], "questions": [{"q": "A client complains to their investment firm. The firm fails to resolve the matter within 8 weeks. What must the firm do?", "opts": "A) The complaint is automatically escalated to the FCA\nB) Send a written response explaining why the firm cannot yet respond and informing the client of their right to refer to the FOS\nC) Issue a refund to the client automatically\nD) Refer the matter to the PRA for investigation", "ans": "B — If a firm cannot issue a final response within 8 weeks, it must send a written response to the complainant explaining the delay and informing them of their right to refer the complaint to the Financial Ombudsman Service."}]}, {"id": "3.6.3", "text": "Explain the role of the Financial Ombudsman Service (DISP Introduction & DISP 2) and the Pensions Ombudsman", "explanation": "<p>The <strong>Financial Ombudsman Service (FOS)</strong> is an independent scheme for resolving disputes between consumers and financial services firms.</p>\n<p><strong>Jurisdiction:</strong></p>\n<ul>\n  <li><strong>Compulsory jurisdiction</strong>: firms regulated by the FCA are automatically subject to FOS compulsory jurisdiction — they must participate.</li>\n  <li><strong>Voluntary jurisdiction</strong>: firms sign up to the FOS voluntary jurisdiction by contractual agreement with FOS (e.g. some unauthorised businesses that want to offer an ADR scheme).</li>\n</ul>\n<p><strong>Timing:</strong> A complaint must be referred to the FOS within <strong>6 months</strong> of the firm's final response.</p>\n<p><strong>Maximum award:</strong> For complaints referred after 1 April 2023: <strong>£415,000</strong>.</p>\n<p>The FOS investigates and adjudicates on complaints; its decisions are binding on firms but not on consumers (who can still go to court).</p>", "keypoints": ["FOS: independent dispute resolution scheme for consumer vs financial firm complaints", "Compulsory jurisdiction: all FCA-regulated firms must participate", "Voluntary jurisdiction: firms can opt in by contractual agreement with FOS", "Time limit: complaint referred to FOS within 6 months of firm's final response", "Maximum award: £415,000 (for complaints referred after 1 April 2023)"], "questions": [{"q": "A client receives a final response from their firm rejecting their complaint. How long do they have to refer the complaint to the FOS?", "opts": "A) 1 month\nB) 3 months\nC) 6 months\nD) 12 months", "ans": "C — A complaint must be referred to the Financial Ombudsman Service within 6 months of receiving the firm's final response."}]}, {"id": "3.6.4", "text": "Apply the rules relating to determination by the Financial Ombudsman Service (DISP 3.6)", "explanation": "<p>When the FOS determines a complaint, it may make an award in favour of the complainant:</p>\n<ul>\n  <li>The award can include: financial compensation; a direction to take specific action; a requirement to pay costs.</li>\n  <li>The FOS can award up to a <strong>maximum of £415,000</strong> per complaint (for complaints referred after 1 April 2023).</li>\n  <li>The FOS's decision is <strong>binding on the firm</strong> if the complainant accepts it.</li>\n  <li>The complainant may <strong>reject</strong> the FOS decision and pursue the matter in court instead.</li>\n  <li>If the FOS makes an award, it is enforceable in court like a court order.</li>\n</ul>", "keypoints": ["FOS awards: financial compensation, directions to act, costs", "Maximum award: £415,000 per complaint (post 1 April 2023)", "Decision binding on the firm once complainant accepts it", "Complainant may reject FOS decision and go to court instead", "FOS awards enforceable as court orders"], "questions": [{"q": "The FOS awards £50,000 to a complainant in respect of unsuitable advice. The firm does not wish to pay. The complainant can:", "opts": "A) Only appeal to the FCA to enforce the award\nB) Enforce the FOS award as a court order — it is legally binding on the firm\nC) Refer the matter to the PRA\nD) Only accept a reduced amount", "ans": "B — Once a complainant accepts a FOS decision, it is binding on the firm and can be enforced as a court order if the firm refuses to comply."}]}, {"id": "3.6.5", "text": "Distinguish between compulsory and voluntary jurisdiction (DISP Introduction)", "explanation": "<p>The FOS has two forms of jurisdiction:</p>\n<p><strong>Compulsory jurisdiction</strong>:</p>\n<ul>\n  <li>Applies automatically to all FCA-authorised firms.</li>\n  <li>Firms have no choice — they must participate.</li>\n  <li>Covers most regulated activities: investment business, banking, insurance, mortgages.</li>\n</ul>\n<p><strong>Voluntary jurisdiction</strong>:</p>\n<ul>\n  <li>Available to businesses that are not FCA-authorised but wish to provide a dispute resolution scheme.</li>\n  <li>Firms sign a contractual agreement with the FOS to participate.</li>\n  <li>Gives unregulated businesses' customers access to the same independent adjudication process.</li>\n</ul>", "keypoints": ["Compulsory jurisdiction: all FCA-authorised firms automatically; no opt-out", "Voluntary jurisdiction: non-FCA-authorised firms can opt in by contractual agreement with FOS", "Both jurisdictions give consumers access to independent adjudication"], "questions": [{"q": "Which of the following firms is automatically subject to the FOS compulsory jurisdiction?", "opts": "A) A US bank with no UK FCA authorisation\nB) An FCA-authorised investment manager\nC) A foreign exchange bureau not required to be FCA-authorised\nD) An online marketplace not involved in financial services", "ans": "B — All FCA-authorised firms are automatically subject to the FOS compulsory jurisdiction. They cannot opt out."}]}, {"id": "3.6.6", "text": "Explain the procedure and time limits for the resolution of complaints (DISP 1.4, 1.5 & 1.6)", "explanation": "<p>Time limits and procedures for complaint resolution (DISP 1.4, 1.5 & 1.6):</p>\n<ul>\n  <li><strong>Acknowledgement</strong>: firms must promptly acknowledge complaints (typically within 5 business days).</li>\n  <li><strong>Holding response</strong> (within 8 weeks): if not resolved, send a written response explaining the delay and referring the complainant to FOS.</li>\n  <li><strong>Final response</strong>: accepts or rejects the complaint clearly, with reasons, and informs complainant of FOS right if they are eligible.</li>\n  <li><strong>FOS referral deadline</strong>: 6 months from firm's final response.</li>\n  <li>For the FOS to have jurisdiction, the complaint must generally have been made within <strong>6 years</strong> of the event OR within <strong>3 years</strong> of when the complainant knew (or should have known) about the matter.</li>\n</ul>", "keypoints": ["Acknowledge complaint promptly (typically within 5 business days)", "8-week deadline: final response OR holding response + FOS referral notice", "FOS referral: within 6 months of firm's final response", "FOS eligibility time limits: within 6 years of event OR 3 years of awareness"], "questions": [{"q": "The FOS has jurisdiction over a complaint if it is referred within how many years of the event giving rise to it?", "opts": "A) 1 year\nB) 3 years\nC) 6 years\nD) 10 years", "ans": "C — The FOS generally has jurisdiction if the complaint is referred within 6 years of the event, or within 3 years of when the complainant knew (or should have known) about the matter, whichever is later."}]}, {"id": "3.6.7", "text": "Apply the rules relating to record-keeping and reporting concerning complaints (DISP 1.9 & 1.10)", "explanation": "<p>Rules on <strong>complaints record-keeping and reporting</strong> (DISP 1.9 & 1.10):</p>\n<ul>\n  <li>Firms must maintain records of all complaints received, sufficient to support their internal reporting and FCA reporting obligations.</li>\n  <li>Firms must provide <strong>reports on complaints to the FCA twice a year</strong> (bi-annually) — covering the number of complaints received, upheld, and the average time taken to resolve.</li>\n  <li>The FCA publishes summary complaints data, which helps consumers compare firms' complaints records.</li>\n  <li>Firms with fewer complaints (below a de minimis threshold) report annually rather than bi-annually.</li>\n</ul>", "keypoints": ["Firms must keep records of all complaints received", "Reports to FCA: twice a year (bi-annually) — number received, upheld, time to resolve", "FCA publishes complaints data publicly — transparency mechanism", "Smaller firms (below de minimis threshold): report annually"], "questions": [{"q": "How often must firms report their complaints data to the FCA?", "opts": "A) Monthly\nB) Quarterly\nC) Twice a year (bi-annually)\nD) Annually", "ans": "C — Firms must provide bi-annual (twice yearly) reports to the FCA on complaints received, upheld and time to resolve."}]}, {"id": "3.6.8", "text": "Explain the purpose of the Financial Services Compensation Scheme (FSCS) (COMP 1.1.7 & 1.1.10A)", "explanation": "<p>The <strong>Financial Services Compensation Scheme (FSCS)</strong> is the fund of last resort for consumers when FCA-authorised firms fail:</p>\n<ul>\n  <li>The FSCS deals with claims against <strong>insolvent authorised firms</strong> that are no longer trading.</li>\n  <li>It is separate from the FOS (which handles complaints about solvent firms).</li>\n  <li>The FSCS is funded by levies on FCA-authorised firms.</li>\n</ul>\n<p><strong>Eligible claims</strong> ('protected investment business') include claims relating to:</p>\n<ul>\n  <li>Designated investment business</li>\n  <li>Activities of managers or trustees of authorised unit trusts</li>\n  <li>Activities of the ACD or depositary of an OEIC/ICVC</li>\n</ul>", "keypoints": ["FSCS: fund of last resort — pays compensation when authorised firms become insolvent", "Different from FOS (FOS = complaints against solvent firms; FSCS = claims against insolvent firms)", "Funded by levies on FCA-authorised firms", "Eligible claims: designated investment business; unit trust managers/trustees; OEIC ACD/depositary"], "questions": [{"q": "When does the FSCS pay compensation to an investor?", "opts": "A) When a firm gives unsuitable investment advice and the client loses money\nB) When a firm has become insolvent and can no longer meet claims\nC) When the FOS upholds a complaint and the firm refuses to pay\nD) When a client is dissatisfied with their investment returns", "ans": "B — The FSCS pays compensation only when a firm has become insolvent (failed) and can no longer meet eligible claims. It is the fund of last resort."}]}, {"id": "3.6.9", "text": "Identify the circumstances under which the FSCS will pay compensation (COMP 1.3.3, 3.2.1, 4.2.1 & 4.2.2)", "explanation": "<p>Circumstances when the FSCS will pay compensation:</p>\n<ul>\n  <li>The firm must be an <strong>FCA-authorised firm</strong> that has <strong>failed</strong> (become insolvent or unable to pay claims against it).</li>\n  <li>The claim must be an <strong>eligible claim</strong> — relating to protected investment business.</li>\n  <li>The claim must be submitted within <strong>6 years</strong> of the event giving rise to it.</li>\n  <li>The claimant must be an <strong>eligible claimant</strong> — primarily private individuals, small businesses and certain charities (large corporates are generally excluded).</li>\n</ul>", "keypoints": ["FSCS conditions: firm must be FCA-authorised AND insolvent/failed; eligible claim; within 6 years", "Eligible claimants: primarily private individuals and small businesses; large corporates generally excluded", "Eligible claims: designated investment business, unit trust/OEIC activities"], "questions": [{"q": "A large pension fund makes an investment with an FCA-authorised firm that subsequently fails. Is the pension fund eligible for FSCS compensation?", "opts": "A) Yes — all investors are eligible for FSCS protection\nB) Unlikely — large institutional investors such as pension funds are generally excluded from FSCS eligibility\nC) Yes — up to the standard limit of £85,000\nD) Only if the investment was in government bonds", "ans": "B — The FSCS primarily protects private individuals and small businesses. Large institutional investors such as pension funds are generally excluded from eligible claimant status."}]}, {"id": "3.6.10", "text": "Identify the limits on the compensation payable by the FSCS (COMP 10.2.1, 10.2.2 & 10.2.3)", "explanation": "<p>The FSCS compensation limits:</p>\n<ul>\n  <li>For <strong>investment claims</strong> against investment firms: maximum <strong>£85,000</strong> per eligible claimant per firm.</li>\n  <li>For <strong>deposit claims</strong> against banks/building societies: £85,000 per eligible depositor per institution.</li>\n  <li>For <strong>insurance claims</strong>: 90% of the value of a claim (100% for compulsory insurance); no upper limit.</li>\n  <li>The investment limit applies per firm — if a client has claims against two separate insolvent firms, they can claim up to £85,000 from each.</li>\n</ul>", "keypoints": ["Investment claims: maximum £85,000 per eligible claimant per firm", "Deposit claims: £85,000 per eligible depositor per institution", "Insurance claims: 90% of claim value (100% for compulsory insurance); no upper limit", "Limits apply per firm — claims against separate firms are treated independently"], "questions": [{"q": "An investor has £200,000 in a now-insolvent investment firm. How much can they recover from the FSCS?", "opts": "A) £200,000 — FSCS covers the full loss\nB) £100,000\nC) £85,000 — the maximum for investment claims\nD) Nothing — investments are not covered by the FSCS", "ans": "C — The FSCS maximum for investment claims against a failed investment firm is £85,000 per eligible claimant per firm. The remaining £115,000 is an unsecured creditor claim in the insolvency."}]}]}, {"id": "3.7", "title": "Financial Crime", "points": [{"id": "3.7.1", "text": "Explain the various sources of money laundering and counter-terrorism regulation and legislation", "explanation": "<p>The UK's anti-money laundering (AML) framework draws from multiple sources:</p>\n<ul>\n  <li><strong>Proceeds of Crime Act 2002 (POCA)</strong>: the primary criminal law on money laundering. Creates offences of: assisting, arranging, acquiring, using or possessing criminal proceeds; tipping-off; failure to disclose.</li>\n  <li><strong>Terrorism Act 2000</strong>: similar provisions for terrorist financing.</li>\n  <li><strong>Money Laundering Regulations (MLR)</strong>: implement the EU's AML Directives into UK law. Impose due diligence, record-keeping and reporting obligations on regulated firms.</li>\n  <li><strong>FCA Rules (SYSC)</strong>: require appointment of a Money Laundering Reporting Officer (MLRO); adequate AML systems and controls.</li>\n  <li><strong>Joint Money Laundering Steering Group (JMLSG)</strong>: provides practical guidance on implementing AML requirements.</li>\n</ul>", "keypoints": ["POCA 2002: primary criminal law on money laundering — assisting, tipping-off, failure to disclose", "Terrorism Act 2000: covers terrorist financing (similar provisions to POCA)", "Money Laundering Regulations (MLR): implement AML directives — CDD, record-keeping, reporting", "FCA SYSC: requires MLRO appointment; adequate AML systems and controls", "JMLSG: practical guidance on implementing AML"], "questions": [{"q": "The primary UK criminal law creating offences of money laundering is:", "opts": "A) The Financial Services and Markets Act 2000\nB) The Terrorism Act 2000\nC) The Proceeds of Crime Act 2002 (POCA)\nD) The Money Laundering Regulations", "ans": "C — The Proceeds of Crime Act 2002 (POCA) is the primary UK criminal legislation on money laundering, creating offences of assisting, acquiring, using, possessing or tipping-off."}]}, {"id": "3.7.2", "text": "Explain the three stages involved in the money laundering process", "explanation": "<p>Money laundering is the process by which criminals disguise the source of their proceeds of crime. It typically occurs in <strong>three stages</strong>:</p>\n<ol>\n  <li><strong>Placement</strong>: the injection of criminal funds into the financial system. This is the most vulnerable stage for detection — e.g. depositing cash from drug sales into a bank account, 'smurfing' (breaking large amounts into smaller deposits).</li>\n  <li><strong>Layering</strong>: the separation of criminal proceeds from their source through complex transactions designed to obscure the trail — e.g. converting deposits into other financial instruments, wire transfers through multiple accounts in different countries.</li>\n  <li><strong>Integration</strong>: the provision of apparent legitimacy to the proceeds — the money re-enters the legitimate economy in a form that appears to be lawfully obtained (e.g. investment in property, luxury goods, or a legitimate business).</li>\n</ol>", "keypoints": ["Stage 1 — Placement: injecting criminal funds into the financial system (e.g. cash deposits, smurfing)", "Stage 2 — Layering: separating funds from source through complex transactions (wire transfers, multiple accounts)", "Stage 3 — Integration: money re-enters legitimate economy appearing lawfully obtained (property, business)", "Placement is the most detectable stage; integration is the hardest to detect"], "questions": [{"q": "A criminal breaks drug sale proceeds into many small cash deposits across different banks to avoid detection. This is an example of which money laundering stage?", "opts": "A) Layering\nB) Integration\nC) Placement (smurfing)\nD) Dissemination", "ans": "C — Breaking large amounts of criminal cash into smaller deposits (known as 'smurfing') is a technique used at the placement stage — injecting criminal funds into the financial system."}, {"q": "A criminal uses laundered funds to purchase a chain of restaurants, which generate legitimate income. This is an example of which money laundering stage?", "opts": "A) Placement\nB) Layering\nC) Integration\nD) Tipping-off", "ans": "C — Integration is when laundered funds re-enter the legitimate economy appearing to have a lawful origin (e.g. a legitimate business or property investment)."}]}, {"id": "3.7.3", "text": "Explain the role of the Joint Money Laundering Steering Group (JMLSG)", "explanation": "<p>The <strong>Joint Money Laundering Steering Group (JMLSG)</strong> is an industry body made up of the leading UK financial trade associations.</p>\n<p><strong>Role</strong>: provides practical assistance in interpreting the Money Laundering Regulations (MLR) and the Proceeds of Crime Act. Produces detailed guidance on implementing AML requirements in financial services.</p>\n<p>The JMLSG guidance is not legally binding but is widely followed and is referenced by the FCA in its supervision. Courts and regulators take compliance with JMLSG guidance as evidence of adequate AML systems.</p>", "keypoints": ["JMLSG: industry body of UK financial trade associations providing practical AML guidance", "Helps firms interpret the Money Laundering Regulations and POCA in practice", "JMLSG guidance is not legally binding but widely followed and referenced by FCA", "Compliance with JMLSG guidance is evidence of adequate AML systems"], "questions": [{"q": "What is the primary role of the Joint Money Laundering Steering Group (JMLSG)?", "opts": "A) It prosecutes money laundering offences on behalf of the FCA\nB) It provides practical guidance to help financial firms implement AML requirements\nC) It sets legally binding money laundering regulations\nD) It manages the UK financial intelligence unit", "ans": "B — The JMLSG provides practical, detailed guidance to help financial services firms implement their AML obligations under the Money Laundering Regulations. Its guidance is not legally binding but is widely followed."}]}, {"id": "3.7.4", "text": "Explain the main features of the guidance provided by the JMLSG", "explanation": "<p>The main features of <strong>JMLSG guidance</strong> cover the following key areas:</p>\n<ul>\n  <li><strong>Internal controls, policies and procedures</strong>: firms must have effective AML policies, procedures and controls in place.</li>\n  <li><strong>Identification procedures (CDD)</strong>: customer due diligence — identify the customer; understand the nature and purpose of the relationship; identify beneficial owners.</li>\n  <li><strong>Record keeping</strong>: all CDD records and transaction records must be retained for a minimum of <strong>5 years</strong>.</li>\n  <li><strong>Recognition and reporting of suspicious transactions</strong>: employees must recognise red flags; suspicious transactions reported internally to the MLRO, who reports to the National Crime Agency (NCA) where appropriate.</li>\n  <li><strong>Training</strong>: all relevant staff must receive regular AML training so they can recognise money laundering and know their reporting obligations.</li>\n</ul>", "keypoints": ["JMLSG covers: internal controls/policies; CDD procedures; record keeping (5 years); suspicious transaction reporting; training", "CDD: identify customer; understand purpose of relationship; identify beneficial owners", "Suspicious transactions: reported internally to MLRO → NCA", "Record keeping: minimum 5 years for CDD and transaction records", "Training: all relevant staff must receive regular AML training"], "questions": [{"q": "Under JMLSG guidance, how long must customer due diligence and transaction records be retained?", "opts": "A) 1 year\nB) 3 years\nC) 5 years\nD) Indefinitely", "ans": "C — AML records (both CDD documentation and transaction records) must be retained for a minimum of 5 years."}]}, {"id": "3.7.5", "text": "Explain the five offence categories under UK money laundering legislation", "explanation": "<p>The <strong>Proceeds of Crime Act 2002 (POCA)</strong> creates five main money laundering offence categories:</p>\n<ol>\n  <li><strong>Assisting</strong> money laundering (or 'Arranging/Using/Possessing/Acquiring'): knowingly engaging in an arrangement that facilitates or benefits from money laundering. Penalty: <strong>up to 14 years' imprisonment</strong> and/or unlimited fine.</li>\n  <li><strong>Tipping-off</strong>: disclosing to a suspect (or anyone likely to tell a suspect) that a money laundering investigation is underway or that a suspicious activity report (SAR) has been filed. Penalty: <strong>up to 2 years' imprisonment</strong> and/or unlimited fine.</li>\n  <li><strong>Failure to report</strong>: a person in the regulated sector who knows or suspects money laundering and fails to report it to the MLRO (or NCA). Penalty: <strong>up to 5 years' imprisonment</strong>.</li>\n  <li><strong>Failure to comply</strong> with an order or notice from law enforcement. Penalty: up to 2 years' imprisonment.</li>\n  <li><strong>False or misleading statement</strong>: making a statement knowing it to be false or misleading. Penalty: up to 2 years' imprisonment.</li>\n</ol>", "keypoints": ["Assisting/arranging money laundering: up to 14 years' imprisonment + unlimited fine", "Tipping-off: disclosing investigation or SAR to suspect: up to 2 years' imprisonment", "Failure to report: not reporting known/suspected money laundering: up to 5 years' imprisonment", "Failure to comply (with enforcement order): up to 2 years' imprisonment", "False/misleading statement: up to 2 years' imprisonment"], "questions": [{"q": "An employee tells a client that their account has been flagged in a suspicious activity report (SAR). This is the offence of:", "opts": "A) Assisting — 14 years\nB) Failure to report — 5 years\nC) Tipping-off — 2 years\nD) False statement — 2 years", "ans": "C — Disclosing to a person that they are under suspicion (or that a SAR has been filed) is the offence of tipping-off, which carries up to 2 years' imprisonment."}, {"q": "What is the maximum prison sentence for the offence of assisting money laundering under POCA 2002?", "opts": "A) 2 years\nB) 5 years\nC) 10 years\nD) 14 years", "ans": "D — Assisting money laundering (or arranging, using, possessing or acquiring criminal proceeds) carries a maximum sentence of 14 years' imprisonment and/or an unlimited fine."}]}, {"id": "3.7.6", "text": "Explain the meaning of 'inside information' covered by the Criminal Justice Act (CJA) 1993", "explanation": "<p>The <strong>Criminal Justice Act 1993 (CJA 1993)</strong> defines <strong>inside information</strong> as information that is:</p>\n<ul>\n  <li><strong>Price sensitive</strong>: likely to have an effect on the price of securities if made public, OR information that a reasonable investor would want to know before making an investment decision.</li>\n  <li><strong>Specific and precise</strong>: not merely general market rumour or speculation — must relate to particular issuer or securities.</li>\n  <li><strong>Non-public</strong>: has not been made generally available to investors in the market.</li>\n  <li><strong>Relating to securities</strong>: connected to particular securities or their issuer.</li>\n</ul>\n<p>Example: advance knowledge of an unannounced profit warning, a takeover bid, or a major contract win before it is publicly disclosed.</p>", "keypoints": ["Inside information (CJA 1993): price-sensitive, specific and precise, non-public, relating to securities", "Price sensitive: would affect price or a reasonable investor would want to know", "Specific and precise: not general rumour — must relate to particular issuer/securities", "Non-public: not yet disseminated to the market"], "questions": [{"q": "A director knows that their company will announce a profit warning next week. This is inside information because it is:", "opts": "A) Known only by the director and is about their own company\nB) Price-sensitive, specific, precise and not yet made public\nC) A general estimate of company performance\nD) Already reflected in the share price", "ans": "B — The information meets all criteria for inside information under the CJA 1993: it would materially affect the share price (price-sensitive), it relates to a specific company/security, it is precise (a definite forthcoming announcement) and it has not been publicly disclosed."}]}, {"id": "3.7.7", "text": "Explain the offence of insider dealing covered by the CJA 1993", "explanation": "<p>The <strong>Criminal Justice Act 1993</strong> creates three insider dealing offences:</p>\n<ol>\n  <li><strong>Dealing</strong>: dealing in securities while in possession of inside information — buying or selling securities when you know you have material non-public information.</li>\n  <li><strong>Encouraging</strong>: encouraging another person to deal in securities, knowing that you possess inside information and that the recipient is likely to deal (whether or not told the information).</li>\n  <li><strong>Disclosing</strong>: disclosing inside information to another person, other than in the proper performance of one's duties.</li>\n</ol>\n<p>All three are <strong>criminal offences</strong>.</p>\n<p><strong>Financial instruments covered</strong>: updated to align with UK MAR — includes currency options, credit default swaps and units in CIUs (such as ETFs).</p>", "keypoints": ["Three CJA 1993 offences: Dealing while in possession of inside information; Encouraging another to deal; Disclosing inside information (other than in proper performance of duties)", "All three are criminal offences", "Instruments: now includes currency options, credit default swaps, units in CIUs (ETFs)"], "questions": [{"q": "A fund manager passes inside information about an acquisition to a colleague, who then trades on it. Which of the CJA 1993 offences has the manager committed?", "opts": "A) Dealing — they personally bought shares\nB) Encouraging — they passed information to someone likely to deal on it\nC) Disclosing — they told someone not in the proper performance of duties\nD) Both disclosing and encouraging", "ans": "D — The manager has committed both disclosing (sharing inside information outside proper duties) and encouraging (passing information to someone likely to deal on it). Multiple CJA 1993 offences can apply to the same conduct."}]}, {"id": "3.7.8", "text": "Identify the penalties for being found guilty of insider dealing", "explanation": "<p>Penalties for <strong>insider dealing</strong> under the CJA 1993:</p>\n<ul>\n  <li><strong>Magistrates' court (summary conviction)</strong>: up to <strong>6 months' imprisonment</strong> and/or a fine not exceeding the statutory maximum.</li>\n  <li><strong>Crown Court (conviction on indictment)</strong>: up to <strong>10 years' imprisonment</strong> and/or an <strong>unlimited fine</strong>.</li>\n</ul>\n<p>In addition to criminal penalties, the FCA can also pursue <strong>civil (market abuse) action</strong> under UK MAR against the same conduct — these are separate regimes and can run in parallel.</p>", "keypoints": ["Magistrates' court: up to 6 months' imprisonment + fine up to statutory maximum", "Crown Court: up to 10 years' imprisonment + unlimited fine", "Civil market abuse regime (UK MAR) can also apply separately (unlimited civil fine)"], "questions": [{"q": "What is the maximum prison sentence for insider dealing tried on indictment in the Crown Court?", "opts": "A) 2 years\nB) 5 years\nC) 7 years\nD) 10 years", "ans": "D — Insider dealing tried on indictment in the Crown Court carries a maximum sentence of 10 years' imprisonment and/or an unlimited fine."}]}, {"id": "3.7.9", "text": "Explain the FCA's powers to prosecute market abuse (EG 12.3)", "explanation": "<p>The FCA has powers to prosecute <strong>market abuse</strong> as a <strong>civil offence</strong> under UK MAR (retained from EU MAR 2016).</p>\n<p>The FCA can:</p>\n<ul>\n  <li>Impose <strong>unlimited financial penalties</strong> on individuals and firms found to have committed market abuse.</li>\n  <li>Issue <strong>public censures</strong> (public statements naming the offending party).</li>\n  <li>Seek <strong>restitution orders</strong> — requiring profits from market abuse to be disgorged.</li>\n  <li>Apply for <strong>injunctions</strong> to prevent further market abuse.</li>\n</ul>\n<p>Market abuse proceedings are <strong>civil</strong> (not criminal) — lower standard of proof (balance of probabilities rather than beyond reasonable doubt). The FCA can pursue both market abuse (civil) AND insider dealing (criminal) for the same conduct.</p>", "keypoints": ["FCA prosecutes market abuse as a civil offence under UK MAR — unlimited fines; public censures; restitution", "Civil standard of proof: balance of probabilities (lower than criminal 'beyond reasonable doubt')", "FCA can pursue civil market abuse AND criminal insider dealing for the same conduct simultaneously", "FCA can also seek injunctions to prevent ongoing market abuse"], "questions": [{"q": "The FCA charges a trader with market abuse under UK MAR. The standard of proof required is:", "opts": "A) Beyond reasonable doubt — as this is a criminal charge\nB) Balance of probabilities — as market abuse is a civil offence\nC) No proof required — the FCA can fine on suspicion alone\nD) Clear and convincing evidence — a higher civil standard", "ans": "B — Market abuse under UK MAR is a civil offence. The standard of proof is the civil standard: balance of probabilities (more likely than not), which is lower than the criminal standard of beyond reasonable doubt."}]}, {"id": "3.7.10", "text": "Describe the behaviours defined as market abuse (MAR 1.3–1.9 and the Market Abuse Regulation)", "explanation": "<p>UK MAR defines seven types of behaviour that constitute <strong>market abuse</strong> (under FSMA and UK MAR 2021):</p>\n<ol>\n  <li><strong>Insider dealing</strong>: dealing while in possession of inside information (civil version of CJA offence).</li>\n  <li><strong>Improper disclosure</strong>: disclosing inside information to another person outside normal employment/duty.</li>\n  <li><strong>Misuse of information</strong>: using information not generally available, likely to affect prices (broader than insider dealing).</li>\n  <li><strong>Manipulating transactions</strong>: transactions that give false/misleading signals about supply, demand or price.</li>\n  <li><strong>Manipulating devices</strong>: using deceptive or artificial devices to fix prices (e.g. wash trading).</li>\n  <li><strong>Dissemination</strong>: spreading false or misleading information to move prices.</li>\n  <li><strong>Misleading behaviour and distortion</strong>: behaviour that gives false/misleading impressions of the market.</li>\n</ol>\n<p>Market abuse is a <strong>civil offence</strong> carrying unlimited fines.</p>", "keypoints": ["7 types of market abuse under UK MAR: insider dealing; improper disclosure; misuse of information; manipulating transactions; manipulating devices; dissemination; misleading behaviour/distortion", "Market abuse is a CIVIL offence — unlimited financial penalty", "Insider dealing appears in both criminal (CJA 1993) and civil (UK MAR) regimes"], "questions": [{"q": "A trader places large buy orders for a share then cancels them before execution, creating an artificial impression of demand to push the price up (spoofing). This is market abuse under which category?", "opts": "A) Improper disclosure\nB) Misuse of information\nC) Manipulating transactions or manipulating devices\nD) Dissemination", "ans": "C — Spoofing (placing orders with intent to cancel, creating false signals of demand) falls under manipulating transactions or manipulating devices under UK MAR."}]}, {"id": "3.7.11", "text": "Explain the enforcement powers of the FCA relating to market abuse (DEPP 6.5C)", "explanation": "<p>The FCA's <strong>enforcement powers</strong> in relation to market abuse (DEPP 6.5C):</p>\n<ul>\n  <li><strong>Unlimited financial penalties</strong>: the FCA can fine individuals and firms any amount it considers appropriate for market abuse.</li>\n  <li><strong>Public censure</strong>: publish a statement naming the person and the nature of the breach.</li>\n  <li><strong>Restitution</strong>: require the person to pay over profits made from market abuse, or compensate those who suffered.</li>\n  <li><strong>Injunction</strong>: apply to the court to stop market abuse.</li>\n  <li><strong>Variation or cancellation</strong> of a firm's Part 4A permission.</li>\n</ul>\n<p>In practice, the FCA considers several factors in determining a penalty for market abuse: the nature and seriousness of the breach; the profit made or loss avoided; the degree of co-operation with the investigation; prior history of breaches.</p>", "keypoints": ["FCA enforcement powers for market abuse: unlimited fines; public censure; restitution; injunction; cancel/vary permission", "FCA considers: seriousness of breach; profit made/loss avoided; co-operation; prior history", "Restitution: disgorge profits or compensate those harmed by the market abuse"], "questions": [{"q": "Which of the following is an enforcement power the FCA can use against a firm found guilty of market abuse?", "opts": "A) Refer the firm for criminal prosecution only\nB) Impose an unlimited civil financial penalty and public censure\nC) Only issue a private warning for a first offence\nD) Reduce the firm's capital requirements as a penalty", "ans": "B — The FCA can impose unlimited civil financial penalties and publish a public censure naming the offending firm for market abuse under UK MAR."}]}, {"id": "3.7.12", "text": "Explain the main features of the Bribery Act 2010, the UK Criminal Finances Act 2017 and the Economic Crime and Corporate Transparency Act 2023", "explanation": "<p><strong>Bribery Act 2010</strong>:</p>\n<ul>\n  <li>Four offences: paying bribes; receiving bribes; bribery of foreign public officials; failure of commercial organisations to prevent bribery.</li>\n  <li>'Adequate procedures' defence: a company can avoid liability for failure to prevent bribery if it had adequate procedures in place to prevent it.</li>\n  <li>Penalties: individuals — <strong>up to 10 years' imprisonment</strong>; companies — <strong>unlimited fine</strong>.</li>\n</ul>\n<p><strong>UK Criminal Finances Act 2017</strong>:</p>\n<ul>\n  <li>Creates the offence of <strong>failure to prevent the facilitation of tax evasion</strong> by associated persons. Similar 'reasonable prevention procedures' defence.</li>\n  <li>Introduced <strong>Unexplained Wealth Orders (UWOs)</strong>: allow law enforcement to require an individual to explain the source of wealth that appears disproportionate to their known income.</li>\n</ul>\n<p><strong>GDPR (General Data Protection Regulation)</strong>: Six data principles; fines up to €20m or 4% of global annual turnover; breaches notified to ICO within 72 hours.</p>", "keypoints": ["Bribery Act 2010: four offences (paying, receiving, foreign officials, failure to prevent); 'adequate procedures' defence", "Penalties: individuals up to 10 years; companies unlimited fine", "Criminal Finances Act 2017: failure to prevent tax evasion facilitation; Unexplained Wealth Orders (UWOs)", "GDPR: six data principles; €20m or 4% global turnover fine; 72-hour breach notification to ICO"], "questions": [{"q": "A company can avoid liability for an employee bribing a foreign official under the Bribery Act 2010 if it can show:", "opts": "A) It had no knowledge of the bribery\nB) It had adequate procedures in place to prevent bribery\nC) The bribe was small and did not affect the outcome\nD) The bribery took place in a country where it is common practice", "ans": "B — The 'adequate procedures' defence under the Bribery Act 2010 allows a company to avoid liability for failure to prevent bribery if it can demonstrate it had adequate anti-bribery procedures in place."}, {"q": "Under GDPR, a personal data breach must be notified to the Information Commissioner's Office (ICO) within:", "opts": "A) 24 hours\nB) 48 hours\nC) 72 hours\nD) 7 days", "ans": "C — GDPR requires data controllers to notify the ICO of a personal data breach within 72 hours of becoming aware of it."}]}]}]}, {"id": 4, "title": "Legal Concepts", "shortTitle": "Ch4: Legal", "questions": "2–5", "color": "#f59e0b", "sections": [{"id": "4.1", "title": "Legal Concepts", "points": [{"id": "4.1.1", "text": "Explain legal persons and power of attorney", "explanation": "<p><strong>Legal person / Legal personality</strong></p>\n<p>A <em>legal person</em> is any entity that has rights, protections, privileges, responsibilities and liabilities under the law. Legal personality allows one or more natural persons to act as a single entity (a \"composite person\") for legal purposes, and may shield participants from personal liability.</p>\n<p><strong>Types of legal person:</strong></p>\n<ul>\n  <li><strong>Natural persons</strong> — individual human beings</li>\n  <li><strong>Corporations</strong> — companies incorporated under the Companies Act; separate legal identity from their shareholders</li>\n  <li><strong>Partnerships</strong> — in English law, a partnership does <em>not</em> have separate legal personality (partners are personally liable); limited liability partnerships (LLPs) do have legal personality</li>\n</ul>\n<p><strong>Power of Attorney (PoA)</strong> — a legal document allowing one person (the <em>donor</em>) to give another person (the <em>donee</em>) the power to make certain decisions on their behalf.</p>\n<p><strong>Lasting Power of Attorney (LPA)</strong> — replaced the Enduring Power of Attorney (EPA) from 2007. Two types:</p>\n<ul>\n  <li><strong>Property and affairs LPA</strong> — donee can make decisions about the donor's <em>financial affairs</em></li>\n  <li><strong>Personal welfare LPA</strong> — donee can make decisions about the donor's <em>personal healthcare and welfare</em></li>\n</ul>\n<p>An LPA must be <strong>registered with the Office of the Public Guardian</strong> to be effective.</p>", "keypoints": ["Legal person: entity with rights, protections, responsibilities and liabilities under law", "Legal personality allows composite action and may shield participants from personal liability", "PoA: legal document allowing donor to grant donee decision-making power", "LPA replaced EPA from 2007; two types: property/affairs (financial) and personal welfare (healthcare)", "LPA must be registered with the Office of the Public Guardian to be effective"], "questions": [{"q": "Which body must a Lasting Power of Attorney be registered with before it becomes effective?", "opts": "A) The Financial Conduct Authority\nB) The Office of the Public Guardian\nC) HM Revenue & Customs\nD) The Probate Registry", "ans": "B — An LPA must be registered with the Office of the Public Guardian to have legal effect."}, {"q": "A personal welfare Lasting Power of Attorney gives the donee the power to make decisions about which of the following?", "opts": "A) The donor's financial investments\nB) The donor's property transactions\nC) The donor's personal healthcare and welfare\nD) The donor's tax affairs", "ans": "C — The personal welfare LPA covers healthcare and welfare decisions. A property and affairs LPA covers financial matters."}, {"q": "The Lasting Power of Attorney replaced which earlier document in 2007?", "opts": "A) Ordinary Power of Attorney\nB) General Power of Attorney\nC) Enduring Power of Attorney\nD) Delegated Power of Attorney", "ans": "C — The LPA replaced the Enduring Power of Attorney (EPA) from 2007."}, {"q": "Which of the following does NOT have separate legal personality under English law?", "opts": "A) A public limited company\nB) A limited liability partnership\nC) An ordinary partnership\nD) A company incorporated under the Companies Act", "ans": "C — An ordinary partnership does not have separate legal personality in English law; partners remain personally liable. LLPs do have separate legal personality."}]}, {"id": "4.1.2", "text": "Explain basic law of contract and agency", "explanation": "<p><strong>Basic Law of Contract</strong></p>\n<p>A contract is an agreement creating and defining the obligations between two or more parties. For a contract to be legally binding it must contain <strong>four essential elements</strong>:</p>\n<ol>\n  <li><strong>Offer and acceptance</strong> — specific terms set out and accepted; no further negotiation intended</li>\n  <li><strong>Consideration</strong> — something of value passing between the parties (e.g. one promises a service, the other promises payment)</li>\n  <li><strong>Intention</strong> — intention for the agreement to become legally binding; assumed in commercial contracts</li>\n  <li><strong>Terms and conditions</strong> — contract not normally binding if T&Cs are unclear</li>\n</ol>\n<p><strong>Types of contract:</strong> certain contracts must be in writing (e.g. sale of property, tenancy agreements); other oral contracts may still be upheld.</p>\n<p><strong>Contract discharge:</strong></p>\n<ul>\n  <li><strong>Performance</strong> — obligations accomplished by both parties</li>\n  <li><strong>Agreement</strong> — both parties agree to end the contract</li>\n  <li><strong>Frustration</strong> — completion of the contract becomes impossible</li>\n  <li><strong>Breach</strong> — one party does not fulfil the terms; damages can be awarded to the innocent party</li>\n</ul>\n<p><strong>Agency</strong> — a relationship where an <em>agent</em> is authorised to act on behalf of a <em>principal</em>. The agent's acts bind the principal within the scope of the agent's authority. Key types of authority: <em>actual authority</em> (expressly or impliedly given), <em>apparent authority</em> (where the principal leads a third party to believe the agent has authority).</p>", "keypoints": ["Contract: agreement creating obligations; must have offer/acceptance, consideration, intention, clear T&Cs", "Consideration: something of value passing between parties — cannot be past consideration", "Discharge: performance, agreement, frustration, or breach (damages awarded to innocent party)", "Agency: agent acts on behalf of principal; principal bound within scope of agent's authority", "Actual authority (express/implied) vs apparent authority (principal's conduct induces belief in authority)"], "questions": [{"q": "Which of the following is NOT one of the essential elements of a legally binding contract?", "opts": "A) Offer and acceptance\nB) Consideration\nC) Registration with a court\nD) Intention to create legal relations", "ans": "C — Registration with a court is not required. The four elements are: offer and acceptance, consideration, intention, and clear terms and conditions."}, {"q": "A contract is discharged by frustration. What does this mean?", "opts": "A) One party refuses to pay damages\nB) Both parties agree to end the contract early\nC) Completion of the contract has become impossible\nD) One party has breached the terms", "ans": "C — Frustration occurs when completion of the contract becomes impossible through no fault of either party."}, {"q": "In an agency relationship, which party's acts are binding on third parties within the scope of authority given?", "opts": "A) The agent's acts bind the agent personally\nB) The agent's acts bind the principal\nC) The third party's acts bind the agent\nD) Neither party is bound until written confirmation", "ans": "B — In an agency relationship, the agent acts on behalf of the principal, and the principal is bound by the agent's acts within the scope of the agent's authority."}, {"q": "A client verbally agrees to buy shares for a fixed price. The broker confirms but later refuses to proceed. The client can most likely claim which remedy?", "opts": "A) Nothing — oral contracts are never enforceable\nB) Damages for breach of contract\nC) A new written contract must be formed first\nD) The broker can withdraw at any time before settlement", "ans": "B — Oral contracts can be legally binding. The client can claim damages for breach of contract if the broker fails to fulfil the agreed terms."}]}, {"id": "4.1.3", "text": "Explain the types of ownership of property", "explanation": "<p><strong>Types of Ownership of Property under English Law</strong></p>\n<p><strong>Legal ownership</strong> — the person named on the title documents (e.g. Land Registry, share register). They hold legal title.</p>\n<p><strong>Beneficial (equitable) ownership</strong> — the person who has the beneficial rights of ownership: use of property, voting rights on shares, financial benefits. Legal and beneficial ownership may be split (e.g. in a trust).</p>\n<p><strong>Forms of co-ownership:</strong></p>\n<ul>\n  <li><strong>Tenants in common</strong> — each co-owner owns a <em>separate identified share</em> of the property. On death, their share passes according to their will or intestacy rules (not automatically to the other owner).</li>\n  <li><strong>Joint tenants (joint owners)</strong> — co-owners have an <em>identical, undivided interest</em>. On death, the deceased's interest passes automatically to the surviving owner(s) — the <em>right of survivorship</em> applies. No separate share to pass under a will.</li>\n</ul>\n<p>In absolute ownership, a single individual owns the entire asset with full legal and beneficial title.</p>", "keypoints": ["Legal ownership: named on title documents (Land Registry, share register)", "Beneficial ownership: right to use, income, and financial benefit from the asset", "Tenants in common: separate share; passes to beneficiaries on death (via will/intestacy)", "Joint tenants: identical undivided interest; right of survivorship — passes to survivor(s) automatically", "Legal and beneficial ownership can be split, e.g. in a trust arrangement"], "questions": [{"q": "Two people own a property as joint tenants. One owner dies. What happens to their interest in the property?", "opts": "A) It passes under the deceased's will\nB) It is split equally between the deceased's children\nC) It passes automatically to the surviving owner\nD) It passes to the state (bona vacantia)", "ans": "C — Joint tenancy carries the right of survivorship: the deceased's interest passes automatically to the surviving co-owner, regardless of what the will says."}, {"q": "Two investors own shares as tenants in common. What best describes this arrangement?", "opts": "A) Each owns an identical undivided interest with right of survivorship\nB) Each owns a separate identified share that can be passed under their will\nC) Neither can sell their share without the other's consent\nD) On death, the shares automatically vest in the surviving owner", "ans": "B — Tenants in common each hold a separate identified share which passes under their will or intestacy rules on death — there is no right of survivorship."}, {"q": "Which type of ownership describes the right to use a property and receive its financial benefits, even if not named on the title deed?", "opts": "A) Legal ownership\nB) Beneficial ownership\nC) Registered ownership\nD) Nominal ownership", "ans": "B — Beneficial (equitable) ownership gives the right to use, income, and financial benefits from an asset, even where legal title is held by another (e.g. a trustee)."}]}, {"id": "4.1.4", "text": "Explain insolvency and bankruptcy", "explanation": "<p><strong>Insolvency and Bankruptcy</strong></p>\n<p><strong>Insolvency</strong> — a <em>state of being</em> in which a person or company <strong>cannot pay their debts</strong>. Insolvency can apply to both individuals and companies.</p>\n<p><strong>Bankruptcy</strong> — a <em>legal process</em> that applies specifically to <strong>individuals</strong> (including sole traders and partners of a partnership). A company is not made bankrupt; instead it is placed into <strong>administration</strong>.</p>\n<p><strong>Bankruptcy orders</strong> can be made for debts over <strong>£5,000</strong> by:</p>\n<ul>\n  <li><strong>The debtor</strong> — debtor's petition made voluntarily by the debtor themselves</li>\n  <li><strong>Creditor(s)</strong> — creditors petition the courts for an enforcement order</li>\n</ul>\n<p>Once a bankruptcy order is made, the <strong>Official Receiver</strong> (an officer of the court) administers the bankrupt person's financial affairs, realises assets and distributes proceeds to creditors.</p>\n<p>Key distinction: <em>insolvency</em> is a financial state; <em>bankruptcy</em> is a legal status that follows from insolvency proceedings for individuals.</p>", "keypoints": ["Insolvency: state of being unable to pay debts — applies to individuals and companies", "Bankruptcy: legal process for individuals (not companies); companies go into administration", "Bankruptcy orders can be for debts >£5,000 — by debtor's petition (voluntary) or creditor's petition", "Official Receiver administers the bankrupt's financial affairs after a bankruptcy order", "Key distinction: insolvency = financial state; bankruptcy = legal status (individuals only)"], "questions": [{"q": "A company is unable to pay its debts. What is the correct legal process for dealing with this?", "opts": "A) The company is declared bankrupt\nB) The company is placed into administration\nC) The directors are made personally bankrupt\nD) The Official Receiver takes over the company", "ans": "B — Bankruptcy is a legal process that applies only to individuals. Companies that cannot pay their debts are placed into administration."}, {"q": "What is the minimum debt level at which a creditor can petition a court for a bankruptcy order against an individual?", "opts": "A) £1,000\nB) £2,500\nC) £5,000\nD) £10,000", "ans": "C — A creditor can petition for a bankruptcy order for debts exceeding £5,000."}, {"q": "Which of the following BEST describes the difference between insolvency and bankruptcy?", "opts": "A) They are the same thing and the terms can be used interchangeably\nB) Insolvency is a financial state; bankruptcy is the legal status that follows for individuals\nC) Bankruptcy applies to companies; insolvency applies to individuals\nD) Insolvency is a criminal offence; bankruptcy is a civil matter", "ans": "B — Insolvency describes the state of being unable to pay debts. Bankruptcy is the formal legal process that applies to individuals (not companies) who are insolvent."}, {"q": "After a bankruptcy order is made, who is responsible for administering the bankrupt individual's financial affairs?", "opts": "A) The creditors collectively\nB) The debtor's solicitor\nC) The Official Receiver\nD) The Insolvency Practitioner appointed by the debtor", "ans": "C — The Official Receiver, an officer of the court, administers the bankrupt person's financial affairs following a bankruptcy order."}]}, {"id": "4.1.5", "text": "Explain wills and intestacy", "explanation": "<p><strong>Wills and Intestacy</strong></p>\n<p>A <strong>will</strong> is a written document that sets out how a deceased person's estate is to be distributed after their death.</p>\n<p><strong>Conditions for a valid will:</strong></p>\n<ul>\n  <li>Must be in writing</li>\n  <li>Must be signed and witnessed</li>\n  <li>The person making the will (testator) must:\n    <ul>\n      <li>Be over 18 years of age when it is made</li>\n      <li>Have the mental capacity to make and understand the will</li>\n      <li>Not have made it under duress or undue pressure from another person</li>\n    </ul>\n  </li>\n</ul>\n<p><strong>Probate</strong> — the legal process that establishes ownership of the deceased person's estate before assets are distributed. The executor named in the will applies for a Grant of Probate.</p>\n<p><strong>Intestacy</strong> — if a person dies without a valid will (<em>dies intestate</em>), their estate is distributed according to the <strong>rules of intestacy</strong>, which are set out in law and may not reflect what the deceased would have wished. In England and Wales the rules prioritise spouses/civil partners and then children, with a set formula.</p>", "keypoints": ["Will: written document directing distribution of estate; must be in writing, signed and witnessed", "Testator must be over 18, have mental capacity, and not be under duress", "Probate: legal process establishing ownership of estate before distribution", "Intestacy: dying without a valid will; estate distributed per rules of intestacy (not the deceased's wishes)", "Rules of intestacy in England and Wales prioritise spouse/civil partner then children"], "questions": [{"q": "A person dies without leaving a valid will. How is their estate distributed?", "opts": "A) The estate passes entirely to the Crown\nB) The estate is divided equally among all blood relatives\nC) The estate is distributed according to the rules of intestacy\nD) The estate is distributed according to the deceased's verbal wishes", "ans": "C — Dying without a valid will means dying intestate. The estate is distributed according to the statutory rules of intestacy, which may not reflect the deceased's wishes."}, {"q": "Which of the following is a requirement for a will to be valid?", "opts": "A) It must be typed, not handwritten\nB) It must be registered with the Probate Registry before death\nC) The testator must be over 18 and have mental capacity\nD) It must be witnessed by a beneficiary named in the will", "ans": "C — A valid will requires the testator to be over 18, have mental capacity, not be under duress, and the will must be in writing and properly signed and witnessed. A beneficiary witnessing the will could invalidate their gift."}, {"q": "What is the purpose of probate?", "opts": "A) To register a will with the courts before death\nB) To establish ownership of the deceased's estate before assets are distributed\nC) To appoint a trustee to manage the deceased's assets indefinitely\nD) To calculate the inheritance tax liability of the estate", "ans": "B — Probate establishes the legal ownership of a deceased person's estate and authorises the executor to distribute the assets."}]}, {"id": "4.1.6", "text": "Describe the main types of trusts and their uses", "explanation": "<p><strong>Main Types of Trusts and their Uses</strong></p>\n<p>A <strong>trust</strong> is an arrangement allowing an individual (the <em>settlor</em>) to have assets controlled by certain parties (the <em>trustees</em>) for the benefit of others (the <em>beneficiaries</em>).</p>\n<p><strong>Types of trust:</strong></p>\n<ul>\n  <li><strong>Bare trust</strong> — trustee holds property for a single beneficiary who has an <em>absolute interest</em>. Assets typically held until the beneficiary reaches age 18. The beneficiary can direct the trustees at any time.</li>\n  <li><strong>Interest in possession trust</strong> — beneficiary has a <em>life interest</em> and is entitled to immediate income from or use of the trust property. A <em>reversionary interest</em> is held by the \"remainderman\" who receives the capital when the life interest ends.</li>\n  <li><strong>Discretionary trust</strong> — no beneficiary has a right to income. Trustees have full discretion to accumulate income and/or make distributions. Trustees decide the amount each beneficiary receives.</li>\n  <li><strong>Charitable trust</strong> — promotes a charitable purpose (e.g. relief of poverty, advancement of education). Must be of a charitable nature and for the public benefit.</li>\n</ul>", "keypoints": ["Trust: settlor transfers assets to trustees to hold for benefit of beneficiaries", "Bare trust: trustee holds for single beneficiary with absolute interest; typically until age 18", "Interest in possession: beneficiary has life interest (income/use); remainderman gets capital on death", "Discretionary trust: trustees decide who gets what; no beneficiary has right to income", "Charitable trust: must be charitable in nature AND for public benefit"], "questions": [{"q": "In a discretionary trust, which of the following is correct?", "opts": "A) Each beneficiary has a fixed right to a share of the income\nB) The settlor retains the right to direct distributions\nC) Trustees decide the amount of trust income and capital each beneficiary receives\nD) Income must be paid out annually and cannot be accumulated", "ans": "C — In a discretionary trust, no beneficiary has a right to income. The trustees have full discretion to accumulate and/or distribute as they see fit."}, {"q": "A grandmother sets up a trust so that her granddaughter receives income from the trust assets during her lifetime, with the capital passing to the granddaughter's children on her death. What type of trust is this?", "opts": "A) Bare trust\nB) Discretionary trust\nC) Interest in possession trust\nD) Charitable trust", "ans": "C — This is an interest in possession trust. The granddaughter has a life interest (income/use) and the children are the remaindermen who receive the capital."}, {"q": "In a bare trust, what interest does the beneficiary hold?", "opts": "A) A discretionary interest\nB) A life interest only\nC) An absolute interest\nD) A reversionary interest", "ans": "C — In a bare trust, the beneficiary has an absolute interest in the assets. The trustee simply holds the assets on their behalf."}, {"q": "A trust is established to promote the relief of poverty in a local community. What type of trust is this?", "opts": "A) Discretionary trust\nB) Bare trust\nC) Interest in possession trust\nD) Charitable trust", "ans": "D — A trust promoting the relief of poverty is a charitable trust. It must be of a charitable nature and for the public benefit."}]}, {"id": "4.1.7", "text": "Explain the purpose and scope of the Trustee Act 2000: the rights and duties of the parties involved, the nature of the trust deed and the investment powers of trustees", "explanation": "<p><strong>Trustee Act 2000 — Rights, Duties and Investment Powers</strong></p>\n<p>The <strong>Trustee Act 2000</strong> governs the investment powers of trustees in England and Wales. Key provisions:</p>\n<ul>\n  <li>Trustees may make <strong>any kind of investment</strong> as if they were the absolute owner — a very wide general power of investment</li>\n  <li>However, when exercising this power trustees must:\n    <ul>\n      <li><strong>Obtain and consider proper advice</strong> (from someone with relevant knowledge/experience), unless it is unnecessary or inappropriate to do so</li>\n      <li><strong>Have regard to the standard investment criteria:</strong>\n        <ul>\n          <li><strong>Suitability</strong> — suitability of the type of investment and of the particular investment</li>\n          <li><strong>Need to diversify</strong> — the need to diversify investments so far as appropriate</li>\n        </ul>\n      </li>\n    </ul>\n  </li>\n  <li>Trustees must <strong>review</strong> trust investments from time to time and consider whether to vary them</li>\n</ul>\n<p><strong>The Act does NOT apply to:</strong></p>\n<ul>\n  <li>Occupational pension schemes</li>\n  <li>Authorised unit trusts</li>\n  <li>Certain schemes under the Charities Act</li>\n</ul>\n<p><strong>Trust deed</strong> — the legal document that establishes the trust, names trustees and beneficiaries, and sets out the rules governing the trust including any specific investment restrictions. Trustees must act within its terms.</p>", "keypoints": ["Trustee Act 2000: trustees may make any kind of investment as if absolute owner", "Must obtain/consider proper advice (unless unnecessary/inappropriate)", "Standard investment criteria: suitability and need to diversify", "Must review investments periodically and consider variations", "Does NOT apply to: occupational pension schemes, authorised unit trusts, certain Charities Act schemes"], "questions": [{"q": "Under the Trustee Act 2000, what are the two standard investment criteria that trustees must have regard to?", "opts": "A) Liquidity and yield\nB) Suitability and need to diversify\nC) Capital growth and income\nD) Risk and return", "ans": "B — The Trustee Act 2000 requires trustees to consider the suitability of investments and the need to diversify the trust portfolio."}, {"q": "The Trustee Act 2000 does NOT apply to which of the following?", "opts": "A) A family discretionary trust\nB) A bare trust for a minor\nC) An occupational pension scheme\nD) An interest in possession trust", "ans": "C — The Trustee Act 2000 does not apply to occupational pension schemes, authorised unit trusts, or certain schemes under the Charities Act."}, {"q": "Under the Trustee Act 2000, what must trustees do before making investment decisions?", "opts": "A) Obtain court approval for each investment\nB) Consult all beneficiaries individually\nC) Obtain and consider proper advice unless it is unnecessary or inappropriate\nD) Obtain written consent from the settlor", "ans": "C — Trustees must obtain and consider proper advice from someone with relevant knowledge, unless it is unnecessary or inappropriate in the circumstances."}, {"q": "What document establishes a trust and sets out the rules, including investment powers and any restrictions?", "opts": "A) A letter of wishes\nB) A deed of variation\nC) The trust deed\nD) A grant of probate", "ans": "C — The trust deed is the legal document that establishes the trust, names the trustees and beneficiaries, and governs how the trust operates."}]}, {"id": "4.1.8", "text": "Explain the purpose of a Statement of Investment Principles", "explanation": "<p><strong>Statement of Investment Principles (SIP)</strong></p>\n<p>A <strong>Statement of Investment Principles</strong> is a formal written document that sets out the investment policy and principles adopted by pension scheme trustees. It is a requirement for <strong>occupational pension schemes</strong> under the <strong>Pensions Act 1995</strong>.</p>\n<p><strong>Purpose of a SIP:</strong></p>\n<ul>\n  <li>Sets out the f
