U directive (implemented in the UK via the Companies (Shareholders' Rights) Regulations) that aims to encourage <strong>long-term shareholder engagement</strong>.</p>\n<p><strong>Key requirements:</strong></p>\n<ul>\n  <li>Institutional investors and asset managers must develop and publicly disclose an <strong>engagement policy</strong> explaining how they engage with investee companies — or explain why they have not.</li>\n  <li>They must annually disclose how they have voted and engaged.</li>\n  <li>Remuneration policies of listed companies must be subject to a binding or advisory shareholder vote.</li>\n</ul>\n<p><strong>Impact on pension schemes:</strong></p>\n<ul>\n  <li>Pension fund trustees must publish an engagement policy explaining how they engage with asset managers on governance, ESG and long-term performance.</li>\n  <li>Or explain why they have decided not to produce one.</li>\n  <li>Encourages pension funds to take an active interest in corporate governance at companies in which their fund is invested.</li>\n</ul>", "keypoints": ["SRD II: encourages long-term shareholder engagement with investee companies", "Institutional investors and asset managers must publish an engagement policy (or explain why not)", "Annual disclosure of voting and engagement required", "Pension schemes must publish an engagement policy or explain absence", "Remuneration policies of listed companies subject to shareholder vote under SRD II"], "questions": [{"q": "Under SRD II, what must institutional investors do regarding their approach to engaging with investee companies?", "opts": "A) They must vote against all management remuneration proposals\nB) They must develop and disclose an engagement policy or explain why they have not\nC) They must hold at least 5% of each investee company\nD) They must attend every AGM of investee companies", "ans": "B — SRD II requires institutional investors and asset managers to develop and publicly disclose an engagement policy, or explain why they have decided not to adopt one (comply-or-explain)."}]}, {"id": "1.5.5", "text": "Explain the importance of board diversity in relation to good corporate governance", "explanation": "<p><strong>Board diversity</strong> is increasingly recognised as a key component of good corporate governance.</p>\n<p><strong>Why diversity matters:</strong></p>\n<ul>\n  <li><strong>Better decision-making</strong>: diverse boards with different perspectives (professional background, gender, ethnicity, age) are less prone to groupthink and make more balanced decisions.</li>\n  <li><strong>Reflects stakeholder base</strong>: companies serve diverse customers, employees and communities — a diverse board better understands and represents these groups.</li>\n  <li><strong>Talent utilisation</strong>: diversity ensures the best candidates are considered, regardless of background.</li>\n  <li><strong>Risk management</strong>: different perspectives improve the identification and management of risks.</li>\n</ul>\n<p><strong>UK context:</strong></p>\n<ul>\n  <li>The <strong>Hampton-Alexander Review</strong> set a target of 33% women on FTSE 350 boards (now met by many companies).</li>\n  <li>The <strong>Parker Review</strong> addressed ethnic diversity on boards.</li>\n  <li>The UK Corporate Governance Code requires boards to explain their approach to diversity, and FCA listing rules require diversity reporting.</li>\n  <li>Operate on comply-or-explain basis — no hard quota but disclosure required.</li>\n</ul>", "keypoints": ["Diverse boards: better decisions, reduced groupthink, reflects stakeholders, utilises talent pool", "Diversity includes: gender, ethnicity, professional background, age, experience", "Hampton-Alexander Review: 33% women on FTSE 350 boards (target)", "Parker Review: ethnic diversity on boards", "Comply-or-explain: no hard quota; companies must disclose diversity approach and progress"], "questions": [{"q": "Which of the following BEST describes why board diversity is considered important for good corporate governance?", "opts": "A) It guarantees higher share prices\nB) Diverse boards reduce the risk of groupthink and improve decision-making quality\nC) It removes the need for non-executive directors\nD) It eliminates the agency problem entirely", "ans": "B — Diverse boards with different perspectives are less prone to groupthink, enabling more balanced and effective decision-making, which is central to good governance."}]}, {"id": "1.5.6", "text": "Explain the London Stock Exchange requirements for listed companies to disclose corporate governance compliance", "explanation": "<p>The <strong>London Stock Exchange</strong> requires <strong>Premium listed</strong> companies to disclose their corporate governance compliance:</p>\n<ul>\n  <li>Companies must include a <strong>corporate governance statement</strong> in their annual report and accounts.</li>\n  <li>The statement must identify the corporate governance code they apply (usually the UK Corporate Governance Code).</li>\n  <li>On a <strong>comply-or-explain</strong> basis: describe how they have applied the Code's principles AND identify any provisions they have not complied with and explain why.</li>\n  <li>This disclosure allows shareholders and analysts to assess the quality of a company's governance and challenge departures from best practice.</li>\n</ul>\n<p>This requirement reinforces the <strong>Listing Rules</strong> obligation for ongoing disclosure, and ties into the DTR requirement for companies to include a corporate governance statement in their annual management report.</p>", "keypoints": ["Premium listed companies must include a corporate governance statement in their annual report", "Must identify the code they apply (UK Corporate Governance Code) and comply-or-explain", "Must explain any non-compliance with specific Code provisions in the annual report", "Enables shareholders to assess governance quality and challenge non-compliance"], "questions": [{"q": "Where must a Premium listed company disclose its compliance (or otherwise) with the UK Corporate Governance Code?", "opts": "A) In a separate filing to Companies House\nB) In a corporate governance statement in the annual report and accounts\nC) Only on the company's website\nD) In a quarterly report to the FCA", "ans": "B — Premium listed companies must include a corporate governance statement in their annual report and accounts, identifying the code applied and explaining any non-compliance."}]}, {"id": "1.5.7", "text": "Explain the continuing obligations of London Stock Exchange listed companies regarding information disclosure and dissemination", "explanation": "<p>The <strong>continuing obligations</strong> of LSE-listed companies regarding information disclosure are set out in the Listing Rules and DTRs. Their purpose is to keep shareholders properly and timely informed.</p>\n<p>Key requirements:</p>\n<ul>\n  <li><strong>Regulatory News Service (RNS) / Primary Information Provider (PIP)</strong>: price-sensitive information must be released through an approved channel to ensure it reaches the market simultaneously.</li>\n  <li><strong>Price-sensitive announcements</strong>: any information likely to have a material effect on the share price must be disclosed promptly (e.g. profit warnings, major contracts, director changes).</li>\n  <li><strong>Circulars and meeting documents</strong>: draft circulars (other than routine) must be submitted to the UKLA for approval before despatch to shareholders.</li>\n  <li><strong>Equal treatment</strong>: all shareholders must receive information at the same time — no selective disclosure to favoured investors.</li>\n  <li>Companies must maintain and update a website with key regulatory information.</li>\n</ul>", "keypoints": ["Price-sensitive information must be released via RNS/PIP — to market simultaneously, not selectively", "No selective disclosure: all investors must receive price-sensitive news at the same time", "Non-routine circulars/meeting documents must be submitted to UKLA before despatch", "Website must contain key regulatory information and be kept up to date"], "questions": [{"q": "A FTSE 100 company receives a material contract. It should notify the market via which channel?", "opts": "A) A press conference for selected analysts\nB) An email to its major shareholders\nC) The Regulatory News Service (RNS) or a Primary Information Provider (PIP)\nD) A posting on the company website only", "ans": "C — Price-sensitive information must be released through the RNS or an approved PIP to ensure simultaneous dissemination to all market participants."}]}, {"id": "1.5.8", "text": "Explain, in outline, the UK company law requirements regarding the calling of annual general meetings and other general meetings", "explanation": "<p>UK company law (Companies Act 2006) sets out strict requirements for calling general meetings:</p>\n<p><strong>Annual General Meeting (AGM):</strong></p>\n<ul>\n  <li>Must be held within <strong>6 months</strong> of the company's financial year end.</li>\n  <li>No more than a <strong>15-month interval</strong> between AGMs.</li>\n  <li>At least <strong>21 clear days' written notice</strong> must be given to members.</li>\n  <li>Electronic notice: deemed delivered <strong>48 hours</strong> after despatch.</li>\n</ul>\n<p><strong>General Meetings (EGMs / other general meetings):</strong></p>\n<ul>\n  <li>At least <strong>14 days' written notice</strong> required.</li>\n  <li>Can be called by the <strong>directors</strong> or requisitioned by shareholders holding <strong>5% or more</strong> of voting capital.</li>\n  <li>Electronic notice: deemed delivered 48 hours after despatch.</li>\n</ul>", "keypoints": ["AGM: within 6 months of year end; 21 days' notice; no more than 15-month gap between AGMs", "General meeting (EGM): 14 days' notice; called by directors or requisitioned by 5%+ shareholders", "Electronic notice: deemed delivered 48 hours after being sent"], "questions": [{"q": "A UK public company must hold its AGM within how many months of its financial year end?", "opts": "A) 3 months\nB) 4 months\nC) 6 months\nD) 12 months", "ans": "C — UK public companies must hold their AGM within 6 months of the financial year end."}, {"q": "What is the minimum notice period for calling a general meeting (other than an AGM)?", "opts": "A) 7 days\nB) 14 days\nC) 21 days\nD) 28 days", "ans": "B — General meetings (other than AGMs) require at least 14 clear days' written notice."}]}, {"id": "1.5.9", "text": "Distinguish between annual general meetings and other types of company meetings", "explanation": "<p><strong>Annual General Meeting (AGM):</strong></p>\n<ul>\n  <li>Required by law for all public companies, annually.</li>\n  <li>Standard business includes: approving accounts and reports, declaring the final dividend, re-electing directors, re-appointing auditors and approving their remuneration.</li>\n  <li>21 days' minimum notice; held within 6 months of year end.</li>\n</ul>\n<p><strong>General Meeting (GM) / Extraordinary General Meeting (EGM):</strong></p>\n<ul>\n  <li>Called between AGMs to deal with <strong>urgent or special business</strong> that cannot wait until the next AGM.</li>\n  <li>Examples: approval of a major acquisition, approval of a rights issue, removal of a director.</li>\n  <li>14 days' minimum notice.</li>\n  <li>Can be requisitioned by shareholders holding 5%+ of voting rights.</li>\n</ul>\n<p>The term \"EGM\" (extraordinary general meeting) is still commonly used even though the Companies Act 2006 simply refers to \"general meetings\" other than the AGM.</p>", "keypoints": ["AGM: annual, required by law, standard business (accounts, dividends, directors, auditors), 21 days' notice", "General meeting (EGM): called for urgent/special business between AGMs, 14 days' notice", "EGM examples: major acquisition approval, rights issue, director removal", "5%+ shareholders can requisition a general meeting"], "questions": [{"q": "Shareholders owning 6% of a company's voting shares wish to remove a director between AGMs. They should:", "opts": "A) Wait for the next AGM and propose a special resolution\nB) Requisition a general meeting — they hold more than 5% of voting rights\nC) Write to the FCA requesting intervention\nD) Contact the FRC to enforce the UK Corporate Governance Code", "ans": "B — Shareholders holding 5% or more of voting capital can requisition the directors to call a general meeting."}]}, {"id": "1.5.10", "text": "Distinguish between the types of resolution that can be considered at company general meetings", "explanation": "<p>Two main types of resolution are considered at general meetings:</p>\n<p><strong>Ordinary resolution:</strong></p>\n<ul>\n  <li>Passed by a <strong>simple majority — more than 50%</strong> of votes cast.</li>\n  <li>Used for standard, recurring decisions: approving accounts, declaring dividends, re-electing directors, re-appointing auditors, approving directors' pay policy (advisory).</li>\n</ul>\n<p><strong>Special resolution:</strong></p>\n<ul>\n  <li>Passed by a <strong>supermajority — at least 75%</strong> of votes cast.</li>\n  <li>Used for <strong>constitutional or significant changes</strong> to the company: amending the articles of association, changing the company's name, reducing share capital, winding up the company voluntarily, dis-applying pre-emption rights.</li>\n  <li>Requires 21 days' notice (cannot be called at short notice like some ordinary resolutions).</li>\n</ul>", "keypoints": ["Ordinary resolution: >50% of votes cast; standard recurring decisions", "Special resolution: ≥75% of votes cast; constitutional/significant changes", "Ordinary: re-elect directors, approve accounts, dividend, auditor appointment", "Special: amend articles, change company name, reduce capital, dis-apply pre-emption rights"], "questions": [{"q": "A company wishes to amend its articles of association. What type of resolution is required and what level of shareholder approval?", "opts": "A) Ordinary resolution — more than 50% approval\nB) Special resolution — at least 75% approval\nC) Ordinary resolution — at least 75% approval\nD) Special resolution — unanimous approval", "ans": "B — Amending the articles of association requires a special resolution, which must be passed by at least 75% of votes cast."}, {"q": "A company proposes the re-election of a non-executive director at its AGM. This requires:", "opts": "A) An ordinary resolution — more than 50% of votes cast\nB) A special resolution — at least 75% of votes cast\nC) A unanimous vote of all shareholders\nD) No vote — directors are automatically re-elected", "ans": "A — Re-electing a director is a standard ordinary resolution, requiring more than 50% of votes cast."}]}, {"id": "1.5.11", "text": "Distinguish between the voting methods used at company meetings", "explanation": "<p>There are two voting methods at company meetings:</p>\n<p><strong>Show of hands:</strong></p>\n<ul>\n  <li>The default and most common method at the start of a meeting.</li>\n  <li>Each member present (or proxy) raises their hand — <strong>one member, one vote</strong>.</li>\n  <li>Quick and simple, but does not reflect the number of shares held.</li>\n</ul>\n<p><strong>Poll vote:</strong></p>\n<ul>\n  <li>More accurate — <strong>one vote per share</strong> held; proxy votes are counted.</li>\n  <li>Can be <strong>demanded</strong> by:\n    <ul>\n      <li>At least <strong>5 members</strong> (shareholders) present, or</li>\n      <li>A member or members representing at least <strong>10% or more</strong> of voting rights.</li>\n    </ul>\n  </li>\n  <li>The chairman can also call a poll at their discretion.</li>\n  <li>Results are more representative of the actual ownership structure.</li>\n</ul>", "keypoints": ["Show of hands: default method; one member = one vote; quick but doesn't reflect shareholding", "Poll vote: one vote per share; proxy votes counted; more accurate and representative", "Poll can be demanded by: 5 members OR members with ≥10% of voting rights", "Chairman can also call a poll at their own discretion"], "questions": [{"q": "A shareholder owning 12% of the voting capital wishes to ensure the vote properly reflects shareholdings. They should demand:", "opts": "A) A show of hands vote\nB) A poll vote — they hold more than 10% of voting rights\nC) A special resolution process\nD) A postal ballot", "ans": "B — A poll vote, where voting is by number of shares held (one share, one vote), can be demanded by a member or members representing 10% or more of voting rights."}]}, {"id": "1.5.12", "text": "Explain the role and powers of a proxy", "explanation": "<p>A <strong>proxy</strong> is a person appointed by a shareholder to attend a company meeting and vote on their behalf.</p>\n<ul>\n  <li>All shareholders have the right to appoint a proxy.</li>\n  <li>A proxy need not be a shareholder themselves.</li>\n</ul>\n<p>Two main types of proxy:</p>\n<p><strong>General proxy (discretionary proxy):</strong></p>\n<ul>\n  <li>The proxy is given <strong>full discretion</strong> to vote as they see fit.</li>\n  <li>No specific instructions on how to vote on each resolution.</li>\n  <li>Suitable when the shareholder trusts the proxy's judgement.</li>\n</ul>\n<p><strong>Special proxy / Two-way proxy (directed proxy):</strong></p>\n<ul>\n  <li>The proxy is instructed to vote <strong>for or against</strong> specific resolutions, exactly as directed by the shareholder.</li>\n  <li>No discretion — the proxy must follow the shareholder's instructions.</li>\n  <li>Most common in institutional practice (fund managers voting on behalf of clients).</li>\n</ul>", "keypoints": ["Proxy: person appointed to attend and vote at meeting on behalf of a shareholder", "All shareholders have the right to appoint a proxy; proxy need not be a shareholder", "General proxy: votes as they see fit (full discretion)", "Special/two-way proxy: votes as directed — for or against specific resolutions, no discretion"], "questions": [{"q": "A pension fund trustee appoints a proxy and instructs them to vote FOR resolution 1 and AGAINST resolution 2. This is an example of:", "opts": "A) A general proxy\nB) A special (two-way) proxy\nC) A poll vote\nD) A show of hands proxy", "ans": "B — A special/two-way proxy is one where the shareholder gives specific voting instructions (for or against each resolution), leaving the proxy no discretion."}]}]}, {"id": "1.6", "title": "International Markets", "points": [{"id": "1.6.1", "text": "Explain the structure, features, and regulatory and trading environment of international markets, including developed markets and emerging markets", "explanation": "<p><strong>Developed markets</strong> (e.g. US, UK, Japan, Germany):</p>\n<ul>\n  <li>Highly liquid, deep, transparent markets with well-established regulatory frameworks.</li>\n  <li><strong>NYSE</strong> (New York Stock Exchange): the world's largest equity market by market cap. Floor-based trading system historically; now mostly electronic via the Universal Trading Platform (UTP). Uses <strong>Designated Market Makers (DMMs)</strong> assigned to specific stocks at trading posts to maintain orderly markets.</li>\n  <li>NASDAQ: fully electronic, quote-driven, major technology stocks.</li>\n</ul>\n<p><strong>Emerging markets</strong> (e.g. Brazil, India, China, South Africa):</p>\n<ul>\n  <li>Higher potential returns but higher risks: political risk, currency risk, liquidity risk, settlement risk, regulatory uncertainty.</li>\n  <li>Less developed infrastructure, potentially lower transparency and investor protection.</li>\n  <li>Capital controls may restrict the movement of money in/out of the country.</li>\n  <li>Settlement cycles may be longer (T+3 or longer).</li>\n  <li>Classified by indices such as MSCI Emerging Markets.</li>\n</ul>", "keypoints": ["Developed markets: deep, liquid, transparent, well-regulated (US, UK, Japan, Germany)", "NYSE: largest equity market; floor-based historically; DMMs (Designated Market Makers) at trading posts", "UTP (Universal Trading Platform): transmits orders from NYSE members to trading posts", "Emerging markets: higher return potential; higher political/currency/liquidity/settlement risks", "Emerging markets: capital controls, less regulation, longer settlement cycles (T+3+)"], "questions": [{"q": "Designated Market Makers (DMMs) on the NYSE are responsible for:", "opts": "A) Setting interest rates for listed companies\nB) Maintaining orderly markets by providing liquidity at their assigned trading posts\nC) Approving prospectuses for new listings\nD) Acting as central counterparties for settlement", "ans": "B — DMMs are assigned to specific stocks on the NYSE floor. They are responsible for maintaining fair and orderly markets by providing liquidity at their assigned trading posts."}, {"q": "An investor in an emerging market fund faces risks that are generally NOT present when investing in developed markets. Which of the following is such a risk?", "opts": "A) Bid-ask spread\nB) Market maker default\nC) Capital controls restricting repatriation of funds\nD) Annual management charges", "ans": "C — Capital controls (government-imposed restrictions on moving money in or out of a country) are a risk specific to some emerging markets and are not typically a concern in developed markets."}]}, {"id": "1.6.2", "text": "Explain the structure and operation of the primary and secondary markets for Eurobonds", "explanation": "<p><strong>Eurobonds</strong> are bonds issued in a currency different from that of the country in which they are issued (i.e. \"international bonds\" denominated in a \"eurocurrency\").</p>\n<p>Example: A US dollar bond issued by a UK company in the London market is a Eurobond.</p>\n<p><strong>Key features:</strong></p>\n<ul>\n  <li><strong>Annual coupons</strong> (unlike UK gilts, which pay semi-annually)</li>\n  <li><strong>Unsecured bearer securities</strong> — ownership is established by possession; no registered owner on issuer's books</li>\n  <li>Generally unregistered (historically; now mostly in book-entry form)</li>\n</ul>\n<p><strong>Primary market:</strong> international placing through a syndicate of banks; not subject to a single country's prospectus requirements.</p>\n<p><strong>Secondary market:</strong> traded OTC; regulated by the <strong>International Capital Market Association (ICMA)</strong>.</p>\n<p><strong>Settlement:</strong> through <strong>Euroclear</strong> (Belgium) and <strong>Clearstream</strong> (Luxembourg) — the two International Central Securities Depositories (ICSDs). Settle <strong>T+2</strong>.</p>", "keypoints": ["Eurobond: bond denominated in a currency different from the country of issue", "Features: annual coupons, unsecured bearer securities", "Primary market: international placing through bank syndicate", "Secondary market: OTC, regulated by ICMA", "Settlement: Euroclear and Clearstream (ICSDs), T+2"], "questions": [{"q": "Which of the following is a key feature that distinguishes Eurobonds from UK gilts?", "opts": "A) Eurobonds pay coupons gross and annually; gilts pay gross semi-annually\nB) Eurobonds are exchange-traded; gilts are OTC\nC) Eurobonds are issued by governments; gilts are issued by corporations\nD) Eurobonds settle T+1; gilts settle T+2", "ans": "A — Eurobonds pay annual coupons (once per year); UK gilts pay semi-annual coupons. Both are generally paid gross."}, {"q": "The secondary market for Eurobonds is regulated by:", "opts": "A) The FCA\nB) The European Central Bank\nC) The International Capital Market Association (ICMA)\nD) Euroclear", "ans": "C — The secondary OTC market for Eurobonds is regulated by the International Capital Market Association (ICMA), which sets standards and conventions for the market."}]}, {"id": "1.6.3", "text": "Explain the settlement and clearing procedures overseas, including the role of international central securities depositories, and the different settlement cycles and challenges in managing global assets", "explanation": "<p><strong>International Central Securities Depositories (ICSDs):</strong></p>\n<ul>\n  <li><strong>Euroclear</strong> (headquartered in Brussels, Belgium) and <strong>Clearstream</strong> (headquartered in Luxembourg) are the two ICSDs.</li>\n  <li>They hold and settle Eurobonds and other international securities in book-entry form.</li>\n  <li>They also link to national Central Securities Depositories (CSDs) such as CREST in the UK.</li>\n</ul>\n<p><strong>Different settlement cycles globally:</strong></p>\n<ul>\n  <li>UK equities: T+2</li>\n  <li>UK gilts: T+1</li>\n  <li>Eurobonds: T+2</li>\n  <li>US equities: T+2 (moved from T+3 in 2017)</li>\n  <li>Japan: T+2</li>\n  <li>Some emerging markets: T+3 or longer</li>\n</ul>\n<p><strong>Challenges in managing global assets:</strong></p>\n<ul>\n  <li><strong>Time zone differences</strong>: markets open/close at different times, making coordination difficult.</li>\n  <li><strong>Currency risk</strong>: cross-currency settlements require FX conversion.</li>\n  <li><strong>Different market practices</strong>: varying corporate action processing, tax withholding rates, and legal frameworks.</li>\n  <li><strong>Custody arrangements</strong>: need sub-custodians in each market; adds complexity and cost.</li>\n  <li><strong>Settlement fails</strong>: different cycles can cause mismatches when trades involve cross-border transactions.</li>\n</ul>", "keypoints": ["ICSDs: Euroclear (Belgium) and Clearstream (Luxembourg) — hold and settle international securities", "ICSDs link to national CSDs (e.g. CREST in UK)", "Settlement cycles: UK equities T+2; gilts T+1; Eurobonds T+2; some emerging markets T+3+", "Global asset challenges: time zones, currency risk, different market practices, sub-custody needs"], "questions": [{"q": "Which of the following are the two International Central Securities Depositories (ICSDs) for Eurobonds?", "opts": "A) CREST and DTC\nB) Euroclear and Clearstream\nC) Euroclear and SWIFT\nD) Clearstream and CREST", "ans": "B — Euroclear (Belgium) and Clearstream (Luxembourg) are the two ICSDs used for settling Eurobond transactions."}]}]}, {"id": "1.7", "title": "The Principal-Agent Problem: Separation of Ownership and Control", "points": [{"id": "1.7.1", "text": "Explain how capital markets allow the beneficial ownership, and the control of capital, to be separated", "explanation": "<p>Capital markets allow the <strong>beneficial ownership</strong> and <strong>control</strong> of a company to be held by <strong>different parties</strong>:</p>\n<ul>\n  <li><strong>Beneficial owners (shareholders)</strong>: own the economic interest in the company. They invest capital but do not need to be involved in day-to-day management.</li>\n  <li><strong>Controllers (directors/managers)</strong>: exercise control over the company's operations, strategy and capital allocation — but may own very little of the company.</li>\n</ul>\n<p>This separation is possible because:</p>\n<ul>\n  <li>Shares are <strong>tradeable</strong> — investors can buy/sell without affecting management continuity.</li>\n  <li>Companies have <strong>limited liability</strong> — investors' maximum loss is their investment.</li>\n  <li><strong>Legal frameworks</strong> (company law) allow management to act on behalf of shareholders under fiduciary duties.</li>\n</ul>\n<p>This separation enables large-scale capital raising but creates the potential for <strong>conflicts of interest</strong> between owners and managers.</p>", "keypoints": ["Capital markets allow ownership (shareholders) and control (directors) to be separated", "Shareholders provide capital; directors/managers run the business day-to-day", "Separation enabled by: tradeable shares, limited liability, legal frameworks (company law)", "This enables large-scale capital raising but creates agency/principal-agent conflict"], "questions": [{"q": "How do capital markets enable the separation of beneficial ownership and control?", "opts": "A) By requiring all shareholders to be involved in management decisions\nB) By making shares tradeable and providing limited liability, so investors can provide capital without managing the business\nC) By requiring directors to own a majority of company shares\nD) By prohibiting directors from owning any shares", "ans": "B — Tradeable shares and limited liability allow investors to provide capital without being involved in management, creating the separation of ownership and control."}]}, {"id": "1.7.2", "text": "Distinguish between beneficial owners (principals) and the various agents involved in the capital allocation process", "explanation": "<p>In the capital allocation process, there are multiple layers of <strong>principals</strong> and <strong>agents</strong>:</p>\n<p><strong>Principals (beneficial owners):</strong></p>\n<ul>\n  <li><strong>Shareholders</strong> of a listed company — ultimate owners of the company's equity.</li>\n  <li><strong>Pension fund beneficiaries</strong> — individuals whose savings are managed by pension fund trustees.</li>\n  <li><strong>Insurance policyholders</strong> — individuals whose premiums are invested by insurance companies.</li>\n  <li><strong>Unit trust/OEIC investors</strong> — individuals whose money is invested by fund managers.</li>\n</ul>\n<p><strong>Agents (who act on behalf of principals):</strong></p>\n<ul>\n  <li><strong>Directors/managers</strong> — act on behalf of shareholders to run the company.</li>\n  <li><strong>Fund managers</strong> — invest capital on behalf of pension funds, insurance companies, individuals.</li>\n  <li><strong>Pension fund trustees</strong> — make investment decisions on behalf of pension beneficiaries.</li>\n  <li><strong>Brokers</strong> — execute trades on behalf of investors.</li>\n  <li><strong>Financial advisers</strong> — advise clients on investment decisions.</li>\n</ul>", "keypoints": ["Principals: shareholders, pension beneficiaries, insurance policyholders, fund investors", "Agents: directors/managers (act for shareholders), fund managers, trustees, brokers, advisers", "Multiple layers: e.g. pensioner → trustee → fund manager → company director", "Each agent layer creates potential for conflicts with the principal's interests"], "questions": [{"q": "In the investment chain, a pension fund trustee investing on behalf of a pension scheme member is BEST described as:", "opts": "A) A principal acting for an agent\nB) An agent acting on behalf of the principal (pension scheme member)\nC) A beneficial owner of the company\nD) A designated market maker", "ans": "B — The pension fund trustee is an agent acting on behalf of the principal (the pension scheme member/beneficiary). The member is the beneficial owner of the pension assets."}]}, {"id": "1.7.3", "text": "Explain how conflict between the interests of agents and principals gives rise to the 'agency' or 'principal-agent' problem", "explanation": "<p>The <strong>principal-agent problem</strong> (or \"agency problem\") arises when an agent's interests diverge from those of the principal:</p>\n<ul>\n  <li><strong>Principal's goal</strong>: maximise the long-term value of the firm (shareholders want maximum risk-adjusted return).</li>\n  <li><strong>Agent's goal</strong>: may include maximising their own compensation, job security, empire-building (growing the firm beyond optimal size), perks, or avoiding risk to protect their position.</li>\n</ul>\n<p><strong>Why the conflict arises:</strong></p>\n<ul>\n  <li>Agents have more information than principals (<strong>information asymmetry</strong>) — managers know more about the business than shareholders.</li>\n  <li>Agents bear less of the risk than principals — shareholders lose if the share price falls, but managers may still receive bonuses.</li>\n  <li>Monitoring is costly and imperfect — shareholders cannot observe every management decision.</li>\n</ul>\n<p>Classic examples: CEO awarding themselves excessive pay, CEO pursuing empire-building acquisitions that destroy shareholder value, a fund manager taking on excessive risk to boost performance fees.</p>", "keypoints": ["Agency problem: agent's interests diverge from the principal's interests", "Principal wants: maximum long-term value; Agent may want: high pay, job security, empire-building, perks", "Caused by: information asymmetry (managers know more than shareholders), differing risk exposure", "Monitoring is costly and imperfect — principals cannot observe all management decisions", "Examples: excessive CEO pay, value-destroying acquisitions, excessive risk-taking by fund managers"], "questions": [{"q": "A CEO approves a large, value-destroying acquisition primarily to increase the size of the empire they manage and enhance their own status. This is an example of:", "opts": "A) Efficient capital allocation\nB) The agency/principal-agent problem — management pursuing own interests over shareholders'\nC) Transparent corporate governance\nD) A special resolution requirement", "ans": "B — This is a classic example of the agency problem: the CEO (agent) is acting in their own interest (empire-building) rather than in the interest of shareholders (principals)."}]}, {"id": "1.7.4", "text": "Identify examples of agency costs such as: expropriation, perquisites, self-dealing and higher cost of capital, which arise when the agency problem is known to exist", "explanation": "<p><strong>Agency costs</strong> are costs incurred because of the separation of ownership and control. They include:</p>\n<ul>\n  <li><strong>Expropriation</strong>: directors/managers take value directly from shareholders — e.g. awarding themselves excessive compensation packages or transferring company assets to related parties at below-market prices.</li>\n  <li><strong>Perquisites (perks)</strong>: managers use company resources for personal benefit — e.g. company jets, luxury offices, generous expense accounts, golf club memberships.</li>\n  <li><strong>Self-dealing</strong>: directors enter into transactions that benefit themselves at the company's (and shareholders') expense — e.g. awarding contracts to firms in which they have a personal interest; related-party transactions.</li>\n  <li><strong>Higher cost of capital</strong>: when investors know the agency problem exists, they demand a higher return to compensate for the risk that management may not act in their interests. This makes it more expensive for the company to raise capital.</li>\n</ul>\n<p>Monitoring costs (paid by shareholders to supervise management) and bonding costs (paid by management to commit to shareholders' interests) are also agency costs.</p>", "keypoints": ["Expropriation: directors take value from shareholders (excessive pay, below-market asset transfers)", "Perquisites (perks): managers use company resources for personal benefit (jets, expenses)", "Self-dealing: directors enter transactions that personally benefit them at company's expense", "Higher cost of capital: investors demand premium to compensate for agency risk", "Monitoring costs (shareholders supervising management) also count as agency costs"], "questions": [{"q": "A company director awards a construction contract to a firm owned by their family, at a price above market rate. This is BEST described as:", "opts": "A) Perquisites\nB) Self-dealing\nC) Higher cost of capital\nD) Information asymmetry", "ans": "B — Self-dealing occurs when a director enters into a transaction that personally benefits them (here, benefiting their family) at the company's expense."}, {"q": "Investors in a company demand a higher expected return because they are concerned about management acting in their own interests. This BEST illustrates which agency cost?", "opts": "A) Perquisites\nB) Expropriation\nC) Higher cost of capital\nD) Self-dealing", "ans": "C — A higher cost of capital is an agency cost: when investors know the agency problem exists, they require a higher return (risk premium) to compensate, making capital raising more expensive for the firm."}]}, {"id": "1.7.5", "text": "Identify the main reasons why it is argued that reducing the agency problem benefits the investment profession and society as a whole", "explanation": "<p>Reducing the agency problem is argued to benefit the investment profession and society for several reasons:</p>\n<ul>\n  <li><strong>Greater trust in capital markets</strong>: investors are more willing to provide capital to companies when they trust that managers will act in their interests. This deepens capital markets and increases their efficiency.</li>\n  <li><strong>More efficient capital allocation</strong>: when managers act in shareholders' interests, capital flows to the most productive investments rather than empire-building or value-destroying projects.</li>\n  <li><strong>Lower cost of capital</strong>: reducing the agency risk premium means companies can raise capital more cheaply, encouraging investment and economic growth.</li>\n  <li><strong>Better outcomes for savers and investors</strong>: pension fund beneficiaries, retail investors and insurance policyholders receive better returns when their agents (fund managers, directors) act in their interests.</li>\n  <li><strong>Long-term sustainable value creation</strong>: aligned incentives encourage managers to focus on long-term value rather than short-term self-interest, benefiting the broader economy.</li>\n  <li><strong>Professional reputation</strong>: a well-governed investment industry attracts better talent and commands greater public trust.</li>\n</ul>", "keypoints": ["Greater trust in capital markets → more investment, deeper and more efficient markets", "More efficient capital allocation → capital goes to productive uses not empire-building", "Lower cost of capital → cheaper to raise funds → more investment and growth", "Better outcomes for savers/investors (pension beneficiaries, retail investors)", "Encourages long-term value creation over short-term self-interest"], "questions": [{"q": "Which of the following BEST describes why reducing the principal-agent problem benefits society as a whole?", "opts": "A) It increases the earnings of investment managers\nB) It enables directors to take on more risk for shareholders\nC) It leads to more efficient capital allocation, lower cost of capital and better returns for savers\nD) It reduces the need for regulation, lowering compliance costs", "ans": "C — Reducing the agency problem means capital is allocated more efficiently, the cost of capital falls, and savers and investors receive better returns — benefiting the economy and society broadly."}]}]}]}, {"id": 2, "title": "Ethics and Investment Professionalism", "shortTitle": "Ch2: Ethics", "questions": "5–15", "color": "#8b5cf6", "sections": [{"id": "2.1", "title": "Ethical and Compliance-Driven Behaviour", "points": [{"id": "2.1.1", "text": "Describe the need for ethics in the investment industry", "explanation": "<p>Ethics provides the <strong>foundation of trust</strong> on which the entire investment industry rests. Without ethical behaviour, financial markets cannot function effectively.</p>\n<p><strong>Why ethics are essential in investment:</strong></p>\n<ul>\n  <li><strong>Asymmetric information</strong>: clients typically know far less than their advisers about investments, products and markets. Without ethical standards, this knowledge gap can easily be exploited.</li>\n  <li><strong>Fiduciary relationships</strong>: fund managers, advisers and trustees are entrusted with managing other people's money. This creates a duty to act in the client's best interest — an inherently ethical obligation.</li>\n  <li><strong>Market integrity</strong>: financial markets depend on participants trusting that prices reflect genuine supply and demand, not manipulation or insider trading. Unethical behaviour corrodes this trust.</li>\n  <li><strong>Long-term sustainability</strong>: firms that behave ethically retain clients and build long-term reputations. Unethical short-term gains typically destroy value and relationships.</li>\n  <li><strong>Regulatory burden</strong>: poor industry ethics invite greater regulation and compliance costs. Strong ethical culture reduces the need for heavy-handed rules.</li>\n  <li><strong>Social licence to operate</strong>: the investment industry must maintain public confidence that it serves the interests of savers and the wider economy — not just its own participants.</li>\n</ul>", "keypoints": ["Ethics is essential because clients lack the information to evaluate investment advice themselves (asymmetric information)", "Fiduciary duty: investment professionals manage other people's money and must act in their best interests", "Market integrity depends on trust that prices reflect genuine activity, not manipulation", "Ethical firms build long-term client relationships; unethical behaviour destroys reputation and value", "Strong ethical culture reduces regulatory burden and maintains industry's social licence to operate"], "questions": [{"q": "Why is ethics PARTICULARLY important in investment management compared to many other industries?", "opts": "A) Investment managers are subject to less regulation than other professionals\nB) Clients typically cannot evaluate the quality of investment advice due to information asymmetry, creating a fiduciary relationship\nC) Investment returns are guaranteed so ethical behaviour has no financial consequences\nD) The investment industry is too small to have wider social impact", "ans": "B — The key reason ethics matters so much in investment is information asymmetry: clients lack the knowledge to judge whether advice or actions are in their interests. This makes the fiduciary duty to act ethically essential."}, {"q": "Which of the following BEST describes what would happen to financial markets if widespread unethical behaviour went unchecked?", "opts": "A) Market prices would become more accurate\nB) Trading volumes and spreads would remain unchanged\nC) Investors would lose trust in market integrity, reducing participation and raising the cost of capital\nD) Regulation would be eliminated, reducing costs for all participants", "ans": "C — Unethical behaviour (e.g. insider trading, manipulation) destroys trust in market integrity. Without that trust, investors withdraw, reducing liquidity, increasing spreads and raising the cost of capital."}]}, {"id": "2.1.2", "text": "Identify positive and negative behavioural indicators", "explanation": "<p>Ethical behaviour in investment can be assessed through observable <strong>behavioural indicators</strong>:</p>\n<p><strong>Positive behavioural indicators:</strong></p>\n<ul>\n  <li>Full, transparent <strong>disclosure</strong> of conflicts of interest, fees and risks</li>\n  <li><strong>Acting in the client's best interest</strong> — placing client interests above personal gain</li>\n  <li><strong>Fair dealing</strong> — treating all clients equitably, not favouring some over others</li>\n  <li>Seeking <strong>independent advice</strong> when uncertain rather than guessing</li>\n  <li><strong>Maintaining confidentiality</strong> of client information</li>\n  <li>Reporting suspected misconduct to a supervisor or compliance function</li>\n  <li>Applying <strong>diligence and thoroughness</strong> in research and recommendations</li>\n  <li>Complying with the <em>spirit</em>, not just the letter, of rules and regulations</li>\n</ul>\n<p><strong>Negative behavioural indicators:</strong></p>\n<ul>\n  <li><strong>Front-running</strong>: trading for personal account ahead of known client orders</li>\n  <li><strong>Insider trading</strong>: dealing on material non-public information</li>\n  <li><strong>Misrepresentation</strong>: overstating qualifications, performance records or expected returns</li>\n  <li><strong>Excessive gifts/hospitality</strong>: accepting benefits that compromise independence</li>\n  <li><strong>Churning</strong>: excessive trading in a client's account to generate commissions</li>\n  <li><strong>Selective disclosure</strong>: sharing information with some clients before others</li>\n  <li>Prioritising personal or employer interests over client interests</li>\n</ul>", "keypoints": ["Positive indicators: full disclosure, acting in client's best interest, fair dealing, confidentiality, diligence", "Positive: reporting misconduct, seeking advice when uncertain, following spirit not just letter of rules", "Negative: front-running, insider trading, misrepresentation, churning, selective disclosure", "Negative: excessive gifts/hospitality, prioritising own interests over clients"], "questions": [{"q": "A fund manager buys shares for their personal account after receiving a large client buy order, knowing the client's order will push the price up. This is BEST described as:", "opts": "A) A positive behavioural indicator — acting on good information\nB) Front-running — a negative behavioural indicator that puts personal interests ahead of the client\nC) Diligent research — a positive indicator of investment skill\nD) Fair dealing — allowed as long as it is disclosed", "ans": "B — Front-running (trading for personal account ahead of known client orders) is a clear negative behavioural indicator and a serious ethical and regulatory breach."}, {"q": "Which of the following is a POSITIVE behavioural indicator?", "opts": "A) Recommending high-commission products that are not suitable for the client\nB) Treating different clients differently based on their account size\nC) Disclosing a conflict of interest before providing investment advice\nD) Guaranteeing a minimum return on a volatile equity fund", "ans": "C — Disclosing conflicts of interest is a key positive behavioural indicator. It allows clients to assess the objectivity of advice and is required under CFA Standard VI(A)."}]}, {"id": "2.1.3", "text": "Identify the ethical obligations to clients, prospective clients, employers and co-workers", "explanation": "<p>Investment professionals have ethical obligations to multiple parties:</p>\n<p><strong>Obligations to clients:</strong></p>\n<ul>\n  <li><strong>Loyalty, prudence and care</strong>: act in the client's best interest; exercise due care in all investment decisions</li>\n  <li><strong>Suitability</strong>: ensure investment recommendations are appropriate for the client's circumstances, objectives and risk tolerance</li>\n  <li><strong>Confidentiality</strong>: protect client information; do not disclose without consent (except where legally required or where illegal activity is involved)</li>\n  <li><strong>Fair dealing</strong>: treat all clients equitably — no preferential treatment in disseminating recommendations</li>\n  <li><strong>Preservation of confidentiality</strong>: protect client information from unauthorised disclosure</li>\n</ul>\n<p><strong>Obligations to prospective clients:</strong></p>\n<ul>\n  <li>No misrepresentation of qualifications, services or performance records</li>\n  <li>Same obligations as to existing clients once an advisory relationship begins</li>\n</ul>\n<p><strong>Obligations to employers:</strong></p>\n<ul>\n  <li><strong>Loyalty</strong>: act in employer's interests; do not divulge confidential information; no independent practice without prior written permission</li>\n  <li>Must continue to act in employer's best interest until resignation takes effect</li>\n  <li>Disclose any additional compensation arrangements</li>\n</ul>\n<p><strong>Obligations to co-workers:</strong></p>\n<ul>\n  <li>Do not encourage or assist unethical behaviour by colleagues</li>\n  <li>Supervisors must ensure those under their authority comply with rules and the Code</li>\n  <li>Report suspected violations to a supervisor or compliance officer</li>\n</ul>", "keypoints": ["Clients: loyalty/prudence/care, suitability, confidentiality, fair dealing", "Prospective clients: no misrepresentation; same obligations as clients once relationship begins", "Employers: loyalty, no independent practice without permission, disclose additional compensation", "Co-workers: do not encourage unethical behaviour; report violations; supervisors must enforce compliance"], "questions": [{"q": "An investment professional plans to leave their firm and start independent practice. Under CFA ethics, they should:", "opts": "A) Immediately start building their new client book using the firm's client list\nB) Continue acting in the employer's best interests until resignation takes effect and obtain prior permission for independent practice\nC) Begin soliciting clients as soon as they hand in their notice\nD) Disclose confidential firm information to prospective clients to win business", "ans": "B — Standard IV(A) requires loyalty to the employer. An investment professional must continue acting in the employer's best interests until resignation takes effect, and must obtain prior permission before undertaking independent practice."}, {"q": "A client reveals to their adviser that they are evading tax. The adviser's obligation of confidentiality means they:", "opts": "A) Must never disclose this information under any circumstances\nB) May be required to disclose this information as it concerns illegal activity\nC) Can disclose only if the client gives written consent\nD) Must report it immediately to the FCA", "ans": "B — Under Standard III(E), confidentiality may be broken where the information concerns illegal activity (or where disclosure is required by law). Tax evasion is illegal activity."}]}, {"id": "2.1.4", "text": "Critically evaluate the outcomes which may result from behaving unethically – for the industry, individual advisers, the firm and consumers", "explanation": "<p>Unethical behaviour has severe consequences at multiple levels:</p>\n<p><strong>For the investment industry:</strong></p>\n<ul>\n  <li>Erosion of <strong>public trust</strong> in financial markets and institutions</li>\n  <li>Increased regulatory scrutiny and heavier compliance requirements for all participants</li>\n  <li>Higher cost of capital as investors demand a risk premium for dishonest markets</li>\n  <li>Long-term damage to the industry's <strong>social licence to operate</strong></li>\n</ul>\n<p><strong>For individual advisers:</strong></p>\n<ul>\n  <li><strong>Regulatory sanctions</strong>: FCA censure, bans from performing regulated activities</li>\n  <li><strong>Criminal prosecution</strong>: fines, imprisonment for serious offences (e.g. insider trading, fraud)</li>\n  <li><strong>Reputational damage</strong>: career destruction — difficult to recover professionally</li>\n  <li>Loss of CFA designation or other professional credentials</li>\n</ul>\n<p><strong>For the firm:</strong></p>\n<ul>\n  <li>Regulatory fines and enforcement actions</li>\n  <li>Loss of authorisation to conduct regulated business</li>\n  <li>Civil litigation from harmed clients</li>\n  <li>Reputational damage leading to loss of clients and AUM</li>\n</ul>\n<p><strong>For consumers:</strong></p>\n<ul>\n  <li>Direct <strong>financial losses</strong> (unsuitable advice, fraud, churning)</li>\n  <li>Emotional distress and loss of confidence in financial planning</li>\n  <li>Systemic harm when widespread unethical behaviour causes market failures (e.g. 2008 financial crisis)</li>\n</ul>", "keypoints": ["Industry: loss of public trust, more regulation, higher cost of capital, damaged social licence", "Individual advisers: FCA sanctions, ban from industry, criminal prosecution, reputational destruction", "Firm: regulatory fines, loss of authorisation, civil litigation, loss of clients/AUM", "Consumers: financial losses, emotional distress, systemic harm from market failures"], "questions": [{"q": "An investment adviser engages in widespread churning of client accounts. Which of the following is a likely consequence FOR THE FIRM?", "opts": "A) Increased client loyalty and retention\nB) Regulatory fines, potential loss of FCA authorisation and civil litigation from harmed clients\nC) Higher revenues with no regulatory risk if clients signed terms and conditions\nD) Reduced compliance costs", "ans": "B — Churning is a serious regulatory breach. The firm faces FCA enforcement action, potential loss of authorisation, and civil suits from clients who suffered losses from excessive trading costs."}, {"q": "A scandal where multiple advisers at a major bank provide unsuitable pension advice to thousands of retail clients would MOST likely result in which industry-level consequence?", "opts": "A) Reduced regulatory oversight of pension advice\nB) Increased consumer trust in financial advisers\nC) Increased regulatory requirements and scrutiny across the entire advice industry\nD) Higher profits for other advisory firms", "ans": "C — Widespread unethical behaviour typically triggers a regulatory response affecting the whole industry, not just the offending firm."}]}, {"id": "2.1.5", "text": "Critically evaluate the outcomes which may result from limiting behaviour to compliance within the rules – for the industry, individual advisers and consumers", "explanation": "<p>There is an important distinction between following the <strong>letter of the law</strong> (mere compliance) and acting in the <strong>spirit</strong> of the rules (truly ethical behaviour).</p>\n<p><strong>Outcomes of limiting behaviour to compliance only:</strong></p>\n<p><strong>For the industry:</strong></p>\n<ul>\n  <li>Sets a <strong>floor, not a ceiling</strong>: minimum standards become the norm rather than best practice</li>\n  <li>Fails to build the deep trust that underpins long-term market efficiency</li>\n  <li>Creates a \"tick-box\" culture that may miss the underlying purpose of regulation</li>\n  <li>When regulations have gaps, compliance-only behaviour exploits those gaps to clients' detriment</li>\n</ul>\n<p><strong>For individual advisers:</strong></p>\n<ul>\n  <li>A service indistinguishable from competitors — no differentiation beyond price</li>\n  <li>Reputational risk: technically compliant behaviour may still harm clients and attract criticism</li>\n  <li>Does not protect from regulatory action if the regulator takes a principles-based approach (e.g. FCA's \"treating customers fairly\" initiative)</li>\n</ul>\n<p><strong>For consumers:</strong></p>\n<ul>\n  <li>May receive technically compliant but <strong>unsuitable or poor-value</strong> advice or products</li>\n  <li>Less confidence in their adviser's commitment to their interests</li>\n  <li>Regulatory gaps may leave consumers with no recourse for harm that was \"technically legal\"</li>\n</ul>\n<p>The CFA Code and Standards deliberately set <strong>higher standards than legal minimum</strong> — members must comply with the stricter of the law or the Code.</p>", "keypoints": ["Compliance-only culture: sets a floor (minimum standard) not a ceiling (best practice)", "Industry risk: tick-box compliance misses the spirit of rules; gaps exploited to clients' detriment", "For advisers: no differentiation, reputational risk, still exposed under principles-based regulation", "For consumers: may receive technically legal but unsuitable/poor-value advice", "CFA sets standards above the legal minimum — members must follow the stricter of law vs Code"], "questions": [{"q": "An investment firm follows all regulatory rules to the letter but routinely places clients in high-cost products that barely meet suitability requirements. This BEST illustrates:", "opts": "A) Exemplary ethical behaviour\nB) The risk of a compliance-only culture — technically legal but not acting in the spirit of client protection\nC) Best execution — the firm is following all rules\nD) A breach of criminal law", "ans": "B — Following the letter but not the spirit of the rules is the hallmark of a compliance-only culture. The firm is technically compliant but not acting in the client's best interest, which falls short of true ethical behaviour."}, {"q": "Under the CFA Code and Standards, if local law is LESS strict than the Code, members should:", "opts": "A) Follow local law only, as it takes precedence\nB) Follow the stricter requirement — the CFA Code and Standards\nC) Follow whichever is more convenient\nD) Seek a waiver from the CFA Institute", "ans": "B — Under Standard I(A), when the law and the CFA Code conflict, members must comply with the more strict requirement. If local law is less strict, the CFA Code applies."}]}]}, {"id": "2.2", "title": "CFA Code of Ethics and Standards of Professional Conduct", "points": [{"id": "2.2.1", "text": "Identify the elements of the CFA Code of Ethics and Standards of Professional Conduct", "explanation": "<p>The CFA Institute's ethical framework has two components: the <strong>Code of Ethics</strong> and the <strong>Standards of Professional Conduct</strong>.</p>\n<p><strong>Six elements of the Code of Ethics:</strong></p>\n<ol>\n  <li>Act with <strong>integrity, competence, diligence, respect</strong> and in an ethical manner with the public, clients, prospects, employers, employees and colleagues. (<em>\"Act in an ethical manner\"</em>)</li>\n  <li>Place the <strong>integrity of the investment profession and clients' interests above personal interests</strong>. (<em>\"Integrity is paramount and clients always come first\"</em>)</li>\n  <li>Use <strong>reasonable care and exercise independent professional judgement</strong> when conducting analysis, making recommendations and taking investment actions. (<em>\"Use reasonable care. Be independent\"</em>)</li>\n  <li>Practice and encourage others to practice in a <strong>professional and ethical manner that will reflect creditably on themselves and the profession</strong>. (<em>\"Be a credit to the investment profession\"</em>)</li>\n  <li><strong>Promote the integrity and viability of global capital markets</strong> for the ultimate benefit of society; uphold capital market rules and regulations. (<em>\"Promote the global capital markets\"</em>)</li>\n  <li><strong>Maintain and improve professional competence</strong> and strive to do the same for other investment professionals. (<em>\"Be competent\"</em>)</li>\n</ol>\n<p><strong>Seven sections of Standards of Professional Conduct:</strong></p>\n<ul>\n  <li><strong>I. Professionalism</strong>: (A) Knowledge of the law; (B) Independence and objectivity; (C) Misrepresentation; (D) Misconduct</li>\n  <li><strong>II. Integrity of Capital Markets</strong>: (A) Material non-public information; (B) Market manipulation</li>\n  <li><strong>III. Duties to Clients</strong>: (A) Loyalty, prudence and care; (B) Fair dealing; (C) Suitability; (D) Performance presentation; (E) Preservation of confidentiality</li>\n  <li><strong>IV. Duties to Employers</strong>: (A) Loyalty; (B) Additional compensation arrangements; (C) Responsibilities of supervisors</li>\n  <li><strong>V. Investment Analysis, Recommendations and Actions</strong>: (A) Diligence and reasonable basis; (B) Communication with clients; (C) Record retention</li>\n  <li><strong>VI. Conflicts of Interest</strong>: (A) Disclosure of conflicts; (B) Priority of transactions; (C) Referral fees</li>\n  <li><strong>VII. Responsibilities as a CFA Member/Candidate</strong>: (A) Conduct as members and candidates; (B) Reference to the CFA designation</li>\n</ul>", "keypoints": ["Code element 1: Act with integrity, competence, diligence and respect", "Code element 2: Clients' interests and profession integrity above personal interests", "Code element 3: Reasonable care and independent professional judgement", "Code element 4: Be a credit to the profession; encourage ethical practice in others", "Code element 5: Promote global capital markets for benefit of society", "Code element 6: Maintain and improve professional competence", "7 Standards: I Professionalism, II Capital Market Integrity, III Client Duties, IV Employer Duties, V Investment Analysis, VI Conflicts, VII CFA Member Responsibilities"], "questions": [{"q": "How many elements does the CFA Code of Ethics contain?", "opts": "A) 4\nB) 5\nC) 6\nD) 7", "ans": "C — The CFA Code of Ethics contains six elements."}, {"q": "Under which Standard of Professional Conduct would the prohibition on acting on material non-public information be found?", "opts": "A) Standard I — Professionalism\nB) Standard II — Integrity of Capital Markets\nC) Standard III — Duties to Clients\nD) Standard VI — Conflicts of Interest", "ans": "B — Prohibition on material non-public information is covered under Standard II(A) — Integrity of Capital Markets."}]}, {"id": "2.2.2", "text": "Explain the professional principles and values on which the CFA Code of Ethics and Standards of Professional Conduct are based", "explanation": "<p>The CFA Code and Standards are built on a set of <strong>core professional principles and values</strong>:</p>\n<ul>\n  <li><strong>Integrity</strong>: Honesty in all professional dealings; never misrepresent facts, qualifications or performance. The Code places integrity above all else — element 2 says integrity of the profession and client interests come before personal interests.</li>\n  <li><strong>Objectivity and independence</strong>: Analysis and recommendations must be free from bias, conflicts of interest, and external pressures. Standard I(B) requires members not to accept gifts or benefits that compromise objectivity.</li>\n  <li><strong>Competence</strong>: Members must maintain and develop the knowledge and skills needed to do their job properly (element 6). Incompetent advice harms clients even if it is honest.</li>\n  <li><strong>Fairness</strong>: Clients and prospective clients must be treated equitably. Standard III(B) prohibits favouring some clients over others in the distribution of information or investment actions.</li>\n  <li><strong>Confidentiality</strong>: Client information must be protected. Trust depends on clients knowing their affairs are kept private.</li>\n  <li><strong>Diligence</strong>: Thorough, careful research and analysis; reasonable basis for all recommendations. Standard V(A) requires diligence and a reasonable basis for investment actions.</li>\n  <li><strong>Loyalty</strong>: Primary loyalty is to clients; secondary loyalty is to the employer. Personal interests come last.</li>\n  <li><strong>Capital market integrity</strong>: Members have a duty to uphold the integrity of global financial markets for the benefit of society — not just their clients.</li>\n</ul>", "keypoints": ["Integrity: honesty above all; clients' interests and profession before personal gain", "Independence and objectivity: free from bias and conflicts; decline gifts/hospitality that compromise", "Competence: maintain and develop knowledge and skills (element 6)", "Fairness: equitable treatment of all clients; no preferential treatment", "Confidentiality: protect client information; build trust", "Diligence: thorough research; reasonable basis for all recommendations (Standard V(A))", "Priority order: clients first, employer second, personal interests last"], "questions": [{"q": "Which of the following BEST describes the priority order of interests under the CFA Code of Ethics?", "opts": "A) Personal interests → employer → clients\nB) Employer → personal interests → clients\nC) Clients → employer → personal interests\nD) Clients and personal interests equally, then employer", "ans": "C — The CFA Code places clients' interests first, employer interests second, and personal interests last. This reflects the fiduciary nature of investment management."}, {"q": "An analyst receives an expensive watch from a company she covers. The CFA principle of independence and objectivity MOST directly requires her to:", "opts": "A) Accept the gift but disclose it to the client\nB) Decline the gift, as it could compromise her independence and objectivity\nC) Accept it since it is a token of appreciation with no strings attached\nD) Only refuse if the gift is worth more than £100", "ans": "B — Standard I(B) requires investment professionals to maintain independence and objectivity. Accepting lavish gifts from companies they cover could compromise their analysis and should be declined."}]}, {"id": "2.2.3", "text": "Apply the CFA Code of Ethics and Standards of Professional Conduct to a range of ethical dilemmas", "explanation": "<p>The CFA Code and Standards can be applied to a range of real-world ethical dilemmas. When faced with a dilemma, identify the relevant Standard, determine whether a breach exists, and determine the appropriate action.</p>\n<p><strong>Common exam scenarios and how to apply the Standards:</strong></p>\n<ul>\n  <li><strong>Insider trading / Material non-public information (II(A))</strong>: An analyst overhears merger plans. They must NOT trade or tip others. Most firms use information barriers (firewalls). \"Mosaic theory\" — piecing together public information — is NOT a breach.</li>\n  <li><strong>Gifts and independence (I(B))</strong>: A broker offers a fund manager free sports tickets. The manager must decline or seek approval — the test is whether it could compromise independence. Pay own travel/accommodation where possible.</li>\n  <li><strong>Suitability (III(C))</strong>: Recommending a highly speculative investment to a risk-averse retired investor is a breach — suitability must be judged in context of the client's total portfolio.</li>\n  <li><strong>Front-running / Priority of transactions (VI(B))</strong>: Trading personal account before placing client orders is prohibited. Family accounts treated like client accounts.</li>\n  <li><strong>Performance misrepresentation (III(D) / I(C))</strong>: Cherry-picking only good periods, or fabricating returns, is a breach.</li>\n  <li><strong>Soft commissions (III(A))</strong>: Using dealing commission to purchase research is allowed only if it benefits the client. Using it for personal items (e.g. office furniture) is a breach.</li>\n  <li><strong>Conflicts of interest (VI(A))</strong>: A manager holds shares in a company they are recommending — must disclose this conflict before giving advice.</li>\n  <li><strong>Conflict of law (I(A))</strong>: When local law conflicts with the CFA Code, always follow the <em>stricter</em> requirement. If both allow the action, follow both; if one prohibits it, do not do it.</li>\n</ul>", "keypoints": ["Material non-public info (II(A)): do not trade or tip; use firewalls; mosaic theory is NOT a breach", "Gifts/independence (I(B)): decline or report gifts that could compromise objectivity; pay own costs", "Suitability (III(C)): assess in context of total portfolio; always enquire into client objectives and constraints", "Front-running (VI(B)): personal/family account trades cannot precede client trades; blackout periods apply", "Soft commissions (III(A)): dealing commission must benefit the client; no personal use", "Conflicts of interest (VI(A)): disclose before giving advice; client/employer to evaluate objectivity", "Conflict of law (I(A)): always follow the stricter of local law or CFA Code"], "questions": [{"q": "A fund manager inadvertently overhears two company directors discussing an unannounced acquisition. Under Standard II(A), the manager should:", "opts": "A) Trade immediately before the information becomes public to benefit clients\nB) Not trade on or communicate this information; report to compliance and implement information barriers\nC) Trade only for their personal account, not for client accounts\nD) Confirm the information with the company before trading", "ans": "B — Standard II(A) prohibits acting on material non-public information. The manager must not trade on it or tip others, and should report to compliance. Firewalls exist precisely to handle this."}, {"q": "A broker uses client dealing commission to subscribe to an investment research service. Under the CFA Standards, this is:", "opts": "A) Always prohibited under Standard III(A) — dealing commission must be kept by the broker\nB) Acceptable under Standard III(A) provided the research service benefits the clients whose commission was used\nC) Only permitted if the client provides written consent\nD) Prohibited regardless of who benefits from the research", "ans": "B — Standard III(A) permits 'soft commission' arrangements (using dealing commission to purchase research or services) provided those goods/services benefit the clients whose commission was used."}, {"q": "An analyst is asked to recommend a company's shares. She personally holds a significant stake in that company. Under Standard VI(A), she should:", "opts": "A) Refuse to cover the company entirely\nB) Issue the recommendation without mentioning her stake\nC) Disclose her personal holding before issuing any recommendation, allowing clients to assess her objectivity\nD) Transfer her shares to a family member first", "ans": "C — Standard VI(A) requires full disclosure of conflicts of interest so that clients can evaluate the objectivity of the advice. Disclosure, not necessarily divestment, is required."}]}]}]}, {"id": 3, "title": "The Regulation of Financial Markets and Institutions", "shortTitle": "Ch3: Regulation", "questions": "25–35", "color": "#10b981", "sections": [{"id": "3.1", "title": "UK Regulation", "points": [{"id": "3.1.1", "text": "Describe and distinguish between the roles of the Financial Conduct Authority (FCA), Prudential Regulation Authority (PRA), Bank of England, Financial Policy Committee and HM Treasury", "explanation": "<p>The UK has a <strong>twin-peaks</strong> regulatory model with three main bodies:</p>\n<ul>\n  <li><strong>Financial Policy Committee (FPC)</strong>: A committee of the Bank of England. Monitors and responds to systemic risks to the UK financial system as a whole (macro-prudential regulation). Has powers of direction over both the FCA and PRA.</li>\n  <li><strong>Financial Conduct Authority (FCA)</strong>: Overseen by HM Treasury. Responsible for <strong>conduct regulation</strong> of all FCA-authorised firms — banks, insurers, investment firms. Focuses on how firms treat customers and how markets operate.</li>\n  <li><strong>Prudential Regulation Authority (PRA)</strong>: A legal entity within the Bank of England. Responsible for <strong>prudential regulation</strong> of banks, building societies, credit unions, insurers and large investment firms. Core objective: promote safety and soundness of regulated firms.</li>\n</ul>\n<p>Dual-regulated firms (e.g. large banks, insurers) are regulated by <em>both</em> the FCA (conduct) and the PRA (prudential). Solo-regulated firms (e.g. most investment firms) are regulated by the FCA only.</p>", "keypoints": ["FPC: Bank of England committee; monitors whole-system (macro-prudential) stability; directs FCA and PRA", "FCA: conduct regulator of all authorised firms; overseen by HM Treasury", "PRA: prudential regulator of banks, insurers and large investment firms; within Bank of England", "Twin-peaks model: dual-regulated firms (banks/insurers) supervised by both FCA and PRA", "Solo-regulated firms (most investment firms): FCA only"], "questions": [{"q": "Which body is responsible for macro-prudential regulation — monitoring risks to the financial system as a whole?", "opts": "A) The FCA\nB) The PRA\nC) The Financial Policy Committee (FPC)\nD) HM Treasury", "ans": "C — The FPC (a committee of the Bank of England) is responsible for macro-prudential regulation and monitoring systemic risk across the whole financial system."}, {"q": "A large UK bank is subject to regulation by both the FCA and PRA. The FCA's role in this context is:", "opts": "A) Prudential regulation — ensuring the bank holds sufficient capital\nB) Conduct regulation — how the bank treats its customers and operates in markets\nC) Setting monetary policy via interest rates\nD) Approving all bank mergers", "ans": "B — The FCA handles conduct regulation (how firms treat customers, market integrity). The PRA handles prudential regulation (capital, safety and soundness)."}]}, {"id": "3.1.2", "text": "Explain the different roles of the FCA and PRA for dual-regulated investment firms", "explanation": "<p>For <strong>dual-regulated firms</strong> (mainly banks, building societies and insurers), both the FCA and PRA have distinct and complementary roles:</p>\n<ul>\n  <li><strong>PRA role</strong>: Prudential supervision — ensures firms maintain adequate capital, liquidity and risk management systems. Objective: prevent firm failure and protect depositors/policyholders. Makes rules on capital requirements, liquidity ratios, leverage limits.</li>\n  <li><strong>FCA role</strong>: Conduct supervision — ensures firms treat customers fairly, provide suitable advice, operate with market integrity, comply with conduct-of-business rules. Makes rules on financial promotions, suitability, complaints handling.</li>\n</ul>\n<p>The PRA is the <strong>lead regulator</strong> for dual-regulated firms in terms of authorisation decisions. However, the FCA retains full conduct oversight. Both regulators can take enforcement action independently.</p>\n<p>Example: a bank must comply with PRA capital rules AND FCA conduct rules on how it sells mortgage products to retail customers.</p>", "keypoints": ["PRA: prudential oversight of dual-regulated firms (capital, liquidity, risk management, solvency)", "FCA: conduct oversight (customer treatment, suitability, financial promotions, complaints)", "PRA is lead regulator for authorisation of dual-regulated firms", "Both can independently enforce their respective rules"], "questions": [{"q": "A dual-regulated insurance firm is found to have insufficient capital reserves AND to have mis-sold products to retail customers. Which regulator addresses each issue?", "opts": "A) FCA handles both\nB) PRA handles capital; FCA handles mis-selling\nC) FCA handles capital; PRA handles mis-selling\nD) PRA handles both", "ans": "B — The PRA addresses prudential issues (insufficient capital). The FCA addresses conduct issues (mis-selling to retail customers)."}]}, {"id": "3.1.3", "text": "Explain the scope of the Financial Services and Markets Act (FSMA) 2000 (as amended)", "explanation": "<p>The <strong>Financial Services and Markets Act 2000 (FSMA 2000)</strong>, as amended by the Financial Services Act 2012, is the cornerstone of UK financial regulation.</p>\n<p>Key provision: <em>\"No person may carry on a regulated activity in the UK, unless he is either <strong>authorised</strong> or <strong>exempt</strong>.\"</em></p>\n<p><strong>Two types of authorisation:</strong></p>\n<ul>\n  <li>FSMA Part 4A permission (granted by FCA/PRA)</li>\n  <li>Authorisation in another EEA member state under MiFID (passporting — pre-Brexit)</li>\n</ul>\n<p><strong>Criminal offences under FSMA include:</strong></p>\n<ul>\n  <li>Carrying on unauthorised investment business</li>\n  <li>Issuing an unapproved financial promotion</li>\n  <li>Failing to co-operate with / misleading the FCA</li>\n</ul>\n<p><strong>Criminal offence under Financial Services Act 2012 (Section 91):</strong></p>\n<ul>\n  <li>Making false or misleading statements (including in relation to benchmarks such as LIBOR)</li>\n</ul>", "keypoints": ["FSMA 2000: no person may carry on a regulated activity unless authorised or exempt", "Two types of authorisation: Part 4A permission (FCA/PRA) or EEA passport", "Criminal: carrying on unauthorised investment business", "Criminal: issuing unapproved financial promotion; misleading/not co-operating with FCA", "FSA 2012 s91: criminal offence to make false/misleading statements (including re: benchmarks like LIBOR)"], "questions": [{"q": "Under FSMA 2000, what happens if a firm carries on regulated investment business without authorisation?", "opts": "A) It receives a civil fine only\nB) It commits a criminal offence\nC) It must simply apply for retrospective authorisation\nD) Nothing — regulation is voluntary", "ans": "B — Carrying on a regulated activity without authorisation or exemption is a criminal offence under FSMA 2000."}]}, {"id": "3.1.4", "text": "Explain the scope of the Regulated Activities Order 2001 (as amended) in terms of regulated activities and specified investments", "explanation": "<p>The <strong>Regulated Activities Order 2001 (RAO)</strong> defines which activities and investments are subject to FSMA regulation.</p>\n<p><strong>Specified investments</strong> include:</p>\n<ul>\n  <li>All investment instruments and rights to those instruments</li>\n  <li>Provision of credit, mortgages and buy-to-let</li>\n  <li><strong>Excluded</strong>: land, antiques, physical commodities (not derivatives on them)</li>\n</ul>\n<p><strong>Regulated activities</strong> include:</p>\n<ul>\n  <li>Accepting deposits</li>\n  <li>Issuing electronic money</li>\n  <li>Effecting/administering/performing contracts of insurance</li>\n  <li>Dealing in investments as principal or agent; arranging deals; advising on investments</li>\n  <li>Managing investments/portfolios</li>\n  <li>Operating an MTF or OTF</li>\n</ul>\n<p><strong>Exempt persons</strong>: appointed representatives, RIEs, RCHs, members of a designated professional body (DPB) carrying on incidental investment business, members of Lloyd's.</p>", "keypoints": ["RAO defines 'specified investments' and 'regulated activities' caught by FSMA", "Specified investments: all investment instruments, credit/mortgages; excludes land, antiques, physical commodities", "Regulated activities include: accepting deposits, dealing, arranging, advising, managing, operating MTF/OTF", "Exempt persons: appointed representatives, RIEs, RCHs, DPB members doing incidental business, Lloyd's members"], "questions": [{"q": "Which of the following is NOT a 'specified investment' under the RAO?", "opts": "A) A corporate bond\nB) A unit in a collective investment scheme\nC) Physical gold bullion\nD) A share option", "ans": "C — Physical commodities (such as gold bullion) are excluded from specified investments under the RAO. However, a derivative on gold would be included."}]}, {"id": "3.1.5", "text": "Explain the function of the following bodies/persons: the Payments Systems Regulator (PSR), the Competition and Markets Authority (CMA), and the Information Commissioner's Office (ICO)", "explanation": "<p><strong>Payment Systems Regulator (PSR)</strong>: The economic regulator for payment systems in the UK. Regulates designated payment systems including BACS, CHAPS, Faster Payments Service (FPS), LINK, MasterCard and Visa Europe. Aims to promote competition, innovation and the interests of service users in payment systems.</p>\n<p><strong>Competition and Markets Authority (CMA)</strong>: Acts as an independent competition authority. Under the Digital Markets, Competition and Consumers Act (2024):</p>\n<ul>\n  <li>Investigates mergers where target turnover ≥ £100m OR merged company controls >25% of UK market</li>\n  <li>New 'acquirer test': existing share of supply ≥33% in UK AND UK turnover ≥ £350m (no increment in share required)</li>\n  <li>Can prohibit mergers causing 'substantial lessening of competition' or impose remedies</li>\n</ul>\n<p><strong>Information Commissioner's Office (ICO)</strong>: Enforces GDPR. Fines up to €20m or 4% of global annual turnover (whichever greater). Breaches must be notified within 72 hours. Six GDPR data principles apply.</p>", "keypoints": ["PSR: regulates UK payment systems (BACS, CHAPS, FPS, LINK, MasterCard, Visa Europe)", "CMA: independent competition authority; investigates mergers (>£100m turnover OR >25% UK market)", "CMA new acquirer test: ≥33% share of supply AND ≥£350m UK turnover (no increment required)", "CMA can prohibit mergers causing substantial lessening of competition", "ICO: enforces GDPR; fines up to €20m or 4% global turnover; breaches reported within 72 hours"], "questions": [{"q": "A merger would result in the combined company controlli
