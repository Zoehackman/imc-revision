function tick(ptId, chId, cb) {
  var done = getDone(chId);
  done = cb.checked ? done.concat([ptId]).filter(function(v,i,a){return a.indexOf(v)===i;}) : done.filter(function(d){return d!==ptId;});
  saveDone(chId, done);
  document.getElementById('c-'+ptId).classList.toggle('done', cb.checked);
  updCh(chId); updAll();
}
function updCh(id) {
  var done=getDone(id), tot=totalPts(id), pct=tot?Math.round(done.length/tot*100):0;
  var f=document.getElementById('pf-'+id); if(f)f.style.width=pct+'%';
  var p=document.getElementById('pp-'+id); if(p)p.textContent=pct+'%';
  var c=document.getElementById('pc-'+id); if(c)c.textContent=done.length+'/'+tot+' revised';
}
function updAll() {
  var d=0,t=0;
  CHAPTERS.forEach(function(ch){d+=getDone(ch.id).length;t+=totalPts(ch.id);});
  var pct=t?Math.round(d/t*100):0;
  document.getElementById('overall-pct').textContent=pct+'%';
  document.getElementById('overall-fill').style.width=pct+'%';
  document.getElementById('overall-count').textContent=d+'/'+t;
}

// ── Image upload ───────────────────────────────────────────────────────────
function addImgs(chId) {
  uploadCh = chId;
  var inp = document.getElementById('img-input');
  inp.onchange = function(e) {
    var files = Array.from(e.target.files);
    var imgs = getImgs(chId); var n = 0;
    files.forEach(function(f) {
      var r = new FileReader();
      r.onload = function(ev) {
        imgs.push(ev.target.result);
        if (++n === files.length) { saveImgs(chId,imgs); refreshImgs(chId,imgs); }
      };
      r.readAsDataURL(f);
    });
    e.target.value = '';
  };
  inp.click();
}
function delImg(chId,i){ var imgs=getImgs(chId); imgs.splice(i,1); saveImgs(chId,imgs); refreshImgs(chId,imgs); }
function refreshImgs(chId,imgs) {
  var g=document.getElementById('ig-'+chId); if(g)g.innerHTML=renderImgs(imgs,chId);
  toast('✅ Images updated');
}

// ── Test mode ──────────────────────────────────────────────────────────────
function openTest(chId) {
  testImgs=getImgs(chId); testIdx=0;
  var ch=CHAPTERS.find(function(c){return c.id===chId;});
  document.getElementById('test-title').textContent='Test Mode — '+ch.shortTitle;
  drawTest(); document.getElementById('test-modal').classList.add('open');
}
function drawTest() {
  var body=document.getElementById('test-body');
  if(!testImgs.length){body.innerHTML='<div class="test-empty">No images uploaded for this chapter yet.</div>';return;}
  body.innerHTML='<img id="test-img" src="'+testImgs[testIdx]+'">' +
    '<div class="test-nav">' +
      '<button onclick="stepTest(-1)" '+(testIdx===0?'disabled':'')+'>◀ Prev</button>' +
      '<span class="test-ctr">'+(testIdx+1)+' / '+testImgs.length+'</span>' +
      '<button onclick="stepTest(1)" '+(testIdx===testImgs.length-1?'disabled':'')+'>Next ▶</button>' +
    '</div>';
}
function stepTest(d){testIdx=Math.max(0,Math.min(testImgs.length-1,testIdx+d));drawTest();}
function closeTest(){document.getElementById('test-modal').classList.remove('open');}

// ── Lightbox / Toast ───────────────────────────────────────────────────────
function openLb(src){document.getElementById('lb-img').src=src;document.getElementById('lb').classList.add('open');}
function closeLb(){document.getElementById('lb').classList.remove('open');}
function toast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2600);
}

// Quiz persistent setup state
var qzSetup = {
  chapters: [1,2,3,4,5,6],
  mode: 'all',     // 'all' | 'wrong'
  count: 'all',    // 'all' | '20' | '30' | '85'
  shuffle: false
};

// Quiz session state (reset per quiz)
var qzSess = {
  questions: [],
  current: 0,
  answered: 0,
  correct: 0,
  results: {}   // key: chId+'_'+origIdx → 'correct'|'wrong'|'guessed'
};

// Count wrong+guessed across selected chapters
function qzCountWrong(chIds) {
  var n = 0;
  for (var ci = 0; ci < chIds.length; ci++) {
    var qs = QUIZ_DATA[chIds[ci]] || [];
    for (var i = 0; i < qs.length; i++) {
      var r = getQResult(chIds[ci], i);
      if (r === 'wrong' || r === 'guessed') n++;
    }
  }
  return n;
}

function qzCountAll(chIds) {
  var n = 0;
  for (var ci = 0; ci < chIds.length; ci++) n += (QUIZ_DATA[chIds[ci]]||[]).length;
  return n;
}

function qzCountPracticed(chIds) {
  var n = 0;
  for (var ci = 0; ci < chIds.length; ci++) {
    var qs = QUIZ_DATA[chIds[ci]] || [];
    for (var i = 0; i < qs.length; i++) {
      if (getQResult(chIds[ci], i)) n++;
    }
  }
  return n;
}

// Open quiz tab pre-set to a specific chapter
function openQuizForChapter(chId) {
  qzSetup.chapters = [chId];
  switchTab('quiz');
}

// Render setup screen
function qzRenderSetup() {
  var chIds = qzSetup.chapters;
  var wrongCount = qzCountWrong(chIds);
  var allCount = qzCountAll(chIds);
  var practiced = qzCountPracticed(chIds);

  var chipsHtml = CHAPTERS.map(function(ch) {
    var isOn = chIds.indexOf(ch.id) > -1;
    var qn = (QUIZ_DATA[ch.id]||[]).length;
    var style = isOn
      ? 'background:'+ch.color+';color:#fff;border-color:'+ch.color
      : 'border-color:'+ch.color+'40;color:'+ch.color;
    return '<button class="qz-chip ' + (isOn?'on':'') + '" style="'+style+'" onclick="qzToggleCh('+ch.id+')">' +
      ch.shortTitle + ' <small style="opacity:.7">('+qn+'Q)</small>' +
    '</button>';
  }).join('');

  var setupHtml =
    '<div class="qz-card">' +
      '<h2>🎯 Practice Quiz</h2>' +

      '<div class="qz-sec">' +
        '<div class="qz-sec-title">Select Chapters</div>' +
        '<div class="qz-chips">' + chipsHtml + '</div>' +
        '<div style="margin-top:8px">' +
          '<button class="qz-small-btn" onclick="qzAllChs()">All Chapters</button>' +
        '</div>' +
      '</div>' +

      '<div class="qz-sec">' +
        '<div class="qz-sec-title">Question Set</div>' +
        '<label class="qz-radio-label">' +
          '<input type="radio" name="qzmode" value="all" ' + (qzSetup.mode==='all'?'checked':'') + ' onchange="qzSetup.mode=\'all\'">' +
          'All Questions' +
          '<span style="font-size:.73rem;color:var(--muted);margin-left:4px">('+allCount+' available)</span>' +
        '</label>' +
        '<label class="qz-radio-label">' +
          '<input type="radio" name="qzmode" value="wrong" ' + (qzSetup.mode==='wrong'?'checked':'') + ' onchange="qzSetup.mode=\'wrong\'">' +
          'Wrong / Guessed Only' +
          (wrongCount>0?'<span class="qz-wrong-pill">'+wrongCount+' to review</span>':'<span style="font-size:.73rem;color:var(--muted);margin-left:5px">none yet</span>') +
        '</label>' +
      '</div>' +

      '<div class="qz-sec">' +
        '<div class="qz-sec-title">Number of Questions</div>' +
        '<label class="qz-radio-label"><input type="radio" name="qzcount" value="all" '+(qzSetup.count==='all'?'checked':'')+' onchange="qzSetup.count=\'all\'"> All Available</label>' +
        '<div class="qz-count-grid">' +
          '<label class="qz-radio-label"><input type="radio" name="qzcount" value="20" '+(qzSetup.count==='20'?'checked':'')+' onchange="qzSetup.count=\'20\'"> 20 Questions</label>' +
          '<label class="qz-radio-label"><input type="radio" name="qzcount" value="30" '+(qzSetup.count==='30'?'checked':'')+' onchange="qzSetup.count=\'30\'"> 30 Questions</label>' +
        '</div>' +
        '<label class="qz-radio-label" style="border-color:#6366f180;background:#f5f3ff">' +
          '<input type="radio" name="qzcount" value="85" '+(qzSetup.count==='85'?'checked':'')+' onchange="qzSetup.count=\'85\'"> 85 Questions — 📝 Mock Exam (proportional per chapter)' +
        '</label>' +
      '</div>' +

      '<div class="qz-sec">' +
        '<div class="qz-sec-title">Options</div>' +
        '<label class="qz-radio-label">' +
          '<input type="checkbox" id="qz-shuffle-cb" ' + (qzSetup.shuffle?'checked':'') + ' onchange="qzSetup.shuffle=this.checked">' +

        '<div class="qz-stats-item">To review: <span style="color:' + (wrongCount>0?'#dc2626':'#16a34a') + '">' + wrongCount + '</span></div>' +
      '</div>' +

// Toggle a chapter in the setup
function qzToggleCh(chId) {
  var idx = qzSetup.chapters.indexOf(chId);
  if (idx > -1) {
    if (qzSetup.chapters.length > 1) qzSetup.chapters.splice(idx, 1);
  } else {
    qzSetup.chapters.push(chId);
    qzSetup.chapters.sort(function(a,b){return a-b;});
  }
  qzRenderSetup();
}

function qzAllChs() {
  qzSetup.chapters = [1,2,3,4,5,6];
  qzRenderSetup();
}

// ── Build question list ────────────────────────────────────────────────────
function qzBuildQuestions() {
  var chIds = qzSetup.chapters;
  var mode = document.querySelector('input[name="qzmode"]:checked');
  var countEl = document.querySelector('input[name="qzcount"]:checked');
  var shuffleCb = document.getElementById('qz-shuffle-cb');

  qzSetup.mode = mode ? mode.value : qzSetup.mode;
  qzSetup.count = countEl ? countEl.value : qzSetup.count;
  qzSetup.shuffle = shuffleCb ? shuffleCb.checked : qzSetup.shuffle;

  var all = [];
  for (var ci = 0; ci < chIds.length; ci++) {
    var chId = chIds[ci];
    var qs = QUIZ_DATA[chId] || [];
    for (var qi = 0; qi < qs.length; qi++) {
      var q = qs[qi];
      var r = getQResult(chId, qi);
      if (qzSetup.mode === 'wrong') {
        if (r === 'wrong' || r === 'guessed') {
          all.push({chId:chId, origIdx:qi, q:q.q, opts:q.opts,
                    ans_letter:q.ans_letter, ans_full:q.ans_full, pointId:q.id});
        }
      } else {
        all.push({chId:chId, origIdx:qi, q:q.q, opts:q.opts,
                  ans_letter:q.ans_letter, ans_full:q.ans_full, pointId:q.id});
      }
    }
  }

  if (qzSetup.shuffle) all.sort(function(){return Math.random()-.5;});

  if (qzSetup.count === '85') {
    all = qzMockSelect(all);
  } else if (qzSetup.count === '20') {
    all = all.slice(0, 20);
  } else if (qzSetup.count === '30') {
    all = all.slice(0, 30);
  }

  return all;
}

function qzMockSelect(allQs) {
  var result = [];
  var chIds = qzSetup.chapters;
  for (var ci = 0; ci < chIds.length; ci++) {
    var chId = chIds[ci];
    var alloc = MOCK_ALLOC[chId] || 0;
    var chQs = allQs.filter(function(q){return q.chId===chId;});
    var take = Math.min(alloc, chQs.length);
    for (var i = 0; i < take; i++) result.push(chQs[i]);
  }
  if (qzSetup.shuffle) result.sort(function(){return Math.random()-.5;});
  return result.slice(0, 85);
}

// ── Start quiz ─────────────────────────────────────────────────────────────
function qzStart() {
  var qs = qzBuildQuestions();
  if (qs.length === 0) {
    toast(qzSetup.mode==='wrong' ? '✅ No wrong answers to review — great work!' : '⚠️ No questions available for selected chapters');
    return;
  }
  qzSess = { questions: qs, current: 0, answered: 0, correct: 0, results: {} };
  document.getElementById('qz-setup').style.display = 'none';
  document.getElementById('qz-session').style.display = 'block';
  document.getElementById('qz-results').style.display = 'none';
  qzRenderQuestion();
}

// ── Render question ────────────────────────────────────────────────────────
function qzRenderQuestion() {
  var q = qzSess.questions[qzSess.current];
  var total = qzSess.questions.length;
  var num = qzSess.current + 1;
  var ch = CHAPTERS.find(function(c){return c.id===q.chId;}) || {};
  var color = ch.color || '#6366f1';
  var pct = Math.round((qzSess.current / total) * 100);

  var L = ['A','B','C','D','E'];
  var optsHtml = q.opts.map(function(opt, i) {
    var m = opt.match(/^([A-E])\)/);
    var letter = m ? m[1] : L[i];
    var text = opt.replace(/^[A-E]\)\s*/, '');
    return '<button class="qz-ans-btn" data-letter="'+letter+'" onclick="qzSelectAnswer(\''+letter+'\',this)">' +
      '<span class="qz-ans-letter">'+letter+'</span>' +
      '<span>'+text+'</span>' +
    '</button>';
  }).join('');

  var sessEl = document.getElementById('qz-session');
  sessEl.innerHTML =
    '<div class="qz-sess-topbar">' +
      '<button class="qz-back-btn" onclick="qzBackToSetup()">← Setup</button>' +
      '<span class="qz-q-counter">Q '+num+' / '+total+'</span>' +
      '<span class="qz-score-pill" id="qz-score-pill">'+qzSess.correct+'/'+qzSess.answered+' correct</span>' +
    '</div>' +
    '<div class="qz-prog-track"><div class="qz-prog-fill" style="width:'+pct+'%"></div></div>' +
    '<div class="qz-q-card">' +
      '<div class="qz-q-meta">' +
        '<span class="qz-q-tag" style="background:'+color+'20;color:'+color+'">'+q.pointId+'</span>' +
        '<span class="qz-q-ch-name" style="color:'+color+'">'+(ch.shortTitle||'')+'</span>' +
      '</div>' +
      '<div class="qz-q-text">'+q.q+'</div>' +
      '<div class="qz-ans-list" id="qz-ans-list">'+optsHtml+'</div>' +
      '<div class="qz-feedback" id="qz-feedback"></div>' +
      '<div class="qz-next-row" id="qz-next-row" style="display:none">' +
        '<button class="qz-next-btn" onclick="qzNext()">' +
          (num < total ? 'Next Question →' : 'See Results') +
        '</button>' +
      '</div>' +
    '</div>';
}

// ── Select answer ──────────────────────────────────────────────────────────
function qzSelectAnswer(letter, btnEl) {
  var q = qzSess.questions[qzSess.current];
  var isOk = letter === q.ans_letter;

  // Lock all answer buttons
  var btns = document.querySelectorAll('.qz-ans-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].disabled = true;
    var l = btns[i].dataset.letter;
    if (l === q.ans_letter) btns[i].classList.add('qz-correct');
    else if (l === letter && !isOk) btns[i].classList.add('qz-wrong');
  }

  // Save result
  var result = isOk ? 'correct' : 'wrong';
  saveQResult(q.chId, q.origIdx, result);
  var key = q.chId + '_' + q.origIdx;
  qzSess.results[key] = result;
  qzSess.answered++;
  if (isOk) qzSess.correct++;

  // Update score
  document.getElementById('qz-score-pill').textContent = qzSess.correct+'/'+qzSess.answered+' correct';

  // Build explanation text
  var expText = q.ans_full ? q.ans_full.replace(/^[A-EX] — /, '') : '';

  // Show feedback
  var fbEl = document.getElementById('qz-feedback');
  if (isOk) {
    fbEl.className = 'qz-feedback qz-fb-ok';
    fbEl.innerHTML =
      '<div class="qz-fb-result">✅ Correct!</div>' +
      (expText ? '<div class="qz-fb-exp">'+expText+'</div>' : '') +
      '<div class="qz-guess-wrap">' +
        '<label class="qz-guess-label">' +
          '<input type="checkbox" onchange="qzToggleGuess(this)">' +
          'I guessed this — mark for review' +
        '</label>' +
      '</div>';
  } else {
    fbEl.className = 'qz-feedback qz-fb-bad';
    fbEl.innerHTML =
      '<div class="qz-fb-result">❌ Incorrect — correct answer: ' + q.ans_letter + '</div>' +
      (expText ? '<div class="qz-fb-exp">'+expText+'</div>' : '');
  }
  fbEl.style.display = 'block';
  document.getElementById('qz-next-row').style.display = 'flex';
}

// ── Toggle guess ───────────────────────────────────────────────────────────
function qzToggleGuess(cb) {
  var q = qzSess.questions[qzSess.current];
  var key = q.chId + '_' + q.origIdx;
  if (cb.checked) {
    saveQResult(q.chId, q.origIdx, 'guessed');
    qzSess.results[key] = 'guessed';
    qzSess.correct--;
  } else {
    saveQResult(q.chId, q.origIdx, 'correct');
    qzSess.results[key] = 'correct';
    qzSess.correct++;
  }
  document.getElementById('qz-score-pill').textContent = qzSess.correct+'/'+qzSess.answered+' correct';
}

// ── Next question ──────────────────────────────────────────────────────────
function qzNext() {
  if (qzSess.current >= qzSess.questions.length - 1) {
    qzShowResults();
    return;
  }
  qzSess.current++;
  qzRenderQuestion();
  window.scrollTo(0, 0);
}

function qzBackToSetup() {
  qzRenderSetup();
  renderTabs(); // refresh wrong count in tab bar
}

// ── Results screen ─────────────────────────────────────────────────────────
function qzShowResults() {
  document.getElementById('qz-session').style.display = 'none';
  document.getElementById('qz-results').style.display = 'block';

  var total = qzSess.questions.length;
  var correct = qzSess.correct;
  var pct = total > 0 ? Math.round(correct/total*100) : 0;
  var scoreColor = pct>=70 ? '#16a34a' : pct>=50 ? '#f59e0b' : '#dc2626';
  var emoji = pct>=70 ? '🎉' : pct>=50 ? '📚' : '💪';
  var msg = pct>=70 ? 'Excellent work! Keep it up!' : pct>=50 ? 'Good effort — keep practising!' : 'Review the material and try again.';

  // Chapter breakdown
  var chBreak = {};
  for (var qi = 0; qi < qzSess.questions.length; qi++) {
    var q = qzSess.questions[qi];
    if (!chBreak[q.chId]) chBreak[q.chId] = {correct:0,total:0};
    chBreak[q.chId].total++;
    var r = qzSess.results[q.chId+'_'+q.origIdx];
    if (r === 'correct') chBreak[q.chId].correct++;
  }

  var chIds = Object.keys(chBreak);
  var breakdownHtml = '';
  if (chIds.length > 1) {
    var rows = chIds.map(function(id) {
      var ch = CHAPTERS.find(function(c){return c.id===parseInt(id);}) || {};
      var data = chBreak[id];
      var p = data.total>0 ? Math.round(data.correct/data.total*100) : 0;
      return '<div class="qz-bd-row">' +
        '<span class="qz-bd-label" style="color:'+(ch.color||'#333')+'">'+(ch.shortTitle||'Ch'+id)+'</span>' +
        '<div class="qz-bd-bar"><div class="qz-bd-bar-fill" style="width:'+p+'%;background:'+(ch.color||'#6366f1')+'"></div></div>' +
        '<span class="qz-bd-score">'+data.correct+'/'+data.total+'</span>' +
      '</div>';
    }).join('');
    breakdownHtml = '<div class="qz-breakdown"><h3>Chapter Breakdown</h3>' + rows + '</div>';
  }

  // Count wrong in this session
  var sessionWrong = 0;
  var keys = Object.keys(qzSess.results);
  for (var ki = 0; ki < keys.length; ki++) {
    var rv = qzSess.results[keys[ki]];
    if (rv === 'wrong' || rv === 'guessed') sessionWrong++;
  }

  document.getElementById('qz-results').innerHTML =
    '<div class="qz-results-card">' +
      '<div class="qz-res-emoji">'+emoji+'</div>' +
      '<h2>Quiz Complete!</h2>' +
      '<div class="qz-big-score" style="color:'+scoreColor+'">'+correct+'/'+total+'</div>' +
      '<div class="qz-res-pct">'+pct+'% — '+msg+'</div>' +
      '<div class="qz-res-prog-track"><div class="qz-res-prog-fill" style="width:'+pct+'%;background:'+scoreColor+'"></div></div>' +
      breakdownHtml +
      (sessionWrong>0?'<div class="qz-review-note">📌 '+sessionWrong+' question'+(sessionWrong>1?'s':'')+' marked for review</div>':'') +
      '<div class="qz-res-btns">' +
        (sessionWrong>0?'<button class="qz-rbtn qz-rbtn-wrong" onclick="qzRetryWrong()">📖 Practice Wrong Answers ('+sessionWrong+')</button>':'') +
        '<button class="qz-rbtn qz-rbtn-new" onclick="qzNewQuiz()">New Quiz</button>' +
        '<button class="qz-rbtn qz-rbtn-chapters" onclick="qzBackToSetup()">← Change Settings</button>' +
      '</div>' +
    '</div>';

  renderTabs(); // refresh wrong count badge
  window.scrollTo(0,0);
}

function qzRetryWrong() {
  qzSetup.mode = 'wrong';
  qzSetup.count = 'all';
  qzStart();
}

function qzNewQuiz() {
  qzSetup.mode = 'all';
  qzSetup.count = 'all';
  qzRenderSetup();
}

// ── Init ───────────────────────────────────────────────────────────────────
renderTabs();
renderPanels();
CHAPTERS.forEach(function(ch){updCh(ch.id);}); updAll();

// Set sticky tab offset
function setHdrH(){
  var h=document.getElementById('hdr');
  if(h) document.documentElement.style.setProperty('--hdr-h', h.offsetHeight+'px');
}
setHdrH();
window.addEventListener('resize', setHdrH);

// Init quiz setup if quiz tab is active
if (activeCh === 'quiz') qzRenderSetup();
</script>
</body>
</html>
