"color": "#14b8a6", "sections": [{"id": "6.1", "title": "The UK Tax System and the Taxation of Investments", "points": [{"id": "6.1.1", "text": "Describe the principles of income tax applicable to earnings, savings and investment income in the UK", "explanation": "<p><strong>Income Tax — Principles</strong></p>\n<p>Income tax is paid on income received during a <strong>tax year</strong> (fiscal year), which runs from <strong>6 April to 5 April</strong> (e.g. 2025/26: 6 April 2025 – 5 April 2026).</p>\n<p>Taxable income has three elements, taxed in this order:</p>\n<ol>\n  <li><strong>Non-savings income</strong> — salary, rental income, pension income. Taxed first.</li>\n  <li><strong>Non-dividend savings income</strong> — interest from bank accounts, corporate bonds. Most paid <em>gross</em>.</li>\n  <li><strong>Dividend income</strong> — dividends from shares. Paid <em>gross</em>. Taxed last.</li>\n</ol>\n<p><strong>Income tax rates (2025/26):</strong></p>\n<table style=\"width:100%;border-collapse:collapse;font-size:.88rem\">\n  <tr style=\"background:#f1f5f9\"><th style=\"padding:5px;border:1px solid #e2e8f0;text-align:left\">Band</th><th style=\"padding:5px;border:1px solid #e2e8f0\">Taxable Income</th><th style=\"padding:5px;border:1px solid #e2e8f0\">Non-savings/Savings</th><th style=\"padding:5px;border:1px solid #e2e8f0\">Dividends</th></tr>\n  <tr><td style=\"padding:5px;border:1px solid #e2e8f0\">Basic rate</td><td style=\"padding:5px;border:1px solid #e2e8f0\">Up to £37,700</td><td style=\"padding:5px;border:1px solid #e2e8f0\">20%</td><td style=\"padding:5px;border:1px solid #e2e8f0\">8.75%</td></tr>\n  <tr><td style=\"padding:5px;border:1px solid #e2e8f0\">Higher rate</td><td style=\"padding:5px;border:1px solid #e2e8f0\">£37,701–£125,140</td><td style=\"padding:5px;border:1px solid #e2e8f0\">40%</td><td style=\"padding:5px;border:1px solid #e2e8f0\">33.75%</td></tr>\n  <tr><td style=\"padding:5px;border:1px solid #e2e8f0\">Additional rate</td><td style=\"padding:5px;border:1px solid #e2e8f0\">Over £125,140</td><td style=\"padding:5px;border:1px solid #e2e8f0\">45%</td><td style=\"padding:5px;border:1px solid #e2e8f0\">39.35%</td></tr>\n</table>", "keypoints": ["Tax year: 6 April – 5 April (e.g. 2025/26)", "Three income types taxed in order: non-savings → savings → dividends", "Basic rate: 20% (non-savings/savings), 8.75% (dividends) — up to £37,700", "Higher rate: 40% / 33.75% — £37,701–£125,140", "Additional rate: 45% / 39.35% — over £125,140"], "questions": [{"q": "In what order is income taxed for UK income tax purposes?", "opts": "A) Dividends, then savings income, then non-savings income\nB) Non-savings income first, then savings income, then dividend income\nC) All income is taxed together at a single blended rate\nD) Savings income first, then non-savings, then dividends", "ans": "B — Income is taxed in a specific order: non-savings income first, then savings income, then dividend income. This affects which rate bands each type falls into."}, {"q": "A higher rate taxpayer receives dividend income. At what rate is it taxed?", "opts": "A) 20%\nB) 33.75%\nC) 39.35%\nD) 40%", "ans": "B — Higher rate taxpayers pay 33.75% on dividend income. The standard higher rate of 40% applies to non-savings and savings income, not dividends."}, {"q": "The UK tax year runs from:", "opts": "A) 1 January to 31 December\nB) 1 April to 31 March\nC) 6 April to 5 April the following year\nD) 1 March to 28 February", "ans": "C — The UK tax year (fiscal year) runs from 6 April to 5 April the following year."}]}, {"id": "6.1.2", "text": "Describe, in relation to income tax, the system of allowances, reliefs and priorities for taxing income", "explanation": "<p><strong>Income Tax Allowances and Reliefs</strong></p>\n<p><strong>Personal allowance:</strong> £12,570 — tapered by £1 for every £2 of income over £100,000; completely lost at £125,140.</p>\n<p><strong>Savings income allowance (Personal Savings Allowance):</strong></p>\n<ul>\n  <li>Basic rate taxpayers: <strong>£1,000</strong></li>\n  <li>Higher rate taxpayers: <strong>£500</strong></li>\n  <li>Additional rate taxpayers: <strong>£0</strong> (no allowance)</li>\n</ul>\n<p><strong>Dividend allowance:</strong> <strong>£500</strong> for all taxpayers.</p>\n<p><strong>Income tax reliefs:</strong></p>\n<ul>\n  <li><strong>Pension contributions</strong> — relief at marginal rate, up to the <em>higher of</em>: earnings (capped at £60,000 annual allowance) or £3,600 (for non-taxpayers). Tapered for income over £260,000 — allowance reduces by £1/£2 until minimum of £10,000.</li>\n  <li><strong>Gift Aid donations to charity</strong> — basic rate relief given at source; higher/additional rate taxpayers claim extra relief via self-assessment.</li>\n</ul>", "keypoints": ["Personal allowance: £12,570; tapered £1/£2 over £100,000; lost at £125,140", "Savings allowance: basic rate = £1,000; higher rate = £500; additional rate = £0", "Dividend allowance: £500 for ALL taxpayers", "Pension relief: marginal rate on contributions up to higher of earnings or £3,600 (cap £60,000)", "Pension taper: annual allowance reduces by £1/£2 over £260,000; minimum £10,000"], "questions": [{"q": "An additional rate taxpayer receives £3,000 of savings interest. How much Personal Savings Allowance can they use?", "opts": "A) £1,000\nB) £500\nC) £250\nD) £0", "ans": "D — Additional rate taxpayers receive no Personal Savings Allowance. All their savings income is taxable."}, {"q": "At what level of income does a UK taxpayer lose their personal allowance entirely?", "opts": "A) £100,000\nB) £112,570\nC) £125,140\nD) £150,000", "ans": "C — The personal allowance is tapered at £1 for every £2 over £100,000 and is completely withdrawn when income reaches £125,140."}, {"q": "What is the annual dividend allowance available to a higher rate taxpayer?", "opts": "A) £2,000\nB) £1,000\nC) £500\nD) £0", "ans": "C — The dividend allowance is £500 for ALL taxpayers regardless of their tax band."}, {"q": "An investor earning £290,000 contributes to a pension. What is the maximum annual allowance available to them?", "opts": "A) £60,000\nB) £45,000\nC) £10,000\nD) £3,600", "ans": "B — The pension annual allowance is tapered by £1 for every £2 of income over £260,000. Income is £290,000 — excess of £30,000 → allowance reduced by £15,000 → £60,000 − £15,000 = £45,000."}]}, {"id": "6.1.3", "text": "Explain the taxation of the income of trusts and beneficiaries", "explanation": "<p><strong>Taxation of Trust Income and Beneficiaries</strong></p>\n<p>The tax treatment depends on the <strong>type of trust</strong>:</p>\n<ul>\n  <li><strong>Bare trusts</strong> — income taxed on the beneficiary directly (as if they owned the assets outright). The trustee is ignored for tax purposes.</li>\n  <li><strong>Interest in possession trusts</strong> — income taxed on the life tenant (beneficiary with the current income interest) at their own marginal rate. Trustee pays basic rate tax first; higher rate beneficiaries pay additional tax via self-assessment.</li>\n  <li><strong>Discretionary trusts</strong> — taxed on the trustees. Income subject to the <em>trust rate</em>:\n    <ul>\n      <li>Dividends: <strong>39.35%</strong></li>\n      <li>Other income: <strong>45%</strong></li>\n    </ul>\n    A standard rate band of <strong>£1,000</strong> is taxed at basic/dividend rates. When income is distributed to beneficiaries, they receive a 45% tax credit and can reclaim if their marginal rate is lower.\n  </li>\n</ul>", "keypoints": ["Bare trust: beneficiary taxed directly at their own rates — trustee transparent for tax", "Interest in possession: life tenant taxed at their marginal rate; trustee deducts basic rate at source", "Discretionary trust: trustees pay trust rate — 45% on income, 39.35% on dividends", "Discretionary trust: standard rate band of £1,000 taxed at lower rates", "Distributions from discretionary trusts carry a 45% tax credit; beneficiaries reclaim if lower rate"], "questions": [{"q": "In a discretionary trust, at what rate is non-dividend income taxed on the trustees?", "opts": "A) 20%\nB) 40%\nC) 45%\nD) 39.35%", "ans": "C — Non-dividend income in a discretionary trust is taxed on the trustees at the trust rate of 45%. Dividend income is taxed at 39.35%."}, {"q": "A bare trust holds shares on behalf of a beneficiary. Who is liable for income tax on the dividends?", "opts": "A) The trustee at the trust rate of 39.35%\nB) The beneficiary at their own marginal tax rate\nC) The settlor at their marginal rate\nD) No tax is due — bare trusts are exempt", "ans": "B — In a bare trust, the beneficiary is treated as the direct owner for tax purposes and is taxed on income at their own marginal rate."}]}, {"id": "6.1.4", "text": "Describe the system of National Insurance contributions (NICs)", "explanation": "<p><strong>National Insurance Contributions (NICs)</strong></p>\n<p>NICs are paid by employed and self-employed people towards state benefits (state pension, certain welfare benefits).</p>\n<p><strong>Classes of NIC:</strong></p>\n<ul>\n  <li><strong>Class 1 (Employee)</strong> — on earnings from employment</li>\n  <li><strong>Class 1A (Employer)</strong> — on certain employee benefits in kind</li>\n  <li><strong>Class 1B (Employer)</strong> — when employer has a PAYE Settlement Agreement (PSA) with HMRC</li>\n  <li><strong>Class 2 (Self-employed)</strong> — effectively abolished from 6 April 2024 (may still apply for low profit years)</li>\n  <li><strong>Class 4 (Self-employed)</strong> — on profits above a threshold</li>\n  <li><strong>Class 3 (Voluntary)</strong> — to fill gaps in NIC record to qualify for state pension</li>\n</ul>\n<p>NICs are separate from income tax but are collected via PAYE for employees. They are not deductible for income tax purposes.</p>", "keypoints": ["Class 1: employee NICs on earnings", "Class 1A: employer NICs on benefits in kind; Class 1B: employer NICs under PSA", "Class 2: self-employed (effectively abolished April 2024); Class 4: self-employed on profits", "Class 3: voluntary contributions to fill NIC record gaps", "NICs fund state benefits (state pension, welfare) — collected via PAYE alongside income tax"], "questions": [{"q": "Which class of NIC is paid by an employer on certain employee benefits in kind?", "opts": "A) Class 1\nB) Class 1A\nC) Class 2\nD) Class 4", "ans": "B — Class 1A NICs are paid by employers on certain employee benefits in kind (e.g. company cars)."}, {"q": "A self-employed individual wants to fill a gap in their National Insurance record to qualify for a full state pension. Which class of NIC should they pay?", "opts": "A) Class 1\nB) Class 1B\nC) Class 3\nD) Class 4", "ans": "C — Class 3 NICs are voluntary contributions made to fill gaps in an individual's NIC record."}, {"q": "Which class of NIC did the government effectively abolish from 6 April 2024?", "opts": "A) Class 1\nB) Class 2\nC) Class 3\nD) Class 4", "ans": "B — Class 2 NICs (paid by the self-employed on a flat-rate basis) were effectively abolished from 6 April 2024."}]}, {"id": "6.1.5", "text": "Describe the principles of capital gains tax (CGT) in the UK", "explanation": "<p><strong>Capital Gains Tax (CGT) — Principles</strong></p>\n<p>CGT is paid on gains on <strong>chargeable assets</strong> disposed of during a tax year (e.g. shares, investment property, collectibles).</p>\n<p><strong>Exempt assets (no CGT):</strong> main home (PPR), cars, assets in ISAs, NS&I Certificates, betting/lottery winnings, UK gilts and most corporate debt, EIS/SEIS shares, foreign currency for personal use.</p>\n<p><strong>CGT rates:</strong></p>\n<ul>\n  <li>Basic rate taxpayers: <strong>18%</strong></li>\n  <li>Higher/additional rate taxpayers: <strong>24%</strong></li>\n  <li>Certain business assets (Entrepreneurs' Relief): <strong>14%</strong></li>\n</ul>\n<p><strong>Annual exempt amount:</strong> <strong>£3,000</strong></p>\n<p><strong>Deductions:</strong> capital losses in same year; annual exemption (£3,000); capital losses brought forward (can be carried indefinitely).</p>\n<p><strong>Planning strategies:</strong> spouse/civil partner transfer (assets can be transferred CGT-free between spouses); phased disposal (spread over multiple years); bed and breakfast (sell and repurchase after 30 days — 30-day rule).</p>", "keypoints": ["CGT on chargeable assets: shares, investment property, collectibles", "Exempt: main home, cars, ISAs, gilts/most corp debt, EIS/SEIS shares, NS&I certificates", "Rates: 18% (basic rate taxpayers), 24% (higher/additional), 14% (Entrepreneurs' Relief)", "Annual exempt amount: £3,000; losses offset in same year first, then carry forward indefinitely", "Planning: spouse transfer (CGT-free), phased disposal, bed & breakfast (30-day rule)"], "questions": [{"q": "A higher rate taxpayer sells shares at a gain. At what rate will they pay CGT?", "opts": "A) 10%\nB) 18%\nC) 24%\nD) 28%", "ans": "C — Higher and additional rate taxpayers pay CGT at 24% on most chargeable assets including shares."}, {"q": "Which of the following assets is EXEMPT from capital gains tax?", "opts": "A) Buy-to-let investment property\nB) Shares held outside an ISA\nC) UK government gilts\nD) A holiday home", "ans": "C — UK government gilts (and most corporate debt) are exempt from CGT. Investment property and shares outside ISAs are chargeable assets."}, {"q": "What is the CGT annual exempt amount for an individual?", "opts": "A) £6,000\nB) £3,000\nC) £12,300\nD) £10,000", "ans": "B — The CGT annual exempt amount is £3,000."}, {"q": "An investor sells shares realising a gain of £20,000. They have capital losses of £5,000 from the same year and £8,000 brought forward. What is the net chargeable gain before the annual exemption?", "opts": "A) £20,000\nB) £15,000\nC) £7,000\nD) £4,000", "ans": "B — Current year losses (£5,000) must be offset first: £20,000 − £5,000 = £15,000. Brought-forward losses are only used to the extent needed after the annual exemption is applied."}]}, {"id": "6.1.6", "text": "Describe the principles of inheritance tax (IHT) in the UK", "explanation": "<p><strong>Inheritance Tax (IHT) — Principles</strong></p>\n<p>IHT is paid on the excess of a deceased person's estate above the <strong>nil rate band</strong>.</p>\n<ul>\n  <li><strong>Nil rate band (NRB):</strong> £325,000</li>\n  <li><strong>Standard rate:</strong> 40% on excess above NRB</li>\n  <li><strong>Reduced rate:</strong> 36% if more than 10% of the estate is left to charity</li>\n  <li><strong>Lifetime rate:</strong> 20% on chargeable lifetime transfers (CLTs) in excess of the NRB</li>\n</ul>\n<p><strong>Key exemptions:</strong></p>\n<ul>\n  <li><strong>Potentially Exempt Transfers (PETs)</strong> — gifts to individuals (not trusts). Fully exempt if the donor survives <strong>7 years</strong>. Taper relief applies if donor survives 3–7 years.</li>\n  <li><strong>Spouse/civil partner transfers</strong> — 100% exempt (if domiciled in UK)</li>\n  <li><strong>Annual exemption</strong> — £3,000 per year (can carry forward one year if unused)</li>\n  <li><strong>Wedding gifts</strong> — up to £5,000 (parent), £2,500 (grandparent), £1,000 (others)</li>\n  <li><strong>Gifts to charity</strong> — fully exempt</li>\n  <li><strong>Small gifts exemption</strong> — up to £250 per person per year to any number of people</li>\n</ul>", "keypoints": ["IHT nil rate band: £325,000; rate: 40% above NRB (36% if 10%+ left to charity)", "Lifetime CLT rate: 20% on excess above NRB", "PETs: fully exempt if donor survives 7 years; taper relief 3–7 years", "Spouse/civil partner transfers: 100% exempt", "Annual exemption: £3,000/year (carry forward one unused year); wedding gifts up to £5,000"], "questions": [{"q": "What is the inheritance tax nil rate band?", "opts": "A) £250,000\nB) £325,000\nC) £500,000\nD) £1,000,000", "ans": "B — The IHT nil rate band is £325,000. Estates above this level are taxed at 40% (or 36% if 10%+ left to charity)."}, {"q": "A person makes a gift to their adult child and dies 4 years later. How is this gift treated for IHT?", "opts": "A) Fully exempt as it was a gift to an individual\nB) Taxed at 40% as the donor did not survive 7 years\nC) It is a PET that failed — taxable but taper relief may apply as the donor survived 3–7 years\nD) Charged at 20% as a chargeable lifetime transfer", "ans": "C — A gift to an individual is a PET. If the donor dies within 7 years, it becomes chargeable. Taper relief reduces the IHT charge if death occurs between 3 and 7 years after the gift."}, {"q": "What IHT rate applies to chargeable lifetime transfers (CLTs) in excess of the nil rate band?", "opts": "A) 40%\nB) 36%\nC) 20%\nD) 10%", "ans": "C — The IHT rate on CLTs (e.g. gifts into discretionary trusts) that exceed the nil rate band is 20% during lifetime. The full 40% rate applies on death."}]}, {"id": "6.1.7", "text": "Explain the limitations of lifetime gifts and transfers at death in mitigating IHT", "explanation": "<p><strong>Lifetime Gifts and Transfers at Death — IHT Mitigation</strong></p>\n<p><strong>Potentially Exempt Transfers (PETs)</strong> — gifts from an individual to another individual (not into a trust). Exempt if the donor survives <strong>7 years</strong>. If not:</p>\n<ul>\n  <li>Years 0–3: 100% of the IHT charge</li>\n  <li>Years 3–4: 80%; Years 4–5: 60%; Years 5–6: 40%; Years 6–7: 20% (taper relief)</li>\n</ul>\n<p><strong>Chargeable Lifetime Transfers (CLTs)</strong> — e.g. gifts into discretionary trusts. Taxed at 20% above NRB during lifetime; additional tax may be due on death if donor dies within 7 years.</p>\n<p><strong>Limitations of lifetime gifts:</strong></p>\n<ul>\n  <li>Must be an outright gift — donor cannot retain a benefit (gift with reservation rules)</li>\n  <li>7-year survival requirement for PETs</li>\n  <li>Only the annual exemption (£3,000) is immediately and unconditionally free</li>\n</ul>\n<p><strong>Business Property Relief (BPR)</strong> and <strong>Agricultural Property Relief (APR)</strong> can give 50% or 100% relief on qualifying business/agricultural assets — a key planning tool.</p>", "keypoints": ["PETs: exempt only if donor survives 7 years; taper relief applies years 3–7", "Taper relief: 80% charge yrs 3–4, 60% yrs 4–5, 40% yrs 5–6, 20% yrs 6–7", "CLTs: taxed at 20% during lifetime; further tax possible on death within 7 years", "Gift with reservation: donor retains benefit — not an effective PET, stays in estate", "BPR/APR: 50% or 100% relief on qualifying business/agricultural assets"], "questions": [{"q": "A person makes a cash gift to their sibling and dies 5 years later. What taper relief applies to the IHT charge?", "opts": "A) No relief — donor did not survive 7 years so full 40% applies\nB) 40% reduction in the IHT charge (i.e. 60% of the full charge is payable)\nC) The gift is fully exempt as it was made more than 3 years before death\nD) 20% reduction (80% of the full charge is payable)", "ans": "B — For a PET where the donor survives 5–6 years, taper relief gives a 40% reduction in the IHT charge, so 60% of the standard charge is payable."}, {"q": "Which of the following would NOT be an effective IHT mitigation strategy?", "opts": "A) Making a gift to a child and surviving 7 years\nB) Transferring assets to a spouse\nC) Making a gift but continuing to live in the gifted property rent-free\nD) Leaving more than 10% of the estate to charity", "ans": "C — Continuing to live in a gifted property rent-free is a 'gift with reservation'. The asset remains in the estate for IHT purposes as the donor has not truly given it away."}]}, {"id": "6.1.8", "text": "Explain the implications of residence in relation to liability to income tax, CGT and IHT", "explanation": "<p><strong>Residence and Domicile — Tax Implications</strong></p>\n<p><strong>Statutory Residence Test (SRT):</strong></p>\n<ul>\n  <li><strong>Automatically non-resident:</strong> fewer than 16 days in UK in tax year; or non-resident in previous 3 years and fewer than 46 days; or works full-time overseas and fewer than 91 days in UK (max 30 working days)</li>\n  <li><strong>Automatically resident:</strong> present 183+ days; or owns a UK home for 91+ days and lives there 30+ days; or works full-time in UK</li>\n  <li><strong>Sufficient ties test:</strong> applies if neither automatic test is met</li>\n</ul>\n<p><strong>Domicile:</strong> permanent home country. Can only be domiciled in one country at a time. Types: domicile of origin (acquired at birth) and domicile of choice (from age 16).</p>\n<p><strong>Tax implications:</strong></p>\n<ul>\n  <li>UK resident + UK domiciled → taxed on <em>worldwide</em> income/gains/assets</li>\n  <li>Non-UK resident → taxed on UK-source income/gains only</li>\n  <li>UK resident + non-UK domiciled → may use the <em>remittance basis</em> (taxed on foreign income only when brought into UK)</li>\n  <li>IHT: UK domiciled → worldwide assets; non-UK domiciled → UK assets only</li>\n</ul>", "keypoints": ["Automatically non-resident: <16 days UK; or non-resident 3 yrs + <46 days; or overseas FT worker <91 days", "Automatically resident: 183+ days; or UK home 91 days + lived there 30 days; or FT UK worker", "Domicile: permanent home — one country only; origin (birth) or choice (age 16+)", "UK resident + UK domicile: worldwide income, gains and IHT", "UK resident + non-UK domicile: may use remittance basis for foreign income/gains"], "questions": [{"q": "A UK-domiciled individual is also UK resident. On what basis are they taxed for income tax and CGT?", "opts": "A) Only on UK-source income and gains\nB) Only on income and gains remitted to the UK\nC) On their worldwide income and gains\nD) They are exempt from UK tax on overseas income", "ans": "C — A UK resident and UK-domiciled individual is taxed on their worldwide income and capital gains."}, {"q": "Under the Statutory Residence Test, an individual is automatically non-resident if they spend fewer than how many days in the UK in a tax year (with no other conditions)?", "opts": "A) 46 days\nB) 91 days\nC) 16 days\nD) 183 days", "ans": "C — An individual who spends fewer than 16 days in the UK in a tax year is automatically non-resident, regardless of other factors."}, {"q": "For IHT purposes, a non-UK domiciled individual's estate is charged on:", "opts": "A) Their worldwide assets\nB) Their UK assets only\nC) No assets — non-domiciled individuals are exempt from UK IHT\nD) Assets brought into the UK only", "ans": "B — A non-UK domiciled individual is only subject to UK IHT on their UK-sited assets. Worldwide assets are only brought within UK IHT for those domiciled in the UK."}]}, {"id": "6.1.9", "text": "Describe the system of UK tax compliance including self-assessment, pay as you earn (PAYE), tax returns, tax payments, tax evasion and avoidance issues", "explanation": "<p><strong>UK Tax Compliance — Self-Assessment, PAYE and Tax Returns</strong></p>\n<p><strong>PAYE (Pay As You Earn)</strong> — system under which employers deduct income tax and NICs from employees' wages before paying them. Tax is collected in real time.</p>\n<p><strong>Self-Assessment</strong> — individuals with complex tax affairs (self-employment, investment income, rental income, high earners) must complete an annual self-assessment tax return.</p>\n<p><strong>Tax return deadlines:</strong></p>\n<ul>\n  <li>Paper return: <strong>31 October</strong> following the end of the tax year</li>\n  <li>Electronic return: <strong>31 January</strong> following the end of the tax year</li>\n</ul>\n<p><strong>Tax evasion vs tax avoidance:</strong></p>\n<ul>\n  <li><strong>Tax evasion</strong> — illegal. Deliberately concealing income or assets to avoid paying tax. Criminal offence.</li>\n  <li><strong>Tax avoidance</strong> — legal but may be challenged. Using legitimate arrangements to reduce tax liability. HMRC targets aggressive avoidance schemes (e.g. GAAR — General Anti-Abuse Rule).</li>\n  <li><strong>Tax planning / tax mitigation</strong> — fully acceptable use of allowances, reliefs and wrappers (ISA, pension) as intended by Parliament.</li>\n</ul>", "keypoints": ["PAYE: income tax and NICs deducted at source by employers", "Self-assessment: required for self-employed, investors, rental income, high earners", "Paper return: 31 October; electronic return: 31 January after tax year end", "Tax evasion: illegal (criminal); tax avoidance: legal but may be challenged; tax planning: fully legitimate", "GAAR (General Anti-Abuse Rule): HMRC tool to challenge aggressive avoidance schemes"], "questions": [{"q": "By what date must an online self-assessment tax return be submitted?", "opts": "A) 31 October following the end of the tax year\nB) 5 April following the end of the tax year\nC) 31 January following the end of the tax year\nD) 31 March following the end of the tax year", "ans": "C — Electronic/online self-assessment returns must be submitted by 31 January following the end of the tax year. Paper returns must be submitted by 31 October."}, {"q": "Which of the following BEST distinguishes tax evasion from tax avoidance?", "opts": "A) Tax evasion uses ISAs and pensions; tax avoidance uses offshore accounts\nB) Tax evasion is illegal (criminal); tax avoidance is legal but may be challenged by HMRC\nC) Both are illegal but tax avoidance carries lower penalties\nD) Tax avoidance is only available to companies; tax evasion is only for individuals", "ans": "B — Tax evasion is a criminal offence (deliberate concealment of income/assets). Tax avoidance is legally reducing your tax liability but aggressive schemes may be challenged under GAAR."}]}, {"id": "6.1.10", "text": "Describe the principles of stamp duty land tax (SDLT) as applied to property purchases (buying, selling and leasing)", "explanation": "<p><strong>Stamp Duty Land Tax (SDLT)</strong></p>\n<p>SDLT is paid on purchases of land and property in England and Northern Ireland.</p>\n<p><strong>Key principles:</strong></p>\n<ul>\n  <li>Both residential and non-residential properties are charged on the <em>part of the purchase price within each tax band</em> (a progressive/slice system — similar to income tax bands)</li>\n  <li><strong>Residential rates:</strong> 0% up to £125,000; 2% on £125,001–£250,000; 5% on £250,001–£925,000; 10% on £925,001–£1.5m; 12% above £1.5m (standard rates)</li>\n  <li><strong>Additional SDLT:</strong> 3% surcharge on second homes and buy-to-let properties</li>\n  <li><strong>Anti-avoidance rate:</strong> 17% flat rate for collective investment schemes and companies buying residential properties valued above £500,000</li>\n  <li>First-time buyers: relief applies up to £500,000 (no SDLT on first £425,000)</li>\n</ul>", "keypoints": ["SDLT: tax on land/property purchases in England and Northern Ireland", "Progressive slice system — each band rate applies to the price within that band", "3% surcharge for second homes and buy-to-let properties", "Anti-avoidance rate: 17% for collective investment schemes/companies buying residential property >£500,000", "First-time buyer relief: no SDLT on first £425,000 (up to £500,000 property)"], "questions": [{"q": "How is SDLT calculated on a residential property purchase?", "opts": "A) A flat rate applied to the full purchase price\nB) A progressive slice system — each band rate applies only to the portion of the price within that band\nC) Based on the market rental value of the property\nD) Only charged on properties above £1 million", "ans": "B — SDLT uses a slice/progressive system where each rate applies only to the portion of the purchase price falling within each band, similar to income tax."}, {"q": "A company purchases a residential property valued at £600,000. Which anti-avoidance SDLT rate applies?", "opts": "A) 5%\nB) 10%\nC) 12%\nD) 17%", "ans": "D — An anti-avoidance SDLT rate of 17% applies to collective investment schemes and companies buying residential properties valued above £500,000."}]}, {"id": "6.1.11", "text": "Describe the principles of stamp duty reserve tax (SDRT)", "explanation": "<p><strong>Stamp Duty Reserve Tax (SDRT)</strong></p>\n<p>SDRT is paid by the <strong>purchaser</strong> on <strong>paperless (electronic) transactions</strong> in certain securities at a rate of <strong>0.5%</strong> of the purchase consideration.</p>\n<p><strong>SDRT applies to:</strong></p>\n<ul>\n  <li>UK listed shares (and foreign shares with a register in the UK)</li>\n  <li>Options to buy shares</li>\n  <li>Rights arising from shares already owned (e.g. rights issues)</li>\n</ul>\n<p><strong>SDRT is EXEMPT for:</strong></p>\n<ul>\n  <li>AIM or AQSE Growth Market listed shares</li>\n  <li>Unit trusts, OEICs and ETFs</li>\n</ul>\n<p>Note: physical (paper) share transfers use Stamp Duty (not SDRT) at 0.5%, rounded up to nearest £5.</p>", "keypoints": ["SDRT: 0.5% on paperless purchase of UK listed shares — paid by the buyer", "Applies to: UK listed shares, options to buy shares, rights issues", "Exempt: AIM/AQSE shares, unit trusts, OEICs, ETFs", "Physical share transfers use Stamp Duty (paper) at 0.5%, rounded up to nearest £5", "SDRT collected automatically through CREST on electronic settlement"], "questions": [{"q": "At what rate is Stamp Duty Reserve Tax (SDRT) charged on a paperless purchase of UK listed shares?", "opts": "A) 0.25%\nB) 0.5%\nC) 1.0%\nD) 1.5%", "ans": "B — SDRT is charged at 0.5% of the purchase consideration on electronic transactions in UK listed shares."}, {"q": "Which of the following transactions is EXEMPT from SDRT?", "opts": "A) Buying shares in a FTSE 100 company electronically\nB) Exercising options to buy shares\nC) Buying units in a unit trust\nD) Taking up a rights issue", "ans": "C — Unit trusts, OEICs and ETFs are exempt from SDRT. AIM and AQSE Growth Market shares are also exempt."}, {"q": "Who pays Stamp Duty Reserve Tax?", "opts": "A) The seller of the shares\nB) The purchaser of the shares\nC) The broker executing the trade\nD) Both buyer and seller equally", "ans": "B — SDRT is paid by the purchaser on the purchase consideration."}]}, {"id": "6.1.12", "text": "Explain how companies are taxed in the UK", "explanation": "<p><strong>Corporation Tax — How Companies are Taxed in the UK</strong></p>\n<p>Corporation tax is paid on a company's <strong>profits and gains</strong> during a <strong>financial year</strong> (1 April – 31 March, e.g. 2025/26: 1 April 2025 – 31 March 2026).</p>\n<p><strong>Rates (2025/26):</strong></p>\n<ul>\n  <li><strong>19%</strong> — profits of £50,000 or less (small profits rate)</li>\n  <li><strong>25%</strong> — profits of £250,000 or more (main rate)</li>\n  <li><strong>Marginal relief</strong> — between £50,000 and £250,000: first £50,000 taxed at 19%; remainder at marginal rate of <strong>26.5%</strong></li>\n</ul>\n<p><strong>Trading losses:</strong> can be offset against profits and gains of the previous year (carry back) and future years (carry forward).</p>\n<p><strong>Payment:</strong></p>\n<ul>\n  <li>Large companies (profits >£1.5m): pay quarterly by instalment</li>\n  <li>Other companies: nine months and one day after the accounting year end</li>\n</ul>", "keypoints": ["Corporation tax: on company profits and gains; financial year 1 April – 31 March", "Small profits rate (≤£50,000): 19%; Main rate (≥£250,000): 25%", "Marginal relief band (£50,001–£250,000): 19% on first £50k + 26.5% marginal rate on remainder", "Trading losses: carry back to prior year OR carry forward indefinitely", "Large companies (profits >£1.5m): quarterly instalments; others: 9 months + 1 day after year end"], "questions": [{"q": "A company has profits of £300,000 in the financial year. At what rate will corporation tax be charged?", "opts": "A) 19%\nB) 20%\nC) 25%\nD) 26.5%", "ans": "C — The main rate of corporation tax (25%) applies to profits of £250,000 or more."}, {"q": "When must a company with profits of £800,000 pay its corporation tax?", "opts": "A) On 31 January following the end of the financial year\nB) Quarterly by instalment during the year\nC) Nine months and one day after the accounting year end\nD) On the last day of the financial year", "ans": "B — Large companies with profits exceeding £1.5 million pay quarterly by instalment. However, a company with profits of £800,000 is not 'large' — they would pay nine months and one day after year end. (Note: the question tests the £1.5m threshold — £800,000 < £1.5m so this company pays 9 months + 1 day.)"}, {"q": "A company makes a trading loss. How can this loss be used?", "opts": "A) It can only be carried forward against future profits\nB) It can be offset against profits of the previous year or future years\nC) It is forfeited after one year if not used\nD) It can only be offset against capital gains, not trading profits", "ans": "B — Corporation tax trading losses can be offset against profits and gains of the previous year (carry back) or future years (carry forward indefinitely)."}]}, {"id": "6.1.13", "text": "Describe, in outline, the principles of value added tax (VAT)", "explanation": "<p><strong>Value Added Tax (VAT) — Principles</strong></p>\n<p>VAT is charged on the taxable supply of goods and services in the UK.</p>\n<p><strong>Three rates:</strong></p>\n<ul>\n  <li><strong>Standard rate: 20%</strong> — most goods and services</li>\n  <li><strong>Reduced rate: 5%</strong> — e.g. domestic electricity and gas, children's car seats</li>\n  <li><strong>Zero rate: 0%</strong> — e.g. children's clothes, books, most food</li>\n</ul>\n<p><strong>Exempt supplies</strong> — businesses supplying exempt items cannot reclaim input VAT on their costs.</p>\n<p><strong>VAT and financial advisers:</strong></p>\n<ul>\n  <li>Advice on the <strong>sale of retail investments</strong> — <strong>VAT exempt</strong></li>\n  <li><strong>Other general advice and recommendations</strong> — <strong>standard rate (20%)</strong></li>\n</ul>", "keypoints": ["Standard rate: 20%; Reduced rate: 5% (electricity/gas); Zero rate: 0% (children's clothes, books)", "Exempt supplies: no VAT charged; business cannot reclaim input VAT", "Financial advice on sale of retail investments: VAT exempt", "General financial advice/recommendations: standard rate (20%)", "Zero-rated ≠ exempt: zero-rated businesses CAN reclaim input VAT"], "questions": [{"q": "A financial adviser charges a client for advice on purchasing a retail investment. What is the VAT treatment?", "opts": "A) Standard rate (20%)\nB) Reduced rate (5%)\nC) Zero rate (0%)\nD) Exempt from VAT", "ans": "D — Advice on the sale of retail investments is exempt from VAT. General advice and recommendations are standard-rated at 20%."}, {"q": "At what rate is domestic gas and electricity charged for VAT purposes?", "opts": "A) 0%\nB) 5%\nC) 10%\nD) 20%", "ans": "B — Domestic electricity and gas are charged at the reduced VAT rate of 5%."}, {"q": "What is the key difference between a zero-rated supply and an exempt supply for VAT purposes?", "opts": "A) Zero-rated supplies are only available to individuals, not businesses\nB) Businesses making zero-rated supplies can reclaim input VAT; businesses making exempt supplies cannot\nC) Exempt supplies are charged at 5%; zero-rated at 0%\nD) There is no practical difference — both result in no VAT charged to the customer", "ans": "B — Zero-rated businesses can reclaim the VAT they paid on their inputs (costs). Exempt businesses cannot reclaim input VAT, which increases their costs."}]}, {"id": "6.1.14", "text": "Analyse the taxation of direct investments including cash and cash equivalents, fixed-interest securities, equities and property", "explanation": "<p><strong>Taxation of Direct Investments</strong></p>\n<ul>\n  <li><strong>Cash deposits</strong> — interest taxed as savings income at 20%/40%/45%; Personal Savings Allowance applies (£1,000/£500/£0). Most interest now paid gross.</li>\n  <li><strong>Fixed interest securities (bonds)</strong>\n    <ul>\n      <li>UK gilts: interest (coupon) taxed as savings income; capital gains <em>exempt</em> from CGT</li>\n      <li>Corporate bonds: coupon taxed as savings income; listed corporate bonds also exempt from CGT (but not unlisted)</li>\n    </ul>\n  </li>\n  <li><strong>Equities (shares)</strong> — dividends taxed at dividend rates (8.75%/33.75%/39.35%) after £500 allowance; capital gains on disposal subject to CGT at 18%/24% after annual exemption</li>\n  <li><strong>Property</strong>\n    <ul>\n      <li>Rental income: taxed as non-savings income; mortgage interest relief restricted to basic rate</li>\n      <li>Capital gain on disposal: CGT at 18%/24% (main home exempt — PPR relief)</li>\n    </ul>\n  </li>\n</ul>", "keypoints": ["Cash: interest = savings income (20/40/45%); PSA applies; paid gross", "Gilts: coupons = savings income; capital gains EXEMPT from CGT", "Listed corporate bonds: coupons = savings income; also exempt from CGT", "Equities: dividends taxed at 8.75/33.75/39.35% (£500 allowance); gains = CGT at 18/24%", "Property: rental income = non-savings income; gains = CGT 18/24%; main home exempt (PPR)"], "questions": [{"q": "A higher rate taxpayer sells UK government gilts at a profit. What is the CGT position?", "opts": "A) CGT at 24% applies on the full gain\nB) CGT at 18% applies on the full gain\nC) The gain is exempt from CGT\nD) The gain is taxed as income at 40%", "ans": "C — Capital gains on UK government gilts (and most corporate debt) are exempt from CGT, regardless of the taxpayer's rate."}, {"q": "A basic rate taxpayer receives £3,000 in dividends from their share portfolio. How much of this is taxable?", "opts": "A) The full £3,000 is taxed at 8.75%\nB) £2,500 is taxable after the £500 dividend allowance\nC) Nothing — dividends are tax-free for basic rate taxpayers\nD) £2,000 is taxable after the £1,000 PSA", "ans": "B — The dividend allowance is £500 for all taxpayers. The remaining £2,500 is taxed at 8.75% (basic rate)."}]}, {"id": "6.1.15", "text": "Analyse the key features and taxation of indirect investments including pension arrangements, different types of individual savings accounts (ISAs), onshore and offshore life assurance policies, real estate investment trusts (REITs), venture capital trusts (VCTs), enterprise investment schemes (EISs) and business property relief", "explanation": "<p><strong>Taxation of Indirect Investments</strong></p>\n<p><strong>Pension arrangements:</strong> contributions receive income tax relief at marginal rate. At retirement: up to 25% tax-free lump sum; pension payments taxed as income.</p>\n<p><strong>ISAs:</strong> annual limit £20,000 (stocks & shares / cash); Junior ISA £9,000. No income tax or CGT on investments within the ISA.</p>\n<p><strong>Collective investment schemes (unit trusts/OEICs):</strong> fund exempt from CGT; income subject to corporation tax at 20% within fund. Investor taxed on distributions and disposals.</p>\n<p><strong>Life assurance bonds (single premium UK):</strong> fund taxed at 20% corporation tax. Investor can withdraw 5% of original premium annually with no immediate income tax (for up to 20 years = 100%). Gains on encashment taxed as income (higher/additional rate payers pay the difference above basic rate already paid).</p>\n<p><strong>REITs:</strong> fund exempt from tax on rental income and capital gains. Must distribute majority of tax-exempt income. Investor taxed on income and gains.</p>\n<p><strong>VCTs:</strong> 30% income tax relief on up to £200,000/year (must hold 5+ years); dividends tax-free; no CGT on disposal.</p>\n<p><strong>EISs:</strong> 30% income tax relief on up to £1m/year (£2m for knowledge-intensive); must hold 3+ years; no CGT on disposal.</p>", "keypoints": ["ISA: £20,000 annual limit; no income tax or CGT — fully tax-free wrapper", "Life bond: 5% annual withdrawal from original premium — no immediate income tax (up to 100%/20 years)", "REIT: fund exempt from tax; must distribute majority of income; investor pays income tax/CGT", "VCT: 30% relief on ≤£200,000/yr; hold 5+ years; dividends tax-free; no CGT", "EIS: 30% relief on ≤£1m/yr; hold 3+ years; no CGT on disposal; losses allowable"], "questions": [{"q": "An investor has a life assurance bond with an original premium of £100,000. How much can they withdraw each year without an immediate income tax liability?", "opts": "A) £1,000\nB) £5,000\nC) £10,000\nD) £20,000", "ans": "B — Investors can withdraw 5% of the original premium per year without an immediate income tax liability, cumulating up to 100% over 20 years. 5% × £100,000 = £5,000 per year."}, {"q": "What is the income tax relief available on a qualifying investment in a Venture Capital Trust (VCT)?", "opts": "A) 20% on up to £100,000\nB) 30% on up to £200,000\nC) 30% on up to £1,000,000\nD) 50% on up to £100,000", "ans": "B — VCT investments attract 30% income tax relief on a maximum of £200,000 per year, provided the shares are held for at least 5 years."}, {"q": "Which of the following is correct regarding EIS investments?", "opts": "A) 50% income tax relief; shares must be held for 5 years\nB) 30% income tax relief; shares must be held for 3 years; no CGT on disposal\nC) 30% income tax relief; shares must be held for 5 years; dividends tax-free\nD) 20% income tax relief on investments up to £2 million", "ans": "B — EIS gives 30% income tax relief on up to £1m per year (£2m for knowledge-intensive). Shares must be held for at least 3 years to keep the relief. No CGT arises on disposal."}]}]}, {"id": "6.2", "title": "Investment Advice and Tax Planning", "points": [{"id": "6.2.1", "text": "Evaluate the tax considerations shaping clients' needs and circumstances", "explanation": "<p><strong>Tax Considerations Shaping Clients' Needs</strong></p>\n<p>A client's tax position is central to investment planning. Key tax considerations include:</p>\n<ul>\n  <li><strong>Marginal income tax rate</strong> — determines the value of tax reliefs (pension contributions, ISA contributions) and the tax cost of income-producing investments</li>\n  <li><strong>Remaining allowances</strong> — personal allowance, savings allowance, dividend allowance, CGT annual exemption. Unused allowances are generally wasted (no carry forward except IHT annual exemption)</li>\n  <li><strong>Use of spouse's allowances</strong> — assets can be transferred between spouses CGT-free; income-splitting can use a lower-rate spouse's allowances</li>\n  <li><strong>Investment wrapper selection</strong> — pension (tax-deductible contributions + tax-free growth), ISA (no income tax or CGT), offshore bond (tax deferral)</li>\n  <li><strong>Timing of income and gains</strong> — deferring income to a lower-income year, or realising gains across tax years to use the annual exemption</li>\n</ul>", "keypoints": ["Marginal rate: determines value of pension relief and cost of investment income", "Unused allowances (PSA, dividend, CGT annual exemption) are generally wasted — not carried forward", "Spouse transfers: CGT-free; income-splitting uses both spouses' allowances", "Wrapper selection: pension (relief + tax-free growth), ISA (no IT/CGT), bond (tax deferral)", "Timing: defer income/gains to lower-income years; use CGT exemption each year"], "questions": [{"q": "A client is a higher rate taxpayer with significant savings income. What is the MOST tax-efficient immediate action?", "opts": "A) Switch savings into a higher-interest account\nB) Transfer savings into an ISA to shelter future interest from income tax\nC) Move savings offshore to avoid UK tax\nD) Withdraw the savings and reinvest in equities", "ans": "B — Moving savings into an ISA shelters all interest from income tax. For a higher rate taxpayer with limited PSA (£500), this is the most tax-efficient use of their £20,000 annual ISA allowance."}, {"q": "A higher rate taxpayer has an unused CGT annual exemption at the end of March. What should they consider?", "opts": "A) Nothing — unused exemptions can be carried forward to the next year\nB) Realising gains up to the £3,000 annual exemption before the tax year ends to avoid wasting it\nC) Converting gains into income to make use of unused personal allowance\nD) Deferring all disposals to avoid triggering CGT", "ans": "B — The CGT annual exemption (£3,000) cannot be carried forward. Realising gains up to this amount before the year-end avoids wasting the exemption."}]}, {"id": "6.2.2", "text": "Analyse the key principles of income tax planning", "explanation": "<p><strong>Key Principles of Income Tax Planning</strong></p>\n<p>The goal of income tax planning is to minimise the tax paid on income using legitimate strategies:</p>\n<ul>\n  <li><strong>Use personal allowances and lower rate bands</strong> — ensure income falls within the basic rate band where possible; avoid the loss of personal allowance between £100,000–£125,140 (effective 60% marginal rate)</li>\n  <li><strong>Pension contributions</strong> — reduce taxable income, restoring personal allowance and avoiding the 60% trap. Relief at marginal rate.</li>\n  <li><strong>ISA contributions</strong> — shelter income from tax permanently (£20,000/year)</li>\n  <li><strong>Income-splitting</strong> — transfer income-producing assets to a lower-earning spouse to use their allowances and lower rate bands</li>\n  <li><strong>Choosing capital growth over income</strong> — where CGT rates are lower than income tax rates, growth-oriented investments may be more efficient</li>\n  <li><strong>Gift Aid</strong> — extends basic rate band for the donor; higher rate taxpayers reclaim additional relief</li>\n</ul>", "keypoints": ["Personal allowance taper: effective 60% marginal rate between £100,000–£125,140", "Pension contributions: reduce taxable income, restore personal allowance, relief at marginal rate", "ISA: £20,000/year — permanently shelters income and gains from all tax", "Income-splitting: transfer assets to spouse with lower income to use their allowances/bands", "Growth vs income: CGT rates (18/24%) often lower than income tax rates (40/45%)"], "questions": [{"q": "A client earns £110,000. Why is a pension contribution particularly beneficial for them?", "opts": "A) It entitles them to a 60% tax credit\nB) It reduces their income below £100,000, restoring their personal allowance and avoiding the effective 60% marginal rate\nC) Pension contributions are always tax-free for everyone\nD) It converts income into capital gains which are tax-free", "ans": "B — Between £100,000 and £125,140, each £2 of income costs £1 of personal allowance, creating an effective 60% marginal rate. Pension contributions reduce adjusted income, potentially restoring the personal allowance."}, {"q": "A couple has one high-income spouse and one with little income and unused allowances. Which income tax planning strategy is most appropriate?", "opts": "A) Both spouses should maximise pension contributions at the higher rate\nB) Transfer income-producing assets to the lower-earning spouse to use their unused allowances and lower rate bands\nC) Place all assets in an offshore account to defer UK tax\nD) Invest only in growth assets to avoid income tax entirely", "ans": "B — Income-splitting by transferring income-producing assets to the lower-earning spouse utilises their personal allowance and basic rate band, reducing the family's overall tax bill."}]}, {"id": "6.2.3", "text": "Analyse how the use of annual CGT exemptions, the realisation of losses, the timing of disposals, and sale and repurchase of similar assets can mitigate CGT", "explanation": "<p><strong>CGT Mitigation Strategies</strong></p>\n<ul>\n  <li><strong>Use the annual exemption (£3,000)</strong> — realise gains each year up to the annual exempt amount; unused exemption cannot be carried forward</li>\n  <li><strong>Realise capital losses</strong> — crystallise losses to offset against gains in the same or future years. Losses must be used in the year they arise before the annual exemption.</li>\n  <li><strong>Timing of disposals</strong> — defer sales to a future tax year if the annual exemption is already used; or if the taxpayer will be a basic rate payer in a future year (18% vs 24%)</li>\n  <li><strong>Bed and breakfast (30-day rule)</strong> — selling shares and buying them back creates a capital loss for tax purposes, but HMRC rules (30-day matching rule) mean you must wait 30+ days before rebuying the same shares, OR use a different wrapper (e.g. ISA or spouse buys the shares immediately)</li>\n  <li><strong>Spouse/civil partner transfer</strong> — assets can be transferred between spouses at no CGT, allowing each to use their annual exemption</li>\n</ul>", "keypoints": ["Annual exemption (£3,000): use it every year — cannot be carried forward", "Realise losses to offset gains: current year losses offset first, before annual exemption", "Timing: defer disposals to use next year's exemption or a lower-rate year", "Bed & breakfast: must wait 30 days before rebuying same shares (or use spouse/ISA)", "Spouse transfer: CGT-free, allows both to use their annual exemptions"], "questions": [{"q": "An investor wants to crystallise a capital loss to offset against gains, and then repurchase the same shares. What rule must they observe?", "opts": "A) They must wait 6 months before rebuying\nB) They must wait 30 days before rebuying the same shares\nC) They can rebuy immediately as the loss is still allowable\nD) They cannot repurchase the same shares within the same tax year", "ans": "B — The 30-day matching rule (bed and breakfast rule) means that if shares are sold and the same shares are repurchased within 30 days, the sale and repurchase are matched, and the capital loss is not recognised. The investor must wait 30+ days, or use a spouse/ISA to buy the shares immediately."}, {"q": "A couple both pay CGT on gains of £25,000. They transfer 50% of an asset to the other spouse before sale. What is the CGT advantage?", "opts": "A) The gain is halved and each can use their £3,000 annual exemption\nB) No advantage — the same total CGT is always due\nC) The transfer triggers an immediate CGT charge\nD) Only the higher-rate taxpayer pays CGT", "ans": "A — Transferring 50% to a spouse splits the gain. Each spouse can then use their own £3,000 annual exemption, saving tax on up to £6,000 of combined gains."}]}, {"id": "6.2.4", "text": "Calculate the most common elements of income tax, CGT and IHT, including the impact of lifetime transfers and transfers at death", "explanation": "<p><strong>Calculating Income Tax, CGT and IHT</strong></p>\n<p><strong>Income tax calculation steps:</strong></p>\n<ol>\n  <li>Add all gross income (non-savings, savings, dividends)</li>\n  <li>Deduct personal allowance (£12,570; nil if income >£125,140)</li>\n  <li>Apply rates: non-savings income fills bands first, then savings, then dividends</li>\n  <li>Apply allowances (PSA, dividend allowance) before calculating tax</li>\n</ol>\n<p><strong>CGT calculation:</strong> Total gains − current year losses − brought forward losses (to extent needed) − annual exemption (£3,000) = Chargeable gain × rate (18% or 24%).</p>\n<p><strong>IHT on death:</strong> Net estate − nil rate band (£325,000) − any transferable nil rate band − spouse/charity exemptions = Chargeable estate × 40% (or 36% if 10%+ to charity). Failed PETs and CLTs within 7 years are added back.</p>", "keypoints": ["Income tax: gross income → deduct PA → apply rates by type (non-savings first, then savings, then dividends)", "CGT: gains − current losses − BF losses − £3,000 exemption = chargeable gain × 18% or 24%", "IHT on death: estate − NRB (£325,000) − exemptions = chargeable × 40%", "BF losses: only offset to extent needed after annual exemption (don't waste exemption)", "Failed PETs added back to estate; taper relief reduces IHT if donor survived 3–7 years"], "questions": [{"q": "A higher rate taxpayer makes capital gains of £30,000 and capital losses of £4,000 in the same year. What is the CGT payable (annual exemption £3,000)?", "opts": "A) £30,000 × 24% = £7,200\nB) £23,000 × 24% = £5,520\nC) £26,000 × 24% = £6,240\nD) £27,000 × 24% = £6,480", "ans": "B — Gains (£30,000) − current losses (£4,000) = £26,000 − annual exemption (£3,000) = £23,000 chargeable gain. CGT = £23,000 × 24% = £5,520."}, {"q": "An estate is worth £500,000. The deceased was single with no transferable NRB. IHT is charged at 40%. What is the IHT due?", "opts": "A) £200,000\nB) £70,000\nC) £130,000\nD) £175,000", "ans": "B — Chargeable estate = £500,000 − £325,000 (NRB) = £175,000. IHT = £175,000 × 40% = £70,000."}]}, {"id": "6.2.5", "text": "Select elementary tax planning recommendations in the context of investments and pension advice", "explanation": "<p><strong>Elementary Tax Planning Recommendations</strong></p>\n<p>When advising clients on investments and pensions, advisers should integrate tax planning throughout:</p>\n<ul>\n  <li><strong>Maximise ISA allowance first</strong> — £20,000/year; shelter income and gains permanently. No income tax, no CGT.</li>\n  <li><strong>Pension contributions</strong> — especially for higher/additional rate taxpayers: relief at 40%/45%; also useful for those facing the £100,000–£125,140 income trap.</li>\n  <li><strong>Use both spouses' allowances</strong> — split assets across spouses to double up on PSA, dividend allowance, CGT exemption and potentially use lower rate bands.</li>\n  <li><strong>Use the CGT annual exemption every year</strong> — don't allow it to go to waste.</li>\n  <li><strong>Consider VCTs/EIS for higher-rate taxpayers</strong> — 30% relief on investment; useful for those with specific risk appetite and tax planning needs.</li>\n  <li><strong>Consider wrappers</strong> — pension for long-term; ISA for flexible access; offshore bond for tax deferral (higher/additional rate taxpayers who may have lower income in retirement).</li>\n</ul>", "keypoints": ["First step: maximise ISA (£20,000/year) — no income tax or CGT", "Pension: especially valuable for higher-rate payers (40–45% relief) and those in the £100k–£125k trap", "Use both spouses' allowances: double up PSA, dividend allowance and CGT exemption", "Never waste the CGT annual exemption: realise gains up to £3,000 each year", "VCT/EIS: 30% relief — suitable for higher-rate taxpayers with appropriate risk tolerance"], "questions": [{"q": "In what order should a financial adviser typically recommend tax-efficient investment wrappers?", "opts": "A) Offshore bond → ISA → pension\nB) Pension → offshore bond → ISA\nC) ISA → pension → offshore bond (or VCT/EIS if appropriate)\nD) VCT → EIS → ISA → pension", "ans": "C — The typical order is ISA first (most flexible, fully tax-free), then pension (relief at marginal rate, long-term lock-in), then other wrappers like offshore bonds or VCT/EIS for appropriate clients."}, {"q": "A higher rate taxpayer with an income of £110,000 and significant investment income asks for tax planning advice. What is the MOST impactful single recommendation?", "opts": "A) Invest in a VCT for 30% income tax relief\nB) Maximise pension contributions to reduce income below £100,000 and restore the personal allowance\nC) Transfer all assets into their spouse's name\nD) Invest the maximum in Premium Bonds", "ans": "B — Maximising pension contributions to bring income below £100,000 restores the £12,570 personal allowance, avoiding the effective 60% marginal rate trap between £100,000 and £125,140. This is typically the highest-impact recommendation."}]}]}]}];
const QUIZ_DATA = {"1": [{"id": "1.1.1", "q": "Which of the following is NOT one of the main functions of the financial services industry?", "opts": ["A) Financial intermediation", "B) Pooling and managing risk", "C) Setting monetary policy", "D) Payment and settlement services"], "ans_letter": "C", "ans_full": "C — Setting monetary policy is the role of central banks (e.g. Bank of England), not the financial services industry as a whole."}, {"id": "1.1.1", "q": "A pension fund accepts contributions from members and invests in a diversified portfolio of equities and bonds. Which financial services function does this BEST illustrate?", "opts": ["A) Payment and settlement", "B) Financial intermediation and portfolio management", "C) Risk transfer via insurance", "D) Regulatory compliance"], "ans_letter": "B", "ans_full": "B — The pension fund intermediates (channels savings into investments) and manages a portfolio on behalf of members."}, {"id": "1.1.2", "q": "Which institution acts as 'lender of last resort' to banks experiencing liquidity problems?", "opts": ["A) Investment bank", "B) Central bank", "C) Pension fund", "D) Commercial bank"], "ans_letter": "B", "ans_full": "B — Central banks (e.g. Bank of England) act as lender of last resort to support banks during a liquidity crisis."}, {"id": "1.1.2", "q": "A large insurance company invests premium income into UK government bonds and equities. It is best described as which type of financial institution?", "opts": ["A) Deposit institution", "B) Central bank", "C) Investment institution", "D) Development bank"], "ans_letter": "C", "ans_full": "C — Insurance companies are investment institutions: they pool funds (premiums) and invest in securities markets."}, {"id": "1.1.3", "q": "The government increases income tax rates and reduces spending to cool an overheating economy. This is an example of which policy?", "opts": ["A) Monetary policy", "B) Fiscal policy", "C) Regulatory policy", "D) Industrial policy"], "ans_letter": "B", "ans_full": "B — Fiscal policy refers to government spending and taxation decisions. Monetary policy is set by the central bank (e.g. changing interest rates)."}, {"id": "1.1.3", "q": "Which of the following is a government mechanism for regulating financial markets in the UK?", "opts": ["A) The Bank of England Act 1694", "B) Financial Services and Markets Act 2000 (FSMA)", "C) The Companies Act 1862", "D) The Pensions Act 1995"], "ans_letter": "B", "ans_full": "B — FSMA 2000 is the primary legislation underpinning UK financial regulation, establishing the FCA and PRA."}, {"id": "1.2.1", "q": "Which of the following is a REAL asset rather than a financial security?", "opts": ["A) A UK government gilt", "B) A share in a FTSE 100 company", "C) A commercial office building", "D) A corporate bond"], "ans_letter": "C", "ans_full": "C — A commercial office building is a physical/real asset. Gilts, shares and bonds are all financial securities (claims on cash flows or ownership)."}, {"id": "1.2.2", "q": "An investor holds units in a UK OEIC. If the fund is wound up, the investor has a claim on:", "opts": ["A) A fixed coupon payment and return of principal", "B) Their proportionate share of the fund's net assets", "C) Voting rights at the company's AGM", "D) The difference in price between two currencies"], "ans_letter": "B", "ans_full": "B — Holders of units in a pooled fund (OEIC/unit trust) have a proportionate claim on the fund's net assets (NAV)."}, {"id": "1.2.2", "q": "A company treasurer agrees today to sell €1 million for sterling in three months' time at a pre-agreed exchange rate. This is an example of:", "opts": ["A) An ordinary share investment", "B) A spot FX transaction", "C) A forward FX transaction", "D) A bond issuance"], "ans_letter": "C", "ans_full": "C — A forward FX transaction locks in an exchange rate for a future date. A spot transaction settles immediately (typically T+2)."}, {"id": "1.2.3", "q": "The publication of the price and size of a trade immediately after it has been executed is an example of:", "opts": ["A) Pre-trade transparency", "B) Post-trade transparency", "C) Market depth", "D) Liquidity risk"], "ans_letter": "B", "ans_full": "B — Post-trade transparency means publishing actual trade details (price and size) after execution. Pre-trade transparency relates to quotes/order book before execution."}, {"id": "1.2.4", "q": "Which of the following BEST explains why liquidity is important for efficient capital allocation?", "opts": ["A) Liquid markets allow governments to raise taxes more easily", "B) Liquidity reduces transaction costs and lowers the required return, enabling capital to flow to productive uses", "C) Liquid markets increase bid-ask spreads, benefiting market makers", "D) High liquidity means fewer participants are needed in a market"], "ans_letter": "B", "ans_full": "B — Liquid markets reduce transaction costs and the liquidity risk premium, lowering the cost of capital and enabling efficient reallocation of resources."}, {"id": "1.2.5", "q": "Which of the following is MOST likely to have LOW price transparency and LOW liquidity?", "opts": ["A) A FTSE 100 share traded on SETS", "B) A UK gilt", "C) A bespoke OTC interest rate swap", "D) A EUR/USD spot FX transaction"], "ans_letter": "C", "ans_full": "C — Bespoke OTC derivatives are bilateral agreements with no public price (low transparency) and may be difficult to unwind (low liquidity)."}, {"id": "1.2.6", "q": "A fund manager holds a large position in a small-cap equity that cannot easily be sold without significantly moving the price. This BEST illustrates:", "opts": ["A) Funding liquidity risk", "B) Credit risk", "C) Asset liquidity risk", "D) Inflation risk"], "ans_letter": "C", "ans_full": "C — Asset liquidity risk arises when the characteristics of the asset (here, a small, thinly traded equity) mean it cannot be sold quickly without a large price impact."}, {"id": "1.2.7", "q": "An investor buys £15,000 of UK equities via an electronic transfer. What is the SDRT charge?", "opts": ["A) £0", "B) £75", "C) £150", "D) £1.50"], "ans_letter": "B", "ans_full": "B — SDRT = 0.5% × £15,000 = £75. The PTM levy of £1.50 also applies as the deal exceeds £10,000, but the SDRT alone is £75."}, {"id": "1.2.7", "q": "The PTM levy is charged on equity transactions:", "opts": ["A) Only on purchases above £10,000", "B) On both purchases and sales above £10,000", "C) On all equity transactions regardless of size", "D) Only on gilts"], "ans_letter": "B", "ans_full": "B — The PTM levy of £1.50 applies to both purchases and sales of equities where the consideration exceeds £10,000."}, {"id": "1.3.1", "q": "Which trading system on the London Stock Exchange uses an electronic order book for FTSE All-Share securities?", "opts": ["A) SEAQ", "B) SETSqx", "C) SETS", "D) IOB"], "ans_letter": "C", "ans_full": "C — SETS is the order-driven electronic order book covering FTSE All-Share, the most liquid AIM and Irish securities."}, {"id": "1.3.1", "q": "When do standard LSE equity trades settle, and through which system?", "opts": ["A) T+1 through LCH.Clearnet", "B) T+2 through CREST", "C) T+3 through Euroclear", "D) T+2 through SWIFT"], "ans_letter": "B", "ans_full": "B — LSE equity trades settle T+2 (two business days after trade date) through the CREST dematerialised settlement system."}, {"id": "1.3.2", "q": "A small AIM-listed company with low trading volumes would MOST likely be traded on which dealing system?", "opts": ["A) SETS", "B) SETSqx", "C) IOB", "D) EQS"], "ans_letter": "B", "ans_full": "B — SETSqx is designed for less liquid AIM securities; it combines a periodic order book with market-making to ensure quotes are available even when order flow is low."}, {"id": "1.3.3", "q": "Gilt coupons are paid on which basis?", "opts": ["A) Net, quarterly", "B) Gross, annually", "C) Gross, semi-annually", "D) Net, semi-annually"], "ans_letter": "C", "ans_full": "C — Gilt coupons are paid gross (without tax deduction) and semi-annually (twice a year)."}, {"id": "1.3.3", "q": "In a gilt 'bought deal', who initially bears the price risk on the newly issued bonds?", "opts": ["A) The DMO", "B) The GEMM", "C) The investment bank (lead manager)", "D) The end investor"], "ans_letter": "C", "ans_full": "C — In a bought deal, the investment bank purchases the entire issue from the issuer, taking on price risk before reselling to institutional investors."}, {"id": "1.3.4", "q": "Which of the following is NOT typically a motivation for a company to seek a dual listing?", "opts": ["A) To access a wider international investor base", "B) To reduce compliance and regulatory costs", "C) To facilitate cross-border acquisitions using shares as currency", "D) To improve the liquidity of the company's shares"], "ans_letter": "B", "ans_full": "B — Dual listing typically INCREASES compliance costs because the company must satisfy the requirements of multiple regulatory regimes."}, {"id": "1.3.5", "q": "Which feature is a key advantage of an exchange-traded market over OTC?", "opts": ["A) Contracts are fully customisable to the buyer's needs", "B) No counterparty risk due to central counterparty clearing", "C) No regulatory oversight required", "D) Lower transparency of pricing"], "ans_letter": "B", "ans_full": "B — A CCP interposes between buyer and seller in exchange-traded markets, virtually eliminating counterparty credit risk. OTC bilateral trades retain this risk unless separately cleared."}, {"id": "1.3.6", "q": "A large fund manager wants to sell a £50 million block of shares without the market knowing the size of the order, to avoid the price falling before execution. It should MOST likely use:", "opts": ["A) SETS order book", "B) A dark pool", "C) A systematic internaliser", "D) The DMO auction"], "ans_letter": "B", "ans_full": "B — Dark pools are MTFs without pre-trade transparency. They allow large orders to be executed anonymously, reducing market impact."}, {"id": "1.3.6", "q": "Which MiFID II category describes an investment firm that deals as principal in liquid shares for clients outside a regulated market or MTF?", "opts": ["A) Organised trading facility", "B) Dark pool", "C) Systematic internaliser", "D) Multilateral trading facility"], "ans_letter": "C", "ans_full": "C — A systematic internaliser (SI) deals on its own account in liquid shares for clients, operating outside exchanges and MTFs, and must publish firm quotes."}, {"id": "1.3.7", "q": "On SETS (order-driven market), how are trades executed?", "opts": ["A) Investors call a market maker who quotes a bid/offer price", "B) Buy and sell orders are entered into an electronic book and matched automatically", "C) A specialist firm sets the clearing price once per day", "D) Trades are executed via an inter-dealer broker"], "ans_letter": "B", "ans_full": "B — SETS is an order-driven electronic order book: orders from buyers and sellers are matched automatically by price and time priority, without the need for market makers."}, {"id": "1.3.8", "q": "A broker executes a client's order to buy 1,000 shares and earns a commission. The broker has acted as:", "opts": ["A) A principal, taking on inventory risk", "B) A market maker", "C) An agent, acting on behalf of the client", "D) A central counterparty"], "ans_letter": "C", "ans_full": "C — A broker acts as agent: it executes orders on behalf of clients and earns a commission. It does not take the other side of the trade as principal."}, {"id": "1.3.9", "q": "The US Flash Crash of 2010, when markets fell and recovered within minutes, is cited as a risk associated with:", "opts": ["A) Central counterparty clearing", "B) High-frequency algorithmic trading feedback loops", "C) Dark pool pre-trade transparency", "D) T+2 settlement cycles"], "ans_letter": "B", "ans_full": "B — The Flash Crash was primarily attributed to algorithmic/HFT feedback loops where sell orders triggered further automated selling, causing extreme short-term price dislocations."}, {"id": "1.4.1", "q": "Which body acts as the UK Listing Authority and decides on admission to the Official List?", "opts": ["A) The London Stock Exchange", "B) The Bank of England", "C) The Financial Conduct Authority (FCA)", "D) The Prudential Regulation Authority (PRA)"], "ans_letter": "C", "ans_full": "C — The FCA acts as the UK Listing Authority (UKLA) and is the competent authority responsible for admission to the Official List."}, {"id": "1.4.2", "q": "Under which legislation does the FCA derive its power to make and enforce the Listing Rules?", "opts": ["A) The Companies Act 2006", "B) The Financial Services and Markets Act 2000 (FSMA)", "C) The Prospectus Regulation 2017", "D) The Market Abuse Regulation (MAR)"], "ans_letter": "B", "ans_full": "B — FSMA 2000 is the primary enabling legislation that gives the FCA its powers to make the Listing Rules and other regulatory rules."}, {"id": "1.4.3", "q": "A company seeking a Premium listing on the Official List must have a free float of at least:", "opts": ["A) 5%", "B) 10%", "C) 25%", "D) 50%"], "ans_letter": "B", "ans_full": "B — Premium listing requires at least 10% of issued shares to be in public hands (free float)."}, {"id": "1.4.3", "q": "Which of the following is required for a Premium listing but NOT for an AIM admission?", "opts": ["A) An admission document", "B) A nominated advisor (Nomad)", "C) A sponsor and at least 3 years' accounts", "D) A corporate adviser"], "ans_letter": "C", "ans_full": "C — Premium listing requires a sponsor and 3 years' accounts. AIM requires a Nomad (not a sponsor) and has no minimum account history requirement."}, {"id": "1.4.4", "q": "The PRIMARY purpose of requiring a prospectus before a public offering is to:", "opts": ["A) Enable the FCA to collect listing fees", "B) Ensure investors have all material information to make an informed investment decision", "C) Allow the company to fix its share price in advance", "D) Prevent small companies from accessing public markets"], "ans_letter": "B", "ans_full": "B — The prospectus is fundamentally an investor protection measure: it ensures all material information is disclosed so that investors can make informed decisions."}, {"id": "1.4.5", "q": "A company issues new shares representing 15% of its existing class of shares already traded on a regulated market, offered only to institutional investors. Which exemption from the prospectus requirement MOST likely applies?", "opts": ["A) The offer is made to fewer than 150 persons", "B) The shares are less than 20% of the same class already admitted to trading", "C) The minimum investment is €100,000", "D) No exemption applies — a prospectus is always required"], "ans_letter": "B", "ans_full": "B — Shares under 20% of the same class already admitted to a regulated market are exempt from the prospectus requirement (for admission purposes)."}, {"id": "1.4.5", "q": "A company makes a rights issue to all its shareholders (members of the public). Must it publish a prospectus?", "opts": ["A) No — it is the same class of shares already traded", "B) No — the minimum investment will exceed €100,000", "C) Yes — a rights issue to the public always requires a prospectus", "D) Only if more than 150 shareholders are eligible"], "ans_letter": "C", "ans_full": "C — Rights issues directed to the public always require a prospectus, even if the new shares are the same class as those already listed. The 20% exemption only applies to admission to trading, not to public offers."}, {"id": "1.5.1", "q": "A PDMR sells shares in their company. Within how many days must they notify the company and the FCA?", "opts": ["A) 1 business day", "B) 2 business days", "C) 3 business days", "D) 5 business days"], "ans_letter": "C", "ans_full": "C — PDMRs must notify the company AND the FCA within 3 business days of the transaction."}, {"id": "1.5.1", "q": "An investor's stake in a listed company rises from 2.8% to 3.2%. What is required?", "opts": ["A) No action — the threshold is 5%", "B) Notify the company within 2 business days as the 3% threshold has been crossed", "C) Notify the FCA directly within 3 business days", "D) No notification required until the stake reaches 5%"], "ans_letter": "B", "ans_full": "B — Investors must notify the company within 2 business days when a holding first reaches 3%."}, {"id": "1.5.2", "q": "Which body produces the UK Corporate Governance Code?", "opts": ["A) Financial Conduct Authority (FCA)", "B) Bank of England", "C) Financial Reporting Council (FRC)", "D) London Stock Exchange"], "ans_letter": "C", "ans_full": "C — The Financial Reporting Council (FRC) is the independent body that produces the UK Corporate Governance Code."}, {"id": "1.5.3", "q": "The UK Corporate Governance Code applies to Premium listed companies on which basis?", "opts": ["A) Mandatory — companies must comply with all provisions", "B) Comply-or-explain — comply or explain why not in the annual report", "C) Voluntary — guidance only with no disclosure requirement", "D) Comply-or-fine — regulators impose fines for non-compliance"], "ans_letter": "B", "ans_full": "B — The UK Corporate Governance Code operates on a 'comply-or-explain' basis: companies must either comply with each provision or explain in their annual report why they have not done so."}, {"id": "1.5.4", "q": "Under SRD II, what must institutional investors do regarding their approach to engaging with investee companies?", "opts": ["A) They must vote against all management remuneration proposals", "B) They must develop and disclose an engagement policy or explain why they have not", "C) They must hold at least 5% of each investee company", "D) They must attend every AGM of investee companies"], "ans_letter": "B", "ans_full": "B — SRD II requires institutional investors and asset managers to develop and publicly disclose an engagement policy, or explain why they have decided not to adopt one (comply-or-explain)."}, {"id": "1.5.5", "q": "Which of the following BEST describes why board diversity is considered important for good corporate governance?", "opts": ["A) It guarantees higher share prices", "B) Diverse boards reduce the risk of groupthink and improve decision-making quality", "C) It removes the need for non-executive directors", "D) It eliminates the agency problem entirely"], "ans_letter": "B", "ans_full": "B — Diverse boards with different perspectives are less prone to groupthink, enabling more balanced and effective decision-making, which is central to good governance."}, {"id": "1.5.6", "q": "Where must a Premium listed company disclose its compliance (or otherwise) with the UK Corporate Governance Code?", "opts": ["A) In a separate filing to Companies House", "B) In a corporate governance statement in the annual report and accounts", "C) Only on the company's website", "D) In a quarterly report to the FCA"], "ans_letter": "B", "ans_full": "B — Premium listed companies must include a corporate governance statement in their annual report and accounts, identifying the code applied and explaining any non-compliance."}, {"id": "1.5.7", "q": "A FTSE 100 company receives a material contract. It should notify the market via which channel?", "opts": ["A) A press conference for selected analysts", "B) An email to its major shareholders", "C) The Regulatory News Service (RNS) or a Primary Information Provider (PIP)", "D) A posting on the company website only"], "ans_letter": "C", "ans_full": "C — Price-sensitive information must be released through the RNS or an approved PIP to ensure simultaneous dissemination to all market participants."}, {"id": "1.5.8", "q": "A UK public company must hold its AGM within how many months of its financial year end?", "opts": ["A) 3 months", "B) 4 months", "C) 6 months", "D) 12 months"], "ans_letter": "C", "ans_full": "C — UK public companies must hold their AGM within 6 months of the financial year end."}, {"id": "1.5.8", "q": "What is the minimum notice period for calling a general meeting (other than an AGM)?", "opts": ["A) 7 days", "B) 14 days", "C) 21 days", "D) 28 days"], "ans_letter": "B", "ans_full": "B — General meetings (other than AGMs) require at least 14 clear days' written notice."}, {"id": "1.5.9", "q": "Shareholders owning 6% of a company's voting shares wish to remove a director between AGMs. They should:", "opts": ["A) Wait for the next AGM and propose a special resolution", "B) Requisition a general meeting — they hold more than 5% of voting rights", "C) Write to the FCA requesting intervention", "D) Contact the FRC to enforce the UK Corporate Governance Code"], "ans_letter": "B", "ans_full": "B — Shareholders holding 5% or more of voting capital can requisition the directors to call a general meeting."}, {"id": "1.5.10", "q": "A company wishes to amend its articles of association. What type of resolution is required and what level of shareholder approval?", "opts": ["A) Ordinary resolution — more than 50% approval", "B) Special resolution — at least 75% approval", "C) Ordinary resolution — at least 75% approval", "D) Special resolution — unanimous approval"], "ans_letter": "B", "ans_full": "B — Amending the articles of association requires a special resolution, which must be passed by at least 75% of votes cast."}, {"id": "1.5.10", "q": "A company proposes the re-election of a non-executive director at its AGM. This requires:", "opts": ["A) An ordinary resolution — more than 50% of votes cast", "B) A special resolution — at least 75% of votes cast", "C) A unanimous vote of all shareholders", "D) No vote — directors are automatically re-elected"], "ans_letter": "A", "ans_full": "A — Re-electing a director is a standard ordinary resolution, requiring more than 50% of votes cast."}, {"id": "1.5.11", "q": "A shareholder owning 12% of the voting capital wishes to ensure the vote properly reflects shareholdings. They should demand:", "opts": ["A) A show of hands vote", "B) A poll vote — they hold more than 10% of voting rights", "C) A special resolution process", "D) A postal ballot"], "ans_letter": "B", "ans_full": "B — A poll vote, where voting is by number of shares held (one share, one vote), can be demanded by a member or members representing 10% or more of voting rights."}, {"id": "1.5.12", "q": "A pension fund trustee appoints a proxy and instructs them to vote FOR resolution 1 and AGAINST resolution 2. This is an example of:", "opts": ["A) A general proxy", "B) A special (two-way) proxy", "C) A poll vote", "D) A show of hands proxy"], "ans_letter": "B", "ans_full": "B — A special/two-way proxy is one where the shareholder gives specific voting instructions (for or against each resolution), leaving the proxy no discretion."}, {"id": "1.6.1", "q": "Designated Market Makers (DMMs) on the NYSE are responsible for:", "opts": ["A) Setting interest rates for listed companies", "B) Maintaining orderly markets by providing liquidity at their assigned trading posts", "C) Approving prospectuses for new listings", "D) Acting as central counterparties for settlement"], "ans_letter": "B", "ans_full": "B — DMMs are assigned to specific stocks on the NYSE floor. They are responsible for maintaining fair and orderly markets by providing liquidity at their assigned trading posts."}, {"id": "1.6.1", "q": "An investor in an emerging market fund faces risks that are generally NOT present when investing in developed markets. Which of the following is such a risk?", "opts": ["A) Bid-ask spread", "B) Market maker default", "C) Capital controls restricting repatriation of funds", "D) Annual management charges"], "ans_letter": "C", "ans_full": "C — Capital controls (government-imposed restrictions on moving money in or out of a country) are a risk specific to some emerging markets and are not typically a concern in developed markets."}, {"id": "1.6.2", "q": "Which of the following is a key feature that distinguishes Eurobonds from UK gilts?", "opts": ["A) Eurobonds pay coupons gross and annually; gilts pay gross se
