<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>IMC Unit 1 – Revision Dashboard</title>
<style>
:root{--navy:#1e293b;--bg:#f1f5f9;--card:#fff;--muted:#64748b;--border:#e2e8f0;
  --green:#22c55e;--amber:#f59e0b;--radius:10px;--quiz-color:#6366f1}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--navy);min-height:100vh}

/* ── Header ── */
#hdr{background:linear-gradient(135deg,#1e293b,#0f172a);color:#fff;
  padding:12px 20px;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.35)}
#hdr h1{font-size:1.05rem;font-weight:700}
#hdr-sub{font-size:.7rem;opacity:.6;margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:10px}
.prog-wrap{display:flex;align-items:center;gap:7px}
.prog-track{background:#334155;border-radius:20px;height:7px;width:120px;overflow:hidden}
.prog-fill{background:var(--green);height:100%;border-radius:20px;transition:width .4s}
#overall-pct{font-size:.78rem;font-weight:700}
#overall-count{font-size:.7rem;opacity:.55}

/* ── Tabs ── */
#tabs{display:flex;overflow-x:auto;background:#fff;
  border-bottom:1px solid var(--border);padding:0 14px;
  position:sticky;top:var(--hdr-h,53px);z-index:99;scrollbar-width:none;
  -webkit-overflow-scrolling:touch}
#tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 14px;border:none;background:none;cursor:pointer;
  font-size:.78rem;font-weight:600;color:var(--muted);
  border-bottom:3px solid transparent;white-space:nowrap;
  display:flex;align-items:center;gap:5px;transition:color .15s}
.tab-btn.active{color:var(--ch-color);border-bottom-color:var(--ch-color)}
.tab-btn:hover{color:var(--ch-color)}
.tab-pip{width:7px;height:7px;border-radius:50%;background:var(--ch-color);
  opacity:.25;flex-shrink:0;transition:opacity .2s}
.tab-pip.lit{opacity:1}
.tab-wrong-pill{background:#ef4444;color:#fff;font-size:.6rem;font-weight:700;
  padding:2px 5px;border-radius:10px;margin-left:2px;line-height:1}

/* ── Panels ── */
.ch-panel{display:none;padding:16px 16px 80px;max-width:860px;margin:0 auto}
#panels{-webkit-overflow-scrolling:touch}
.ch-panel.active{display:block}

/* Chapter header */
.ch-hdr{background:var(--card);border-radius:var(--radius);padding:14px 16px;
  margin-bottom:14px;border-left:5px solid var(--ch-color);
  box-shadow:0 1px 3px rgba(0,0,0,.07)}
.ch-hdr h2{font-size:.98rem;font-weight:700}
.ch-meta{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
.badge{font-size:.68rem;padding:2px 8px;border-radius:20px;
  background:#f1f5f9;color:var(--muted);font-weight:600}
.badge.green{background:#dcfce7;color:#16a34a}
.quiz-open-btn{background:#eff6ff;color:#1d4ed8;border:none;cursor:pointer;
  font-size:.68rem;padding:2px 8px;border-radius:20px;font-weight:600;transition:background .15s}
.quiz-open-btn:hover{background:#dbeafe}
.ch-prog{display:flex;align-items:center;gap:8px;margin-top:9px}
.ch-prog .prog-track{background:#e2e8f0;width:160px}
.ch-prog-pct{font-size:.76rem;font-weight:700;color:var(--ch-color)}
.ch-prog-count{font-size:.72rem;color:var(--muted)}

/* Search */
.srch{margin-bottom:11px}
.srch input{width:100%;padding:9px 13px;border:1px solid var(--border);
  border-radius:8px;font-size:.84rem;background:#fff;outline:none}
.srch input:focus{border-color:var(--ch-color)}

/* Section label */
.sec-label{font-size:.72rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);margin:18px 0 8px;
  padding-bottom:5px;border-bottom:1px solid var(--border)}

/* ── Point card ── */
.pc{background:var(--card);border-radius:var(--radius);
  border-left:4px solid var(--ch-color);
  box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:8px;
  transition:box-shadow .2s}
.pc:hover{box-shadow:0 3px 9px rgba(0,0,0,.1)}
.pc.done{opacity:.5}
.pc-head{display:flex;align-items:flex-start;gap:9px;padding:11px 13px;cursor:pointer}
.pc-num{background:var(--ch-color);color:#fff;font-size:.65rem;font-weight:700;
  padding:3px 6px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.pc-text{flex:1;font-size:.85rem;line-height:1.5}
.pc-check{flex-shrink:0;width:19px;height:19px;margin-top:3px;
  accent-color:var(--green);cursor:pointer}
.pc-body{display:none;padding:0 13px 12px}
.pc-body.open{display:block}

/* Accordions */
.acc{border:1px solid var(--border);border-radius:8px;margin-top:7px;overflow:hidden}
.acc-h{display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;cursor:pointer;font-size:.78rem;font-weight:600;
  background:#f8fafc;user-select:none}
.acc-h:hover{background:#f1f5f9}
.acc-h .ch{transition:transform .2s;font-size:.62rem;color:var(--muted)}
.acc-h.open .ch{transform:rotate(180deg)}
.acc-b{display:none;padding:10px 12px;font-size:.82rem;line-height:1.68;color:#334155}
.acc-b.open{display:block}

/* Key points */
.kpl{list-style:none;padding:0}
.kpl li{padding:4px 0 4px 17px;position:relative;
  border-bottom:1px solid #f1f5f9;font-size:.82rem}
.kpl li:last-child{border-bottom:none}
.kpl li::before{content:"▸";position:absolute;left:0;color:var(--ch-color)}

/* Inline questions (in accordions) */
.qi{background:#f8fafc;border-left:3px solid var(--ch-color);
  border-radius:6px;padding:9px 11px;margin-bottom:7px}
.qi-q{font-size:.8rem;font-weight:600;margin-bottom:5px}
.qi-opts{font-size:.78rem;color:var(--muted);white-space:pre-line;margin-bottom:4px}
.qi-ans{font-size:.78rem;font-weight:700;color:var(--green);
  border-top:1px solid var(--border);padding-top:5px;margin-top:5px;display:none}
.reveal{font-size:.72rem;padding:3px 8px;border:1px solid var(--ch-color);
  background:none;color:var(--ch-color);border-radius:5px;cursor:pointer}
.reveal:hover{background:var(--ch-color);color:#fff}
.empty-note{font-size:.77rem;color:var(--amber);font-style:italic;
  background:#fefce8;border:1px dashed var(--amber);border-radius:6px;padding:7px 11px}

/* Practice Q section */
.pq-box{background:var(--card);border-radius:var(--radius);
  margin-top:20px;padding:14px 16px;border:1px solid var(--border)}
.pq-box h3{font-size:.86rem;margin-bottom:11px}
.pq-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.pq-btn{padding:8px 15px;border-radius:8px;border:none;cursor:pointer;
  font-size:.77rem;font-weight:600}
.pq-btn.solid{background:var(--ch-color);color:#fff}
.pq-btn.solid:hover{opacity:.88}
.pq-btn.outline{background:#fff;border:1.5px solid var(--ch-color);color:var(--ch-color)}
.pq-btn.outline:hover{background:var(--ch-color);color:#fff}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:8px}
.img-wrap{position:relative;aspect-ratio:4/3;border-radius:7px;overflow:hidden;
  border:2px solid var(--border);cursor:pointer;transition:border-color .2s}
.img-wrap:hover{border-color:var(--ch-color)}
.img-wrap img{width:100%;height:100%;object-fit:cover}
.img-del{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;
  border:none;border-radius:50%;width:17px;height:17px;font-size:.6rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-weight:700;line-height:1;z-index:5}
.no-files{font-size:.78rem;color:var(--muted);font-style:italic}

/* ── Modals ── */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:1000;align-items:center;justify-content:center}
.modal.open{display:flex}
.test-box{background:#fff;border-radius:14px;padding:20px;
  width:min(94vw,620px);text-align:center;position:relative;
  max-height:92vh;overflow-y:auto}
.test-box h2{font-size:.92rem;margin-bottom:13px;color:var(--navy)}
#test-img{max-width:100%;max-height:55vh;border-radius:8px;object-fit:contain}
.test-nav{display:flex;align-items:center;justify-content:center;gap:11px;margin-top:13px}
.test-nav button{padding:7px 17px;border-radius:8px;border:none;cursor:pointer;
  font-weight:600;font-size:.8rem;background:var(--navy);color:#fff}
.test-nav button:disabled{opacity:.3;cursor:not-allowed}
.test-ctr{font-size:.78rem;color:var(--muted)}
.modal-close{position:absolute;top:10px;right:12px;background:none;border:none;
  font-size:1.15rem;cursor:pointer;color:var(--muted)}
.test-empty{color:var(--muted);padding:16px;font-size:.87rem}
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);
  z-index:2000;align-items:center;justify-content:center;cursor:zoom-out}
#lb.open{display:flex}
#lb img{max-width:95vw;max-height:95vh;border-radius:8px}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(16px);
  background:#1e293b;color:#fff;padding:9px 18px;border-radius:22px;
  font-size:.8rem;font-weight:600;opacity:0;transition:all .25s;
  z-index:9999;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Quiz Tab Styles ── */
#pnl-quiz{max-width:700px}

/* Setup card */
.qz-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:12px;
  box-shadow:0 1px 3px rgba(0,0,0,.07)}
.qz-card h2{font-size:1.1rem;font-weight:700;margin-bottom:18px;color:var(--navy)}
.qz-sec{margin-bottom:18px}
.qz-sec-title{font-size:.75rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);margin-bottom:9px;padding-bottom:5px;
  border-bottom:1px solid var(--border)}
.qz-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
.qz-chip{padding:8px 13px;border-radius:8px;border:2px solid var(--border);
  background:#fff;cursor:pointer;font-size:.78rem;font-weight:600;
  transition:all .15s;color:var(--muted);font-family:inherit}
.qz-chip.on{color:#fff}
.qz-small-btn{padding:5px 11px;border-radius:6px;border:1px solid var(--border);
  background:#fff;font-size:.73rem;cursor:pointer;color:var(--muted);
  margin-right:5px;font-family:inherit}
.qz-small-btn:hover{background:#f1f5f9}
.qz-radio-label{display:flex;align-items:center;gap:8px;padding:9px 12px;
  border-radius:8px;border:1.5px solid var(--border);cursor:pointer;
  font-size:.84rem;background:#fff;margin-bottom:7px;
  transition:border-color .15s;font-family:inherit}
.qz-radio-label input[type="radio"]{accent-color:var(--quiz-color);
  width:16px;height:16px;flex-shrink:0}
.qz-radio-label input[type="checkbox"]{accent-color:var(--quiz-color);
  width:16px;height:16px;flex-shrink:0}
.qz-count-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.qz-count-grid .qz-radio-label{margin-bottom:0}
.qz-wrong-pill{background:#fee2e2;color:#dc2626;font-size:.72rem;font-weight:700;
  padding:2px 8px;border-radius:10px;margin-left:4px}
.qz-stats-bar{background:#f8fafc;border-radius:8px;padding:10px 14px;
  display:flex;flex-wrap:wrap;gap:14px;font-size:.78rem;color:var(--muted);
  margin-bottom:14px}
.qz-stats-item span{font-weight:700;color:var(--navy)}
.qz-start-btn{width:100%;padding:14px;background:var(--quiz-color);color:#fff;
  border:none;border-radius:10px;font-size:.92rem;font-weight:700;
  cursor:pointer;transition:opacity .15s;font-family:inherit}
.qz-start-btn:hover{opacity:.9}
.qz-start-btn:active{opacity:.8}

/* Session */
.qz-sess-topbar{display:flex;align-items:center;justify-content:space-between;
  padding:10px 0 8px;gap:8px;flex-wrap:wrap}
.qz-back-btn{padding:7px 13px;background:#fff;border:1.5px solid var(--border);
  border-radius:7px;font-size:.78rem;font-weight:600;cursor:pointer;
  color:var(--muted);font-family:inherit}
.qz-back-btn:hover{background:#f1f5f9}
.qz-q-counter{font-size:.82rem;font-weight:700;color:var(--navy)}
.qz-score-pill{background:#f1f5f9;padding:5px 11px;border-radius:20px;
  font-size:.76rem;font-weight:700;color:var(--navy)}
.qz-prog-track{height:6px;background:#e2e8f0;border-radius:3px;
  overflow:hidden;margin-bottom:14px}
.qz-prog-fill{height:100%;background:var(--quiz-color);border-radius:3px;transition:width .3s}
.qz-q-card{background:#fff;border-radius:12px;padding:18px;
  box-shadow:0 1px 3px rgba(0,0,0,.07)}
.qz-q-meta{display:flex;align-items:center;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.qz-q-tag{font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:5px}
.qz-q-ch-name{font-size:.73rem;font-weight:600}
.qz-q-text{font-size:.92rem;font-weight:600;line-height:1.6;margin-bottom:16px;color:var(--navy)}
.qz-ans-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.qz-ans-btn{display:flex;align-items:flex-start;gap:10px;width:100%;
  padding:12px 14px;background:#fff;border:2px solid var(--border);
  border-radius:9px;cursor:pointer;text-align:left;font-size:.85rem;
  line-height:1.45;transition:all .15s;font-family:inherit;color:var(--navy)}
.qz-ans-btn:hover:not(:disabled){border-color:var(--quiz-color);background:#f5f3ff}
.qz-ans-btn:disabled{cursor:default}
.qz-ans-letter{width:28px;height:28px;border-radius:50%;background:#f1f5f9;
  display:flex;align-items:center;justify-content:center;font-size:.72rem;
  font-weight:700;color:var(--muted);flex-shrink:0;transition:all .15s;
  border:2px solid transparent}
.qz-ans-btn.qz-correct{border-color:#16a34a!important;background:#f0fdf4!important}
.qz-ans-btn.qz-correct .qz-ans-letter{background:#16a34a;color:#fff;border-color:#16a34a}
.qz-ans-btn.qz-wrong{border-color:#dc2626!important;background:#fff1f2!important}
.qz-ans-btn.qz-wrong .qz-ans-letter{background:#dc2626;color:#fff;border-color:#dc2626}
.qz-feedback{margin-top:12px;padding:13px;border-radius:9px;font-size:.84rem;
  line-height:1.6;display:none}
.qz-feedback.qz-fb-ok{background:#f0fdf4;border-left:4px solid #16a34a}
.qz-feedback.qz-fb-bad{background:#fff1f2;border-left:4px solid #dc2626}
.qz-fb-result{font-weight:700;font-size:.9rem;margin-bottom:6px}
.qz-fb-exp{color:#334155;margin-top:6px;font-size:.82rem}
.qz-guess-wrap{margin-top:10px;padding-top:9px;border-top:1px solid var(--border)}
.qz-guess-label{display:flex;align-items:center;gap:7px;font-size:.82rem;
  color:var(--muted);cursor:pointer;font-family:inherit}
.qz-guess-label input{accent-color:#f59e0b;width:16px;height:16px;flex-shrink:0}
.qz-next-row{margin-top:14px;display:flex;justify-content:flex-end}
.qz-next-btn{padding:11px 22px;background:var(--quiz-color);color:#fff;
  border:none;border-radius:8px;font-size:.87rem;font-weight:700;
  cursor:pointer;transition:opacity .15s;font-family:inherit}
.qz-next-btn:hover{opacity:.9}

/* Results */
.qz-results-card{background:#fff;border-radius:12px;padding:28px 22px;
  text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.qz-res-emoji{font-size:2.4rem;margin-bottom:10px}
.qz-results-card h2{font-size:1.2rem;margin-bottom:6px}
.qz-big-score{font-size:3rem;font-weight:800;margin:8px 0;line-height:1}
.qz-res-pct{font-size:.88rem;color:var(--muted);margin-bottom:16px}
.qz-res-prog-track{height:10px;background:#f1f5f9;border-radius:5px;
  overflow:hidden;margin:12px 0 20px}
.qz-res-prog-fill{height:100%;border-radius:5px;transition:width .7s}
.qz-breakdown{text-align:left;border-top:1px solid var(--border);padding-top:14px;margin-top:4px}
.qz-breakdown h3{font-size:.8rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;color:var(--muted);margin-bottom:10px}
.qz-bd-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.qz-bd-label{font-size:.76rem;font-weight:700;min-width:75px;white-space:nowrap}
.qz-bd-bar{flex:1;height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden}
.qz-bd-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.qz-bd-score{font-size:.75rem;font-weight:600;min-width:36px;text-align:right;color:var(--muted)}
.qz-review-note{font-size:.83rem;color:#92400e;background:#fef3c7;
  border-radius:7px;padding:9px 13px;margin:16px 0;text-align:left}
.qz-res-btns{display:flex;flex-direction:column;gap:8px;margin-top:18px}
.qz-rbtn{padding:12px;border:none;border-radius:9px;font-size:.88rem;
  font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.qz-rbtn:hover{opacity:.88}
.qz-rbtn-wrong{background:#fee2e2;color:#dc2626}
.qz-rbtn-new{background:var(--quiz-color);color:#fff}
.qz-rbtn-chapters{background:#f1f5f9;color:var(--navy)}
.qz-empty-note{text-align:center;padding:40px 20px;color:var(--muted);font-size:.88rem}
</style>
</head>
<body>

<div id="hdr">
  <div><h1>📚 IMC Unit 1 — Revision Dashboard</h1>
    <div id="hdr-sub">Investment Management Certificate · V.23</div></div>
  <div class="hdr-right">
    <div class="prog-wrap">
      <span id="overall-pct">0%</span>
      <div class="prog-track"><div class="prog-fill" id="overall-fill" style="width:0%"></div></div>
      <span id="overall-count">0/0</span>
    </div>
  </div>
</div>

<div id="tabs"></div>
<div id="panels"></div>

<!-- Test mode modal -->
<div class="modal" id="test-modal">
  <div class="test-box">
    <button class="modal-close" onclick="closeTest()">✕</button>
    <h2 id="test-title">Test Mode</h2>
    <div id="test-body"></div>
  </div>
</div>

<!-- Lightbox -->
<div id="lb" onclick="closeLb()"><img id="lb-img" src="" alt=""></div>

<!-- Toast -->
<div id="toast"></div>

<!-- Hidden file input -->
<input type="file" id="img-input" accept="image/*" multiple style="display:none">

<script>
const CHAPTERS = [{"id": 1, "title": "Financial Markets and Institutions", "shortTitle": "Ch1: Markets", "questions": "10–20", "color": "#3b82f6", "sections": [{"id": "1.1", "title": "Introduction to Financial Markets", "points": [{"id": "1.1.1", "text": "Explain the functions of the financial services industry in allocating capital within the global economy", "explanation": "<p>The financial services industry performs four core functions in the global economy:</p>\n<ol>\n  <li><strong>Financial intermediation</strong> — channels funds from <em>savers</em> (surplus units) to <em>borrowers</em> (deficit units). Banks accept deposits and lend; capital markets allow companies to raise equity or debt directly.</li>\n  <li><strong>Pooling and managing risk</strong> — pooled investment funds spread risk across many assets; insurance products transfer risk; derivative products (options, futures, swaps) allow risk to be hedged or transferred.</li>\n  <li><strong>Payment and settlement services</strong> — banks and financial infrastructure (e.g. CREST, Euroclear) enable money and securities to be transferred efficiently between counterparties.</li>\n  <li><strong>Portfolio management</strong> — fund managers, wealth managers and advisers allocate capital across asset classes on behalf of investors, optimising risk and return.</li>\n</ol>\n<p>By performing these functions the industry directs capital to its most productive uses, supporting economic growth.</p>", "keypoints": ["Financial intermediation: channels funds from savers → borrowers (banks, capital markets)", "Risk pooling: pooled funds, insurance, derivatives allow risk to be managed/transferred", "Payment & settlement: CREST, Euroclear enable efficient transfer of money and securities", "Portfolio management: professional allocation of capital across asset classes", "All four functions together allocate capital efficiently in the global economy"], "questions": [{"q": "Which of the following is NOT one of the main functions of the financial services industry?", "opts": "A) Financial intermediation\nB) Pooling and managing risk\nC) Setting monetary policy\nD) Payment and settlement services", "ans": "C — Setting monetary policy is the role of central banks (e.g. Bank of England), not the financial services industry as a whole."}, {"q": "A pension fund accepts contributions from members and invests in a diversified portfolio of equities and bonds. Which financial services function does this BEST illustrate?", "opts": "A) Payment and settlement\nB) Financial intermediation and portfolio management\nC) Risk transfer via insurance\nD) Regulatory compliance", "ans": "B — The pension fund intermediates (channels savings into investments) and manages a portfolio on behalf of members."}]}, {"id": "1.1.2", "text": "Explain the role and impact of the main financial institutions", "explanation": "<p>The main financial institutions and their roles:</p>\n<ul>\n  <li><strong>Central banks</strong> (e.g. Bank of England, Federal Reserve, ECB) — control monetary policy (interest rates, money supply), act as lender of last resort, issue banknotes, supervise the banking system and manage foreign exchange reserves.</li>\n  <li><strong>Deposit institutions</strong> (commercial/retail banks, building societies) — accept deposits and make loans; create credit; provide payment services. They are the primary channel for financial intermediation for households and SMEs.</li>\n  <li><strong>Investment institutions</strong> — include pension funds, insurance companies, unit trusts/OEICs, investment trusts, hedge funds and sovereign wealth funds. They pool the savings of many investors and invest in securities markets. As large investors they have significant market impact.</li>\n</ul>\n<p>Investment institutions are significant because they represent the majority of equity ownership in developed markets, and therefore exert influence on corporate governance and capital allocation.</p>", "keypoints": ["Central banks: monetary policy, lender of last resort, banknote issuance, banking supervision", "Deposit institutions: accept deposits, make loans, create credit, payment services", "Investment institutions: pension funds, insurers, unit trusts, hedge funds, sovereign wealth funds", "Investment institutions pool savings and invest in securities — dominant owners of equities", "Each type of institution plays a distinct role in financial intermediation"], "questions": [{"q": "Which institution acts as 'lender of last resort' to banks experiencing liquidity problems?", "opts": "A) Investment bank\nB) Central bank\nC) Pension fund\nD) Commercial bank", "ans": "B — Central banks (e.g. Bank of England) act as lender of last resort to support banks during a liquidity crisis."}, {"q": "A large insurance company invests premium income into UK government bonds and equities. It is best described as which type of financial institution?", "opts": "A) Deposit institution\nB) Central bank\nC) Investment institution\nD) Development bank", "ans": "C — Insurance companies are investment institutions: they pool funds (premiums) and invest in securities markets."}]}, {"id": "1.1.3", "text": "Explain the role of the government, including economic and industrial policy, regulation, taxation and social welfare", "explanation": "<p>Governments influence the economy and financial markets through four main channels:</p>\n<ul>\n  <li><strong>Provision of public sector services</strong> — governments provide defence, education, healthcare and infrastructure. This requires taxation and borrowing (issuing gilts/government bonds).</li>\n  <li><strong>Regulation</strong> — governments set the legal and regulatory framework for markets (e.g. FSMA 2000, FCA/PRA), protecting consumers and maintaining market integrity.</li>\n  <li><strong>Intervention in the distribution of income</strong> — through taxation (income tax, CGT, inheritance tax) and social welfare (benefits, state pension), governments redistribute income to reduce inequality.</li>\n  <li><strong>Stabilisation of the economy</strong> — <em>fiscal policy</em> (government spending and taxation) and <em>monetary policy</em> (via the central bank) are used to smooth economic cycles, control inflation and support employment.</li>\n</ul>", "keypoints": ["Provision of public services: funded by taxation and government borrowing (gilts)", "Regulation: FSMA 2000, FCA/PRA oversee financial markets to protect consumers and market integrity", "Income redistribution: taxation (income tax, CGT) and welfare spending reduce inequality", "Economic stabilisation: fiscal policy (spending/tax) and monetary policy (interest rates) smooth cycles"], "questions": [{"q": "The government increases income tax rates and reduces spending to cool an overheating economy. This is an example of which policy?", "opts": "A) Monetary policy\nB) Fiscal policy\nC) Regulatory policy\nD) Industrial policy", "ans": "B — Fiscal policy refers to government spending and taxation decisions. Monetary policy is set by the central bank (e.g. changing interest rates)."}, {"q": "Which of the following is a government mechanism for regulating financial markets in the UK?", "opts": "A) The Bank of England Act 1694\nB) Financial Services and Markets Act 2000 (FSMA)\nC) The Companies Act 1862\nD) The Pensions Act 1995", "ans": "B — FSMA 2000 is the primary legislation underpinning UK financial regulation, establishing the FCA and PRA."}]}]}, {"id": "1.2", "title": "The Role of Securities Markets in Providing Liquidity and Price Transparency", "points": [{"id": "1.2.1", "text": "Differentiate between a financial security and a real asset", "explanation": "<p><strong>Financial security</strong>: a tradeable financial instrument that represents a claim on future cash flows or ownership. Examples include:</p>\n<ul>\n  <li>Ordinary shares — claim on dividends and residual assets</li>\n  <li>Bonds — right to receive fixed coupon payments and principal repayment</li>\n  <li>Derivatives — right/obligation derived from an underlying asset</li>\n</ul>\n<p><strong>Real asset</strong>: a physical or tangible asset with intrinsic value. Examples include: property, machinery, infrastructure, commodities (gold, oil), and human capital.</p>\n<p>Key distinction: financial securities are <em>claims on</em> real assets or cash flows — they are not physical things themselves. The same real asset (e.g. a factory) can be funded by multiple financial securities (shares, bonds, bank loans).</p>", "keypoints": ["Financial security: tradeable claim on future cash flows/ownership (shares, bonds, derivatives)", "Real asset: physical/tangible asset with intrinsic value (property, machinery, commodities)", "Financial securities represent claims ON real assets — not physical things themselves", "One real asset can be backed by multiple financial securities"], "questions": [{"q": "Which of the following is a REAL asset rather than a financial security?", "opts": "A) A UK government gilt\nB) A share in a FTSE 100 company\nC) A commercial office building\nD) A corporate bond", "ans": "C — A commercial office building is a physical/real asset. Gilts, shares and bonds are all financial securities (claims on cash flows or ownership)."}]}, {"id": "1.2.2", "text": "Identify the key features of an ordinary share, a bond, a derivative contract, a unit in a pooled fund and a foreign exchange transaction", "explanation": "<p>Key features of the main financial instruments:</p>\n<ul>\n  <li><strong>Ordinary share</strong>: equity ownership; entitles holder to dividends (discretionary), voting rights at AGMs, and residual claim on assets in liquidation. Highest risk/return profile among these.</li>\n  <li><strong>Bond</strong>: debt instrument; issuer promises fixed coupon payments and principal repayment at maturity. Bondholder is a creditor (ranked above equity). Lower risk than shares but fixed return.</li>\n  <li><strong>Derivative contract</strong>: value derived from an underlying asset (share, index, currency, commodity, interest rate). Includes futures, options, swaps. Used for hedging or speculation. Can be exchange-traded or OTC.</li>\n  <li><strong>Unit in a pooled fund</strong> (e.g. OEIC, unit trust): collective investment; investor buys units representing a share of the fund's portfolio. Provides diversification. Value = net asset value (NAV) per unit.</li>\n  <li><strong>Foreign exchange (FX) transaction</strong>: exchange of one currency for another at a specified rate. Can be spot (immediate) or forward (agreed rate for future date). Used by companies and investors to manage currency risk.</li>\n</ul>", "keypoints": ["Ordinary share: equity, discretionary dividends, voting rights, residual claim in liquidation", "Bond: debt, fixed coupon + principal at maturity, creditor (ranks above equity)", "Derivative: value derived from underlying asset; used for hedging or speculation", "Pooled fund unit: collective investment, diversification, valued at NAV per unit", "FX transaction: exchange currencies at spot or forward rate; manages currency risk"], "questions": [{"q": "An investor holds units in a UK OEIC. If the fund is wound up, the investor has a claim on:", "opts": "A) A fixed coupon payment and return of principal\nB) Their proportionate share of the fund's net assets\nC) Voting rights at the company's AGM\nD) The difference in price between two currencies", "ans": "B — Holders of units in a pooled fund (OEIC/unit trust) have a proportionate claim on the fund's net assets (NAV)."}, {"q": "A company treasurer agrees today to sell €1 million for sterling in three months' time at a pre-agreed exchange rate. This is an example of:", "opts": "A) An ordinary share investment\nB) A spot FX transaction\nC) A forward FX transaction\nD) A bond issuance", "ans": "C — A forward FX transaction locks in an exchange rate for a future date. A spot transaction settles immediately (typically T+2)."}]}, {"id": "1.2.3", "text": "Identify the functions of securities markets in providing price transparency and liquidity", "explanation": "<p>Securities markets provide two essential functions:</p>\n<p><strong>Price transparency</strong>:</p>\n<ul>\n  <li><em>Pre-trade transparency</em>: real-time dissemination of bid/offer quotes and order book depth before a trade is executed. Helps buyers and sellers assess fair value.</li>\n  <li><em>Post-trade transparency</em>: publication of trade prices and sizes shortly after execution. Allows the market to see where deals were actually done.</li>\n</ul>\n<p><strong>Liquidity</strong>: the ability to buy or sell a security quickly at or close to its fair market value. Liquid markets have:</p>\n<ul>\n  <li>Tight bid-ask spreads</li>\n  <li>Deep order books (large volume available at each price level)</li>\n  <li>High trading volumes</li>\n</ul>\n<p>Both functions together support efficient <em>price discovery</em> — the process by which market prices reflect all available information about the value of a security.</p>", "keypoints": ["Pre-trade transparency: real-time quotes/order book visible BEFORE trade executes", "Post-trade transparency: trade prices/volumes published AFTER execution", "Liquidity: ability to buy/sell quickly at fair value; tight spreads, deep order books, high volume", "Price discovery: process by which prices reflect all available information", "Both transparency and liquidity support efficient price discovery"], "questions": [{"q": "The publication of the price and size of a trade immediately after it has been executed is an example of:", "opts": "A) Pre-trade transparency\nB) Post-trade transparency\nC) Market depth\nD) Liquidity risk", "ans": "B — Post-trade transparency means publishing actual trade details (price and size) after execution. Pre-trade transparency relates to quotes/order book before execution."}]}, {"id": "1.2.4", "text": "Identify the reasons why liquidity and price transparency are thought to be important for the efficient allocation of capital when trading in securities markets", "explanation": "<p>Liquidity and price transparency are important for efficient capital allocation because:</p>\n<ul>\n  <li><strong>Accurate prices signal value</strong>: transparent prices reflect the collective view of all market participants. Capital flows towards assets priced attractively (high expected return) and away from those priced expensively.</li>\n  <li><strong>Lower transaction costs</strong>: liquid markets have tight bid-ask spreads, reducing the cost of moving capital from low-productivity to high-productivity uses.</li>\n  <li><strong>Lower risk premium</strong>: investors demand a lower return for holding liquid, transparent assets because they can exit easily. This reduces the cost of capital for issuers.</li>\n  <li><strong>Better information for decision-making</strong>: transparent prices reflect publicly available information, helping investors make informed decisions about where to allocate capital.</li>\n  <li><strong>Reduced adverse selection and moral hazard</strong>: when prices are transparent, it is harder for one party to exploit information advantages over another.</li>\n</ul>", "keypoints": ["Accurate prices signal value → capital flows to most productive uses", "Liquid markets have tight spreads → lower cost of moving capital", "Investors accept lower returns in liquid markets → lower cost of capital for issuers", "Transparent prices reflect information → better investment decisions", "Reduced adverse selection and moral hazard when prices are visible to all"], "questions": [{"q": "Which of the following BEST explains why liquidity is important for efficient capital allocation?", "opts": "A) Liquid markets allow governments to raise taxes more easily\nB) Liquidity reduces transaction costs and lowers the required return, enabling capital to flow to productive uses\nC) Liquid markets increase bid-ask spreads, benefiting market makers\nD) High liquidity means fewer participants are needed in a market", "ans": "B — Liquid markets reduce transaction costs and the liquidity risk premium, lowering the cost of capital and enabling efficient reallocation of resources."}]}, {"id": "1.2.5", "text": "Identify the types of securities and the market conditions where price transparency, liquidity and depth are likely to be high/low", "explanation": "<p>Liquidity, price transparency and depth vary significantly across securities and market conditions:</p>\n<p><strong>Likely to be HIGH:</strong></p>\n<ul>\n  <li>FTSE 100 equities — large cap, heavily traded, tight spreads, continuous order book (SETS)</li>\n  <li>UK gilts — government bonds, GEMMs provide continuous quotes</li>\n  <li>Major FX pairs (EUR/USD, GBP/USD) — global, enormous daily volume</li>\n  <li>Exchange-traded futures on major indices</li>\n</ul>\n<p><strong>Likely to be LOW:</strong></p>\n<ul>\n  <li>Small-cap or AIM shares — fewer market makers, low daily volume</li>\n  <li>Corporate bonds, especially sub-investment grade — OTC, infrequent trading</li>\n  <li>OTC derivatives — bespoke, bilateral, no public price</li>\n  <li>Property — physical, non-standardised, infrequent transactions</li>\n  <li>Emerging market securities — political risk, capital controls, thinner markets</li>\n</ul>", "keypoints": ["HIGH transparency/liquidity: FTSE 100 equities, gilts, major FX pairs, exchange-traded futures", "LOW transparency/liquidity: small caps/AIM, corporate bonds, OTC derivatives, property, emerging markets", "Exchange-traded instruments generally more transparent than OTC", "Higher trading volume = greater depth and tighter spreads"], "questions": [{"q": "Which of the following is MOST likely to have LOW price transparency and LOW liquidity?", "opts": "A) A FTSE 100 share traded on SETS\nB) A UK gilt\nC) A bespoke OTC interest rate swap\nD) A EUR/USD spot FX transaction", "ans": "C — Bespoke OTC derivatives are bilateral agreements with no public price (low transparency) and may be difficult to unwind (low liquidity)."}]}, {"id": "1.2.6", "text": "Define liquidity risk and identify why it is important", "explanation": "<p><strong>Liquidity risk</strong> is the risk that an asset cannot be sold (or can only be sold) at a significant discount to its fair value, due to a lack of willing buyers or thin trading conditions.</p>\n<p>There are two forms:</p>\n<ul>\n  <li><strong>Asset liquidity risk</strong>: the risk arising from the characteristics of the asset itself (e.g. a commercial property or a small-cap share is harder to sell than a FTSE 100 share).</li>\n  <li><strong>Funding liquidity risk</strong>: the risk that a firm cannot meet its cash flow obligations because it cannot convert assets to cash in time.</li>\n</ul>\n<p><strong>Why it matters:</strong></p>\n<ul>\n  <li>During market stress, liquidity can dry up rapidly (e.g. 2008 financial crisis) — assets that appeared liquid can become illiquid quickly.</li>\n  <li>Forced selling at distressed prices amplifies losses.</li>\n  <li>Investors demand a <em>liquidity premium</em> to compensate for holding illiquid assets — raising the cost of capital for illiquid issuers.</li>\n  <li>Fund managers with open-ended structures must carefully manage liquidity to meet redemptions.</li>\n</ul>", "keypoints": ["Liquidity risk: cannot sell an asset quickly at fair value", "Asset liquidity risk: property, small caps harder to sell than large cap equities", "Funding liquidity risk: firm cannot meet cash obligations due to inability to liquidate assets", "During market stress, liquidity can disappear rapidly (e.g. 2008 financial crisis)", "Investors demand a liquidity premium for holding illiquid assets → higher cost of capital"], "questions": [{"q": "A fund manager holds a large position in a small-cap equity that cannot easily be sold without significantly moving the price. This BEST illustrates:", "opts": "A) Funding liquidity risk\nB) Credit risk\nC) Asset liquidity risk\nD) Inflation risk", "ans": "C — Asset liquidity risk arises when the characteristics of the asset (here, a small, thinly traded equity) mean it cannot be sold quickly without a large price impact."}]}, {"id": "1.2.7", "text": "Identify, explain and calculate transaction costs and their differences associated with dealing in UK and non-UK equities, fixed-income securities, pooled funds and property", "explanation": "<p>Transaction costs vary by asset class:</p>\n<p><strong>UK equities:</strong></p>\n<ul>\n  <li><strong>Stamp Duty Reserve Tax (SDRT)</strong>: 0.5% of the purchase consideration on electronic transfers of UK shares (charged to buyer)</li>\n  <li><strong>PTM levy</strong>: £1.50 on bargains exceeding £10,000 (charged on both buys and sells)</li>\n  <li>Broker commission (typically a % or flat fee)</li>\n  <li>Bid-ask spread</li>\n</ul>\n<p><strong>Non-UK equities:</strong></p>\n<ul>\n  <li>No SDRT, but may have equivalent local taxes (e.g. French financial transaction tax)</li>\n  <li>Typically wider spreads and higher broker commissions</li>\n  <li>Currency conversion cost (FX spread)</li>\n</ul>\n<p><strong>Fixed-income (gilts / corporate bonds):</strong></p>\n<ul>\n  <li>No SDRT on gilts or bonds</li>\n  <li>Bid-ask spread (tighter for gilts than corporate bonds)</li>\n</ul>\n<p><strong>Pooled funds (unit trusts/OEICs):</strong></p>\n<ul>\n  <li>Annual management charge (AMC)</li>\n  <li>Dilution levy (charged on entry/exit to protect existing investors from transaction costs)</li>\n</ul>\n<p><strong>Property:</strong></p>\n<ul>\n  <li>Stamp Duty Land Tax (SDLT)</li>\n  <li>Legal fees, agency/agent fees, surveys</li>\n  <li>High illiquidity premium — transaction times measured in months</li>\n</ul>", "keypoints": ["SDRT: 0.5% on UK equity purchases (buyer only, electronic transfer)", "PTM levy: £1.50 on bargains > £10,000 (both buys and sells)", "No SDRT on gilts, bonds or non-UK equities", "Non-UK equities: may have local equivalent taxes + FX conversion cost", "Property: highest transaction costs (SDLT, legal fees, agent fees) + illiquid", "Pooled funds: AMC, dilution levy — no SDRT as fund holds underlying assets"], "questions": [{"q": "An investor buys £15,000 of UK equities via an electronic transfer. What is the SDRT charge?", "opts": "A) £0\nB) £75\nC) £150\nD) £1.50", "ans": "B — SDRT = 0.5% × £15,000 = £75. The PTM levy of £1.50 also applies as the deal exceeds £10,000, but the SDRT alone is £75."}, {"q": "The PTM levy is charged on equity transactions:", "opts": "A) Only on purchases above £10,000\nB) On both purchases and sales above £10,000\nC) On all equity transactions regardless of size\nD) Only on gilts", "ans": "B — The PTM levy of £1.50 applies to both purchases and sales of equities where the consideration exceeds £10,000."}]}]}, {"id": "1.3", "title": "Types of Financial Markets", "points": [{"id": "1.3.1", "text": "Identify the main dealing systems and facilities offered in the UK equities market and explain the clearing and settlement procedures for UK exchange-traded securities", "explanation": "<p>The UK equity market has several dealing systems:</p>\n<ul>\n  <li><strong>SETS (Stock Exchange Electronic Trading Service)</strong>: order-driven electronic order book. Covers FTSE All-Share stocks, the most liquid AIM securities and Irish stocks. Buy and sell orders are matched automatically.</li>\n  <li><strong>SETSqx</strong>: hybrid system for less liquid securities not on SETS. Combines periodic electronic order book with a quote-driven market-making facility.</li>\n  <li><strong>SEAQ (Stock Exchange Automated Quotation)</strong>: quote-driven. Used for fixed interest securities and AIM securities not on SETS. Market makers provide continuous bid/offer quotes.</li>\n  <li><strong>IOB (International Order Book)</strong>: for depositary receipts on international securities.</li>\n  <li><strong>EQS (European Quoting Service)</strong>: for EU liquid securities.</li>\n</ul>\n<p><strong>Clearing and settlement:</strong></p>\n<ul>\n  <li><strong>LCH.Clearnet</strong> acts as <strong>central counterparty (CCP)</strong> for SETS and SETSqx trades — it interposes itself between buyer and seller, eliminating counterparty risk.</li>\n  <li><strong>LSE equities</strong> settle <strong>T+2</strong> through <strong>CREST</strong> (electronic dematerialised settlement system).</li>\n  <li><strong>Gilts</strong> settle <strong>T+1</strong> through CREST.</li>\n</ul>", "keypoints": ["SETS: order-driven, electronic order book, FTSE All-Share + liquid AIM + Irish securities", "SETSqx: hybrid (order book + market making), less liquid securities", "SEAQ: quote-driven, market maker quotes, fixed interest + remaining AIM", "LCH.Clearnet: central counterparty (CCP) for SETS/SETSqx — eliminates counterparty risk", "UK equities settle T+2 via CREST; gilts settle T+1 via CREST"], "questions": [{"q": "Which trading system on the London Stock Exchange uses an electronic order book for FTSE All-Share securities?", "opts": "A) SEAQ\nB) SETSqx\nC) SETS\nD) IOB", "ans": "C — SETS is the order-driven electronic order book covering FTSE All-Share, the most liquid AIM and Irish securities."}, {"q": "When do standard LSE equity trades settle, and through which system?", "opts": "A) T+1 through LCH.Clearnet\nB) T+2 through CREST\nC) T+3 through Euroclear\nD) T+2 through SWIFT", "ans": "B — LSE equity trades settle T+2 (two business days after trade date) through the CREST dematerialised settlement system."}]}, {"id": "1.3.2", "text": "Identify the nature of the securities that would be traded on each of the main dealing systems and facilities", "explanation": "<p>Each dealing system is designed for a different type of security:</p>\n<ul>\n  <li><strong>SETS</strong>: FTSE All-Share constituents (FTSE 100, FTSE 250, FTSE SmallCap), the most liquid AIM securities, and Irish equities. These are large, frequently traded stocks that generate sufficient order flow to support a continuous order book.</li>\n  <li><strong>SETSqx</strong>: Less liquid AIM securities and other smaller companies. The hybrid model means market makers can provide quotes when order book activity is low.</li>\n  <li><strong>SEAQ</strong>: Fixed income securities (corporate bonds) and remaining AIM stocks not covered by SETS/SETSqx. Also used for non-UK securities quoted in London.</li>\n  <li><strong>IOB (International Order Book)</strong>: Depositary receipts (e.g. GDRs) representing international shares. Allows foreign companies to be traded in London in sterling or US dollars.</li>\n  <li><strong>EQS (European Quoting Service)</strong>: European Union liquid securities.</li>\n</ul>", "keypoints": ["SETS: FTSE All-Share, most liquid AIM, Irish equities", "SETSqx: less liquid AIM + smaller companies (hybrid model)", "SEAQ: corporate bonds, fixed interest, remaining AIM stocks", "IOB: depositary receipts on international/foreign securities", "EQS: EU liquid securities"], "questions": [{"q": "A small AIM-listed company with low trading volumes would MOST likely be traded on which dealing system?", "opts": "A) SETS\nB) SETSqx\nC) IOB\nD) EQS", "ans": "B — SETSqx is designed for less liquid AIM securities; it combines a periodic order book with market-making to ensure quotes are available even when order flow is low."}]}, {"id": "1.3.3", "text": "Explain the structure and operation of the primary and secondary UK markets for gilts and corporate bonds", "explanation": "<p><strong>Gilts (UK Government Bonds):</strong></p>\n<ul>\n  <li><strong>Primary market</strong>: auctioned by the <strong>Debt Management Office (DMO)</strong>. Gilt-Edged Market Makers (GEMMs) are obliged to bid at DMO auctions.</li>\n  <li><strong>Secondary market</strong>: dealer/quote-driven OTC market. GEMMs provide continuous bid/offer prices. Inter-Dealer Brokers (IDBs) facilitate trading between GEMMs anonymously.</li>\n  <li>Coupons paid <strong>gross</strong> (without deduction of tax), <strong>semi-annually</strong>.</li>\n  <li><strong>Ex-dividend date</strong>: 7 days before each coupon payment — buyers after the ex-date do not receive the next coupon.</li>\n  <li>Settlement: <strong>T+1 via CREST</strong>.</li>\n</ul>\n<p><strong>Corporate Bonds:</strong></p>\n<ul>\n  <li><strong>Primary market</strong>: issued via private placements. Two methods:\n    <ol>\n      <li><strong>Bought deal</strong>: investment bank buys entire issue from issuer then resells to investors, taking on price risk.</li>\n      <li><strong>Fixed price re-offer</strong>: investment bank agrees a fixed price but distributes to investors at that price — some inventory risk shared.</li>\n    </ol>\n  </li>\n  <li><strong>Secondary market</strong>: decentralised, dealer-based <strong>OTC market</strong>. Less liquid than gilts.</li>\n</ul>", "keypoints": ["Gilt primary: auctioned by DMO; GEMMs must bid in auctions", "Gilt secondary: OTC, dealer-driven; IDBs facilitate inter-GEMM trading", "Gilt coupons: paid GROSS, SEMI-ANNUALLY; ex-div date = 7 days before coupon", "Gilt settlement: T+1 via CREST", "Corporate bond primary: private placements — bought deal OR fixed price re-offer", "Corporate bond secondary: OTC, decentralised, dealer-based, less liquid than gilts"], "questions": [{"q": "Gilt coupons are paid on which basis?", "opts": "A) Net, quarterly\nB) Gross, annually\nC) Gross, semi-annually\nD) Net, semi-annually", "ans": "C — Gilt coupons are paid gross (without tax deduction) and semi-annually (twice a year)."}, {"q": "In a gilt 'bought deal', who initially bears the price risk on the newly issued bonds?", "opts": "A) The DMO\nB) The GEMM\nC) The investment bank (lead manager)\nD) The end investor", "ans": "C — In a bought deal, the investment bank purchases the entire issue from the issuer, taking on price risk before reselling to institutional investors."}]}, {"id": "1.3.4", "text": "Explain the motivations for, and implications of, dual listing for a company", "explanation": "<p><strong>Dual listing</strong> means a company's shares are listed and traded on two or more different stock exchanges.</p>\n<p><strong>Motivations for dual listing:</strong></p>\n<ul>\n  <li>Access to a <strong>wider investor base</strong> — particularly important for large capital raises or accessing institutional investors in different geographies.</li>\n  <li><strong>Increased profile and prestige</strong> in key financial centres.</li>\n  <li><strong>Facilitates cross-border acquisitions</strong> — shares can be used as acquisition currency in markets where the company is listed.</li>\n  <li><strong>Improved liquidity</strong> — more markets means more buyers/sellers.</li>\n  <li><strong>Diversified shareholder base</strong> reduces dependence on domestic investors.</li>\n</ul>\n<p><strong>Implications of dual listing:</strong></p>\n<ul>\n  <li>Must comply with the regulatory and disclosure requirements of <strong>each jurisdiction</strong>.</li>\n  <li><strong>Additional costs</strong>: listing fees, legal fees, translation costs, additional audit/reporting requirements.</li>\n  <li><strong>Currency risk</strong>: shares trade in different currencies, creating potential for arbitrage.</li>\n  <li><strong>Arbitrage opportunities</strong>: price discrepancies between listings will be quickly exploited by traders.</li>\n</ul>", "keypoints": ["Dual listing: shares listed on two or more stock exchanges simultaneously", "Motivations: wider investor base, higher profile, cross-border acquisitions, improved liquidity", "Implications: multi-jurisdictional regulation, additional compliance costs, currency risk", "Arbitrageurs exploit price differences between listings → prices quickly converge"], "questions": [{"q": "Which of the following is NOT typically a motivation for a company to seek a dual listing?", "opts": "A) To access a wider international investor base\nB) To reduce compliance and regulatory costs\nC) To facilitate cross-border acquisitions using shares as currency\nD) To improve the liquidity of the company's shares", "ans": "B — Dual listing typically INCREASES compliance costs because the company must satisfy the requirements of multiple regulatory regimes."}]}, {"id": "1.3.5", "text": "Compare and contrast exchange-traded and over-the-counter (OTC) markets", "explanation": "<p><strong>Exchange-traded markets:</strong></p>\n<ul>\n  <li>Centralised venue (e.g. London Stock Exchange, NYSE)</li>\n  <li>Standardised contracts and terms</li>\n  <li>Central counterparty (CCP) interposes — eliminates counterparty risk</li>\n  <li>High pre- and post-trade transparency (order book visible)</li>\n  <li>Regulated by financial regulator</li>\n  <li>Margin requirements (for derivatives)</li>\n</ul>\n<p><strong>Over-the-counter (OTC) markets:</strong></p>\n<ul>\n  <li>Decentralised, bilateral — directly between buyer and seller (or via broker)</li>\n  <li>Customisable/bespoke contract terms</li>\n  <li><strong>Counterparty risk</strong> exists (unless cleared through a CCP)</li>\n  <li>Less price transparency (no central order book)</li>\n  <li>Less regulated (though post-MiFID II/EMIR much more oversight)</li>\n  <li>Flexible: can be tailored to specific needs</li>\n</ul>\n<p>Examples: gilts, corporate bonds, most FX, interest rate swaps, and bespoke derivatives trade OTC.</p>", "keypoints": ["Exchange: centralised, standardised, CCP clears, high transparency, regulated", "OTC: bilateral/decentralised, customisable, counterparty risk, less transparent", "CCP eliminates counterparty risk in exchange-traded and some cleared OTC markets", "Gilts, corporate bonds, FX, most swaps trade OTC", "Post-EMIR/MiFID II: more OTC derivatives must be reported and centrally cleared"], "questions": [{"q": "Which feature is a key advantage of an exchange-traded market over OTC?", "opts": "A) Contracts are fully customisable to the buyer's needs\nB) No counterparty risk due to central counterparty clearing\nC) No regulatory oversight required\nD) Lower transparency of pricing", "ans": "B — A CCP interposes between buyer and seller in exchange-traded markets, virtually eliminating counterparty credit risk. OTC bilateral trades retain this risk unless separately cleared."}]}, {"id": "1.3.6", "text": "Distinguish between the following alternative trading venues: multilateral trading facilities, systematic internalisers, organised trading facilities and dark pools", "explanation": "<p>MiFID II (2018) introduced a framework of trading venues beyond traditional exchanges:</p>\n<ul>\n  <li><strong>Multilateral Trading Facility (MTF)</strong>: a trading platform operated by an investment firm or market operator that brings together multiple buyers and sellers. Examples: BATS Chi-X Europe, Turquoise. Similar to exchanges but operated by private firms.</li>\n  <li><strong>Systematic Internaliser (SI)</strong>: an investment firm that deals on its own account (as principal) when executing client orders in liquid shares, outside a regulated market or MTF. Must publish firm quotes.</li>\n  <li><strong>Organised Trading Facility (OTF)</strong>: introduced by MiFID II to capture bond and derivatives trading that would not occur on exchanges or MTFs. Multilateral system but with operator discretion over how orders are matched.</li>\n  <li><strong>Dark pools</strong>: MTFs that have opted out of pre-trade transparency requirements. Orders are not displayed before execution. Used for large institutional trades to avoid <em>market impact</em> (price moving against the trade). Potentially get a better price on large orders.</li>\n</ul>", "keypoints": ["MTF: private trading platform bringing multiple buyers/sellers (e.g. BATS Chi-X, Turquoise)", "SI: investment firm dealing own account in liquid shares outside exchange/MTF; must publish quotes", "OTF: MiFID II category for bonds/derivatives; multilateral but operator has matching discretion", "Dark pool: MTF with pre-trade transparency opt-out; used for large orders to avoid market impact", "All introduced/formalised under MiFID II framework"], "questions": [{"q": "A large fund manager wants to sell a £50 million block of shares without the market knowing the size of the order, to avoid the price falling before execution. It should MOST likely use:", "opts": "A) SETS order book\nB) A dark pool\nC) A systematic internaliser\nD) The DMO auction", "ans": "B — Dark pools are MTFs without pre-trade transparency. They allow large orders to be executed anonymously, reducing market impact."}, {"q": "Which MiFID II category describes an investment firm that deals as principal in liquid shares for clients outside a regulated market or MTF?", "opts": "A) Organised trading facility\nB) Dark pool\nC) Systematic internaliser\nD) Multilateral trading facility", "ans": "C — A systematic internaliser (SI) deals on its own account in liquid shares for clients, operating outside exchanges and MTFs, and must publish firm quotes."}]}, {"id": "1.3.7", "text": "Distinguish between a quote-driven and an order-driven market", "explanation": "<p><strong>Quote-driven (dealer) markets:</strong></p>\n<ul>\n  <li>Market makers <strong>continuously quote bid and offer prices</strong> at which they will buy and sell.</li>\n  <li>Investors deal directly with market makers at their quoted prices.</li>\n  <li>Market makers profit from the bid-ask spread and take on inventory risk.</li>\n  <li>Example: <strong>SEAQ</strong> for less liquid UK equities and fixed interest securities; OTC bond markets.</li>\n  <li>Suitable when order flow is insufficient to support a continuous order book.</li>\n</ul>\n<p><strong>Order-driven markets:</strong></p>\n<ul>\n  <li>Buy and sell orders from investors are entered into an order book and <strong>matched electronically</strong> by price and time priority.</li>\n  <li>No need for market makers — prices emerge from the interaction of orders.</li>\n  <li>Example: <strong>SETS</strong> for FTSE All-Share equities.</li>\n  <li>Best suited to liquid, actively traded securities where natural buyers and sellers exist.</li>\n</ul>", "keypoints": ["Quote-driven: market makers provide continuous bid/offer prices; investors deal at quoted prices", "Order-driven: investor orders entered into order book; matched electronically by price/time", "SEAQ = quote-driven; SETS = order-driven", "Quote-driven suits less liquid securities; order-driven suits high-volume liquid stocks", "Market makers profit from bid-ask spread; take inventory risk"], "questions": [{"q": "On SETS (order-driven market), how are trades executed?", "opts": "A) Investors call a market maker who quotes a bid/offer price\nB) Buy and sell orders are entered into an electronic book and matched automatically\nC) A specialist firm sets the clearing price once per day\nD) Trades are executed via an inter-dealer broker", "ans": "B — SETS is an order-driven electronic order book: orders from buyers and sellers are matched automatically by price and time priority, without the need for market makers."}]}, {"id": "1.3.8", "text": "Explain the roles of the various participants in the UK equity market", "explanation": "<p>Key participants in the UK equity market and their roles:</p>\n<ul>\n  <li><strong>Brokers</strong>: act as agents, executing buy/sell orders on behalf of clients (investors). Charge commission. Do not take principal risk.</li>\n  <li><strong>Market makers</strong>: dealers who commit to providing continuous two-way prices (bid/offer) in their assigned stocks. Provide liquidity, profit from spread, take inventory risk. Required on SEAQ and SETSqx.</li>\n  <li><strong>Institutional investors</strong>: pension funds, insurance companies, unit trusts. The dominant buyers and sellers of equities. Transact in large blocks.</li>\n  <li><strong>Retail investors</strong>: individual investors, typically transacting in smaller sizes via brokers or platforms.</li>\n  <li><strong>Custodians</strong>: hold securities on behalf of investors; manage settlement and corporate actions.</li>\n  <li><strong>Regulators</strong>: FCA regulates conduct; PRA regulates prudential standards.</li>\n  <li><strong>LCH.Clearnet</strong>: central counterparty — clears SETS/SETSqx trades and eliminates counterparty risk.</li>\n  <li><strong>CREST</strong>: settlement system — holds shares in dematerialised form and settles T+2.</li>\n</ul>", "keypoints": ["Broker: agent for clients, earns commission, does not take principal risk", "Market maker: provides two-way quotes, earns spread, takes inventory risk", "Institutional investors (pension funds, insurers, unit trusts): dominant equity owners", "LCH.Clearnet: CCP for SETS/SETSqx — clears trades, eliminates counterparty risk", "CREST: electronic settlement system, holds shares in dematerialised form, settles T+2"], "questions": [{"q": "A broker executes a client's order to buy 1,000 shares and earns a commission. The broker has acted as:", "opts": "A) A principal, taking on inventory risk\nB) A market maker\nC) An agent, acting on behalf of the client\nD) A central counterparty", "ans": "C — A broker acts as agent: it executes orders on behalf of clients and earns a commission. It does not take the other side of the trade as principal."}]}, {"id": "1.3.9", "text": "Explain algorithmic and high-frequency trading, its benefits, risks and regulation", "explanation": "<p><strong>Algorithmic trading (algo trading)</strong>: the use of computer programs to execute trading decisions based on pre-defined rules (algorithms). Can handle large orders by breaking them into smaller slices, optimising execution price and speed.</p>\n<p><strong>High-frequency trading (HFT)</strong>: a subset of algo trading characterised by extremely high speeds (milliseconds or microseconds), high order volumes and very short holding periods. Firms co-locate servers next to exchange matching engines to minimise latency.</p>\n<p><strong>Benefits:</strong></p>\n<ul>\n  <li>Increased market liquidity — HFT firms frequently act as de facto market makers</li>\n  <li>Tighter bid-ask spreads</li>\n  <li>Faster price discovery and greater market efficiency</li>\n</ul>\n<p><strong>Risks:</strong></p>\n<ul>\n  <li><strong>Flash crashes</strong>: rapid, extreme price moves caused by algorithmic feedback loops (e.g. US Flash Crash 2010)</li>\n  <li><strong>Market manipulation</strong>: spoofing (placing and cancelling large orders to move prices)</li>\n  <li><strong>Systemic risk</strong>: interconnected algos can amplify market dislocations</li>\n</ul>\n<p><strong>Regulation (MiFID II)</strong>: algo traders must be authorised; must have kill switches; must test algorithms; must keep records of all orders.</p>", "keypoints": ["Algo trading: computer programs execute trades based on rules; breaks large orders into slices", "HFT: extreme speed (ms/μs), high volume, very short holding periods, co-location", "Benefits: more liquidity, tighter spreads, faster price discovery", "Risks: flash crashes (feedback loops), spoofing/manipulation, systemic risk", "MiFID II: algo traders need authorisation, kill switches, algorithm testing, order records"], "questions": [{"q": "The US Flash Crash of 2010, when markets fell and recovered within minutes, is cited as a risk associated with:", "opts": "A) Central counterparty clearing\nB) High-frequency algorithmic trading feedback loops\nC) Dark pool pre-trade transparency\nD) T+2 settlement cycles", "ans": "B — The Flash Crash was primarily attributed to algorithmic/HFT feedback loops where sell orders triggered further automated selling, causing extreme short-term price dislocations."}]}]}, {"id": "1.4", "title": "The UK Listing Authority and Prospectus Requirements", "points": [{"id": "1.4.1", "text": "Explain the role of the Financial Conduct Authority (FCA) as the UK listing authority", "explanation": "<p>The <strong>Financial Conduct Authority (FCA)</strong> acts as the <strong>UK Listing Authority (UKLA)</strong> — the \"competent authority\" responsible for admitting securities to the <strong>Official List</strong>.</p>\n<p>Key responsibilities as UKLA:</p>\n<ul>\n  <li>Decides on applications for admission to the Official List</li>\n  <li>Approves prospectuses/listing particulars before a company can list</li>\n  <li>Maintains and enforces the <strong>Listing Rules</strong> (LR)</li>\n  <li>Enforces the <strong>Disclosure and Transparency Rules (DTR)</strong></li>\n  <li>Enforces the <strong>Market Abuse Regulation (MAR)</strong></li>\n  <li>Can censure, fine or delist companies that breach rules</li>\n  <li>Maintains the UK Financial Services Register</li>\n</ul>\n<p>The Official List is separate from admission to trading on the London Stock Exchange (LSE). Both are needed for a \"full listing\".</p>", "keypoints": ["FCA is the UK Listing Authority (UKLA) — 'competent authority' for the Official List", "FCA approves prospectuses/listing particulars before listing", "Enforces Listing Rules (LR), DTRs and Market Abuse Regulation (MAR)", "Official List admission (FCA) is separate from LSE admission to trading (both needed for full listing)", "FCA can censure, fine or delist companies for breaches"], "questions": [{"q": "Which body acts as the UK Listing Authority and decides on admission to the Official List?", "opts": "A) The London Stock Exchange\nB) The Bank of England\nC) The Financial Conduct Authority (FCA)\nD) The Prudential Regulation Authority (PRA)", "ans": "C — The FCA acts as the UK Listing Authority (UKLA) and is the competent authority responsible for admission to the Official List."}]}, {"id": "1.4.2", "text": "Identify the listing rules in the Financial Services and Markets Act (FSMA) 2000 as amended", "explanation": "<p>The <strong>Financial Services and Markets Act 2000 (FSMA 2000)</strong> is the primary legislation underpinning UK financial regulation and provides the legal basis for the Listing Rules.</p>\n<p>Under FSMA 2000:</p>\n<ul>\n  <li>The FCA has the power to make <strong>Listing Rules</strong> governing conditions for admission to the Official List and continuing obligations</li>\n  <li>Establishes the requirement for an approved <strong>prospectus</strong> before a public offering or admission to trading on a regulated market</li>\n  <li>Provides the FCA with powers to enforce the rules — including the ability to impose financial penalties, issue public censures and cancel listings</li>\n  <li>The FCA's rulebook (which includes the Listing Rules, DTRs and Prospectus Regulation Rules) is made under powers granted by FSMA</li>\n</ul>\n<p>The Listing Rules distinguish between <strong>Premium listing</strong> (higher standards) and <strong>Standard listing</strong> (minimum EU standards) — with different ongoing obligations for each.</p>", "keypoints": ["FSMA 2000: primary legislation underpinning UK financial regulation", "FSMA grants FCA powers to make Listing Rules, enforce them, impose penalties", "Listing Rules distinguish Premium listing (higher standards) vs Standard listing (minimum EU)", "FSMA requires an approved prospectus before public offering or admission to trading"], "questions": [{"q": "Under which legislation does the FCA derive its power to make and enforce the Listing Rules?", "opts": "A) The Companies Act 2006\nB) The Financial Services and Markets Act 2000 (FSMA)\nC) The Prospectus Regulation 2017\nD) The Market Abuse Regulation (MAR)", "ans": "B — FSMA 2000 is the primary enabling legislation that gives the FCA its powers to make the Listing Rules and other regulatory rules."}]}, {"id": "1.4.3", "text": "Explain the main conditions for listing on the Official List, AIM and AQSE", "explanation": "<p><strong>Premium listing (Official List):</strong></p>\n<ul>\n  <li>Published accounts covering at least <strong>3 years</strong></li>\n  <li>Expected aggregate market value: at least <strong>£30 million</strong> (shares) or £200,000 (debt securities)</li>\n  <li><strong>Free float</strong>: at least <strong>10%</strong> of issued shares in public hands</li>\n  <li>Working capital: sufficient for at least the next <strong>12 months</strong></li>\n  <li>A <strong>sponsor</strong> must be appointed (for Premium listing)</li>\n  <li>Standard listing has relaxed criteria (no sponsor, no working capital requirement)</li>\n</ul>\n<p><strong>AIM (Alternative Investment Market):</strong></p>\n<ul>\n  <li>Administered by the LSE (not a regulated market)</li>\n  <li>Company must appoint and retain a <strong>nominated advisor (Nomad)</strong></li>\n  <li>Admission document required (not a full prospectus)</li>\n  <li>No minimum market cap or free float specified (but Nomad must be satisfied)</li>\n</ul>\n<p><strong>AQSE Growth Market:</strong></p>\n<ul>\n  <li>Must appoint and retain an <strong>AQSE corporate adviser</strong></li>\n  <li>At least <strong>24 months</strong> audited accounts</li>\n  <li>At least <strong>10% free float</strong></li>\n  <li>Corporate governance standards required</li>\n</ul>", "keypoints": ["Premium listing: 3yr accounts, £30m market cap (shares), 10% free float, 12m working capital, sponsor", "Standard listing: relaxed criteria vs Premium (no sponsor requirement, no working capital test)", "AIM: LSE-administered, requires Nomad (nominated advisor), admission document", "AQSE Growth Market: AQSE corporate adviser, 24 months accounts, 10% free float"], "questions": [{"q": "A company seeking a Premium listing on the Official List must have a free float of at least:", "opts": "A) 5%\nB) 10%\nC) 25%\nD) 50%", "ans": "B — Premium listing requires at least 10% of issued shares to be in public hands (free float)."}, {"q": "Which of the following is required for a Premium listing but NOT for an AIM admission?", "opts": "A) An admission document\nB) A nominated advisor (Nomad)\nC) A sponsor and at least 3 years' accounts\nD) A corporate adviser", "ans": "C — Premium listing requires a sponsor and 3 years' accounts. AIM requires a Nomad (not a sponsor) and has no minimum account history requirement."}]}, {"id": "1.4.4", "text": "Explain the purpose of the requirement for a prospectus or listing particulars", "explanation": "<p>A <strong>prospectus</strong> (or listing particulars) is a formal legal document that must be approved by the FCA before:</p>\n<ul>\n  <li>A public offer of securities to investors, or</li>\n  <li>Admission of securities to trading on a regulated market</li>\n</ul>\n<p><strong>Purpose:</strong></p>\n<ul>\n  <li>Provide investors with all <strong>material information</strong> needed to make an informed investment decision</li>\n  <li>Establish legal liability: if the prospectus is misleading or incorrect, directors and the company may be liable</li>\n  <li>Ensure <strong>market transparency</strong> and investor protection</li>\n</ul>\n<p><strong>Contents typically include:</strong></p>\n<ul>\n  <li>Company overview, business description, strategy</li>\n  <li>Historical financial information (usually 3 years)</li>\n  <li>Risk factors</li>\n  <li>Details of the offer (price, number of shares, use of proceeds)</li>\n  <li>Directors' details and remuneration</li>\n  <li>Working capital statement</li>\n</ul>", "keypoints": ["Prospectus required before public offer of securities OR admission to trading on a regulated market", "Purpose: give investors all material information to make an informed decision", "Establishes legal liability — directors liable if prospectus is misleading", "Contains: business overview, 3yr financials, risk factors, offer details, directors, working capital"], "questions": [{"q": "The PRIMARY purpose of requiring a prospectus before a public offering is to:", "opts": "A) Enable the FCA to collect listing fees\nB) Ensure investors have all material information to make an informed investment decision\nC) Allow the company to fix its share price in advance\nD) Prevent small companies from accessing public markets", "ans": "B — The prospectus is fundamentally an investor protection measure: it ensures all material information is disclosed so that investors can make informed decisions."}]}, {"id": "1.4.5", "text": "Identify the main exemptions from listing particulars", "explanation": "<p>The following are the main <strong>exemptions</strong> from the requirement to publish a prospectus (relating to admission to trading; note that a rights issue to the public always requires a prospectus even if shares are the same class):</p>\n<ol>\n  <li><strong>Qualified investors only</strong>: the offer is made exclusively to institutional or professional investors who have the expertise to assess risk.</li>\n  <li><strong>Fewer than 150 persons</strong>: the offer is made to fewer than 150 natural or legal persons per EEA state (other than qualified investors).</li>\n  <li><strong>Minimum denomination ≥ €100,000</strong>: the minimum investment per investor is at least €100,000 — implies sophisticated/wealthy investors.</li>\n  <li><strong>Less than 20% of same class</strong>: the shares represent less than 20% of the number of shares of the same class already admitted for trading on the same regulated market. <em>Note: this exemption applies only to admission to trading, not a public offer — a rights issue to the public still requires a prospectus regardless.</em></li>\n</ol>", "keypoints": ["Exemption 1: offer made exclusively to qualified investors", "Exemption 2: offer made to fewer than 150 persons per EEA state", "Exemption 3: minimum investment ≥ €100,000 per investor", "Exemption 4: shares < 20% of same class already admitted (admission only, not public offer)", "IMPORTANT: rights issues to the public ALWAYS require a prospectus, regardless of % of class"], "questions": [{"q": "A company issues new shares representing 15% of its existing class of shares already traded on a regulated market, offered only to institutional investors. Which exemption from the prospectus requirement MOST likely applies?", "opts": "A) The offer is made to fewer than 150 persons\nB) The shares are less than 20% of the same class already admitted to trading\nC) The minimum investment is €100,000\nD) No exemption applies — a prospectus is always required", "ans": "B — Shares under 20% of the same class already admitted to a regulated market are exempt from the prospectus requirement (for admission purposes)."}, {"q": "A company makes a rights issue to all its shareholders (members of the public). Must it publish a prospectus?", "opts": "A) No — it is the same class of shares already traded\nB) No — the minimum investment will exceed €100,000\nC) Yes — a rights issue to the public always requires a prospectus\nD) Only if more than 150 shareholders are eligible", "ans": "C — Rights issues directed to the public always require a prospectus, even if the new shares are the same class as those already listed. The 20% exemption only applies to admission to trading, not to public offers."}]}]}, {"id": "1.5", "title": "Information Disclosure and Corporate Governance Requirements for UK Equity Markets", "points": [{"id": "1.5.1", "text": "Explain the disclosures required under the disclosure and transparency rules relating to directors' interests and major shareholdings", "explanation": "<p>The FCA's <strong>Disclosure and Transparency Rules (DTR)</strong> impose two key disclosure requirements:</p>\n<p><strong>Directors and PDMRs (Persons Discharging Managerial Responsibilities):</strong></p>\n<ul>\n  <li>PDMRs must notify the <strong>company AND the FCA</strong> of transactions in company securities within <strong>3 business days</strong> of the transaction.</li>\n  <li>This includes the PDMR's connected persons (spouse, minor children).</li>\n  <li>The company must then disclose this to the market within <strong>2 business days</strong> of receiving the notification.</li>\n</ul>\n<p><strong>Major shareholdings:</strong></p>\n<ul>\n  <li>Investors must notify the company when a holding <strong>reaches 3%</strong>, or thereafter goes up or down to a new <strong>whole percentage point</strong>, or falls below 3%.</li>\n  <li>Notification must be made <strong>within 2 business days</strong>.</li>\n  <li>Listed companies must maintain a <strong>register of disclosures</strong>.</li>\n  <li>Companies may require confirmation of interests held at any time in the last <strong>3 years</strong>.</li>\n</ul>", "keypoints": ["PDMRs: must notify company AND FCA of share transactions within 3 business days", "Major shareholders: notify company when crossing 3% threshold (then each whole % up or down)", "Major shareholder notification: within 2 business days of crossing threshold", "Companies maintain a register of disclosures; can seek confirmation of interests over last 3 years"], "questions": [{"q": "A PDMR sells shares in their company. Within how many days must they notify the company and the FCA?", "opts": "A) 1 business day\nB) 2 business days\nC) 3 business days\nD) 5 business days", "ans": "C — PDMRs must notify the company AND the FCA within 3 business days of the transaction."}, {"q": "An investor's stake in a listed company rises from 2.8% to 3.2%. What is required?", "opts": "A) No action — the threshold is 5%\nB) Notify the company within 2 business days as the 3% threshold has been crossed\nC) Notify the FCA directly within 3 business days\nD) No notification required until the stake reaches 5%", "ans": "B — Investors must notify the company within 2 business days when a holding first reaches 3%."}]}, {"id": "1.5.2", "text": "Explain the purpose of corporate governance regulation and the role of the Financial Reporting Council in promoting good corporate governance", "explanation": "<p><strong>Corporate governance</strong> is the system by which companies are directed and controlled. Good corporate governance ensures that those running a company act in the interests of shareholders (and other stakeholders).</p>\n<p><strong>Purpose of corporate governance regulation:</strong></p>\n<ul>\n  <li>Protect shareholders from management self-interest</li>\n  <li>Improve accountability and transparency</li>\n  <li>Build trust in capital markets</li>\n  <li>Reduce the agency problem between owners and managers</li>\n</ul>\n<p><strong>Financial Reporting Council (FRC):</strong></p>\n<ul>\n  <li>Independent body that promotes good corporate governance and financial reporting standards in the UK.</li>\n  <li>Produces the <strong>UK Corporate Governance Code</strong> (apply on a comply-or-explain basis for Premium listed companies).</li>\n  <li>Also produces the <strong>UK Stewardship Code</strong> (for institutional investors and asset managers).</li>\n  <li>Oversees the accountancy profession.</li>\n</ul>", "keypoints": ["Corporate governance: system by which companies are directed and controlled", "Purpose: protect shareholders, improve accountability, build trust, reduce agency problem", "FRC: independent body promoting good corporate governance and financial reporting in UK", "FRC produces UK Corporate Governance Code (comply-or-explain for Premium listed companies)", "FRC also produces UK Stewardship Code for institutional investors"], "questions": [{"q": "Which body produces the UK Corporate Governance Code?", "opts": "A) Financial Conduct Authority (FCA)\nB) Bank of England\nC) Financial Reporting Council (FRC)\nD) London Stock Exchange", "ans": "C — The Financial Reporting Council (FRC) is the independent body that produces the UK Corporate Governance Code."}]}, {"id": "1.5.3", "text": "Explain, in outline, the scope and content of corporate governance standards in the UK", "explanation": "<p>The <strong>UK Corporate Governance Code</strong> (produced by the FRC) applies on a <strong>comply-or-explain</strong> basis to <strong>Premium listed</strong> companies.</p>\n<p>Key areas covered:</p>\n<ul>\n  <li><strong>Board leadership and purpose</strong>: an effective and entrepreneurial board, collective responsibility, clear roles for Chairman and CEO (should not be same person).</li>\n  <li><strong>Division of responsibilities</strong>: clear division between board leadership (Chairman) and running the business (CEO).</li>\n  <li><strong>Composition, succession and evaluation</strong>: regular board evaluation; sufficient independent non-executive directors (NEDs); diverse board.</li>\n  <li><strong>Audit, risk and internal control</strong>: audit committee (majority independent NEDs); external auditor independence; risk management systems.</li>\n  <li><strong>Remuneration</strong>: remuneration committee (majority NEDs); pay aligned with long-term performance and company values; transparent reporting.</li>\n</ul>\n<p><strong>Comply-or-explain</strong>: companies must either comply with each provision of the Code or explain in their annual report why they have not.</p>", "keypoints": ["UK Corporate Governance Code: comply-or-explain basis for Premium listed companies", "Chairman and CEO roles should be separate (no combined role)", "Board composition: sufficient independent NEDs, regular evaluation, diversity", "Audit committee: majority independent NEDs; oversees risk, internal control, audit", "Remuneration committee: NEDs set pay; must align with long-term performance"], "questions": [{"q": "The UK Corporate Governance Code applies to Premium listed companies on which basis?", "opts": "A) Mandatory — companies must comply with all provisions\nB) Comply-or-explain — comply or explain why not in the annual report\nC) Voluntary — guidance only with no disclosure requirement\nD) Comply-or-fine — regulators impose fines for non-compliance", "ans": "B — The UK Corporate Governance Code operates on a 'comply-or-explain' basis: companies must either comply with each provision or explain in their annual report why they have not done so."}]}, {"id": "1.5.4", "text": "Explain the purpose and scope of the Shareholders Rights Directive (SRD II) and its impact on pension schemes", "explanation": "<p>The <strong>Shareholders Rights Directive II (SRD II)</strong> is an E
